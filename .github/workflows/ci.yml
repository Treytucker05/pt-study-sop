name: CI

on:
  push:
  pull_request:

jobs:
  ai_config_drift:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AI config drift check
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/sync_agent_config.ps1 -Mode Check

  harness_contract:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          pip install -r brain/requirements.txt
          pip install pytest

      - name: Harness bootstrap
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\harness.ps1 -Mode Bootstrap -Profile Hermetic -Json

      - name: Harness hermetic smoke
        shell: pwsh
        run: |
          $artifact = Join-Path $env:RUNNER_TEMP "pt-harness-artifacts"
          $data = Join-Path $env:RUNNER_TEMP "pt-harness-data"
          if (Test-Path $artifact) { Remove-Item -Recurse -Force $artifact }
          if (Test-Path $data) { Remove-Item -Recurse -Force $data }

          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\harness.ps1 -Mode Run -Profile Hermetic -Port 5127 -DataRoot $data -ArtifactRoot $artifact -NoBrowser -SkipUiBuild

          $runPath = Join-Path $artifact "run.json"
          if (-not (Test-Path $runPath)) {
            throw "Harness run metadata missing at $runPath."
          }

          $run = Get-Content -Raw $runPath | ConvertFrom-Json
          try {
            pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\harness.ps1 -Mode Eval -Scenario tutor-hermetic-smoke -ArtifactRoot $artifact -Json
            pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\harness.ps1 -Mode Report -RunId $run.run_id -ArtifactRoot $artifact -Json
          }
          finally {
            if ($run -and $run.server_pid) {
              Stop-Process -Id $run.server_pid -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-contract-windows
          path: ${{ runner.temp }}\pt-harness-artifacts

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r brain/requirements.txt
          pip install pytest

      - name: Docs sync check
        run: python scripts/check_docs_sync.py

      - name: Run tests
        run: python -m pytest brain/tests

  sop_validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r sop/requirements.txt pytest

      - name: Validate library (strict)
        run: python sop/tools/validate_library.py --strict

      - name: Build runtime bundles
        run: python sop/tools/build_runtime_bundle.py

      - name: Run SOP tests
        run: python -m pytest sop/tests/ -v
