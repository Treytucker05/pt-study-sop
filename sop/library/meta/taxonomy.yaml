categories:
  plan:
    label: "PLAN"
    description: "Turn a learner goal into a bounded session/week/multi-week plan with explicit scope, method choice, and review timing"
    prefix: PLAN
    aliases: ["planning", "schedule", "preplan"]
  orient:
    label: "ORIENT"
    description: "Quick orientation pass to surface terminology, big picture, and learning objectives before deeper teaching"
    prefix: PRE
    aliases: ["orientation", "scope", "preview"]
  prime:
    label: "PRIME"
    description: "Prepare attention and build structure from the source before detail"
    prefix: PRE
    aliases: ["prep", "warmup", "prime", "prepare"]
  teach:
    label: "TEACH"
    description: "Deliver first-contact explanation in bounded chunks before diagnostic probing"
    prefix: TEA
    aliases: ["instruct", "teach_first", "guided_explanation"]
  explain:
    label: "EXPLAIN"
    description: "Multi-level explanatory teaching (depth ladder, story spine, mechanism trace) — first-contact explanation specialized for narrative or layered exposure"
    prefix: TEA
    aliases: ["explanation", "teach_explain"]
  calibrate:
    label: "CALIBRATE"
    description: "Diagnostic readiness checks after PRIME or TEACH to identify weaknesses before learner production"
    prefix: CAL
    aliases: ["diagnostic", "baseline", "pretest"]
  encode:
    label: "ENCODE"
    description: "Attach meaning to material through active processing"
    prefix: ENC
    aliases: ["encoding", "attach_meaning", "elaboration"]
  reference:
    label: "REFERENCE"
    description: "Generate target cues and cheat sheets for retrieval"
    prefix: REF
    aliases: ["cue_gen", "anchor", "target"]
  consolidate:
    label: "CONSOLIDATE"
    description: "Stabilize and link reference artifacts (one-page anchors, question-bank seeds) so retrieval has explicit targets"
    prefix: REF
    aliases: ["consolidation", "stabilize", "anchor_finalize"]
  retrieve:
    label: "RETRIEVE"
    description: "Test recall with adversarial near-miss and timed sprints"
    prefix: RET
    aliases: ["recall", "test", "practice"]
  interrogate:
    label: "INTERROGATE"
    description: "Active questioning and self-testing to strengthen encoding"
    prefix: INT
    aliases: ["question", "self_test", "interrogation"]
  overlearn:
    label: "OVERLEARN"
    description: "Close loop, capture artifacts, Anki, drill sheets"
    prefix: OVR
    aliases: ["wrap", "refine"]

