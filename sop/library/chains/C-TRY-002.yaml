id: C-TRY-002
name: "Top-Down Forward Progress"
description: >-
  Top-down first-exposure chain with tiered exits and explicit opening order:
  MICRO-CALIBRATE -> TEACH -> FULL CALIBRATE. TEACH closes with a learner-usable
  anchor artifact before any mnemonic slot. Teach-back is removed from the
  default live path.
blocks:
  # --- TIER 1: opening architecture complete ---
  - M-PRE-004      # Hierarchical Advance Organizer
  - M-CAL-001      # MICRO-CALIBRATE baseline
  - M-ENC-008      # TEACH Mechanism Trace
  - M-INT-001      # TEACH Analogy Bridge
  - M-REF-003      # TEACH-close artifact
  - M-CAL-002      # FULL CALIBRATE probes
  - M-CAL-003      # FULL CALIBRATE priority set
  # --- TIER 2: deep encode ---
  - M-ENC-015      # Hand-Draw Map
  - M-ENC-001      # Full KWIK Hook (deeper ENCODE)
  - M-ENC-009      # Concept Map (learner-facing production)
  # --- TIER 3: retrieval + closure ---
  - M-RET-001      # Timed Brain Dump
  - M-OVR-004      # Brain Dump + Exit
allowed_modes:
  - classification
  - mechanism
  - definition
  - procedure
  - spatial
  - recognition
gates:
  - prime_artifacts_present
  - micro_calibrate_before_teach
  - teach_chunk_delivered_when_present
  - teach_close_artifact_ready
  - full_calibrate_after_teach
  - mnemonic_after_teach_close_artifact_only
  - retrieve_after_reference_only
  - tier_exit_allowed
failure_actions:
  - if_micro_calibrate_unstable_reduce_initial_chunk
  - if_full_calibrate_poor_route_to_targeted_encode
  - substitute_by_error_type_mapping
requires_reference_targets: true
tier_exits:
  tier_1:
    after_block: M-CAL-003
    min_duration_min: 24
    description: "Opening architecture complete (MICRO-CALIBRATE -> TEACH -> FULL CALIBRATE). Safe to stop."
  tier_2:
    after_block: M-ENC-009
    min_duration_min: 38
    description: "Deep encoding complete. Safe to stop."
  tier_3:
    after_block: M-OVR-004
    min_duration_min: 50
    description: "Full session with retrieval + closure."
context_tags:
  stage: first_exposure
  energy: medium
  time_available: 50
  learner_style: top_down_structured
runtime_profile:
  opening_sequence:
    - MICRO-CALIBRATE
    - TEACH
    - FULL_CALIBRATE
  depth_policy: brief_l0_hook_then_l3_mechanism_then_l4_precision_with_l1_l2_fallback_only
  l3_to_l4_gate: low_friction_function_confirmation
  teaching_style: explanation-first but structured and target-oriented
  mnemonic_policy: mnemonic slot only after TEACH-close artifact; full KWIK remains ENCODE depth work
  provenance_mode: strict
  confidence_floor: medium
default_knobs:
  energy: medium
  near_miss_intensity: low
  time_available_min: 50
  timed: soft
block_overrides:
  M-ENC-008:
    teach_packet:
      concept_type: mechanism
      bridge_choice: mechanism_trace
      artifact_target: one_page_anchor
      escalation_rule: brief_l0_hook_then_l3_mechanism_then_l4_precision_with_low_friction_function_confirmation
  M-INT-001:
    teach_packet:
      concept_type: compare_contrast
      bridge_choice: analogy_bridge
      artifact_target: one_page_anchor
      escalation_rule: brief_l0_hook_then_l3_mechanism_then_l4_precision_with_low_friction_function_confirmation
  M-ENC-001:
    slot_policy:
      requires_teach_close_artifact: true
      runtime_live_slot: kwik_lite_pending_runtime_lane
      full_kwik_position: encode_deepening
proving_ground: true
weak_cards_log: []
is_template: true
status: draft
evidence:
  advance_organizer: "Ausubel (1960); Mayer (1979) d=0.57"
  concept_mapping: "Faraji et al. (2025) SMD=1.693, 44 RCTs"
  coverage_trap: "Bjork et al. (2013) fluency illusion; Dunlosky and Rawson (2012)"
