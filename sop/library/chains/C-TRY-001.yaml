id: C-TRY-001
name: Top-Down Narrative Mastery
description: "Top-down first-exposure chain with explicit opening order: MICRO-CALIBRATE -> TEACH -> FULL CALIBRATE. TEACH builds a story + analogy bridge, closes with a compact anchor artifact, then full calibrate determines ENCODE depth. Teach-back is not a default live gate."
blocks:
  - M-PRE-004      # Hierarchical Advance Organizer (H1 map)
  - M-ENC-015      # Hand-Draw Map (spatial orientation)
  - M-CAL-001      # MICRO-CALIBRATE baseline
  - M-TEA-001      # TEACH Story Spine
  - M-INT-001      # TEACH Analogy Bridge
  - M-REF-003      # TEACH-close artifact (One-Page Anchor)
  - M-CAL-002      # FULL CALIBRATE probes
  - M-CAL-003      # FULL CALIBRATE priority set
  - M-ENC-001      # Full KWIK Hook (deeper ENCODE, not live-lite mnemonic)
  - M-ENC-009      # Concept Map (learner production)
  - M-RET-001      # Timed Brain Dump
  - M-OVR-004      # Post-Learn Brain Dump closure
allowed_modes:
  - classification
  - mechanism
  - definition
  - procedure
  - spatial
gates:
  - prime_artifacts_present
  - micro_calibrate_before_teach
  - teach_chunk_delivered_when_present
  - teach_close_artifact_ready
  - full_calibrate_after_teach
  - mnemonic_after_teach_close_artifact_only
  - retrieve_after_reference_only
failure_actions:
  - if_micro_calibrate_unstable_reduce_teach_chunk_size
  - if_full_calibrate_poor_route_to_targeted_encode
  - substitute_by_error_type_mapping
requires_reference_targets: true
context_tags:
  stage: first_exposure
  energy: medium
  time_available: 45
  learner_style: top_down_narrative
runtime_profile:
  opening_sequence:
    - MICRO-CALIBRATE
    - TEACH
    - FULL_CALIBRATE
  teaching_style: explanation-first, big-picture narrative, interactive pauses
  depth_policy: brief_l0_hook_then_l3_mechanism_then_l4_precision_with_l1_l2_fallback_only
  l3_to_l4_gate: low_friction_function_confirmation
  mnemonic_policy: mnemonic slot only after TEACH-close artifact; full KWIK remains ENCODE depth work
  provenance_mode: strict
  confidence_floor: medium
  output_policy: notes and cards must be dependable session outputs
block_overrides:
  M-TEA-001:
    teach_packet:
      concept_type: procedure
      bridge_choice: story_spine
      artifact_target: one_page_anchor
      escalation_rule: brief_l0_hook_then_l3_mechanism_then_l4_precision_with_low_friction_function_confirmation
  M-INT-001:
    teach_packet:
      concept_type: mechanism
      bridge_choice: analogy_bridge
      artifact_target: one_page_anchor
      escalation_rule: brief_l0_hook_then_l3_mechanism_then_l4_precision_with_low_friction_function_confirmation
  M-ENC-001:
    slot_policy:
      requires_teach_close_artifact: true
      runtime_live_slot: kwik_lite_pending_runtime_lane
      full_kwik_position: encode_deepening
proving_ground: true
weak_cards_log: []
is_template: true
status: draft
