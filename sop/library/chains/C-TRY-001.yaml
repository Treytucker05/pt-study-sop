id: C-TRY-001
name: Top-Down Narrative Mastery
description: 'Trey''s primary chain. Top-down narrative processor flow: big-picture H1 map → hand-draw spatial encoding → story confidence check → L1-L2 narrative build with Kwik sound-stories + analogies → One-Page Anchor (hand-draw) → gentle story recall after learner says "ready" → Teach-back + Post-Learn Brain Dump for closure. 45 min, medium energy, framework-only. Tutor ingests material, teaches interactively with "does this click?" pauses, never quizzes prematurely.'
blocks:
- M-PRE-004      # Hierarchical Advance Organizer (H1 map — 5 min)
- M-PRE-011      # Hand-Draw Map (spatial mind map — 5 min cap)
- M-CAL-004      # Story Confidence Tag (narrative-level calibration — 2 min)
- M-ENC-001      # KWIK Hook (sound-story mnemonics — 3 min per term)
- M-INT-001      # Analogy Bridge (cross-domain connections — 5 min)
- M-REF-003      # One-Page Anchor (hand-draw reference sheet — 5 min)
- M-RET-001      # Timed Brain Dump (timed topic recall — 5 min)
- M-ENC-004      # Teach-Back (explain it back — 5 min)
- M-OVR-004      # Post-Learn Brain Dump (full recall + gap fill — 7 min)
allowed_modes:
- classification
- mechanism
- definition
- procedure
- spatial
gates:
- prime_artifacts_present
- calibrate_before_deep_encode
- learner_confirms_ready_before_retrieve
- retrieve_after_reference_only
failure_actions:
- if_story_confidence_low_repeat_narrative
- if_recall_poor_return_to_encode
- substitute_by_error_type_mapping
requires_reference_targets: true
context_tags:
  stage: first_exposure
  energy: medium
  time_available: 45
  learner_style: top_down_narrative
runtime_profile:
  provenance_mode: strict       # always cite sources inline; flag general-knowledge claims
  confidence_floor: medium      # do not proceed if confidence is below this threshold
  block_overrides: {}           # per-block knob overrides (empty for now)
  teaching_style: explanation-first, big-picture narrative, interactive pauses
  analogy_policy: analogies encouraged as teaching bridges, never as evidence claims
  retrieval_timing: delay retrieval until learner says ready after narrative build
  provenance_policy: materials and notes first for factual claims; general knowledge allowed for conceptual teaching with explicit disclosure
  confidence_policy: qualitative grounding labels preferred over raw numeric confidence for normal tutoring
  output_policy: notes and cards must be dependable session outputs
block_overrides:
  M-ENC-001:
    allowed_moves:
      - Use sound-story mnemonics only after the learner understands the concept's function.
      - Keep hooks tied to the narrative thread already built in the session.
    forbidden_moves:
      - Do not replace explanation with mnemonic generation.
      - Do not present mnemonic content as source evidence.
    required_outputs:
      - KWIK hook that preserves the concept's actual meaning
    chain_specific_prompt: Treat mnemonics as support for understanding, not as the main teaching mechanism.
  M-INT-001:
    allowed_moves:
      - Use analogies to bridge from familiar systems to the target concept.
      - Explicitly test where the analogy breaks down.
    forbidden_moves:
      - Do not present an analogy as if it were a sourced fact.
      - Do not let the analogy replace the real concept definition.
    required_outputs:
      - Analogy
      - structural mapping
      - breakdown point
    chain_specific_prompt: Analogies are teaching bridges. Mark their limits clearly and return to the actual concept before moving on.
  M-REF-003:
    allowed_moves:
      - Preserve the narrative spine when building the reference artifact.
      - Keep the anchor compact enough to support later gentle recall.
    forbidden_moves:
      - Do not turn the one-page anchor into a bloated study guide.
    required_outputs:
      - One-page anchor that keeps the main story thread visible
  M-RET-001:
    allowed_moves:
      - Run gentle story recall only after the learner confirms readiness.
    forbidden_moves:
      - Do not surprise the learner with retrieval before readiness is confirmed.
      - Do not turn this block into itemized quizzing.
    required_outputs:
      - timed recall of the narrative thread
      - explicit gap markers
    chain_specific_prompt: In this chain, retrieval is readiness-gated and should feel like story reconstruction, not exam interrogation.
  M-ENC-004:
    allowed_moves:
      - Use teach-back to surface breakdowns in the learner's explanation.
      - Ask clarifying questions that deepen explanation.
    forbidden_moves:
      - Do not grade or verdict the learner unexpectedly.
      - Do not switch into strict evaluation mode unless explicitly requested.
    required_outputs:
      - learner explanation
      - breakdown list
      - targeted review items
  M-OVR-004:
    allowed_moves:
      - Use the dump as session closure and gap capture.
    forbidden_moves:
      - Do not turn this into a second harsh retrieval block.
      - Do not reopen full teaching during the closure block.
    required_outputs:
      - session-level dump
      - gap list
      - gap-fill annotations
proving_ground: true
weak_cards_log: []
is_template: true
status: draft
