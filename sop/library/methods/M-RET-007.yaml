id: M-RET-007
name: Timed Sprint Sets
category: retrieve
subcategory: timed
description: Execute timed retrieval sprints and record latency per item to expose speed bottlenecks.
control_stage: RETRIEVE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- retrieval
- timing
- latency
purpose: Timed Sprint Sets exists to run timed retrieval sprints that surface speed bottlenecks and item-level latency patterns.
  It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use REFERENCE if the learner needs
  an anchor first.
best_fit_topics:
- speed bottleneck exposure
- timed item batches
- latency tracking
poor_fit_topics:
- slow reflective essays
- untimed recall
- new instruction
learner_state_required: The learner already has source material or an anchor available, the source will be closed for recall,
  and a retrieval target exists.
inputs:
- description: Question Bank Seed
  required: true
- description: Timer
  required: true
outputs:
- name: Timed sprint result set with per-item accuracy
  description: A timed practice log that pairs accuracy with item latency and speed bottlenecks.
  format: structured response
- name: Latency log (time_to_answer per item)
  description: A structured output for timed retrieval sprints that surface speed bottlenecks and item-level latency patterns.
  format: structured log
- name: ErrorLog updates (misses and speed failures tagged)
  description: A structured output for timed retrieval sprints that surface speed bottlenecks and item-level latency patterns.
  format: structured log
required_outputs:
- Timed sprint result set with per-item accuracy
- Latency log (time_to_answer per item)
- ErrorLog updates (misses and speed failures tagged)
success_criteria:
- All required outputs are present for M-RET-007.
- A genuine attempt-first recall happened before any comparison or feedback.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Timed sprint result set with per-item accuracy.'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Run short timed sets
  action: Run short timed sets with strict item clocks. Mark misses at >45s and move on
  tutor_does: Run run short timed sets with strict item clocks. mark misses at >45s and move on while protecting the attempt-first
    rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Are all materials closed and is the learner ready to attempt recall?
  example: 'Tutor: "Close your notes. Do not peek." Learner: "Notes are closed."'
- step: 2
  name: Record time_to_answer for each
  action: Record time_to_answer for each item. Capture accuracy and confidence together
  tutor_does: Run record time_to_answer for each item. capture accuracy and confidence together while protecting the attempt-first
    rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor starts the timer and asks for a free-response dump.
- step: 3
  name: Push misses to ErrorLog.csv.
  action: Push misses to ErrorLog.csv. Tag Speed when latency is the limiting factor
  tutor_does: Run push misses to errorlog.csv. tag speed when latency is the limiting factor while protecting the attempt-first
    rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor marks gaps with question marks and compares them after the attempt window ends.
constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Run short timed sets with strict per-item clocks
- Record time_to_answer for each item
- Mark misses at >45 seconds and move on
- Capture accuracy and confidence together per item
- Provide corrective feedback AFTER each attempt
- Push misses to ErrorLog with Speed tag when latency is limiting factor
- Track latency patterns across items
- Route back to ENCODE on repeated misses
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Reveal answer before learner commits a response
- Provide hints during first attempt
- Remove or extend per-item time constraints
- Skip latency recording for any item
- Teach new material during retrieval
- Accept "I don't know" without at least one timed attempt
- Skip ErrorLog updates for misses and speed failures
- Sacrifice accuracy tracking for speed-only metrics
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 8
energy_cost: high
best_stage: review
mechanisms:
- retrieval
- desirable_difficulty
evidence:
  citation: Cepeda et al. (2006)
  finding: Spaced retrieval with repeated timed attempts improves long-term access speed
  source: control-plane migration
knobs:
  default_duration_min: 8
  energy_cost: high
  best_stage: review
