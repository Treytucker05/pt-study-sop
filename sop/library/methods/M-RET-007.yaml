id: M-RET-007
name: Timed Sprint Sets
category: RETRIEVE
subcategory: timed
description: Execute timed retrieval sprints and record latency per item to expose speed bottlenecks.
control_stage: RETRIEVE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- retrieval
- timing
- latency
purpose: Timed Sprint Sets exists to run timed retrieval sprints that surface speed bottlenecks and item-level latency patterns. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use REFERENCE if the learner needs an anchor first.
best_fit_topics:
- speed bottleneck exposure
- timed item batches
- latency tracking
poor_fit_topics:
- slow reflective essays
- untimed recall
- new instruction
learner_state_required: The learner already has source material or an anchor available, the source will be closed for recall, and a retrieval target exists.
inputs:
- description: Question Bank Seed
  required: true
- description: Timer
  required: true
outputs:
- name: Timed sprint result set with per-item accuracy
  description: A timed practice log that pairs accuracy with item latency and speed bottlenecks.
  format: structured response
- name: Latency log (time_to_answer per item)
  description: A structured output for timed retrieval sprints that surface speed bottlenecks and item-level latency patterns.
  format: structured log
- name: ErrorLog updates (misses and speed failures tagged)
  description: A structured output for timed retrieval sprints that surface speed bottlenecks and item-level latency patterns.
  format: structured log
artifact_schemas:
  Timed sprint result set with per-item accuracy: scored_items
  Latency log (time_to_answer per item): scored_items
  ErrorLog updates (misses and speed failures tagged): scored_items
produces:
- Timed sprint result set with per-item accuracy
- Latency log (time_to_answer per item)
- ErrorLog updates (misses and speed failures tagged)
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Timed sprint result set with per-item accuracy
- Latency log (time_to_answer per item)
- ErrorLog updates (misses and speed failures tagged)
success_criteria:
- All required outputs are present for M-RET-007.
- A genuine attempt-first recall happened before any comparison or feedback.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Timed sprint result set with per-item accuracy.'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Run short timed sets
  action: Run short timed sets with strict item clocks. Mark misses at >45s and move on
  tutor_does: Run run short timed sets with strict item clocks. mark misses at >45s and move on while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Are all materials closed and is the learner ready to attempt recall?
  example: 'Tutor: "Close your notes. Do not peek." Learner: "Notes are closed."'
- step: 2
  name: Record time_to_answer for each
  action: Record time_to_answer for each item. Capture accuracy and confidence together
  tutor_does: Run record time_to_answer for each item. capture accuracy and confidence together while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor starts the timer and asks for a free-response dump.
- step: 3
  name: Push misses to ErrorLog.csv.
  action: Push misses to ErrorLog.csv. Tag Speed when latency is the limiting factor
  tutor_does: Run push misses to errorlog.csv. tag speed when latency is the limiting factor while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor marks gaps with question marks and compares them after the attempt window ends.
constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Run short timed sets with strict per-item clocks
- Record time_to_answer for each item
- Mark misses at >45 seconds and move on
- Capture accuracy and confidence together per item
- Provide corrective feedback AFTER each attempt
- Push misses to ErrorLog with Speed tag when latency is limiting factor
- Track latency patterns across items
- Route back to ENCODE on repeated misses
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Reveal answer before learner commits a response
- Provide hints during first attempt
- Remove or extend per-item time constraints
- Skip latency recording for any item
- Teach new material during retrieval
- Accept "I don't know" without at least one timed attempt
- Skip ErrorLog updates for misses and speed failures
- Sacrifice accuracy tracking for speed-only metrics
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 8
energy_cost: high
best_stage: review
mechanisms:
- retrieval
- desirable_difficulty
evidence:
  citation: Yang, Luo, Vadillo, Yu, and Shanks (2021); Agarwal, Nunes, and Blunt (2021); Mielicki and Wiley (2019); Barenberg and Dutke (2021)
  finding: Timed Sprint Sets is best supported as a retrieval-practice routine that adds pacing pressure to reveal whether recall is both correct and available fast enough to be usable. Meta-analytic retrieval evidence supports repeated testing, classroom reviews support frequent short retrieval rounds, and more specific timing and fluency work suggests that response speed can separate stable access from labored recall. The practical implication for this method is to use short rounds, capture latency per item, and treat both misses and slow answers as routing signals instead of focusing on correctness alone.
  source: https://doi.org/10.1037/bul0000309; https://doi.org/10.1007/s10648-021-09595-9; https://doi.org/10.1016/j.ijpsycho.2019.07.002; https://doi.org/10.1080/09658211.2021.1990963
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest sprint build. Use two short rounds, terse bullets, and only the biggest speed failures plus misses.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest sprint build. Use three rounds, keep per-item latency explicit, and return a fuller fluency-risk readout.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh sprint build. Use a compact round table with item, accuracy, latency, and failure tag columns.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied sprint build. Use quick applied prompts and summarize misses or slow answers in a short triage-style matrix.
related_methods:
- id: M-REF-003
  relationship: Latency bottlenecks can be compared against a compact anchor
- id: M-OVR-003
  relationship: Drill sheets can be tuned from latency data
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - 'If I''m stuck: do NOT repeat the same explanation. Pick exactly one recovery move (simpler ladder, format switch, side-by-side contrast, tiny clinical case).'
  - Execute ONE step at a time. Do not advance to the next step until I say NEXT.
  replaces_with:
  - Closed-note timed retrieval. No hints. Reveal correct answer only after the learner commits each attempt, for tally.
  - If stuck on an item, mark a miss within the per-item time cap and move on. The cap IS the signal.
  - "Inside a sprint set, advance item-to-item automatically. NEXT gates method-level steps (configure \u2192 run sprint \u2192 log latency \u2192 analyze), not individual items."
  reason: Timed Sprint Sets measures latency. Per-item NEXT gating breaks the latency signal; hints break the cold-recall signal.
facilitation_prompt: |-
  You are running M-RET-007 (Timed Sprint Sets) in the RETRIEVE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Timed sprint result set with per-item accuracy, Latency log, and ErrorLog updates.
  Run short timed retrieval rounds that capture both correctness and response speed. Keep the rounds brief, force an answer before feedback, and log slow answers as fluency problems rather than hiding them inside accuracy totals.
  Preset behavior:
  - exam_cram: one-shot; two short rounds; terse bullets; only the biggest speed failures and misses.
  - deep_mastery: interactive; three rounds; explicit per-item latency and fuller fluency-risk readout.
  - quick_review: one-shot refresh; compact round table with accuracy, latency, and failure tags.
  - clinical_bridge: stepwise; quick applied prompts with misses and slow answers in a short triage matrix.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves round -> scoring -> logging and waits.
validation:
  test_cases:
  - topic: speed bottleneck exposure
    expected_outputs:
    - Timed sprint result set with per-item accuracy
    - Latency log (time_to_answer per item)
    - ErrorLog updates (misses and speed failures tagged)
    pass_criteria:
    - All required outputs for M-RET-007 are present.
    - The response stays inside the correct stage rules.
  - topic: timed item batches
    expected_outputs:
    - Timed sprint result set with per-item accuracy
    - Latency log (time_to_answer per item)
    - ErrorLog updates (misses and speed failures tagged)
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Retrieval blocks can collapse into explanation unless the tutor protects the attempt-first rule.
