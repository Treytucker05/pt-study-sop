id: M-PRE-013
name: Big-Picture Orientation Summary
category: prime
subcategory: overview
description: Generate a short source-grounded big-picture summary that states what the material is about, why it matters, and the main hook without crossing into full explanation.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- prime
- overview
- orientation
- prior-knowledge
- summary
purpose: Generate a short source-grounded big-picture summary that states what the material is about, why it matters, and the main hook without crossing into full explanation. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Big-Picture Orientation Summary'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: NorthStarSentence
  description: Activation or structure artifact for big-picture orientation summary.
  format: bulleted artifact
- name: BigPictureSummary
  description: Concise summary or framing artifact for big-picture orientation summary.
  format: concise paragraph plus bullets
required_outputs:
- NorthStarSentence
- BigPictureSummary
success_criteria:
- 'Core structure is captured in the required outputs: NorthStarSentence, BigPictureSummary.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- NorthStarSentence is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
