id: M-CAL-003
name: Full Calibrate Priority Set
category: calibrate
subcategory: priority
description: Build a deterministic top-3 weakness set from FULL CALIBRATE telemetry to drive ENCODE method selection.
control_stage: CALIBRATE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- calibrate
- prioritization
- sequencing
- deterministic-routing
- full-calibrate
purpose: Full Calibrate Priority Set exists to run a deterministic top-3 weakness ranking that turns full-calibrate telemetry
  into downstream encoding priorities. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for teaching new material, extended explanation, or open-ended discussion. Use TEACH when the goal is
  instruction and use REFERENCE when the goal is artifact building.
best_fit_topics:
- ranked weak spots
- top-three priorities for encoding
- telemetry-driven triage
poor_fit_topics:
- full teaching blocks
- broad curriculum planning
- non-routed reflection
learner_state_required: Full calibrate telemetry exists and the learner is ready for a ranked weakness pass that determines
  what gets encoded next.
inputs:
- description: FullCalibrateItemResults
  required: true
- description: FullCalibrateSnapshot
  required: true
- description: Confidence-tagged results
  required: true
- description: Error-type labels
  required: true
outputs:
- name: FullCalibratePrioritySet (exactly 3 ranked weaknesses)
  description: A calibrated diagnostic output that supports routing for a deterministic top-3 weakness ranking that turns
    full-calibrate telemetry into downstream encoding priorities.
  format: structured response
- name: WeaknessScoreTable (scoring breakdown per weakness)
  description: A calibrated diagnostic output that supports routing for a deterministic top-3 weakness ranking that turns
    full-calibrate telemetry into downstream encoding priorities.
  format: structured table
- name: EncodeRoutingSeed (one ENCODE method-family recommendation per weakness)
  description: A tagged retrieval-question bank that can be reused later for practice or deck construction.
  format: bulleted or tabular list
- name: FullCalibrateHandoff (diagnostic-to-encode handoff contract)
  description: A calibrated diagnostic output that supports routing for a deterministic top-3 weakness ranking that turns
    full-calibrate telemetry into downstream encoding priorities.
  format: structured response
required_outputs:
- FullCalibratePrioritySet (exactly 3 ranked weaknesses)
- WeaknessScoreTable (scoring breakdown per weakness)
- EncodeRoutingSeed (one ENCODE method-family recommendation per weakness)
- FullCalibrateHandoff (diagnostic-to-encode handoff contract)
success_criteria:
- All required outputs are present for M-CAL-003.
- The block remains diagnostic only and no teaching is introduced before the attempt.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: FullCalibratePrioritySet (exactly 3 ranked
  weaknesses).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Aggregate misses by error
  action: Aggregate misses by error type. Use Recall, Confusion, Rule, Representation, Procedure, Computation, Speed.
  tutor_does: Present aggregate misses by error type. use recall, confusion, rule, representation, procedure, computation,
    speed as a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 6
  check: Is the scope set and is the learner ready for a diagnostic attempt?
  example: 'Tutor: "Aggregate misses by error type. Use Recall, Confusion, Rule, Representation, Procedure, Computation, Speed."
    Learner: "Ready."'
- step: 2
  name: Score weakness impact using
  action: Score weakness impact using weighting_profile. Include frequency, confidence mismatch, and latency.
  tutor_does: Present score weakness impact using weighting_profile. include frequency, confidence mismatch, and latency as
    a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor shows one brief probe and records answer, confidence, and latency.
- step: 3
  name: Rank weaknesses and emit
  action: Rank weaknesses and emit top_k. Must produce exactly 3 ranked items.
  tutor_does: Present rank weaknesses and emit top_k. must produce exactly 3 ranked items as a short diagnostic move and do
    not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor summarizes the weakest pattern and states whether the learner is ready to route onward.
- step: 4
  name: Map each weakness to
  action: Map each weakness to next ENCODE action seed. Provide method-family recommendation only, not full lesson.
  tutor_does: Present map each weakness to next encode action seed. provide method-family recommendation only, not full lesson
    as a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor gives a short diagnostic prompt; learner responds with a best attempt.
constraints:
- rule: Diagnostic only; no teaching before or during the probe
  why: Calibration must measure readiness, not change the learner state by explanation.
- rule: Require one genuine attempt before hints or answer reveal
  why: The diagnostic signal is only trustworthy when the learner has to produce a response first.
- rule: Keep scope tied to the active objective set
  why: Calibration is only useful when the items match what the learner is supposed to know.
- rule: Respect item-count and time caps from the source file
  why: Short calibration blocks preserve low-friction routing and reduce fatigue.
allowed_moves:
- Aggregate misses by error type (Recall, Confusion, Rule, Representation, Procedure, Computation, Speed)
- Score weakness impact using weighting profile (frequency, confidence mismatch, latency)
- Rank weaknesses deterministically and emit exactly top 3
- Apply deterministic tie-breaks (high-confidence misses first, then frequency)
- Map each weakness to an ENCODE method-family seed
- Keep ranking scoped to current objective telemetry only
- Trigger micro-recalibration if too little data for stable ranking
- Run short scored probes inside the declared scope
- Capture answer, confidence, and latency for each item
- Provide only minimal clarification after the learner attempts an item
- Summarize readiness and route the learner to the next stage
forbidden_moves:
- Teach or explain content (routing and ranking only)
- Emit more or fewer than exactly 3 weaknesses
- Use non-deterministic ranking (must be reproducible)
- Provide full lesson plans or deep explanations
- Include items outside current objective scope
- Skip tie-break resolution (all ties must be resolved)
- Allow ranking to drift into teaching mode
- Teach the concept before the learner attempts the probe
- Reveal the full answer before the attempt
- Expand beyond the active objective scope
stuck_protocol: Use one simpler probe, narrow the objective scope, and keep the block diagnostic only.
failure_modes:
- mode: Learner asks for teaching before attempting
  detection: The response contains requests for explanation instead of a first attempt.
  recovery: Restate the diagnostic rule, reduce the item to one short probe, and require an attempt.
  fallback_method: M-CAL-004
- mode: Probe is too broad to score cleanly
  detection: The learner stalls, guesses, or gives a very long response with no clear target.
  recovery: Narrow the scope to one objective or one subskill and rerun the probe.
  fallback_method: M-CAL-001
- mode: The block drifts into TEACH
  detection: The tutor starts explaining content or giving step-by-step instruction.
  recovery: Stop the explanation, reset to a diagnostic prompt, and summarize only the readiness signal.
  fallback_method: M-CAL-003
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
mechanisms:
- adaptive_sequencing
- error_localization
