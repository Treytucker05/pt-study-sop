id: M-CAL-003
name: Full Calibrate Priority Set
category: calibrate
description: Build a deterministic top-3 weakness set from FULL CALIBRATE telemetry to drive ENCODE method selection.
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
control_stage: CALIBRATE
status: validated
calibrate_phase: full
calibrate_scope: post_teach
tags:
- calibrate
- prioritization
- sequencing
- deterministic-routing
- full-calibrate
mechanisms:
- adaptive_sequencing
- error_localization
stipulations:
- This is the second FULL CALIBRATE block and follows M-CAL-002.
- Output must be deterministic and ranked.
- Exactly top 3 weaknesses are emitted.
- Ranking favors high-confidence misses and repeated errors.
when_to_use:
- After M-CAL-002 completes.
- Before selecting ENCODE methods.
when_not_to_use:
- If fewer than 3 valid items exist; run micro-recalibration first.
knobs:
  top_k: 3
  weighting_profile: balanced
constraints:
  deterministic_output_required: true
  top_k_fixed: true
gating_rules:
- Emit exactly top_k weaknesses (fixed at 3).
- Apply deterministic tie-breaks (high-confidence misses, then frequency).
- Output ranking and routing seeds only; no teaching/explanations.
- Keep ranking scoped to current objective telemetry only.
- Treat this as FULL CALIBRATE closure before ENCODE.
inputs:
- FullCalibrateItemResults
- FullCalibrateSnapshot
- Confidence-tagged results
- Error-type labels
steps:
- step: 1
  action: Aggregate misses by error type
  notes: Use Recall, Confusion, Rule, Representation, Procedure, Computation, Speed.
- step: 2
  action: Score weakness impact using weighting_profile
  notes: Include frequency, confidence mismatch, and latency.
- step: 3
  action: Rank weaknesses and emit top_k
  notes: Must produce exactly 3 ranked items.
- step: 4
  action: Map each weakness to next ENCODE action seed
  notes: Provide method-family recommendation only, not full lesson.
outputs:
- FullCalibratePrioritySet
- WeaknessScoreTable
- EncodeRoutingSeed
- FullCalibrateHandoff
artifact_type: notes
stop_criteria:
- Exactly 3 prioritized weaknesses output
- EncodeRoutingSeed and FullCalibrateHandoff created
failure_modes:
- mode: Too little data for stable ranking
  mitigation: Trigger micro-recalibration with 2-3 extra items.
- mode: Ranking ties remain unresolved
  mitigation: Break ties by high-confidence miss count, then frequency.
- mode: Output drifts into teaching
  mitigation: Restrict to ranked diagnostics and routing only.
logging_fields:
- top_k
- weighting_profile
- priority_set
- tie_break_applied
evidence:
  citation: Rawson and Dunlosky (2011)
  finding: Targeted corrective practice outperforms broad untargeted restudy.
  source: control-plane migration
evidence_strength: high
primary_citations:
- Rawson and Dunlosky (2011)
- Bjork and Bjork (2011)
evidence_raw: Focused relearning based on diagnosed weaknesses improves long-term retention.
allowed_moves:
- Aggregate misses by error type (Recall, Confusion, Rule, Representation, Procedure, Computation, Speed)
- Score weakness impact using weighting profile (frequency, confidence mismatch, latency)
- Rank weaknesses deterministically and emit exactly top 3
- Apply deterministic tie-breaks (high-confidence misses first, then frequency)
- Map each weakness to an ENCODE method-family seed
- Keep ranking scoped to current objective telemetry only
- Trigger micro-recalibration if too little data for stable ranking
forbidden_moves:
- Teach or explain content (routing and ranking only)
- Emit more or fewer than exactly 3 weaknesses
- Use non-deterministic ranking (must be reproducible)
- Provide full lesson plans or deep explanations
- Include items outside current objective scope
- Skip tie-break resolution (all ties must be resolved)
- Allow ranking to drift into teaching mode
required_outputs:
- FullCalibratePrioritySet (exactly 3 ranked weaknesses)
- WeaknessScoreTable (scoring breakdown per weakness)
- EncodeRoutingSeed (one ENCODE method-family recommendation per weakness)
- FullCalibrateHandoff (diagnostic-to-encode handoff contract)
facilitation_prompt: 'You are running M-CAL-003 (Full Calibrate Priority Set) in CALIBRATE stage.

  Build a deterministic ranked weakness set to close FULL CALIBRATE and hand off to ENCODE.


  Requirements:

  - Use correctness, latency, confidence, and error types.

  - Apply {weighting_profile}.

  - Emit exactly {top_k} weaknesses (fixed at 3).

  - Add one ENCODE method-family seed per weakness.


  Return exactly:

  1) FullCalibratePrioritySet

  2) WeaknessScoreTable

  3) EncodeRoutingSeed

  4) FullCalibrateHandoff


  Do not provide full teaching or answer explanations in this method.

  '
