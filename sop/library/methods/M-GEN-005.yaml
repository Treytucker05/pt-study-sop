id: M-GEN-005
name: Why-Chain
category: encode
subcategory: gen
description: Ask 'why?' 3-5 times in succession about a concept to build causal depth. Each answer becomes
  the premise for the next question. Based on elaborative interrogation (Dunlosky et al.).
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- elaboration
- causal
- depth
- evidence-based
purpose: Force the learner to actively generate, explain, sequence, or transform the material so encoding
  is deeper than passive review.
not_for: This is not for passive reading, copying answers, or letting the tutor do the cognitive work
  for the learner.
best_fit_topics:
- Concepts the learner can explain, transform, or generate in their own words
- Mechanisms and causal chains that benefit from active elaboration
poor_fit_topics:
- Pure passive rereading or copy-paste note taking
- Items that are still completely unknown and cannot yet be transformed
learner_state_required: Source material is loaded. The learner has a bounded concept and is ready to generate,
  explain, or transform it before seeing help.
inputs:
- description: Initial statement or fact to interrogate
  required: true
- description: Source material for verification
  required: true
outputs:
- name: Why-chain document (3-5 linked explanations)
  description: Why-chain document (3-5 linked explanations)
  format: concise prose bullets or short paragraph
- name: Depth level reached
  description: Depth level reached
  format: short, checkable artifact
- name: Verification status
  description: Verification status
  format: short, checkable artifact
required_outputs: &id001
- Why-chain document (3-5 linked explanations)
- Depth level reached
- Verification status
success_criteria:
- 'All required outputs are present and checkable: Why-chain document (3-5 linked explanations), Depth
  level reached, Verification status.'
- 'The method reaches its stop condition: 3-5 why levels completed; Hit bedrock knowledge.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Why-chain document (3-5
  linked explanations), Depth level reached.'
steps:
- step: 1
  name: The Initial Statement Fact
  action: Write the initial statement/fact
  tutor_does: 'Guide the learner to Write the initial statement/fact. Keep in mind: Example: ''ACE inhibitors
    cause cough'''
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: ''ACE inhibitors cause cough'
- step: 2
  name: Ask
  action: 'Ask: ''Why is this true?'
  tutor_does: 'Guide the learner to Ask: ''Why is this true?''. Keep in mind: Write the answer as a new
    statement'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Write the answer as a new statement'
- step: 3
  name: Why About Your Answer
  action: Ask 'why?' about your answer
  tutor_does: 'Guide the learner to Ask ''why?'' about your answer. Keep in mind: Go one level deeper'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Go one level deeper'
- step: 4
  name: Repeat Until You Hit 3
  action: Repeat until you hit 3-5 levels or bedrock knowledge
  tutor_does: 'Guide the learner to Repeat until you hit 3-5 levels or bedrock knowledge. Keep in mind:
    Bedrock = can''t explain further without new learning'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Bedrock = can''t explain further without new learning'
- step: 5
  name: Chain Accuracy With Source Material
  action: Verify chain accuracy with source material
  tutor_does: 'Guide the learner to Verify chain accuracy with source material. Keep in mind: Flag any
    errors for correction'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Flag any errors for correction'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Present the initial statement or fact for interrogation
- Prompt the learner with "Why is this true?" at each level
- Require the learner to write each answer as a new statement before proceeding
- Guide the learner to go deeper when answers are superficial
- Flag circular reasoning and redirect to new information
- Enforce minimum 3 levels of depth before allowing stop
- Prompt learner to verify chain accuracy against source material
- Help identify bedrock knowledge (point where further explanation requires new learning)
forbidden_moves:
- Answer the "why?" questions FOR the learner
- Accept circular reasoning as a valid chain link
- Allow stopping before 3 levels of depth are reached
- Skip source verification of the completed chain
- Deliver a passive causal explanation instead of guiding interrogation
- Accept made-up explanations without verification
- Present information outside the objective scope
- Move to retrieval before the why-chain is complete and verified
stuck_protocol: Offer one smaller hint, one simpler example, or one step back in the chain; then require
  the learner to continue actively.
failure_modes:
- mode: Circular reasoning
  detection: The learner or tutor starts doing circular reasoning or the artifact stops satisfying the
    method’s required checks.
  recovery: Each answer must introduce new information
  fallback_method: M-GEN-006
- mode: Stopping too early
  detection: The learner or tutor starts doing stopping too early or the artifact stops satisfying the
    method’s required checks.
  recovery: Require minimum 3 levels
  fallback_method: M-GEN-002
- mode: Making up explanations
  detection: The learner or tutor starts doing making up explanations or the artifact stops satisfying
    the method’s required checks.
  recovery: Verify each level against source
  fallback_method: M-GEN-007
default_duration_min: 5
energy_cost: medium
best_stage: first_exposure
mechanisms:
- elaboration
- generation
evidence:
  citation: Dunlosky et al. (2013)
  finding: Elaborative interrogation rated moderate utility for learning; builds causal understanding
  source: seed_methods.py
knobs:
  guidance_level: medium
  output_format: bullets
  evidence_raw: Dunlosky et al. (2013); elaborative interrogation rated moderate utility for learning
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  logging_fields:
  - initial_statement
  - chain_depth
  - verification_status
  - bedrock_reached
  artifact_type: notes
related_methods:
- id: M-GEN-006
  relationship: Similar self-explanation move
- id: M-GEN-002
  relationship: Teach-back fallback if oral explanation helps
- id: M-GEN-007
  relationship: Mechanism trace if the chain is causal
