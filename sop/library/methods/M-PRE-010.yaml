purpose: Build the study-target objective list for the current topic by accounting for all provided files first, then merging the objective signals into one clean set of learning targets. Also extract any explicit instructor objective statements found verbatim in the provided source material. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Learning Objectives Primer'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
