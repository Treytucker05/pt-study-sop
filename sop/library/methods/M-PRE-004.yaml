id: M-PRE-004
name: Hierarchical Advance Organizer
category: prime
description: Present a high-abstraction top-down framework (3-5 umbrella pillars + sub-branches) that still covers the full selected scope before detail study.
control_stage: PRIME
default_duration_min: 5
energy_cost: low
best_stage: first_exposure
status: validated
has_steps: Y
has_outputs_or_artifacts: Y
outputs_summary: PillarTree; PriorKnowledgeLinks; Hypotheses
tags:
- advance-organizer
- hierarchy
- top-down
mechanisms:
- schema_activation
- subsumption
stipulations:
- Keep abstraction high; do not include leaf-level memorization details.
- Start from most inclusive concept, then descend one level only.
- The 3-5 pillar cap is a final grouping cap. Inventory the full supported structure first, then cluster it into broad pillars that still cover the whole selected scope.
- PRIME boundary applies: no scoring and no quiz behavior.
when_to_use:
- New, dense, or mechanism-heavy topics.
- Learners who prefer big-picture-first orientation.
when_not_to_use:
- Learner already demonstrates expert-level schema familiarity.
- Ultra-familiar topics where organizer adds redundancy.
knobs:
  complexity_level: intermediate_outline
  representation_format: markdown_tree
constraints:
  non_assessment: true
  pillar_min: 3
  pillar_max: 5
  max_depth: 2
inputs:
- Topic title
- Learning objectives (preferred)
- Prior mastered topics (optional)
steps:
- step: 1
  action: Identify the most inclusive parent concept
  notes: One sentence maximum.
- step: 2
  action: Inventory all major supported sections, then cluster them into 3-5 pillar concepts
  notes: Pillars should subsume upcoming details and collectively cover the full selected scope.
- step: 3
  action: Add one sub-branch per pillar
  notes: Keep depth <=2, omit leaf trivia, and make sub-branches representative rather than cherry-picked.
- step: 4
  action: Add one comparative link to prior knowledge for each pillar
  notes: Use concise bridge statements.
outputs:
- PillarTree
- PriorKnowledgeLinks
- StructuralHypotheses
stop_criteria:
- Pillar count between 3 and 5
- Depth <=2
- Pillars collectively cover the full selected scope
- Every pillar has at least one prior-knowledge bridge
failure_modes:
- mode: Tree becomes detail-heavy
  mitigation: Collapse leaf nodes to pillar/sub-branch only.
- mode: No prior bridge links
  mitigation: Force one bridge sentence per pillar.
logging_fields:
- pillar_count
- depth_level
- bridge_link_count
evidence_strength: high
primary_citations:
- Ausubel (1960)
- Luiten et al. (1980)
- Hattie (2009)
facilitation_prompt: 'You are running M-PRE-004 (Hierarchical Advance Organizer) in PRIME stage.

  This method is non-assessment.

  Build a top-down organizer, not a lesson and not a quiz.


  Requirements:

  - 3-5 pillars, max depth 2.
  - Pillars are umbrella groups that collectively cover the full selected scope.

  - One concise prior-knowledge bridge per pillar.

  - Output in {representation_format} at {complexity_level}.

  - No scoring, no checks, no retrieval prompts.


  Return exactly:

  1) PillarTree

  2) PriorKnowledgeLinks

  3) StructuralHypotheses

  '
gating_rules:
- Do not assess or score the learner in PRIME.
- Stay at orientation level and avoid full solution reveal.
artifact_type: notes
evidence_raw: Ausubel (1960); Luiten et al. (1980); advance organizers facilitate subsumption of new material
allowed_moves:
- Present a top-down framework from most inclusive concept downward
- Extract 3-5 umbrella pillar concepts that subsume upcoming details and collectively cover the full selected scope
- Add one sub-branch per pillar (max depth 2)
- Add one comparative link to prior knowledge per pillar
- Orient the learner to upcoming content structure
- Use concise bridge statements to connect pillars to known material
forbidden_moves:
- Score, grade, or assess the learner
- Include leaf-level memorization details or trivia
- Cherry-pick a few favorite sections while leaving major supported sections unrepresented
- Teach new detailed content beyond structural framing
- Exceed depth of 2 levels in the hierarchy
- Run quizzes, retrieval prompts, or correctness checks
- Lecture at length or provide paragraph explanations
- Exceed 5 pillars
required_outputs:
- PillarTree (3-5 pillars, max depth 2, collectively covering the full selected scope)
- PriorKnowledgeLinks (one bridge per pillar)
- StructuralHypotheses
