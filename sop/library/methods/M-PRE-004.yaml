id: M-PRE-004
name: Hierarchical Advance Organizer
category: prime
subcategory: hierarchy
description: Present a high-abstraction top-down framework as an ASCII concept map plus Obsidian-friendly hierarchy that covers the selected scope before detail study.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- advance-organizer
- hierarchy
- top-down
- prime
- orientation
- prior-knowledge
purpose: Present a high-abstraction top-down framework as an ASCII concept map plus Obsidian-friendly hierarchy that covers the selected scope before detail study. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Hierarchical Advance Organizer'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: AsciiConceptMap
  description: Structured artifact that captures the key hierarchical advance organizer relationships.
  format: structured map or nested bullets
- name: ObsidianHierarchy
  description: Structured artifact that captures the key hierarchical advance organizer relationships.
  format: ASCII tree or nested bullets
required_outputs:
- AsciiConceptMap
- ObsidianHierarchy
success_criteria:
- 'Core structure is captured in the required outputs: AsciiConceptMap, ObsidianHierarchy.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- AsciiConceptMap is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
steps:
- step: 1
  name: Opening Step
  action: Identify the most inclusive parent concept
  tutor_does: Identify the most inclusive parent concept. One sentence maximum
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Opening Step: Identify the most inclusive parent concept"'
- step: 2
  name: Step 2
  action: Cluster the supported structure into 3-5 pillar concepts
  tutor_does: Cluster the supported structure into 3-5 pillar concepts. Pillars should collectively cover the selected scope
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 2: Cluster the supported structure into 3-5 pillar concepts"'
- step: 3
  name: Step 3
  action: Add one representative sub-branch per pillar
  tutor_does: Add one representative sub-branch per pillar. Keep depth <=2 and omit leaf trivia
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 3: Add one representative sub-branch per pillar"'
- step: 4
  name: Step 4
  action: Render the organizer as an ASCII concept map and an Obsidian-friendly nested hierarchy
  tutor_does: Render the organizer as an ASCII concept map and an Obsidian-friendly nested hierarchy. Keep structure clear and avoid paragraph explanations
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Step 4: Render the organizer as an ASCII concept map and an Obsidian-friendly nested hierarchy"'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: 'Pillar Min: 3'
  why: Carried forward from the legacy method card.
- rule: 'Pillar Max: 5'
  why: Carried forward from the legacy method card.
- rule: 'Max Depth: 2'
  why: Carried forward from the legacy method card.
allowed_moves:
- Present a top-down framework from most inclusive concept downward
- Extract 3-5 umbrella pillar concepts
- Add one sub-branch per pillar (max depth 2)
- Render the framework as an ASCII map plus Obsidian-friendly nested hierarchy
- Activate prior knowledge with a bounded free recall or orientation prompt
- Summarize structure, objectives, gaps, or blind spots without scoring
- Link recalled ideas to the current objective or source packet
forbidden_moves:
- Score, grade, or assess the learner
- Include leaf-level memorization details or trivia
- Teach new detailed content beyond structural framing
- Exceed depth of 2 levels in the hierarchy
- Lecture at length or provide paragraph explanations
- Exceed 5 pillars
- Score the learner or run retrieval grading
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Orientation drifts into assessment
  detection: The tutor starts scoring, judging, or treating the learner like a test taker.
  recovery: Re-state the non-assessment rule, reduce the scope to one objective, and return to structure or gaps.
  fallback_method: M-PRE-010
default_duration_min: 5
energy_cost: low
best_stage: first_exposure
mechanisms:
- schema_activation
- subsumption
- scaffolding
- prior_knowledge_activation
- organization
