id: M-PRE-004
name: Hierarchical Advance Organizer
category: PRIME
subcategory: hierarchical-advance-organizer
description: Present a high-abstraction top-down framework as an ASCII concept map plus Obsidian-friendly hierarchy that covers the selected scope before detail study.
control_stage: PRIME
status: validated
version: '1.3'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- prime
- advance-organizer
- hierarchy
- top-down
- orientation
- prior-knowledge
- structure
- mapping
purpose: Hierarchical Advance Organizer exists to give the learner a top-down structural frame before detail study by naming the most inclusive parent concept, compressing the selected scope into 3-5 pillars, and adding one representative branch per pillar. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- New or complex material that needs a quick structural frame before deeper study
- Topics with prior notes, objective context, or an obvious hierarchy to surface
- Material where the learner needs a coverage-first map instead of detail-first explanation
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
- Topics that do not compress naturally into a bounded top-down structure
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: AsciiConceptMap
  description: ASCII concept map showing the parent concept, 3-5 pillars, and one representative branch per pillar.
  format: structured map or nested bullets
- name: ObsidianHierarchy
  description: Obsidian-friendly nested hierarchy of the same organizer for later note reuse.
  format: ASCII tree or nested bullets
- name: CarryForwardGaps
  description: Short list of missing nodes, thin pillars, or next-study targets exposed by the organizer.
  format: bulleted or tabular list
artifact_schemas:
  AsciiConceptMap: tree_map
  ObsidianHierarchy: tree_map
  CarryForwardGaps: bullet_list
produces:
- AsciiConceptMap
- ObsidianHierarchy
- CarryForwardGaps
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- AsciiConceptMap
- ObsidianHierarchy
success_criteria:
- All required outputs are present for M-PRE-004.
- The method stays non-assessive and does not score the learner.
- The organizer covers the selected scope with 3-5 pillars and surfaces at least one carry-forward gap, priority, or blind spot.
partial_criteria:
- AsciiConceptMap is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage, pillar, or objective tie.
steps:
- step: 1
  name: Opening Step
  action: Identify the most inclusive parent concept
  tutor_does: Identify the most inclusive parent concept. One sentence maximum.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Opening Step: Identify the most inclusive parent concept"'
- step: 2
  name: Step 2
  action: Cluster the supported structure into 3-5 pillar concepts
  tutor_does: Cluster the supported structure into 3-5 pillar concepts. Pillars should collectively cover the selected scope.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 2: Cluster the supported structure into 3-5 pillar concepts"'
- step: 3
  name: Step 3
  action: Add one representative sub-branch per pillar
  tutor_does: Add one representative sub-branch per pillar. Keep depth <=2 and omit leaf trivia.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 3: Add one representative sub-branch per pillar"'
- step: 4
  name: Step 4
  action: Render the organizer as an ASCII concept map and an Obsidian-friendly nested hierarchy
  tutor_does: Render the organizer as an ASCII concept map and an Obsidian-friendly nested hierarchy. Keep structure clear and avoid paragraph explanations.
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Step 4: Render the organizer as an ASCII concept map and an Obsidian-friendly nested hierarchy"'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: 'Pillar Min: 3'
  why: Carried forward from the legacy method card.
- rule: 'Pillar Max: 5'
  why: Carried forward from the legacy method card.
- rule: 'Max Depth: 2'
  why: Carried forward from the legacy method card.
allowed_moves:
- Present a top-down framework from most inclusive concept downward
- Extract 3-5 umbrella pillar concepts
- Add one sub-branch per pillar (max depth 2)
- Render the framework as an ASCII map plus Obsidian-friendly nested hierarchy
- Activate prior knowledge with a bounded free recall or orientation prompt
- Summarize structure, objectives, gaps, or blind spots without scoring
- Link recalled ideas to the current objective or source packet
- Compress dense source material into umbrella groups that still cover the full selected scope
forbidden_moves:
- Score, grade, or assess the learner
- Include leaf-level memorization details or trivia
- Teach new detailed content beyond structural framing
- Exceed depth of 2 levels in the hierarchy
- Lecture at length or provide paragraph explanations
- Exceed 5 pillars
- Score the learner or run retrieval grading
- Drop supported source sections just to stay under the pillar cap
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Orientation drifts into assessment
  detection: The tutor starts scoring, judging, or treating the learner like a test taker.
  recovery: Re-state the non-assessment rule, reduce the scope to one objective, and return to structure or gaps.
  fallback_method: M-PRE-010
- mode: Pillar cap causes scope loss
  detection: The organizer drops major supported sections instead of compressing them into umbrella groups.
  recovery: Rebuild the pillars as broader categories that still cover the full selected slice before adding branches.
  fallback_method: M-PRE-008
default_duration_min: 5
energy_cost: low
best_stage: first_exposure
mechanisms:
- schema_activation
- subsumption
- scaffolding
- prior_knowledge_activation
- organization
- text_structure_support
evidence:
  citation: Ausubel (1960); Luiten, Ames, and Ackerson (1980); Hebert, Bohaty, Nelson, and Brown (2016); Bogaerds-Hazenberg, Evers-Vermeul, and van den Bergh (2020); Bogaerds-Hazenberg, Evers-Vermeul, and van den Bergh (2024)
  finding: >-
    Hierarchical Advance Organizer is best supported as a structure-first
    orientation method that gives learners a small, high-level frame before
    detail work, not as a full explanation or quiz. Ausubel's original
    organizer study and the later meta-analysis by Luiten and colleagues
    support the basic value of advance organizers for learning and retention.
    Later text-structure meta-analytic work and classroom interventions extend
    that logic by showing that explicit attention to structure, main ideas, and
    organizing relations can improve comprehension, summarization, and writing
    when the structure is made visible and practiced. The practical implication
    for this method is to keep the organizer compact, coverage-first, and
    hierarchical: one parent concept, 3-5 umbrella pillars, one representative
    branch per pillar, and a short carry-forward gap list rather than a
    detail-heavy outline.
  source: https://doi.org/10.1037/h0046669; https://doi.org/10.3102/00028312017002211; https://doi.org/10.1037/edu0000082; https://doi.org/10.1002/rrq.311; https://doi.org/10.1080/1046560X.2024.2373548
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: one_shot
  fade_intensity: minimal
  output_format: text
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest organizer pass. Give one parent concept, 3 terse pillars, one short branch per pillar, and a one-line carry-forward gap note.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full organizer pass. Keep separate sections for parent concept, pillars, representative branches, ASCII concept map, Obsidian hierarchy, and carry-forward gaps.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render the organizer as a compact table with level, node, structural role, and carry-forward columns before the final tree view.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied orientation pass. Use a clinic-facing organizer table with umbrella pillar, representative branch, why it matters clinically, and missing-node columns before the final hierarchy.
  visual_map:
    guidance_level: medium
    delivery_mode: one_shot
    fade_intensity: minimal
    output_format: map
    output_layout: labeled_sections
    explanation_density: focused
    behavior: Map-first organizer pass. Keep the same parent-to-pillar-to-branch flow, but render the final artifact as a clean hierarchical map using indentation, labeled sections, or simple ASCII structure.
related_methods:
- id: M-PRE-008
  relationship: Use when the learner needs a more compact structure-first pass
- id: M-PRE-005
  relationship: Follow when the topic should be unpacked into a fuller nested hierarchy
system_prompt_override:
  relaxes:
  - Highly interactive. One small teaching chunk, one short check, or one question at a time.
  - Ask only one question at a time.
  - Do not do more than one step at a time.
  - Within TEACH, deliver ONE chunk at a time, check in, then continue.
  replaces_with:
  - Produce the full organizer artifact when enough context is present. Do not force a pillar-by-pillar intake exchange unless the preset explicitly asks for interactive or stepwise delivery.
  - Keep the output structural and coverage-first. Compress the full selected scope into umbrella pillars instead of dropping supported sections to stay under the pillar cap.
  reason: Hierarchical Advance Organizer is primarily an artifact-style PRIME method. Over-chunking it turns a 5-minute organizer into a long interview and weakens the structure-first benefit.
facilitation_prompt: |
  You are running M-PRE-004 (Hierarchical Advance Organizer) in the PRIME stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: AsciiConceptMap, ObsidianHierarchy, and CarryForwardGaps.
  Build a top-down organizer by naming the most inclusive parent concept, compressing the selected scope into 3-5 pillars, adding one representative branch per pillar, and rendering the result as both an ASCII concept map and an Obsidian-friendly hierarchy. Keep it orientation-only, non-assessive, and coverage-first; do not turn it into a lecture, quiz, or detail dump.
  Output mode:
  - If output_format is text, keep the current text-first artifact shape.
  - If output_format is map, render a clean hierarchical map using indentation, labeled sections, or simple ASCII structure.
  Preset behavior:
  - exam_cram: one-shot; parent concept, 3 terse pillars, one branch each, and a one-line gap note.
  - deep_mastery: interactive; labeled sections for parent concept, pillars, branches, final maps, and carry-forward gaps.
  - quick_review: one-shot refresh; compact level / node / role / carry-forward table plus final tree view.
  - clinical_bridge: stepwise; clinic-facing organizer table with pillar, branch, why-it-matters, and missing-node columns.
  - visual_map: one-shot; same organizer logic, but force a clean hierarchical map output.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves parent concept -> pillars -> representative branches -> final maps and waits.
validation:
  test_cases:
  - topic: First pass on Hierarchical Advance Organizer with prior notes present
    expected_outputs:
    - AsciiConceptMap
    - ObsidianHierarchy
    - CarryForwardGaps
    pass_criteria:
    - All required outputs are present.
    - The organizer covers the selected scope with 3-5 pillars and at least one representative branch per pillar.
    - The output identifies what is known, what is missing, and what to do next.
  - topic: Dense review topic where the learner needs orientation before detail
    expected_outputs:
    - AsciiConceptMap
    - ObsidianHierarchy
    - CarryForwardGaps
    pass_criteria:
    - All required outputs are present.
    - No scored probe, quiz behavior, or grading language appears in the response.
    - The organizer stays at orientation level instead of becoming a long topic explanation.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs sometimes over-explain instead of staying at orientation level.
  - If the source is dense, the model may under-cover the scope unless the prompt explicitly compresses into umbrella groups first.
