id: M-REF-003
name: One-Page Anchor
category: reference
description: Build a single-page reference anchor containing minimal definitions, decision rules, canonical examples, near-misses,
  and traps.
default_duration_min: 8
energy_cost: medium
best_stage: exam_prep
control_stage: REFERENCE
status: validated
artifact_type: outline
tags:
- reference
- anchor
- synthesis
mechanisms:
- elaboration
- discrimination
stipulations:
- Preserve the concept or narrative spine of the topic rather than producing disconnected bullets.
- Keep the artifact compact enough to support later retrieval, not as a substitute for all notes.
knobs:
  artifact_depth: standard
  link_density: medium
constraints:
  target_artifact_required: true
  retrieval_blocked_without_targets: true
  objective_scope_required: true
inputs:
- PrioritySet
- Source-grounded notes
steps:
- step: 1
  action: Capture minimal definitions only
  notes: Keep to high-value distinctions
- step: 2
  action: Write decision rules and triggers
  notes: Focus on rapid discrimination cues
- step: 3
  action: Add 3 canonical examples and 3 near-miss examples
  notes: Include trap notes for common errors
outputs:
- One-Page Anchor
- Trap list and near-miss set
stop_criteria:
- Definitions, decision rules, examples, near-miss, traps all present
evidence:
  citation: Schmidt & Rikers (2007)
  finding: Structured scripts and discriminators improve transfer and diagnostic reasoning
  source: control-plane migration
evidence_raw: Schmidt & Rikers (2007); structured reference schemas improve clinical reasoning
facilitation_prompt: 'You are running M-REF-003 (One-Page Anchor) in REFERENCE stage.

  Execute this method card exactly and keep outputs deterministic.


  Stage hard rules:

  - Build concrete anchors and artifacts.

  - Map concept to applied context.

  - Do not skip artifact creation.
  - Preserve the main concept spine so the anchor supports later recall, not just storage.


  Required outputs:

  - One-Page Anchor

  - Trap list and near-miss set


  Stop conditions:

  - Definitions, decision rules, examples, near-miss, traps all present


  If required inputs are missing, request only the minimum needed input and continue.

  Keep the anchor compact, retrieval-ready, and explicitly scoped to the active objective.

  '
gating_rules:
- Produce structured targets that RETRIEVE can directly test.
- No retrieval drills until reference targets are explicit.
failure_modes:
- mode: Artifact too vague for retrieval
  mitigation: Rewrite targets into explicit prompts/answers.
- mode: Reference bloat
  mitigation: Trim to objective-critical content only.
allowed_moves:
- Guide the learner to capture minimal definitions (high-value distinctions only)
- Enforce one-page constraint ruthlessly — trim anything that exceeds it
- Require decision rules and rapid discrimination cues
- Push for 3 canonical examples AND 3 near-miss examples
- Require trap notes for common errors
- Preserve the concept spine/narrative structure (not disconnected bullets)
- Help the learner prioritize which content is objective-critical
- Build discrimination cues for confusable items
forbidden_moves:
- Accept a bloated artifact that exceeds one page — enforce the constraint
- Accept vague or retrieval-unfriendly targets (must be explicit prompt/answer pairs)
- Generate the One-Page Anchor FOR the learner without their active construction
- Skip any required section (definitions, decision rules, examples, near-misses, traps)
- Introduce entirely new content not yet encoded
- Skip artifact creation — the One-Page Anchor IS the output
- Accept disconnected bullet lists without narrative spine
- Rush through consolidation without all sections present
required_outputs:
- One-Page Anchor (definitions, decision rules, examples, near-misses, traps — all present)
- Trap list and near-miss set (3 canonical + 3 near-miss examples minimum)
