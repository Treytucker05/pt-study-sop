id: M-GEN-007
name: Mechanism Trace
category: ENCODE
subcategory: mechanism-trace
description: Trace one mechanism step by step from trigger to outcome, add explicit because-links between steps, and mark where the pathway branches.
control_stage: ENCODE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- encode
- mechanism-trace
- causal-reasoning
- pathophysiology
- physiology
- branch-points
- verification
purpose: Mechanism Trace exists to force the learner to build a cause-to-effect chain that makes each step and each because-link explicit instead of leaving the mechanism implicit. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for passive reading, copying answers, or letting the tutor do the cognitive work for the learner.
best_fit_topics:
- Concepts the learner can explain, transform, or generate in their own words
- Mechanisms and causal chains that benefit from active elaboration
- Pathophysiology, physiology, or treatment pathways with a traceable trigger-to-outcome sequence
poor_fit_topics:
- Pure passive rereading or copy-paste note taking
- Items that are still completely unknown and cannot yet be transformed
- Topics where the mechanism is too underspecified to trace without inventing links
learner_state_required: Source material is loaded. The learner has one bounded mechanism and is ready to trace it actively before receiving help.
inputs:
- description: Pathway or mechanism to trace
  required: true
- description: Source material with mechanism details
  required: true
- description: Flowchart template or blank paper
  required: true
outputs:
- name: Complete mechanism chain (trigger to outcome)
  description: Ordered mechanism sequence from the initiating trigger to the final outcome.
  format: short, checkable artifact
- name: Because statements for each step
  description: Explicit causal explanations for the arrows linking each mechanism step.
  format: short, checkable artifact
- name: Branch points identified
  description: Points where the pathway diverges into parallel, conditional, or alternative downstream effects.
  format: short, checkable artifact
- name: Verification status
  description: Whether the completed trace is fully source-supported or contains flagged gaps.
  format: short, checkable artifact
artifact_schemas:
  Complete mechanism chain (trigger to outcome): paragraph
  Because statements for each step: paragraph
  Branch points identified: bullet_list
  Verification status: paragraph
produces:
- Complete mechanism chain (trigger to outcome)
- Because statements for each step
- Branch points identified
- Verification status
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Complete mechanism chain (trigger to outcome)
- Because statements for each step
- Branch points identified
- Verification status
success_criteria:
- All required outputs are present for M-GEN-007.
- The chain reaches the final outcome through explicit intermediate steps rather than by jumping from trigger to conclusion.
- The learner verifies the chain against the source and marks branch points instead of presenting one uninspected linear story.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Complete mechanism chain (trigger to outcome).'
- The learner traced the chain, but the because-links, branch points, or verification status remained too vague to guide repair.
steps:
- step: 1
  name: Identify the trigger initial cause or stimulus
  action: Identify the trigger (initial cause or stimulus).
  tutor_does: Guide the learner to define the starting perturbation, lesion, signal, or intervention precisely enough that the downstream trace has a stable anchor.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is the trigger specific enough to launch a real mechanism trace?
  example: 'Example: ACE inhibitor blocks ACE enzyme.'
- step: 2
  name: Ask what happens next as a direct result
  action: Ask what happens next as a direct result.
  tutor_does: Guide the learner to write the nearest downstream effect, not a distant summary outcome.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is the next step the direct downstream consequence of the trigger?
  example: 'Example: Write the immediate downstream effect, not the final symptom yet.'
- step: 3
  name: Repeat step 2 until you reach the final outcome
  action: Repeat step 2 until you reach the final outcome.
  tutor_does: Guide the learner to extend the chain one explicit link at a time and to add intermediate steps instead of skipping from A to C.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Does each step directly cause the next?
  example: 'Example: Use A -> B -> C, not A -> C.'
- step: 4
  name: Add because statements at each arrow
  action: Add because statements at each arrow.
  tutor_does: Guide the learner to explain why each transition occurs using specific mechanism detail instead of vague causal language.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Does each because statement explain the link rather than just rename it?
  example: 'Example: Fill in why A causes B, not just that B comes after A.'
- step: 5
  name: Verify chain against source material
  action: Verify chain against source material.
  tutor_does: Guide the learner to check each link against the source and flag unsupported or incorrect steps instead of smoothing them over.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is every link marked as verified, uncertain, or incorrect?
  example: 'Example: Flag the exact step that fails source support.'
- step: 6
  name: Note branch points where mechanisms diverge
  action: Note branch points where mechanisms diverge.
  tutor_does: Guide the learner to identify where the pathway splits into parallel, conditional, or alternative outcomes rather than forcing everything into a single line.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Have real branch points been marked where the mechanism diverges?
  example: 'Example: Real pathways often have multiple downstream effects from one node.'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Explain the trigger and downstream chain in plain language before adding finer detail
- Help the learner identify the trigger of the mechanism
- Prompt what happens next as a direct result at each step
- Require because statements at every causal arrow
- Guide the learner to look for branch points where mechanisms diverge
- Prompt verification of the chain against source material
- Flag vague because statements and ask for specific molecular, cellular, or functional detail
- Require explicit intermediate steps rather than skipped links
- Use Socratic questioning to help the learner discover missing links
forbidden_moves:
- Accept vague because statements without specific mechanism detail
- Allow skipping intermediate steps in the causal chain
- Skip source verification of the completed chain
- Deliver a long ungated lecture without using the mechanism trace as the scaffold
- Accept linear-only thinking without exploring branch points
- Present information outside the objective scope
- Move to retrieval before the mechanism trace is complete
stuck_protocol: Offer one smaller hint, one simpler example, or one step back in the chain, then require the learner to continue actively.
failure_modes:
- mode: Skipping intermediate steps
  detection: The learner jumps from an early step to a distant outcome without tracing the missing links.
  recovery: Require explicit A -> B -> C sequencing before the chain can continue.
  fallback_method: M-ORG-003
- mode: Vague because statements
  detection: The learner uses generic because language without specifying the actual mechanism.
  recovery: Require concrete molecular, cellular, physiological, or system-level detail for the link.
  fallback_method: M-GEN-005
- mode: Linear thinking only
  detection: The learner forces the mechanism into one straight line and ignores meaningful divergence.
  recovery: Look actively for parallel or conditional downstream effects and mark them as branch points.
  fallback_method: M-ELB-004
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- causal_self_explanation
- generation
- causal_model_building
- cognitive_integration
- verification
- branch_tracking
evidence:
  citation: Kulasegaram, Martimianakis, Mylopoulos, Whitehead, and Woods (2013); Kulasegaram, Manzone, Ku, Skye, Wadey, and Woods (2015); Lisk, Agur, and Woods (2016); Woods, Neville, Levinson, Howey, Oczkowski, and Norman (2006); Woods, Brooks, and Norman (2007); Chamberland and Mamede (2015)
  finding: >-
    Mechanism Trace is best supported as a novice-oriented causal
    self-explanation scaffold for mechanism-dense content, especially in
    biomedical contexts where explicit cause-and-effect links matter for
    transfer. The strongest support is not for a decorative flowchart but for
    making basic-science or mechanism links explicit: studies of cognitive
    integration and biomedical reasoning show that learners perform better on
    delayed or more difficult transfer tasks when they build explicit causal
    links instead of memorizing feature lists or relying on proximity alone.
    The review literature also adds a boundary condition: mechanism tracing is
    most useful when the learner still needs to build coherent causal
    structure, and it is less central once knowledge becomes more encapsulated.
    The practical implication for this method is to trace one bounded mechanism
    from trigger to outcome, require specific because-links, verify every arrow
    against the source, and mark real branch points instead of forcing a false
    linear story.
  source: https://doi.org/10.1097/ACM.0b013e3182a45def; https://doi.org/10.1097/ACM.0000000000000896; https://doi.org/10.1007/s40037-016-0268-2; https://doi.org/10.1097/00001888-200610001-00031; https://doi.org/10.1007/s10459-006-9054-y; https://doi.org/10.1016/j.hpe.2015.11.005
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest trace. Produce one trigger-to-outcome chain, one because line per arrow, one branch note if present, and one verification line.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full mechanism pass. Keep separate sections for trigger, chain steps, because links, branch points, and verification notes.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render the output as a compact mechanism table with step, next effect, because, and verification columns.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied clinical pass. Use a table with trigger, path step, because, clinical sign or consequence, and branch or alternate effect columns.
related_methods:
- id: M-ORG-003
  relationship: Flowchart fallback for sequential mechanisms when the learner mainly needs visual sequencing
- id: M-GEN-005
  relationship: Why-chain fallback for causal depth on one specific claim
- id: M-ELB-004
  relationship: Illness-script fallback when the learner needs a clinical pattern rather than a single traced pathway
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - Highly interactive. One teaching chunk (8-12 lines max), one check, one question at a time.
  replaces_with:
  - Require one learner-built mechanism chain before any tutor repair. Do not let the learner jump from trigger to outcome or hide behind vague because language.
  - Treat verification and branch-point marking as required outputs. A fluent linear story is not enough if the source does not support every arrow or the pathway actually diverges.
  reason: Mechanism Trace only works when the learner constructs the causal chain explicitly and the hidden weak points are exposed. If the tutor fills the chain in or accepts vague links, the method loses the transfer and integration benefits it is supposed to provide.
facilitation_prompt: |
  You are running M-GEN-007 (Mechanism Trace) in the ENCODE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Complete mechanism chain, Because statements for each step, Branch points identified, and Verification status.
  Have the learner trace one bounded mechanism from trigger to outcome one direct step at a time, explain each arrow with a because statement, verify every link against the source, and mark where the pathway branches. Do not let the learner skip intermediate steps, use vague because language, or flatten real divergence into one straight line.
  Preset behavior:
  - exam_cram: one-shot; one traced chain, because lines, branch note, verification line.
  - deep_mastery: interactive; separate trigger, chain, because, branch, and verification sections.
  - quick_review: one-shot refresh; compact step-next-because-verification table.
  - clinical_bridge: stepwise; trigger -> path step -> because -> clinical consequence -> branch table.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves trigger -> next effects -> because links -> verification -> branch points and waits.
validation:
  test_cases:
  - topic: Concepts the learner can explain, transform, or generate in their own words
    expected_outputs:
    - Complete mechanism chain (trigger to outcome)
    - Because statements for each step
    - Branch points identified
    - Verification status
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Pure passive rereading or copy-paste note taking
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain or patch missing links too early instead of forcing the learner to build the trace.
  - Learners may still oversimplify branching or reciprocal systems unless divergence is explicitly marked.
