  tutor_does: Ask for a quick 60-120 second free write of what the learner already remembers. Orientation only; no correctness scoring
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Free Write: Ask for a quick 60-120 second free write of what the learner already remembers"'
- step: 2
