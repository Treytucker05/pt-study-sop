id: M-PRE-001
name: Brain Dump
category: prime
subcategory: activation
description: Rapid orientation recall over existing notes to identify strong anchors and missing nodes before deeper work.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- prime
- activation
- orientation
- prior-knowledge
purpose: Rapid orientation recall over existing notes to identify strong anchors and missing nodes before deeper work. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Brain Dump'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: StrongConnections
  description: Top-level anchors the learner already has tied to the topic.
  format: bulleted artifact
- name: MissingNodes
  description: Important anchors or gaps that should be revisited next.
  format: bulleted artifact
- name: FollowUpTargets
  description: Next-pass targets for study or clarification.
  format: bulleted artifact
required_outputs:
- StrongConnections
- MissingNodes
- FollowUpTargets
success_criteria:
- 'Core structure is captured in the required outputs: StrongConnections, MissingNodes.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- StrongConnections is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
