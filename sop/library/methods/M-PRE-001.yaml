constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Run only when prior context is available
  why: This method activates or structures existing knowledge.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
allowed_moves:
- Activate prior knowledge through free recall of existing notes
- Ask learner to write what they already remember (60-120 seconds)
- Extract anchor nodes that align with objective targets
- Flag missing nodes as follow-up anchors non-judgmentally
- Connect recalled concepts to upcoming learning objectives
- Use supportive synthesis tone throughout
- Activate prior knowledge with a bounded free recall or orientation prompt
forbidden_moves:
- Score, grade, or make mastery/confidence judgments
- Teach new detailed content or provide explanations
- Reveal full answers or solutions
- Run on first-contact content with no prior notes or North Star context
- Run quizzes or retrieval tests
- Correct the learner's recall as right or wrong
- Lecture or provide extended explanations
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Learner treats it like a quiz
  detection: The tutor starts judging answers or asking the learner to prove mastery.
  recovery: Explicitly state this is orientation, not assessment.
  fallback_method: M-PRE-010
- mode: No prior context exists
  detection: The output no longer matches the method’s core purpose.
  recovery: Skip and route to M-PRE-010 then M-PRE-008.
  fallback_method: M-PRE-010
default_duration_min: 3
