id: M-TEA-001
name: Story Spine
category: teach
subcategory: narrative-bridge
description: Teach a sequence or pathway as a compact story with a beginning state, trigger, causal progression, consequence, and application breakpoint.
control_stage: TEACH
status: draft
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- teach
- story
- sequence
- pathway
- narrative
- narrative-bridge
- teaching
- explanation
purpose: Teach a sequence or pathway as a compact story with a beginning state, trigger, causal progression, consequence, and application breakpoint. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use a PRIME method when the learner first needs orientation or objective framing.
best_fit_topics:
- 'A single bounded concept or pathway that can be taught in one pass: Story Spine'
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Story spine
  description: Structured artifact that captures the key story spine relationships.
  format: ordered bullets
- name: Ordered step list
  description: Learner-facing teaching artifact for story spine.
  format: bulleted artifact
- name: Clinical breakpoint
  description: Learner-facing teaching artifact for story spine.
  format: bulleted artifact
- name: Source-backed mechanism restatement
  description: Learner-facing teaching artifact for story spine.
  format: bulleted artifact
required_outputs:
- Story spine
- Ordered step list
- Clinical breakpoint
success_criteria:
- The learner-facing explanation artifact is faithful to Story Spine and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Story spine is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Beginning State
  action: State the beginning state and trigger
  tutor_does: State the beginning state and trigger. Name the system before change begins
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Beginning State: State the beginning state and trigger"'
- step: 2
  name: Sequence
  action: Walk the sequence as a causal story
  tutor_does: Walk the sequence as a causal story. Each sentence should move the process forward
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Sequence: Walk the sequence as a causal story"'
- step: 3
  name: Sequence
  action: Mark the main consequence or endpoint
  tutor_does: Mark the main consequence or endpoint. Show why the sequence matters
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Sequence: Mark the main consequence or endpoint"'
- step: 4
  name: Breakpoint
  action: Add one application breakpoint or failure point
  tutor_does: Add one application breakpoint or failure point. Explain where the story goes wrong or breaks down in the real world
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Breakpoint: Add one application breakpoint or failure point"'
- step: 5
  name: Step 5
  action: Return to the formal mechanism terms
  tutor_does: Return to the formal mechanism terms. Translate the story back to the real source language
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Step 5: Return to the formal mechanism terms"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: TEACH methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Turn a hard sequence into a simple causal story
- Emphasize trigger, transition, endpoint, and breakpoint
- Pause to restate the real mechanism after the bridge
- Ask a light check-in question about whether the story clicks
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Score the learner or turn the story into a quiz
- Add causal steps not supported by source anchors
- Leave the story un-translated back to the formal mechanism
- Use the story as the final evidence instead of the source-backed explanation
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For TEACH, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Story becomes decorative and loses the mechanism
  detection: The explanation loses trigger, sequence, or endpoint and starts sounding decorative.
  recovery: Re-anchor every sentence to the underlying cause-effect chain.
  fallback_method: M-TEA-006
- mode: Learner remembers story but not real terms
  detection: The explanation loses trigger, sequence, or endpoint and starts sounding decorative.
  recovery: End with a direct source-term restatement.
  fallback_method: M-TEA-006
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
mechanisms:
- scaffolding
- elaboration
- transfer
- narrative_coding
evidence:
  citation: Mayer (2009)
  finding: Segmented explanation and pretraining support novice learning on unfamiliar systems
  source: control-plane migration
knobs:
