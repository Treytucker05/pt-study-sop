id: M-TEA-001
name: Story Spine
category: encode
description: Teach a sequence or pathway as a compact story with a beginning state, trigger, causal progression, consequence, and clinical breakpoint.
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
control_stage: TEACH
status: draft
tags:
- teach
- story
- sequence
- pathway
- narrative
mechanisms:
- scaffolding
- elaboration
- transfer
stipulations:
- Story is a teaching bridge, not source evidence by itself.
- Keep the story faithful to the source sequence and name where the simplification breaks.
knobs:
  guidance_level: medium
  output_format: bullets
constraints:
  non_assessment: true
  no_scored_checks: true
  objective_scope_required: true
inputs:
- Ordered process, pathway, or sequence
- Source anchors for the key steps
steps:
- step: 1
  action: State the beginning state and trigger
  notes: Name the system before change begins.
- step: 2
  action: Walk the sequence as a causal story
  notes: Each sentence should move the process forward.
- step: 3
  action: Mark the main consequence or endpoint
  notes: Show why the sequence matters.
- step: 4
  action: Add one clinical breakpoint or failure point
  notes: Explain where the story goes wrong in the real world.
- step: 5
  action: Return to the formal mechanism terms
  notes: Translate the story back to the real source language.
outputs:
- Story spine
- Ordered step list
- Clinical breakpoint
- Source-backed mechanism restatement
stop_criteria:
- Beginning state, trigger, middle progression, and endpoint are all present
- One breakpoint is named
- Story is translated back into source terms
failure_modes:
- mode: Story becomes decorative and loses the mechanism
  mitigation: Re-anchor every sentence to the underlying cause-effect chain.
- mode: Learner remembers story but not real terms
  mitigation: End with a direct source-term restatement.
evidence:
  citation: Mayer (2009)
  finding: Segmented explanation and pretraining support novice learning on unfamiliar systems
  source: control-plane migration
evidence_raw: Mayer (2009); segmented explanation supports novice learning on unfamiliar systems
facilitation_prompt: 'You are running M-TEA-001 (Story Spine) in TEACH stage.

  This method is non-assessment. Teach one bounded story chunk.

  Return exactly:

  1) StorySpine

  2) OrderedStepList

  3) ClinicalBreakpoint

  4) MechanismRestatement

  Keep the story faithful to the source sequence and translate back to formal source terms before stopping.

  '
gating_rules:
- Keep the story inside the active objective scope.
- Use the story only to clarify the true causal sequence.
- End with a source-backed restatement.
artifact_type: notes
allowed_moves:
- Turn a hard sequence into a simple causal story
- Emphasize trigger, transition, endpoint, and breakpoint
- Pause to restate the real mechanism after the bridge
- Ask a light check-in question about whether the story clicks
forbidden_moves:
- Score the learner or turn the story into a quiz
- Add causal steps not supported by source anchors
- Leave the story un-translated back to the formal mechanism
- Use the story as the final evidence instead of the source-backed explanation
required_outputs:
- Story spine
- Ordered step list
- Clinical breakpoint
- Source-backed mechanism restatement
