id: M-TEA-001
name: Story Spine
category: EXPLAIN
subcategory: narrative-bridge
description: Teach a sequence or pathway as a compact story with a beginning state, trigger, causal progression, consequence, and application breakpoint.
control_stage: EXPLAIN
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- teach
- story
- sequence
- pathway
- narrative
- narrative-bridge
- teaching
- explanation
- explain
purpose: Teach a sequence or pathway as a compact story with a beginning state, trigger, causal progression, consequence, and application breakpoint. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use a PRIME method when the learner first needs orientation or objective framing.
best_fit_topics:
- 'A single bounded concept or pathway that can be taught in one pass: Story Spine'
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Story spine
  description: Structured artifact that captures the key story spine relationships.
  format: ordered bullets
- name: Ordered step list
  description: Learner-facing teaching artifact for story spine.
  format: bulleted artifact
- name: Clinical breakpoint
  description: Learner-facing teaching artifact for story spine.
  format: bulleted artifact
- name: Source-backed mechanism restatement
  description: Learner-facing teaching artifact for story spine.
  format: bulleted artifact
artifact_schemas:
  Story spine: ordered_steps
  Ordered step list: bullet_list
  Clinical breakpoint: bullet_list
  Source-backed mechanism restatement: bullet_list
produces:
- Story spine
- Ordered step list
- Clinical breakpoint
- Source-backed mechanism restatement
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Story spine
- Ordered step list
- Clinical breakpoint
success_criteria:
- The learner-facing explanation artifact is faithful to Story Spine and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Story spine is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Beginning State
  action: State the beginning state and trigger
  tutor_does: State the beginning state and trigger. Name the system before change begins
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Beginning State: State the beginning state and trigger"'
- step: 2
  name: Sequence
  action: Walk the sequence as a causal story
  tutor_does: Walk the sequence as a causal story. Each sentence should move the process forward
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Sequence: Walk the sequence as a causal story"'
- step: 3
  name: Sequence
  action: Mark the main consequence or endpoint
  tutor_does: Mark the main consequence or endpoint. Show why the sequence matters
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Sequence: Mark the main consequence or endpoint"'
- step: 4
  name: Breakpoint
  action: Add one application breakpoint or failure point
  tutor_does: Add one application breakpoint or failure point. Explain where the story goes wrong or breaks down in the real world
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Breakpoint: Add one application breakpoint or failure point"'
- step: 5
  name: Step 5
  action: Return to the formal mechanism terms
  tutor_does: Return to the formal mechanism terms. Translate the story back to the real source language
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Does the causal chain feel clear from start to finish?
  example: 'Example: "Step 5: Return to the formal mechanism terms"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: TEACH methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Turn a hard sequence into a simple causal story
- Emphasize trigger, transition, endpoint, and breakpoint
- Pause to restate the real mechanism after the bridge
- Ask a light check-in question about whether the story clicks
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Score the learner or turn the story into a quiz
- Add causal steps not supported by source anchors
- Leave the story un-translated back to the formal mechanism
- Use the story as the final evidence instead of the source-backed explanation
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For TEACH, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Story becomes decorative and loses the mechanism
  detection: The explanation loses trigger, sequence, or endpoint and starts sounding decorative.
  recovery: Re-anchor every sentence to the underlying cause-effect chain.
  fallback_method: M-TEA-006
- mode: Learner remembers story but not real terms
  detection: The explanation loses trigger, sequence, or endpoint and starts sounding decorative.
  recovery: End with a direct source-term restatement.
  fallback_method: M-TEA-006
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
mechanisms:
- narrative_coding
- causal_coherence
- schema_abstraction
- structure_signaling
- elaboration
- transfer
evidence:
  citation: van den Broek (1981); Reiser, Novak, McGill, and Penuel (2021); Chen and Bornstein (2024)
  finding: 'Story Spine is best supported as a coherence-building explanation method that helps learners hold a causal sequence together when the narrative structure tracks the real mechanism. Story-comprehension work shows that causal links are central to building a stable representation of events, and storyline-based instructional work shows that learners follow an explanation more effectively when they can see why the sequence moves from one focus to the next. Recent narrative-memory review work sharpens the same point: causal coherence, not decorative storytelling, is what supports comprehension and recall. The practical implication for this method is to keep the story spine short, map each beat to a real causal step, and finish by translating the story back into formal mechanism terms so the narrative remains a bridge rather than a substitute.'
  source: https://doi.org/10.1016/S0079-7421(08)60177-2; https://doi.org/10.1080/1046560X.2021.1884784; https://doi.org/10.1016/j.tics.2024.04.003
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
related_methods:
- id: M-TEA-004
  relationship: Use when the concept needs a modality switch rather than a causal story spine
- id: M-ELB-003
  relationship: Escalate when the learner needs a fuller case walkthrough after the bounded story pass
facilitation_prompt: |-
  You are running M-TEA-001 (Story Spine) in the EXPLAIN stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Story spine, Ordered step list, Clinical breakpoint, and Source-backed mechanism restatement.
  Teach one bounded pathway by stating the beginning state and trigger, walking the causal progression, naming the consequence, adding one breakpoint, and translating back to source terms.
  Preset behavior:
  - exam_cram: one-shot; terse story beats plus one breakpoint and one formal restatement.
  - deep_mastery: interactive; labeled sections with explicit causal transitions before the final formal restatement.
  - quick_review: one-shot refresh; compact Beat | Why it leads | Formal term table.
  - clinical_bridge: stepwise; applied sequence grid with trigger, consequence, breakpoint, and practical implication.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves start state -> sequence -> breakpoint -> formal restatement and waits.
validation:
  test_cases:
  - topic: Single concept explanation for Story Spine
    expected_outputs:
    - Story spine
    - Ordered step list
    - Clinical breakpoint
    - Source-backed mechanism restatement
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Story Spine.
    - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  - topic: A slightly harder variant with one confusable or confusable wrinkle
    expected_outputs:
    - Story spine
    - Ordered step list
    - Clinical breakpoint
    - Source-backed mechanism restatement
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Story Spine.
    - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  acceptance_criteria:
  - Required outputs appear and the main learner-facing artifact is faithful to Story Spine.
  - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  known_issues:
  - Some prompts may over-run the time budget if the source material is very dense.
  - Without a clear topic boundary, the method can broaden instead of teaching one useful chunk.
  - "Single story does not reliably produce transfer \u2014 learner must explicitly abstract the schema (Gick & Holyoak, 1983)."
  - Fictionalized or richly immersive stories can reduce comprehension relative to expository text.
  - Seductive detail risk: interesting but irrelevant narrative elements hurt retention and transfer.
  - Narratives can inflate learner confidence beyond actual understanding (illusion of comprehension).
  - Breakpoint must function as a contrastive boundary case, not a dramatic flourish.
boundary_conditions:
  strongest_for:
  - Novices learning unfamiliar bounded causal processes
  - Content with a real causal pathway that can be walked step by step
  - Non-fictional, concept-tight stories immediately connected to formal vocabulary
  - Delayed retention and conceptual understanding outcomes
  weakest_for:
  - Symbol-heavy or precision-critical content (taxonomies, rule systems, symbolic procedures)
  - Far transfer without explicit abstraction step
  - Fictionalized or richly contextualized explanations
  - Content where narrative coherence could oversimplify evidentiary nuance
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: One-shot; return 4-5 terse story beats, one breakpoint, and one formal mechanism restatement line.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Interactive; use labeled sections, make the causal transitions explicit, and pause before the final source-term restatement.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: One-shot refresh; compress the sequence into a Beat | Why it leads | Formal term table plus one carry-forward cue.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Stepwise; render the pathway as an applied sequence grid with trigger, consequence, breakpoint, and practical implication columns.
