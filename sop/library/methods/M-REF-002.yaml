id: M-REF-002
name: Mastery Loop
category: REFERENCE
subcategory: mastery-loop
description: Re-study items missed during retrieval, then immediately re-test them in short successive relearning loops until the misses are closed or clearly flagged for more work.
control_stage: REFERENCE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- reference
- successive-relearning
- mastery
- retest
- spacing
- loop-tracking
purpose: Mastery Loop exists to run a mastery loop that restudies missed items, re-tests them, and closes persistent gaps with successive relearning. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for quizzing the learner or introducing new material. Use RETRIEVE when the goal is memory testing and TEACH when the goal is explanation.
best_fit_topics:
- missed-item relearning
- successive relearning
- retest-after-restudy loops
poor_fit_topics:
- new content introduction
- unspecified review sessions
- one-and-done re-read loops
learner_state_required: Missed items from retrieval practice are available and the learner is ready to restudy and immediately re-test them.
inputs:
- description: List of missed items from retrieval practice
  required: true
- description: Source materials for re-study
  required: true
- description: Testing mechanism (flashcards, quiz, or tutor)
  required: true
- description: Loop tracker (to count iterations)
  required: true
outputs:
- name: Mastery achieved on all targeted items (or partial progress with time noted)
  description: Restudy-and-retest log showing which missed items were repaired and which still need another pass.
  format: structured response
- name: Loop count per item (difficulty metric)
  description: Per-item loop counts that show how much relearning effort each target required.
  format: structured response
- name: Weak anchor list (items needing 3+ loops)
  description: Compact list of items that remained weak enough to justify earlier or denser review.
  format: bulleted or tabular list
- name: Updated spacing recommendations based on loop performance
  description: Next-review recommendations derived from the observed loop counts and weak-anchor flags.
  format: structured response
artifact_schemas:
  Mastery achieved on all targeted items (or partial progress with time noted): scored_items
  Loop count per item (difficulty metric): scored_items
  Weak anchor list (items needing 3+ loops): bullet_list
  Updated spacing recommendations based on loop performance: scored_items
produces:
- Mastery achieved on all targeted items (or partial progress with time noted)
- Loop count per item (difficulty metric)
- Weak anchor list (items needing 3+ loops)
- Updated spacing recommendations based on loop performance
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Mastery achieved on all targeted items (or partial progress with time noted)
- Loop count per item (difficulty metric)
- Weak anchor list (items needing 3+ loops)
- Updated spacing recommendations based on loop performance
success_criteria:
- All required outputs are present for M-REF-002.
- A reusable artifact is produced and preserved instead of a loose discussion transcript.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Mastery achieved on all targeted items (or partial progress with time noted).'
- The method stayed in the correct stage but the loop tracker or spacing recommendations remain too weak to reuse later.
steps:
- step: 1
  name: Identify the mastery targets
  action: Identify all items missed in recent retrieval practice because these are the targets for successive relearning.
  tutor_does: Capture the miss set in stable wording so the mastery tracker stays source-linked and reusable.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 8
  check: Has the source material been collected and organized for artifact building?
  example: 'Tutor: "Collect the source errors and keep them in the original wording where possible." Learner: "Ready."'
- step: 2
  name: Re-study one missed item
  action: Re-study the first missed item using source materials in a brief focused window of about 30-60 seconds rather than a long review.
  tutor_does: Capture the short re-study step as part of the tracker and keep the restudy window focused rather than expansive.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor adds a single row to the artifact and keeps the loop structure consistent.
- step: 3
  name: Immediately re-test it
  action: Immediately re-test the item without looking at the source because the test must come right after the brief restudy.
  tutor_does: Capture the immediate closed-note retest and keep it adjacent to the study step so the loop remains successive relearning rather than delayed review.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is this step complete and ready to advance?
  example: Tutor writes the result into the loop tracker in a format that can be reused later.
- step: 4
  name: Mark the next loop
  action: If the item is correct, move to the next missed item; if incorrect, mark it for another loop and track the additional attempt.
  tutor_does: Capture whether the item exits the loop or stays active and record the loop count deterministically.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is this step complete and ready to advance?
  example: Tutor saves the artifact and asks for one final verification.
- step: 5
  name: Revisit unresolved items
  action: After all items are attempted, loop back to any still incorrect and continue until all items are recalled correctly at least once.
  tutor_does: Capture the repeated passes without turning them into a long reteach block and keep unresolved items visible in the tracker.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is this step complete and ready to advance?
  example: Tutor saves the artifact and asks for one final verification.
- step: 6
  name: Record difficulty for spacing
  action: Record total loops needed per item for future spacing decisions, and flag items needing 3 or more loops as weak anchors for earlier review.
  tutor_does: Capture final loop counts, weak-anchor flags, and next-review timing in the same reusable artifact.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is this step complete and ready to advance?
  example: Tutor saves the artifact and asks for one final verification.
constraints:
- rule: Artifact-first; do not turn the block into teaching or testing
  why: Reference methods exist to build later-use assets, not to run a lesson or a quiz.
- rule: Keep the structure deterministic and reusable
  why: Later retrieval depends on stable headers, rows, and cue language.
- rule: Preserve source language when it helps later recognition
  why: Exact wording can become the cue that makes retrieval possible.
- rule: Do not start retrieval drills until the reference target exists
  why: The artifact is the prerequisite for later recall work.
allowed_moves:
- Identify missed items from retrieval practice and create mastery targets
- Enforce brief restudy windows of about 30-60 seconds per item before re-testing
- Immediately re-test after re-study without delay
- Track loop counts per item as a diagnostic metric
- Flag weak anchors, especially items needing 3 or more loops, for earlier spacing
- Enforce mastery criterion of correct recall at least once, and twice for especially weak items when the workflow calls for it
- Generate updated spacing recommendations based on loop data
- Route persistently missed items back to ENCODE
- Organize misses into a reusable artifact
- Preserve exact cues or definitions when they help later retrieval
- Create compact lists, tables, or anchors that can be reused later
- Tag content so RETRIEVE can target it later
forbidden_moves:
- Allow extended re-study sessions because the method depends on brief focused restudy rather than long review
- Skip re-testing after re-study because the test is where the relearning signal becomes visible
- Accept a single correct recall as mastery for items that needed 3 or more loops when the workflow requires a second confirmation
- Skip tracking loop counts because they are essential diagnostic data
- Generate the mastery loop for the learner without their active recall
- Skip artifact creation because loop counts and the weak anchor list are part of the required output
- Introduce entirely new content not yet encoded
- Stop the loop before all items are recalled correctly unless the time budget is exhausted and that limit is recorded
- Turn the block into a lecture or quiz
- Hide the source relationship between notes and evidence
- Produce an artifact that cannot be reused later
stuck_protocol: Collapse to a smaller artifact, keep the same headers, and capture one row at a time.
failure_modes:
- mode: Artifact becomes a loose discussion transcript
  detection: There is no stable table, header, or reusable structure.
  recovery: Reformat into a fixed artifact template with explicit fields.
  fallback_method: M-REF-003
- mode: The learner tries to use the block as a quiz
  detection: The prompt turns into right-or-wrong testing instead of artifact building.
  recovery: Reframe as capture-and-organize, not assess-and-grade.
  fallback_method: M-REF-004
- mode: Source language gets lost
  detection: Key terms are paraphrased too aggressively and cues become fuzzy.
  recovery: Restore the original wording where it matters most and add a short note beside it.
  fallback_method: M-REF-001
default_duration_min: 10
energy_cost: medium
best_stage: consolidation
mechanisms:
- retrieval_practice
- spacing
- successive_relearning
- mastery_learning
- corrective_feedback
- relearning_to_criterion
evidence:
  citation: Rawson and Dunlosky (2011); Rawson, Dunlosky, and Sciartelli (2013); Rawson and Dunlosky (2022); Higham, Zengel, Bartlett, and Hadwin (2022); Janes, Dunlosky, Rawson, and Jasnow (2020)
  finding: Mastery Loop is best supported as a successive-relearning method, not as a vague restudy cycle. Successive relearning research shows that repeated retrieval with feedback across spaced sessions produces stronger and more durable retention than restudying alone. Classroom and course-based studies also suggest that this kind of loop can improve exam performance, retention, metacognitive calibration, and even reduce anxiety when learners repeatedly re-test after short corrective study rather than relying on one long review pass. The practical implication for this method is to keep restudy brief, re-test immediately, track how many loops each item needs, and use high loop counts to identify weak anchors that should return sooner in the spacing plan.
  source: https://doi.org/10.1037/a0023956; https://doi.org/10.1007/s10648-013-9240-4; https://doi.org/10.1177/09637214221100484; https://doi.org/10.1037/edu0000693; https://doi.org/10.1002/acp.3699
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest mastery pass. Track only the highest-priority misses, keep the loop log terse, and output one early-review recommendation for weak anchors.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full mastery pass. Keep a fuller loop ledger, record repeated-success confirmation for weak items, and produce richer spacing guidance from the final counts.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh mastery pass. Use a compact per-item table with columns for item, loop count, status, and next review timing.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied mastery pass. Frame the weak-anchor list around clinically dangerous misses or action-relevant confusions and weight spacing recommendations toward safer earlier review.
related_methods:
- id: M-RET-003
  relationship: Works on missed fill-in-the-blank items
- id: M-REF-003
  relationship: Can support relearning with a compact anchor
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  replaces_with:
  - Re-study reveals the correct answer directly to the learner. Re-test then requires a fresh closed-note attempt. The cycle is miss -> reveal or study -> immediate re-test -> repeat until correct. Do not insert hints between reveal and re-test.
  reason: Mastery Loop is successive relearning. The re-study phase must expose the correct answer directly, and the re-test must immediately follow.
facilitation_prompt: |
  You are running M-REF-002 (Mastery Loop) in the REFERENCE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Mastery achieved, Loop count per item, Weak anchor list, and Updated spacing recommendations.
  Run a successive relearning loop on recent misses by restudying briefly, re-testing immediately, and tracking how many loops each item needs. Keep the output reusable and do not turn the block into a lecture.
  Preset behavior:
  - exam_cram: one-shot; terse loop log; focus on top misses; one early-review recommendation.
  - deep_mastery: interactive; fuller loop ledger; repeated-success check for weak items; richer spacing guidance.
  - quick_review: one-shot refresh; compact per-item mastery table.
  - clinical_bridge: stepwise; weak anchors framed around clinically dangerous or action-relevant misses.
  If no preset is specified, use the default knobs. One-shot returns the full mastery artifact in one bounded reply; interactive or stepwise mode moves misses -> loops -> weak anchors -> spacing and waits.
validation:
  test_cases:
  - topic: missed-item relearning
    expected_outputs:
    - Mastery achieved on all targeted items (or partial progress with time noted)
    - Loop count per item (difficulty metric)
    - Weak anchor list (items needing 3+ loops)
    pass_criteria:
    - All required outputs for M-REF-002 are present.
    - The response stays inside the correct stage rules.
  - topic: successive relearning
    expected_outputs:
    - Loop count per item (difficulty metric)
    - Weak anchor list (items needing 3+ loops)
    - Updated spacing recommendations based on loop performance
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Artifact building can drift into teaching unless the tutor keeps the loop tracker explicit and source-linked.
