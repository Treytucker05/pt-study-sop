id: M-REF-002
name: Mastery Loop
category: reference
description: Re-study items missed during retrieval, then immediately re-test. Repeat until all items are recalled correctly.
  Based on successive relearning (Rawson & Dunlosky).
default_duration_min: 10
energy_cost: medium
best_stage: consolidation
control_stage: REFERENCE
status: validated
tags:
- successive-relearning
- mastery
- retest
- evidence-based
mechanisms:
- retrieval
- spacing
- successive_relearning
- mastery_learning
knobs:
  artifact_depth: standard
  link_density: medium
constraints:
  target_artifact_required: true
  retrieval_blocked_without_targets: true
  objective_scope_required: true
inputs:
- List of missed items from retrieval practice
- Source materials for re-study
- Testing mechanism (flashcards, quiz, or Tutor)
- Loop tracker (to count iterations)
steps:
- step: 1
  action: Identify all items missed in recent retrieval practice
  notes: These are your mastery targets — items that need successive relearning
- step: 2
  action: Re-study the first missed item using source materials
  notes: Brief focused study — 30-60 seconds per item, not lengthy review
- step: 3
  action: Immediately re-test the item without looking at source
  notes: The test must come immediately after study — no delay
- step: 4
  action: If correct, move to next missed item; if incorrect, mark for another loop
  notes: Track which items needed multiple loops
- step: 5
  action: After all items attempted, loop back to any that were still incorrect
  notes: Continue until all items recalled correctly at least once
- step: 6
  action: Record total loops needed per item for future spacing decisions
  notes: Items needing 3+ loops are weak anchors — schedule for earlier review
outputs:
- Mastery achieved on all targeted items
- Loop count per item (difficulty metric)
- Weak anchor list (items needing 3+ loops)
- Updated spacing recommendations
stop_criteria:
- All items recalled correctly at least once
- Maximum loop limit reached (e.g., 5 loops per item)
- Time budget exhausted (with partial progress logged)
failure_modes:
- mode: Re-studying too long before re-testing
  mitigation: Keep re-study brief (30-60 sec) — the test is where learning happens
- mode: Stopping after first correct recall (no overlearning)
  mitigation: For weak items, aim for 2 correct recalls before moving on
- mode: Not tracking loop counts
  mitigation: Loop counts are diagnostic — always record them
logging_fields:
- items_targeted
- items_mastered
- average_loops_to_mastery
- weak_anchors_flagged
- total_time_spent
evidence:
  citation: Rawson & Dunlosky (2011)
  finding: successive relearning combines testing + spacing for durable retention
  source: seed_methods.py
evidence_raw: Rawson & Dunlosky (2011); successive relearning combines testing + spacing for durable retention
facilitation_prompt: 'You are running M-REF-002 (Mastery Loop) in REFERENCE stage.

  Execute this method card exactly and keep outputs deterministic.


  Stage hard rules:

  - Build concrete anchors and artifacts.

  - Map concept to applied context.

  - Do not skip artifact creation.


  Required outputs:

  - Mastery achieved on all targeted items

  - Loop count per item (difficulty metric)

  - Weak anchor list (items needing 3+ loops)

  - Updated spacing recommendations


  Stop conditions:

  - All items recalled correctly at least once

  - Maximum loop limit reached (e.g., 5 loops per item)

  - Time budget exhausted (with partial progress logged)


  If required inputs are missing, request only the minimum needed input and continue.

  '
gating_rules:
- Produce structured targets that RETRIEVE can directly test.
- No retrieval drills until reference targets are explicit.
artifact_type: notes
allowed_moves:
- Identify missed items from retrieval practice and create mastery targets
- Enforce brief re-study windows (30-60 seconds per item) before re-testing
- Immediately re-test after re-study without delay
- Track loop counts per item as a diagnostic metric
- Flag weak anchors (items needing 3+ loops) for earlier spacing
- Enforce mastery criterion (correct recall at least once, ideally twice for weak items)
- Generate updated spacing recommendations based on loop data
- Route persistently missed items back to ENCODE
forbidden_moves:
- Allow extended re-study sessions (must be 30-60 seconds, not lengthy review)
- Skip re-testing after re-study — the test is where learning happens
- Accept a single correct recall as mastery for items that needed 3+ loops (require 2)
- Skip tracking loop counts — they are essential diagnostic data
- Generate the mastery loop FOR the learner without their active recall
- Skip artifact creation — loop counts and weak anchor list ARE the output
- Introduce entirely new content not yet encoded
- Stop the loop before all items are recalled correctly (unless time budget exhausted)
required_outputs:
- Mastery achieved on all targeted items (or partial progress with time noted)
- Loop count per item (difficulty metric)
- Weak anchor list (items needing 3+ loops)
- Updated spacing recommendations based on loop performance
