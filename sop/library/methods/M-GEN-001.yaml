id: M-GEN-001
name: Seed-Lock Generation
category: ENCODE
subcategory: seed-lock-generation
description: Force the learner to generate their own first encoding hook before any tutor help, then lock the strongest cue for later reuse.
control_stage: ENCODE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- encode
- seed-lock
- generation-first
- mnemonic
- cue-generation
- desirable-difficulty
purpose: Seed-Lock Generation exists to force the learner to create an initial hook before the tutor contributes anything, then refine and lock the strongest cue for later review. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for passive reading, copying answers, or letting the tutor do the cognitive work for the learner.
best_fit_topics:
- Concepts the learner can explain, transform, or generate in their own words
- Mechanisms and causal chains that benefit from active elaboration
- Bounded terms, definitions, or distinctions that can be hooked to a simple cue
poor_fit_topics:
- Pure passive rereading or copy-paste note taking
- Items that are still completely unknown and cannot yet be transformed
- Large, multi-part topics that need explanation before any cue can be formed
learner_state_required: Source material is loaded. The learner has a bounded concept and is ready to generate, explain, or transform it before seeing help.
inputs:
- description: New term or concept to encode
  required: true
- description: Definition from source material
  required: true
- description: 90-second timer
  required: true
outputs:
- name: Learner-generated Seed (primary hook attempt)
  description: First learner-made hook attempt captured before tutor assistance.
  format: short cue plus explanation
- name: Final locked hook
  description: Final cue selected for later reuse after comparing the seed with any allowed assistance.
  format: short cue plus explanation
- name: Generation success flag (self vs AI-assisted)
  description: Short flag showing whether the final hook was fully self-generated or required tutor support.
  format: short, checkable artifact
artifact_schemas:
  Learner-generated Seed (primary hook attempt): string
  Final locked hook: string
  Generation success flag (self vs AI-assisted): string
produces:
- Learner-generated Seed (primary hook attempt)
- Final locked hook
- Generation success flag (self vs AI-assisted)
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Learner-generated Seed (primary hook attempt)
- Final locked hook
- Generation success flag (self vs AI-assisted)
success_criteria:
- All required outputs are present for M-GEN-001.
- The learner generates a real seed before tutor help instead of outsourcing the first encoding move.
- The method ends with one locked hook and a clear self-versus-assisted status rather than drifting into general explanation.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Learner-generated Seed (primary hook attempt).'
- The learner produced a hook, but it was not clearly locked or the self-versus-assisted status remained ambiguous.
steps:
- step: 1
  name: Read the term and definition
  action: Read the term and its source-grounded definition so the learner knows exactly what must be encoded.
  tutor_does: Guide the learner to restate the term and definition clearly enough that the later hook still points back to the source meaning rather than to a vague impression.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is the target concept clear enough to encode without inventing new meaning?
  example: 'Example: Before generating, state the term and what it actually means in the source.'
- step: 2
  name: Start the 90-second attempt
  action: Start a 90-second generation window before any tutor suggestion is allowed.
  tutor_does: Guide the learner to use the full attempt window and treat the timer as a forced first-pass generation move rather than a delay before asking for help.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Has the learner actually attempted generation before requesting help?
  example: 'Example: Use the full 90 seconds before asking for a rescue cue.'
- step: 3
  name: Generate the seed
  action: Generate your own hook using an association, metaphor, mnemonic, image, or other compact cue.
  tutor_does: Guide the learner to produce one cue that is personally memorable, source-linked, and simple enough to retrieve later.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Did the learner create a real seed instead of leaving the attempt blank?
  example: 'Example: The seed can be imperfect, but it must exist before any tutor contribution.'
- step: 4
  name: Write the seed even if imperfect
  action: Write down the seed and explain briefly why it should point back to the definition.
  tutor_does: Guide the learner to preserve the first cue attempt instead of silently discarding it, because the comparison between seed and final lock is part of the method.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is the learner-generated seed captured in a reusable form?
  example: 'Example: Record the cue plus one line explaining how it connects to the concept.'
- step: 5
  name: Request one suggestion if still stuck
  action: If stuck after the 90-second attempt, request one tutor suggestion and compare it against the learner seed.
  tutor_does: Guide the learner to take only one bounded assist after a genuine attempt, then compare that suggestion against the learner seed rather than replacing the learner process outright.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Was tutor help delayed until after a visible learner attempt?
  example: 'Example: Ask for one scaffold cue only after the learner has already produced or failed to produce a seed.'
- step: 6
  name: Lock the final hook
  action: Lock the final hook, mark whether it was self-generated or AI-assisted, and save it for later repetition.
  tutor_does: Guide the learner to choose the strongest cue, mark the generation source, and preserve the final hook in a stable form for spaced reuse.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is the final artifact captured and ready to keep or review?
  example: 'Example: Final lock = cue, why it works, and whether it stayed self-generated or needed tutor help.'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Present the term and definition clearly before generation timer starts
- Enforce the 90-second generation window before offering help
- Encourage any attempt, even imperfect, during the Seed phase
- Prompt the learner to write down the Seed even if they feel it is weak
- Offer one scaffold hint or suggestion only after 90 seconds of learner effort
- Ask the learner to compare their Seed to the tutor suggestion and choose the stronger hook
- Guide the Lock step to capture the final hook for spaced repetition
- Track whether the hook was self-generated or AI-assisted
forbidden_moves:
- Offer tutor-generated hooks before the 90-second learner attempt
- Skip the generation timer or shorten the attempt window
- Accept a blank Seed without requiring a written attempt
- Generate the entire hook for the learner without prior learner effort
- Deliver a passive explanation instead of prompting active generation
- Move to Lock without a finalized hook (self or AI-assisted)
- Present information outside the objective scope
- Skip gating steps defined in the method card
stuck_protocol: Offer one smaller hint, one simpler example, or one step back in the chain, then require the learner to continue actively.
failure_modes:
- mode: Asking AI immediately
  detection: The learner or tutor starts doing asking AI immediately or the artifact stops satisfying the method’s required checks.
  recovery: Enforce the 90-second wait before tutor help.
  fallback_method: M-HOOK-002
- mode: Giving up too fast
  detection: The learner or tutor starts doing giving up too fast or the artifact stops satisfying the method’s required checks.
  recovery: Require a written attempt even if the learner thinks it is bad.
  fallback_method: M-GEN-002
- mode: Over-relying on AI hooks
  detection: The learner or tutor starts doing over-relying on AI hooks or the artifact stops satisfying the method’s required checks.
  recovery: Track self-generation rate and flag if it drops below half of recent runs.
  fallback_method: M-HOOK-001
default_duration_min: 3
energy_cost: medium
best_stage: first_exposure
mechanisms:
- generation_effect
- elaboration
- desirable_difficulty
- cue_generation
- metacognitive_selection
- retrieval_support
evidence:
  citation: Slamecka and Graf (1978); Bertsch, Pesta, Wiscott, and McDaniel (2007); McCurdy, Viechtbauer, Sklenar, Frankenstein, and Leshikar (2020); Tullis and Finley (2018); Tullis and Fraundorf (2022); Mocko, Wagler, and Lesser (2024)
  finding: >-
    Seed-Lock Generation is best supported as a bounded self-generation method
    that uses the generation effect and the learner's own cue-selection
    advantage to make later recall more likely than simple reading or
    tutor-provided phrasing alone. Foundational and meta-analytic
    generation-effect work shows that producing information rather than reading
    it tends to improve memory, but later reviews also show that the benefit
    depends on task constraint and on whether the generation task fits the
    material. Research on self-generated memory cues suggests that learner-made
    cues often outperform other-provided cues because learners choose
    distinctive prompts that fit their own memory needs. Recent classroom work
    on mnemonic use also shows an important limit: remembering a mnemonic is
    not the same as understanding the concept, so the cue must stay tied to
    the source definition and not become a substitute for meaning. The
    practical implication for this method is to force a real learner-made seed
    first, keep the target bounded, require a short explanation of why the cue
    fits, and allow tutor assistance only after a genuine attempt has been
    captured.
  source: https://doi.org/10.1037/0278-7393.4.6.592; https://doi.org/10.3758/BF03193441; https://doi.org/10.3758/s13423-020-01762-3; https://doi.org/10.1177/2372732218788092; https://doi.org/10.3758/s13421-021-01245-3; https://doi.org/10.1080/26939169.2024.2334905
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest cue pass. Produce one seed, one locked hook, and one self-versus-assisted status line with almost no extra commentary.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full generation pass. Preserve the learner seed, compare it against one bounded assist if needed, explain why the final hook wins, and keep an explicit lock note for later reuse.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render the result as a compact table with concept, learner seed, final hook, cue type, and self-versus-assisted status.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied cue pass. Tie the hook to a patient finding, mechanism, or action cue when the concept is clinical, and render the lock as a cue-to-meaning-to-action grid.
related_methods:
- id: M-HOOK-002
  relationship: Mnemonic support after a failed self-attempt
- id: M-GEN-002
  relationship: Use teach-back if the learner needs more conceptual elaboration
- id: M-HOOK-001
  relationship: Fallback if a fuller hook workflow is needed
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - Highly interactive. One teaching chunk (8-12 lines max), one check, one question at a time.
  replaces_with:
  - Enforce a visible learner-generated seed before any tutor hook appears. The tutor may give one bounded suggestion only after a genuine attempt or a clear failed attempt after the timer.
  - Keep the final hook tied to the source definition with one short why-it-fits explanation. Do not let the cue drift into a clever but inaccurate mnemonic.
  reason: Seed-Lock Generation only works if the learner owns the first cue and the final hook still points back to the real concept rather than to a tutor-authored shortcut.
facilitation_prompt: |
  You are running M-GEN-001 (Seed-Lock Generation) in the ENCODE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Learner-generated Seed, Final locked hook, and Generation success flag.
  Force the learner to create the first hook. Read the term and source definition, require a real 90-second seed attempt, capture that seed even if imperfect, and only then allow one bounded tutor suggestion if the learner is still stuck. End by locking the strongest hook and marking whether it stayed self-generated or needed assistance.
  Preset behavior:
  - exam_cram: one-shot; one seed, one lock, one status line.
  - deep_mastery: interactive; preserve seed, compare against one bounded assist if needed, and add a fuller lock note.
  - quick_review: one-shot refresh; compact seed-lock table.
  - clinical_bridge: stepwise; cue-to-meaning-to-action grid for clinical concepts.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves definition -> seed -> assist if needed -> lock and waits.
validation:
  test_cases:
  - topic: Concepts the learner can explain, transform, or generate in their own words
    expected_outputs:
    - Learner-generated Seed (primary hook attempt)
    - Final locked hook
    - Generation success flag (self vs AI-assisted)
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Pure passive rereading or copy-paste note taking
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-help before the learner produces a real seed unless the attempt gate is enforced explicitly.
  - Clever hooks can drift away from the actual definition unless the lock step requires a short why-it-fits explanation.
