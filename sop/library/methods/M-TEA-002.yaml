id: M-TEA-002
name: Confusable Contrast Teach
category: encode
description: Teach two confusable concepts side-by-side by naming the shared bucket, the key difference, the signature clue, and the classic trap.
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
control_stage: TEACH
status: draft
tags:
- teach
- compare
- contrast
- confusable
- differential
mechanisms:
- discrimination
- scaffolding
- transfer
stipulations:
- Teach the contrast before asking the learner to build their own table.
- End with a crisp discriminator, not a vague recap.
knobs:
  output_format: bullets
constraints:
  non_assessment: true
  no_scored_checks: true
  objective_scope_required: true
inputs:
- Two confusable concepts
- Source anchors for definitions and discriminators
steps:
- step: 1
  action: State the common bucket both concepts belong to
  notes: Start with what makes them seem similar.
- step: 2
  action: Name the one key difference
  notes: Use plain language first, then formal terms.
- step: 3
  action: Give a signature clue for each concept
  notes: What clue should make the learner lean one way?
- step: 4
  action: Name the classic trap
  notes: Explain why people mix them up.
- step: 5
  action: Finish with one short application contrast
  notes: Use a minimal example, not a full case drill.
outputs:
- Shared bucket statement
- Key difference statement
- Signature clues
- Classic trap
- Mini application contrast
stop_criteria:
- Shared bucket and discriminator are explicit
- Each concept has a signature clue
- One trap is named
failure_modes:
- mode: Contrast stays too abstract
  mitigation: Force a concrete discriminator and one signature clue per concept.
- mode: Too many differences create noise
  mitigation: Rank and teach the top discriminator first.
evidence:
  citation: Alfieri et al. (2013)
  finding: Comparison-based learning improves discrimination and concept formation
  source: control-plane migration
evidence_raw: Alfieri et al. (2013); comparison-based learning improves discrimination and concept formation
facilitation_prompt: 'You are running M-TEA-002 (Confusable Contrast Teach) in TEACH stage.

  This method is non-assessment. Teach the contrast clearly before any learner-built table.

  Return exactly:

  1) SharedBucket

  2) KeyDifference

  3) SignatureClues

  4) ClassicTrap

  5) MiniApplicationContrast

  End with the cleanest discriminator in one sentence.

  '
gating_rules:
- Teach the shared bucket before the difference.
- Keep the contrast bounded to the active objective scope.
- Use a minimal application example, not a scored check.
artifact_type: table
allowed_moves:
- Explain why the concepts are confusable
- Name the key discriminator in plain language and source terms
- Use one short compare/contrast example
- Highlight the classic trap explicitly
forbidden_moves:
- Turn the block into learner-first recall or quizzing
- Present a long exhaustive table instead of a clean teaching contrast
- Skip the classic trap
- Leave the learner without one crisp discriminator
required_outputs:
- Shared bucket statement
- Key difference statement
- Signature clues
- Classic trap
- Mini application contrast
