id: M-TEA-002
name: Confusable Contrast Teach
category: EXPLAIN
subcategory: confusable-contrast
description: Teach two confusable concepts side-by-side by naming the shared bucket, the key difference, the signature clue, and the classic trap.
control_stage: EXPLAIN
status: validated
version: '1.6'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- explain
- compare
- contrast
- confusable
- differential
- discriminator
- explanation
purpose: Teach two confusable concepts side-by-side by naming the shared bucket, the key difference, the signature clue, and the classic trap. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use an ORIENT method when the learner first needs orientation or objective framing.
best_fit_topics:
- Confusable items that need separation by features, cues, or exceptions
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Shared bucket statement
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Key difference statement
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Signature clues
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Classic trap
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Mini application contrast
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: two-column table or tightly grouped bullets
artifact_schemas:
  Shared bucket statement: bullet_list
  Key difference statement: bullet_list
  Signature clues: bullet_list
  Classic trap: bullet_list
  Mini application contrast: table
produces:
- Shared bucket statement
- Key difference statement
- Signature clues
- Classic trap
- Mini application contrast
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Shared bucket statement
- Key difference statement
- Signature clues
success_criteria:
- The learner-facing explanation artifact is faithful to Confusable Contrast Teach and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Shared bucket statement is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Shared Bucket
  action: State the shared bucket and the 1-2 shared features that make the concepts confusable
  tutor_does: State the shared bucket first and name the 1-2 features that make the concepts feel similar. Keep the opening concrete and source-faithful before introducing any difference.
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Does the learner see why these two concepts belong in the same bucket before the contrast begins?
  example: 'Example: "Both are upper motor neuron patterns, so they live in the same neuro bucket before we separate them."'
- step: 2
  name: Key Difference
  action: Name the one diagnostic difference in plain language and then in source terms
  tutor_does: Name one deciding difference only. Give the plain-language contrast first, then translate it back to the canonical source language.
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: If the learner remembers only one discriminator, is it the right one?
  example: 'Example: "The deciding difference is where the deficit shows up most strongly; in formal terms, distribution pattern is the discriminator."'
- step: 3
  name: Signature Clues
  action: Give one diagnostic clue for each concept tied to the key difference
  tutor_does: Give one clue for each concept that points back to the deep difference, not a random surface mnemonic. Keep both clues visible as a pair.
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Would each clue push the learner toward the correct concept for the right reason?
  example: 'Example: "If you notice leg-dominant weakness, lean ACA; if you notice face-arm-language involvement, lean MCA."'
- step: 4
  name: Classic Trap
  action: Name one common wrong cue and refute it immediately
  tutor_does: Name the common trap, explain why it misleads learners, and immediately redirect them back to the true discriminator.
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Is the trap specific, corrected, and clearly weaker than the true clue?
  example: 'Example: "Classic trap: people choose MCA for every weakness pattern; the fix is to check whether the distribution is face-arm or leg-dominant."'
- step: 5
  name: Mini Application Contrast
  action: Finish with one short application contrast and one carry-forward cue
  tutor_does: Give one minimal either-or example, state which feature decides it, and close with one carry-forward cue or next contrast to review.
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Can the learner apply the discriminator to one minimal case and say what to watch next?
  example: 'Example: "Quick contrast: leg-heavy weakness with frontal signs leans ACA, not MCA; next time, watch the body-region distribution first."'
constraints:
- rule: Do not turn the method into a test or quiz
  why: EXPLAIN methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Explain why the concepts are confusable
- Name the key discriminator in plain language and source terms
- Use one short compare/contrast example
- Highlight the classic trap explicitly
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Turn the block into learner-first recall or quizzing
- Present a long exhaustive table instead of a clean teaching contrast
- Skip the classic trap
- Leave the learner without one crisp discriminator
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For EXPLAIN, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Contrast stays too abstract
  detection: The two items blur together instead of separating cleanly.
  recovery: Force a concrete discriminator and one signature clue per concept.
  fallback_method: M-TEA-004
- mode: Too many differences create noise
  detection: "The output no longer matches the method\u2019s core purpose."
  recovery: Rank and teach the top discriminator first.
  fallback_method: M-TEA-004
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
mechanisms:
- discrimination
- scaffolding
- transfer
- elaboration
evidence:
  citation: Alfieri, Nokes-Malach, and Schunn (2013); Richland and McDonough (2010); Richland and Simms (2015); Kendeou, Walsh, Smith, and O'Brien (2014); Loibl, Tillema, Rummel, and van Gog (2020)
  finding: 'Confusable Contrast Teach is best supported as a structured comparison method that first aligns the shared bucket and then isolates the small set of cues that actually discriminate the concepts. Comparison research shows that aligned contrasts help learners notice deep structure and build more differentiated categories than studying cases alone. Refutation research adds the second half of the method: tempting but wrong cues are less likely to stick when they are explicitly named, rejected, and replaced with the correct explanation. The practical implication for this method is to keep the contrast narrow, surface one true discriminator, attach one signature clue to each side, and explicitly kill the classic trap instead of hoping the learner will infer the difference alone.'
  source: https://doi.org/10.1080/00461520.2013.775712; https://doi.org/10.1016/j.cedpsych.2009.09.001; https://doi.org/10.1002/wcs.1336; https://doi.org/10.1080/0163853X.2014.913961; https://doi.org/10.1007/s11251-020-09504-7
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: One-shot; deliver the shared bucket, key difference, one clue per side, and one trap in terse bullets.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Interactive; use labeled sections, keep the clues and trap explicit, and end with a fuller application contrast before routing onward.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: One-shot refresh; compress the contrast into a two-column discriminator table plus one carry-forward cue.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Stepwise; use an applied contrast grid with cue, likely mistake, and confirming clue columns to support real-world separation.
related_methods:
- id: M-ILV-002
  relationship: Use when the learner needs a fuller side-by-side comparison artifact after the teaching pass
- id: M-RET-006
  relationship: Use when the next step should be adversarial discrimination practice on the same confusable pair
facilitation_prompt: |-
  You are running M-TEA-002 (Confusable Contrast Teach) in the EXPLAIN stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Shared bucket statement, Key difference statement, Signature clues, Classic trap, and Mini application contrast.
  Teach two confusable concepts by naming the shared bucket, isolating one real discriminator, attaching one signature clue to each side, killing one classic trap, and ending with a short application contrast.
  Preset behavior:
  - exam_cram: one-shot; terse bullets with one clue per side and one trap.
  - deep_mastery: interactive; labeled sections with fuller clue, trap, and application handling.
  - quick_review: one-shot refresh; compact discriminator table plus one carry-forward cue.
  - clinical_bridge: stepwise; applied contrast grid with cue, likely mistake, and confirming clue columns.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves shared bucket -> discriminator -> clues/trap -> application contrast and waits.
validation:
  test_cases:
  - topic: Single concept explanation for Confusable Contrast Teach
    expected_outputs:
    - Shared bucket statement
    - Key difference statement
    - Signature clues
    - Classic trap
    - Mini application contrast
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Confusable Contrast Teach.
    - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  - topic: A slightly harder variant with one confusable or clinical wrinkle
    expected_outputs:
    - Shared bucket statement
    - Key difference statement
    - Signature clues
    - Classic trap
    - Mini application contrast
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Confusable Contrast Teach.
    - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  acceptance_criteria:
  - Required outputs appear and the main learner-facing artifact is faithful to Confusable Contrast Teach.
  - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  known_issues:
  - Some prompts may over-run the time budget if the source material is very dense.
  - Without a clear topic boundary, the method can broaden instead of teaching one useful chunk.
