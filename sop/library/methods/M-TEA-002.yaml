id: M-TEA-002
name: Confusable Contrast Teach
category: teach
subcategory: contrast
description: Teach two confusable concepts side-by-side by naming the shared bucket, the key difference, the signature clue, and the classic trap.
control_stage: TEACH
status: draft
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- teach
- compare
- contrast
- confusable
- differential
- teaching
- explanation
purpose: Teach two confusable concepts side-by-side by naming the shared bucket, the key difference, the signature clue, and the classic trap. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use a PRIME method when the learner first needs orientation or objective framing.
best_fit_topics:
- Confusable items that need separation by features, cues, or exceptions
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Shared bucket statement
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Key difference statement
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Signature clues
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Classic trap
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: bulleted artifact
- name: Mini application contrast
  description: Learner-facing teaching artifact for confusable contrast teach.
  format: two-column table or tightly grouped bullets
required_outputs:
- Shared bucket statement
- Key difference statement
- Signature clues
success_criteria:
- The learner-facing explanation artifact is faithful to Confusable Contrast Teach and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Shared bucket statement is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Opening Step
  action: State the common bucket both concepts belong to
  tutor_does: State the common bucket both concepts belong to. Start with what makes them seem similar
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Which distinction matters most right now, and why?
  example: 'Example: "Opening Step: State the common bucket both concepts belong to"'
- step: 2
  name: Step 2
  action: Name the one key difference
  tutor_does: Name the one key difference. Use plain language first, then formal terms
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Which distinction matters most right now, and why?
  example: 'Example: "Step 2: Name the one key difference"'
- step: 3
  name: Step 3
  action: Give a signature clue for each concept
  tutor_does: Give a signature clue for each concept. What clue should make the learner lean one way?
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Which distinction matters most right now, and why?
  example: 'Example: "Step 3: Give a signature clue for each concept"'
- step: 4
  name: Step 4
  action: Name the classic trap
  tutor_does: Name the classic trap. Explain why people mix them up
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Which distinction matters most right now, and why?
  example: 'Example: "Step 4: Name the classic trap"'
- step: 5
  name: Contrast
  action: Finish with one short application contrast
  tutor_does: Finish with one short application contrast. Use a minimal example, not a full case drill
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which distinction matters most right now, and why?
  example: 'Example: "Contrast: Finish with one short application contrast"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: TEACH methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Explain why the concepts are confusable
- Name the key discriminator in plain language and source terms
- Use one short compare/contrast example
- Highlight the classic trap explicitly
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Turn the block into learner-first recall or quizzing
- Present a long exhaustive table instead of a clean teaching contrast
- Skip the classic trap
- Leave the learner without one crisp discriminator
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For TEACH, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Contrast stays too abstract
  detection: The two items blur together instead of separating cleanly.
  recovery: Force a concrete discriminator and one signature clue per concept.
  fallback_method: M-TEA-004
- mode: Too many differences create noise
  detection: The output no longer matches the method’s core purpose.
  recovery: Rank and teach the top discriminator first.
  fallback_method: M-TEA-004
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
mechanisms:
- discrimination
- scaffolding
- transfer
- elaboration
evidence:
