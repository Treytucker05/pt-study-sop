id: M-ENC-009
name: Concept Map
category: encode
control_stage: ENCODE
description: Generate a learner-usable concept map that captures core nodes and labeled links for objective-scoped encoding.
default_duration_min: 10
energy_cost: high
has_steps: Y
has_outputs_or_artifacts: Y
outputs_summary: Concept map (nodes + labeled links); Mermaid code
knobs:
  diagram_format: mermaid
stipulations:
- The concept map must be learner-usable, not decorative.
- The learner must be able to explain the map structure after it is built.
- Start with a short top-down verbal frame before drawing the map.
- Treat generated structure as teaching support, not source evidence, unless specific sources are cited.
facilitation_prompt: 'Analyze the skeleton outline just provided and generate a concept map visualizing the relationships
  between the core components. You MUST format your visual output strictly using {diagram_format}.

  You are running M-ENC-009 (Concept Map) in ENCODE stage.

  Stage boundary: - ENCODE requires active processing. Do not passively summarize. - Keep map scoped to the current objective
  only. - The map must stay learner-usable and explanation-ready. - Prefer clarity and relationship structure over visual flourish.

  Build and return exactly: 1) BriefTopDownFrame 2) ConceptMapNodes 3) ConceptMapLinks 4) MermaidOrAsciiMap 5) One-ParagraphLearnerExplanation

  Provenance rule: if you add structure or phrasing that comes from your own teaching synthesis rather than a cited course source,
  mark it as teaching support, not source evidence.

  Stop condition: - End when the learner can explain the concept map structure in their own words with minimal support.

  '
constraints:
  active_processing_required: true
  objective_scope_required: true
  no_final_answer_only: true
steps:
- step: 1
  action: Start ENCODE protocol within scope
  notes: Respect stage boundaries.
- step: 2
  action: Execute method actions in order
  notes: Capture required telemetry/artifacts.
- step: 3
  action: Emit required outputs and handoff
  notes: Do not drift into another stage.
inputs:
- Target concept from objective map
- Current misconception or gap signal
gating_rules:
- Force active processing (explain, transform, or map), not passive reading.
- Keep output scoped to mapped objectives only.
outputs:
- Learner-generated explanation or structured encoding artifact
stop_criteria:
- Learner can explain concept in own words with minimal support
failure_modes:
- mode: Passive repetition
  mitigation: Switch to self-explanation or transform-the-content prompt.
- mode: Overload
  mitigation: Lower complexity and continue with one concept at a time.
artifact_type: concept-map
allowed_moves:
- Provide a brief top-down verbal frame before map building begins
- Guide learner to identify core concept nodes from the objective scope
- Prompt learner to create labeled links showing relationships between nodes
- Use Socratic questioning to help learner discover missing connections
- Suggest Mermaid or ASCII format for digital map output
- Ask learner to explain the map structure in their own words
- Review learner's map for missing relationships and prompt additions
- Mark any tutor-added structure as teaching support, not source evidence
forbidden_moves:
- Build the concept map FOR the learner
- Add nodes or links without learner involvement
- Accept a map the learner cannot explain in their own words
- Skip the top-down verbal frame before map construction
- Create decorative maps that are not learner-usable
- Deliver a passive summary instead of facilitating map building
- Present tutor-generated structure as source evidence without citation
- Move to retrieval before the learner can explain the map
required_outputs:
- Learner-generated explanation or structured encoding artifact
- Concept map with nodes and labeled links
evidence_raw: Novak & Canas (2008); concept mapping promotes meaningful learning through explicit relationship encoding
