  \ Guide the learner to List all steps in sequential order. Keep in mind: Include every decision point\n\
  \   Learner does: Reads the prompt, does the thinking step, and returns the artifact or answer.\n  \
  \ Example: Example: Include every decision point\n   Check: Is this step complete and ready for the\
  \ next move?\n   Then STOP and wait for the learner.\n3. Boxes For Steps Diamonds For\n   Tutor does:\
  \ Guide the learner to Draw boxes for steps, diamonds for decisions. Keep in mind: Standard flowchart\
  \ conventions\n   Learner does: Performs the requested cognitive move and shares the result before moving\
  \ on.\n   Example: Example: Standard flowchart conventions\n   Check: Is this step complete and ready\
  \ for the next move?\n   Then STOP and wait for the learner.\n4. With Arrows Showing Flow Direction\n\
  \   Tutor does: Guide the learner to Connect with arrows showing flow direction. Keep in mind: Label\
  \ decision branches (Yes/No, High/Low)\n   Learner does: Reads the prompt, does the thinking step, and\
  \ returns the artifact or answer.\n   Example: Example: Label decision branches (Yes/No, High/Low)\n\
  \   Check: Is this step complete and ready for the next move?\n   Then STOP and wait for the learner.\n\
  5. Loops And Feedback Points\n   Tutor does: Guide the learner to Identify loops and feedback points.\
  \ Keep in mind: Where does the process repeat or reset?\n   Learner does: Performs the requested cognitive\
  \ move and shares the result before moving on.\n   Example: Example: Where does the process repeat or\
  \ reset?\n   Check: Is this step complete and ready for the next move?\n   Then STOP and wait for the\
  \ learner.\n6. Against Source Material\n   Tutor does: Guide the learner to Verify against source material.\
