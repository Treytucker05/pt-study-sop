  \ trivia, free-form brainstorming, or content that has no meaningful structure to map.\nInputs:\n- Process\
  \ or algorithm to diagram (required)\n- Source material with step sequence (required)\n- Mermaid editor\
  \ or blank paper (required)\nRequired outputs:\n- Completed flowchart: Completed flowchart [labeled\
