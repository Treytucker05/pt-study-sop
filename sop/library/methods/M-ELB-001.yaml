id: M-ELB-001
name: Analogy Bridge
category: ELABORATE
subcategory: analogy-bridge
description: Create an analogy linking the concept to something familiar, map the structure explicitly, and test where the analogy breaks.
control_stage: ELABORATE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- elaborate
- analogy
- transfer
- structure-mapping
- comparison
- sop-core
purpose: Analogy Bridge exists to elaborate already-encoded material by linking the target concept to a familiar domain, mapping the structure, and making the limits explicit. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
- Mechanisms, relationships, or processes that benefit from a familiar bridge
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or elaborate
- Topics where no structurally aligned familiar domain is available
learner_state_required: The target concept has already been taught or encoded. The learner can attempt retrieval, comparison, or application before seeing the answer.
inputs:
- description: Concept to analogize
  required: true
- description: Familiar domain for comparison
  required: true
outputs:
- name: Analogy statement (A is to B as X is to Y)
  description: One source-grounded analogy statement that frames the bridge cleanly.
  format: short summary paragraph or bullets
- name: Mapping table (3+ correspondences)
  description: Explicit mapping of at least three structural correspondences between the concept and the familiar domain.
  format: 2-column or multi-row table
- name: Breakdown points (where analogy fails and what that teaches)
  description: Limits of the analogy plus what those limits reveal about the real concept.
  format: bulleted or tabular list
artifact_schemas:
  Analogy statement (A is to B as X is to Y): paragraph
  Mapping table (3+ correspondences): table
  Breakdown points (where analogy fails and what that teaches): bullet_list
produces:
- Analogy statement (A is to B as X is to Y)
- Mapping table (3+ correspondences)
- Breakdown points (where analogy fails and what that teaches)
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Analogy statement (A is to B as X is to Y)
- Mapping table (3+ correspondences)
- Breakdown points (where analogy fails and what that teaches)
success_criteria:
- All required outputs are present for M-ELB-001.
- The analogy includes at least three explicit correspondences and at least one real breakdown point.
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Mapping table (3+ correspondences).'
- The method stayed in the correct stage but the analogy remains too superficial or the breakdowns are underdeveloped.
steps:
- step: 1
  name: Name the target concept
  action: State the concept you want to understand better.
  tutor_does: Guide the learner to name the target concept clearly and keep the focus on the specific aspect that needs clarification.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Be specific about what aspect needs clarification.'
- step: 2
  name: Choose a familiar source domain
  action: Find a familiar domain with similar structure.
  tutor_does: Guide the learner to choose a genuinely familiar source domain with similar structure, not just something that feels loosely similar.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Good sources can come from everyday objects, sports, cooking, or machines if the structure really matches.'
- step: 3
  name: Map the analogy
  action: Map the analogy as A is to B as X is to Y.
  tutor_does: Guide the learner to map the analogy and identify at least three corresponding elements or relationships.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Identify 3+ corresponding elements.'
- step: 4
  name: Test the edges
  action: Test the edges and identify where the analogy breaks down.
  tutor_does: Guide the learner to test the limits of the analogy so it does not get mistaken for the full truth.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: All analogies have limits; knowing them is part of learning.'
- step: 5
  name: Convert breakdown into insight
  action: Note what the breakdown teaches you.
  tutor_does: Guide the learner to convert the failure points into a clearer statement about the real concept.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: The failure points often reveal important nuances.'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Analogies are teaching bridges, not source claims
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Always return to the real concept after the analogy
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Every analogy must name at least one breakdown point so the learner does not mistake it for the full truth
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Force active processing (explain, transform, or map), not passive reading
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Propose an analogy when the learner needs a bridge into an unfamiliar mechanism
- Ask probing questions about analogy structure and correspondences
- Challenge breakdown points and make their limits explicit
- Require structural mapping, not surface similarity (reject "they're both big")
- Invite the learner to refine or extend the mapping after the initial bridge
- Question whether the familiar domain is truly familiar to the learner
- Use Socratic questioning to expose gaps in the mapping
- Demand a return to the real concept after the bridge move
forbidden_moves:
- Accept surface-level analogy without structural mapping (e.g., "it's like a pump")
- Skip identification of breakdown points
- Accept an analogy with fewer than 3 mapped correspondences
- Let the analogy stand unchallenged as a full explanation
- Move on without the learner distinguishing analogy from source-backed fact
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or route back to ENCODE/REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Analogy too superficial
  detection: The learner or tutor starts doing analogy too superficial or the artifact stops satisfying the method’s required checks.
  recovery: Require structural mapping, not just surface similarity.
  fallback_method: M-ILV-001
- mode: Ignoring breakdown points
  detection: The learner or tutor starts doing ignoring breakdown points or the artifact stops satisfying the method’s required checks.
  recovery: Force identification of at least one limitation.
  fallback_method: M-GEN-002
- mode: Familiar domain not actually familiar
  detection: The learner or tutor starts doing familiar domain not actually familiar or the artifact stops satisfying the method’s required checks.
  recovery: Choose domains the learner genuinely knows well.
  fallback_method: M-ILV-002
default_duration_min: 3
energy_cost: medium
best_stage: review
mechanisms:
- structure_mapping
- analogical_reasoning
- transfer
- elaboration
- relational_reasoning
- generation
evidence:
  citation: Gentner (1983); Harrison and Treagust (1993); Richland and McDonough (2010); Alfieri, Nokes-Malach, and Schunn (2013); Richland and Simms (2015)
  finding: >-
    Analogy Bridge is best supported as a structured comparison method that
    helps learners align relational structure, not as a shortcut that makes a
    concept true by resemblance. Structure-mapping theory and later analogy
    research support explicit relational mapping over surface-feature matching,
    and case-comparison evidence shows that comparing aligned examples or
    analogs can improve conceptual learning and transfer. Educational reviews
    and classroom studies also show the main risk: analogies mislead when the
    source is only superficially familiar or when unshared attributes are left
    implicit. The practical implication for this method is to choose one
    structurally aligned familiar domain, require explicit correspondences, and
    always end by naming at least one breakdown point and what it teaches about
    the real concept.
  source: https://doi.org/10.1207/s15516709cog0702_3; https://doi.org/10.1002/tea.3660301010; https://doi.org/10.1016/j.cedpsych.2009.09.001; https://doi.org/10.1080/00461520.2013.775712; https://doi.org/10.1002/wcs.1336
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest bridge. Return one tight analogy, 3 mapped correspondences, 1 breakdown point, and 1 one-line return-to-concept note.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fuller bridge. Walk concept, source domain, 4-6 correspondences, and 2 breakdown points in sequence, then state exactly what the analogy does and does not capture.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh bridge. Use a compact table with target role, familiar analog, and caution columns plus a minimal analogy statement.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied bridge. Choose an analogy that supports a real-world or clinical cue, map the correspondences in a cue table, and make the breakdowns explicit so the learner does not overextend the analogy in practice.
related_methods:
- id: M-ILV-001
  relationship: Cross-topic transfer cousin method
- id: M-GEN-002
  relationship: Teach-back fallback if the analogy needs explanation
- id: M-ILV-002
  relationship: Comparison fallback for discrimination
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  replaces_with:
  - Require the learner to propose or refine the analogy before you complete the final bridge. You may scaffold with one candidate source domain or one partial correspondence, but do not hand over the full mapping before an attempt.
  - When the analogy starts to overextend, switch from elaboration to boundary-setting: name the breakdown, then restate the real concept in source-faithful language.
  reason: Analogy Bridge only works if the learner actively maps the structure and sees where it breaks. A fully supplied analogy too early collapses the interrogation step and hides the limits of the bridge.
facilitation_prompt: |
  You are running M-ELB-001 (Analogy Bridge) in the ELABORATE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Analogy statement, Mapping table, and Breakdown points.
  Build one analogy for an already-encoded concept, map at least 3 structural correspondences, test where the analogy fails, and return to the real concept without turning the run into a lecture or quiz.
  Preset behavior:
  - exam_cram: one-shot; 1 tight analogy; 3 mappings; 1 breakdown; terse bullets.
  - deep_mastery: interactive; 4-6 correspondences; 2 breakdowns; explicit return-to-concept section.
  - quick_review: one-shot refresh; compact mapping table with minimal prose.
  - clinical_bridge: stepwise; cue-focused analogy table with practical breakdown warnings.
  If no preset is specified, use the default knobs. One-shot returns the full bridge artifact in one bounded reply; interactive or stepwise mode moves concept -> source domain -> mapping -> breakdown -> takeaway and waits.
validation:
  test_cases:
  - topic: Previously encoded concepts that need comparison, application, or discrimination
    expected_outputs:
    - Analogy statement (A is to B as X is to Y)
    - Mapping table (3+ correspondences)
    - Breakdown points (where analogy fails and what that teaches)
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Brand-new material that has not been encoded yet
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain before the learner attempts the required move.
  - LLMs may pick source domains that feel familiar but do not preserve the target structure.
