id: M-TEA-006
name: Depth Ladder (4-10-HS-PT)
category: encode
description: >-
  Explain the same concept in four deliberate passes: like the learner is
  4 years old, 10 years old, in high school, and finally at PT/DPT level.
  Each rung must preserve the same underlying idea while increasing
  mechanism, terminology, and clinical precision.
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
control_stage: TEACH
status: draft
tags:
- teach
- depth
- ladder
- scaffold
- sop-core
mechanisms:
- scaffolding
- segmenting
- progressive_precision
- transfer
stipulations:
- 'Run the ladder literally in this order: 4-year-old -> 10-year-old -> high-school -> PT/DPT.'
- Each rung must explain the same core concept, not wander into a different topic.
- Lower rungs should emphasize purpose, concrete imagery, and simple cause-effect before formal terminology appears.
- Do not skip straight to PT/DPT depth unless the learner explicitly requests a condensed replay after the full ladder has already been delivered once.
- Do not turn the ladder into a blank-page teach-back or scored performance task.
knobs:
  guidance_level: medium
  output_format: bullets
constraints:
  non_assessment: true
  no_scored_checks: true
  objective_scope_required: true
inputs:
- Active concept or objective
- Source facts or PRIME artifacts
- Learner familiarity signal
steps:
- step: 1
  action: Deliver the 4-year-old rung
  notes: Explain the concept in 1-3 concrete sentences using everyday language, purpose, and a simple felt-sense or image.
- step: 2
  action: Deliver the 10-year-old rung
  notes: Add simple system logic and basic cause-effect while keeping the explanation non-technical and easy to picture.
- step: 3
  action: Deliver the high-school rung
  notes: Introduce the real mechanism with introductory terminology and a cleaner causal chain.
- step: 4
  action: Deliver the PT/DPT rung
  notes: Add the full domain-appropriate precision, discriminators, edge cases, or clinical implications expected at Trey's training level.
- step: 5
  action: Run a low-friction rung check
  notes: Ask which rung made it click or where the concept started to get fuzzy, without turning the block into a quiz.
outputs:
- Age4Explanation
- Age10Explanation
- HighSchoolExplanation
- PTLevelExplanation
- LadderCarryForwardNotes
- RungCheckSignal
stop_criteria:
- All four rungs are delivered in order.
- The same concept is recognizably preserved across all four rungs.
- The PT/DPT rung reaches the learner's real training level instead of stopping at general biology.
- The learner identifies which rung clicked or where fuzziness began.
failure_modes:
- mode: The ladder skips a rung or jumps straight to PT-level explanation
  mitigation: Re-run the explanation from the missing rung forward in literal order.
- mode: Each rung sounds like the same paraphrase with no increase in precision
  mitigation: Make each rung add one clear layer of mechanism, terminology, or clinical nuance.
- mode: The 4-year-old rung becomes inaccurate baby talk
  mitigation: Keep it simple but still faithful to the source-grounded function of the concept.
- mode: The rung check becomes a hidden quiz
  mitigation: Ask only where understanding clicked or blurred; do not score the learner.
evidence:
  citation: Mayer (2009)
  finding: Segmented and progressively elaborated explanation improves novice understanding of unfamiliar systems.
  source: control-plane migration
evidence_raw: Mayer (2009); segmented explanation supports novice learning, especially when complexity is layered instead of dumped all at once.
facilitation_prompt: 'You are running M-TEA-006 (Depth Ladder (4-10-HS-PT)) in TEACH stage.

  This method is non-assessment. Run the ladder literally.

  Return exactly:

  1) Age4Explanation

  2) Age10Explanation

  3) HighSchoolExplanation

  4) PTLevelExplanation

  5) LadderCarryForwardNotes

  6) RungCheckSignal

  Requirements:

  - Explain the SAME concept in this exact order: 4-year-old -> 10-year-old -> high-school -> PT/DPT.
  - Each rung must become more precise than the last.
  - Do not skip a rung.
  - Keep lower rungs simple without becoming inaccurate.
  - The rung check is only to identify where it clicked or blurred, not to score the learner.

  '
gating_rules:
- Deliver the literal 4 -> 10 -> HS -> PT ladder in order.
- Keep the same concept thread across all four rungs.
- Keep the rung check low-friction and non-assessment.
- Keep every move inside the active objective scope.
artifact_type: notes
allowed_moves:
- Explain the same idea in progressively deeper language across the four rungs
- Use concrete imagery or felt-sense language in the lower rungs
- Introduce formal terms gradually instead of all at once
- Add PT-level discriminators or clinical implications only in the final rung
- Ask which rung made the concept click or where the learner lost the thread
forbidden_moves:
- Skip one of the named rungs
- Deliver PT/DPT depth before the simpler rungs are complete
- Teach a different concept at each rung
- Replace the PT/DPT rung with analogy-only language
- Turn the depth ladder into a scored diagnostic
required_outputs:
- Age4Explanation
- Age10Explanation
- HighSchoolExplanation
- PTLevelExplanation
- LadderCarryForwardNotes
- RungCheckSignal
