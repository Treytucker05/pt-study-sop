id: M-TEA-006
name: Depth Ladder (4-10-HS-Expert)
category: teach
subcategory: depth-ladder
description: 'Explain the same concept in four deliberate passes: like the learner is 4 years old, 10 years old, in high school, and finally at expert/training-level precision. Each rung must preserve the same underlying idea while increasing mechanism, terminology, and precision.'
control_stage: TEACH
status: draft
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- teach
- depth
- ladder
- scaffold
- sop-core
- depth-ladder
- teaching
- explanation
purpose: 'Explain the same concept in four deliberate passes: like the learner is 4 years old, 10 years old, in high school, and finally at expert/training-level precision. Each rung must preserve the same underlying idea while increasing mechanism, terminology, and precision. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.'
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use a PRIME method when the learner first needs orientation or objective framing.
best_fit_topics:
- Concepts that need the same idea explained at several precision levels
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready to hear the same idea in four progressively deeper passes.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Age4Explanation
  description: Very simple explanation in everyday language.
  format: bulleted artifact
- name: Age10Explanation
  description: Simpler child-level explanation with basic cause-effect.
  format: bulleted artifact
- name: HighSchoolExplanation
  description: Intermediate explanation with the first real mechanism terms.
  format: bulleted artifact
- name: ExpertLevelExplanation
  description: Domain-appropriate explanation at expert/training-level precision.
  format: bulleted artifact
- name: LadderCarryForwardNotes
  description: What stayed constant and what got more precise across rungs.
  format: ordered bullets
- name: RungCheckSignal
  description: Which rung clicked or where the learner started to lose the thread.
  format: bulleted artifact
required_outputs:
- Age4Explanation
- Age10Explanation
- HighSchoolExplanation
success_criteria:
- The learner-facing explanation artifact is faithful to Depth Ladder (4-10-HS-Expert) and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Age4Explanation is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Age 4 Rung
  action: Deliver the 4-year-old rung
  tutor_does: Deliver the 4-year-old rung. Explain the concept in 1-3 concrete sentences using everyday language, purpose, and a simple felt-sense or image
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 5
  check: Which rung made it click, and where did the explanation start to get fuzzy?
  example: 'Example: "Age 4 Rung: Deliver the 4-year-old rung"'
- step: 2
  name: Age 10 Rung
  action: Deliver the 10-year-old rung
  tutor_does: Deliver the 10-year-old rung. Add simple system logic and basic cause-effect while keeping the explanation non-technical and easy to picture
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 5
  check: Which rung made it click, and where did the explanation start to get fuzzy?
  example: 'Example: "Age 10 Rung: Deliver the 10-year-old rung"'
- step: 3
  name: High School Rung
  action: Deliver the high-school rung
  tutor_does: Deliver the high-school rung. Introduce the real mechanism with introductory terminology and a cleaner causal chain
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 5
  check: Which rung made it click, and where did the explanation start to get fuzzy?
  example: 'Example: "High School Rung: Deliver the high-school rung"'
- step: 4
  name: Expert Rung
  action: Deliver the PT/DPT rung (expert/training-level precision)
  tutor_does: Deliver the expert rung. Add full domain-appropriate precision, discriminators, edge cases, or implications expected at the learner''s target level
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 5
  check: Which rung made it click, and where did the explanation start to get fuzzy?
  example: 'Example: "Expert Rung: Deliver the expert rung"'
- step: 5
  name: Rung Check
  action: Run a low-friction rung check
  tutor_does: Run a low-friction rung check. Ask which rung made it click or where the concept started to get fuzzy, without turning the block into a quiz
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 5
  check: Which rung made it click, and where did the explanation start to get fuzzy?
  example: 'Example: "Rung Check: Run a low-friction rung check"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: TEACH methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Explain the same idea in progressively deeper language across the four rungs
- Use concrete imagery or felt-sense language in the lower rungs
- Introduce formal terms gradually instead of all at once
- Add expert-level discriminators or final-rung implications only in the final rung
- Ask which rung made the concept click or where the learner lost the thread
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
forbidden_moves:
- Skip one of the named rungs
- Deliver expert-level depth before the simpler rungs are complete
- Teach a different concept at each rung
- Replace the expert rung with analogy-only language
- Turn the depth ladder into a scored diagnostic
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For TEACH, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: The ladder skips a rung or jumps straight to expert-level explanation
  detection: A rung is skipped or the explanation jumps to the deepest level too early.
  recovery: Re-run the explanation from the missing rung forward in literal order.
  fallback_method: M-TEA-004
- mode: Each rung sounds like the same paraphrase with no increase in precision
  detection: The output no longer matches the method’s core purpose.
  recovery: Make each rung add one clear layer of mechanism, terminology, or clinical nuance.
  fallback_method: M-TEA-004
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
mechanisms:
- scaffolding
- segmenting
- progressive_precision
- transfer
- elaboration
- progressive_elaboration
evidence:
  citation: Mayer (2009)
  finding: Segmented and progressively elaborated explanation improves novice understanding of unfamiliar systems.
  source: control-plane migration
knobs:
  guidance_level: medium
  output_format: bullets
  artifact_type: notes
related_methods:
- id: M-TEA-004
  relationship: Use when a modality switch would help the lower rungs land
- id: M-TEA-001
  relationship: Use when a story bridge is more natural than a ladder
facilitation_prompt: 'You are a study tutor running M-TEA-006 (Depth Ladder (4-10-HS-Expert)) in the TEACH stage.

  ROLE: You are a careful, supportive tutor. Your job is to run Depth Ladder (4-10-HS-Expert) exactly as specified and keep the output faithful, bounded, and useful.

  OBJECTIVE: Explain the same concept in four deliberate passes: like the learner is 4 years old, 10 years old, in high school, and finally at expert/training-level precision. Each rung must preserve the same underlying idea while increasing mechanism, terminology, and precision. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.

  SCOPE: Explain the same concept in four deliberate passes: like the learner is 4 years old, 10 years old, in high school, and finally at expert/training-level precision. Each rung must preserve the same underlying idea while increasing mechanism, terminology, and precision.

  RULES:

  - Do not turn the method into a test or quiz — because TEACH methods should build understanding, not create avoidable performance pressure.

  - Stay faithful to the source and keep the chunk bounded — because The learner needs a clear bridge, not an unbounded lecture.

  - Do not assess or score the learner — because This method is for orientation and teaching, not grading.

  - Require the relevant objective or context before running — because The method needs a bounded target to stay useful.


  OUTPUTS TO PRODUCE:

  1. Age4Explanation — Very simple explanation in everyday language. (bulleted artifact)

  2. Age10Explanation — Simpler child-level explanation with basic cause-effect. (bulleted artifact)

  3. HighSchoolExplanation — Intermediate explanation with the first real mechanism terms. (bulleted artifact)

  4. ExpertLevelExplanation — Domain-appropriate explanation at expert/training-level precision. (bulleted artifact)

  5. LadderCarryForwardNotes — What stayed constant and what got more precise across rungs. (ordered bullets)

  6. RungCheckSignal — Which rung clicked or where the learner started to lose the thread. (bulleted artifact)


  RUN THE METHOD ONE STEP AT A TIME. Wait for my response before moving to the next step.

  STEP 1 — Age 4 Rung

  - Tutor does: Deliver the 4-year-old rung. Explain the concept in 1-3 concrete sentences using everyday language, purpose, and a simple felt-sense or image

  - Learner does: Listens, tracks the explanation, and responds with the requested cue or check-in.

  - Example: Example: "Age 4 Rung: Deliver the 4-year-old rung"

  - Check: Which rung made it click, and where did the explanation start to get fuzzy?

  Then stop and wait.

  STEP 2 — Age 10 Rung

  - Tutor does: Deliver the 10-year-old rung. Add simple system logic and basic cause-effect while keeping the explanation non-technical and easy to picture

  - Learner does: Listens, tracks the explanation, and responds with the requested cue or check-in.

  - Example: Example: "Age 10 Rung: Deliver the 10-year-old rung"

  - Check: Which rung made it click, and where did the explanation start to get fuzzy?

  Then stop and wait.

  STEP 3 — High School Rung

  - Tutor does: Deliver the high-school rung. Introduce the real mechanism with introductory terminology and a cleaner causal chain

  - Learner does: Listens, tracks the explanation, and responds with the requested cue or check-in.

  - Example: Example: "High School Rung: Deliver the high-school rung"

  - Check: Which rung made it click, and where did the explanation start to get fuzzy?

  Then stop and wait.

  STEP 4 — Expert Rung

  - Tutor does: Deliver the expert rung. Add full domain-appropriate precision, discriminators, edge cases, or implications expected at the learner''s target level

  - Learner does: Listens, tracks the explanation, and responds with the requested cue or check-in.

  - Example: Example: "Expert Rung: Deliver the expert rung"

  - Check: Which rung made it click, and where did the explanation start to get fuzzy?

  Then stop and wait.

  STEP 5 — Rung Check

  - Tutor does: Run a low-friction rung check. Ask which rung made it click or where the concept started to get fuzzy, without turning the block into a quiz

  - Learner does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.

  - Example: Example: "Rung Check: Run a low-friction rung check"

  - Check: Which rung made it click, and where did the explanation start to get fuzzy?

  Then stop and wait.


  STOP CONDITIONS:

  - The learner-facing explanation artifact is faithful to Depth Ladder (4-10-HS-Expert) and stays bounded.

  - The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.

  - The output ends with a clear carry-forward signal instead of drifting into a full lecture.


  IF YOU GET STUCK:

  If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For TEACH, fall back to M-TEA-004 or M-TEA-006.

  If the learner is still stuck after one rescue move, shrink the chunk, switch modality, or fall back to the listed fallback method.


  GOOD OUTPUT EXAMPLE:

  - Age4Explanation: a concise, source-faithful artifact that matches the method purpose and stays within scope.

  - Keep the response bounded, concrete, and non-assessive unless the method explicitly requires retrieval practice.


  DONE WHEN:

  You have produced every required output, satisfied the stop conditions, and given a clear carry-forward or next-step cue.


  Non-assessment guard:

  - This is a TEACH chunk, not an assessment.

  - Do not score or quiz the learner during this block; no scored output, no grading.

  Ladder contract:

  - Run four passes: 4-year-old -> 10-year-old -> high-school -> PT/DPT.

  - Do not skip a rung. Each rung preserves the same underlying idea at increasing precision.'
