id: M-RET-006
name: Adversarial Drill
category: RETRIEVE
subcategory: adversarial
description: Run near-miss adversarial prompts that force distinction between confusable concepts under low support.
control_stage: RETRIEVE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- retrieval
- adversarial
- confusables
purpose: Adversarial Drill exists to run an adversarial drill that uses near-miss prompts to force distinctions between confusable concepts under low support. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use REFERENCE if the learner needs an anchor first.
best_fit_topics:
- near-miss distinctions
- confusable concepts
- low-support discrimination
poor_fit_topics:
- friendly prompts with obvious cues
- teaching new material
- open-note support
learner_state_required: The learner already has source material or an anchor available, the source will be closed for recall, and a retrieval target exists.
inputs:
- description: Confusable pairs from Spine or ErrorLog
  required: true
- description: Question Bank Seed
  required: true
outputs:
- name: Adversarial near-miss results with discrimination accuracy
  description: A structured output for an adversarial drill that uses near-miss prompts to force distinctions between confusable concepts under low support.
  format: structured log
- name: ErrorLog updates (error_type and fix_applied per miss)
  description: A structured output for an adversarial drill that uses near-miss prompts to force distinctions between confusable concepts under low support.
  format: structured log
artifact_schemas:
  Adversarial near-miss results with discrimination accuracy: scored_items
  ErrorLog updates (error_type and fix_applied per miss): scored_items
produces:
- Adversarial near-miss results with discrimination accuracy
- ErrorLog updates (error_type and fix_applied per miss)
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Adversarial near-miss results with discrimination accuracy
- ErrorLog updates (error_type and fix_applied per miss)
success_criteria:
- All required outputs are present for M-RET-006.
- A genuine attempt-first recall happened before any comparison or feedback.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Adversarial near-miss results with discrimination accuracy.'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Select confusable pairs with
  action: Select confusable pairs with highest error risk. Use recent Confusion errors first
  tutor_does: Run select confusable pairs with highest error risk. use recent confusion errors first while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Are all materials closed and is the learner ready to attempt recall?
  example: 'Tutor: "Close your notes. Do not peek." Learner: "Notes are closed."'
- step: 2
  name: Ask near-miss prompts with
  action: Ask near-miss prompts with minimal cues. Require explicit discriminator in each response
  tutor_does: Run ask near-miss prompts with minimal cues. require explicit discriminator in each response while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor starts the timer and asks for a free-response dump.
- step: 3
  name: Log misses to ErrorLog.csv.
  action: Log misses to ErrorLog.csv. Include error_type and fix_applied
  tutor_does: Run log misses to errorlog.csv. include error_type and fix_applied while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor marks gaps with question marks and compares them after the attempt window ends.
constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Select confusable pairs with highest error risk from ErrorLog
- Present near-miss prompts with minimal cues
- Require explicit discriminator in each response
- Provide corrective feedback AFTER each attempt
- Log misses to ErrorLog with error_type and fix_applied
- Route back to ENCODE with targeted scaffold on repeated misses
- Use recent Confusion errors as priority source
- Increase discrimination difficulty progressively
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Reveal answer or discriminating feature before learner attempt
- Provide hints during first attempt
- Use easy or non-confusable items (must be near-miss pairs)
- Skip requiring explicit discriminator in responses
- Teach new material during retrieval
- Accept "I don't know" without at least one discrimination attempt
- Skip ErrorLog updates for missed items
- Allow low-support items to leak answer through prompt wording
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 8
energy_cost: high
best_stage: exam_prep
mechanisms:
- discrimination
- retrieval
evidence:
  citation: Ahn and Bjork (2018); Kang and Pashler (2012); Brunmair and Richter (2019); Rohrer, Dedrick, Hartwig, and Cheung (2020)
  finding: Adversarial Drill is best supported as a discrimination-heavy retrieval routine that uses confusable alternatives to sharpen category boundaries. Research on inductive discrimination and interleaving shows that near-miss contrasts can improve later classification, while classroom mixed-practice work supports exposing confusion rather than hiding it inside blocked review. The practical implication for this method is to choose genuinely confusable pairs, require the learner to state the discriminator, and log misses in a way that supports later repair instead of reteaching mid-block.
  source: https://doi.org/10.1177/2372732218814861; https://doi.org/10.1007/s11251-007-9015-8; https://doi.org/10.1007/s11251-020-09504-7; https://doi.org/10.1037/edu0000367
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest adversarial pass. Use 5 near-miss pairs, terse bullets, and only the most dangerous confusions plus fix tags.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest adversarial pass. Use a larger confusable set, keep per-pair discrimination outcomes explicit, and return a fuller ErrorLog-ready table.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh adversarial pass. Use a compact confusion grid with pair, learner choice, discriminator, and result columns.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied adversarial pass. Use clinical or action-level near misses and organize the results as a short risk-and-fix matrix.
related_methods:
- id: M-REF-001
  relationship: Adversarial misses should be autopsied
- id: M-REF-003
  relationship: Compact anchors help separate near-miss concepts
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - 'If I''m stuck: do NOT repeat the same explanation. Pick exactly one recovery move (simpler ladder, format switch, side-by-side contrast, tiny clinical case).'
  replaces_with:
  - "Adversarial near-miss prompts under low support. No hints at any point \u2014 hints destroy the discrimination signal entirely. Reveal correct answer only after the learner commits each attempt."
  - Low-support is the design. Do not soften prompts because the learner struggles. Mark misses and continue.
  reason: Adversarial Drill is intentionally low-support to force discrimination between confusable concepts. Any softening breaks the method.
facilitation_prompt: |-
  You are running M-RET-006 (Adversarial Drill) in the RETRIEVE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Adversarial near-miss results with discrimination accuracy and ErrorLog updates.
  Run a low-support near-miss drill that forces the learner to name the discriminator before any feedback. Keep it diagnostic, log misses cleanly, and do not rescue the attempt with teaching.
  Preset behavior:
  - exam_cram: one-shot; 5 pairs; terse bullets; only the most dangerous confusions and fix tags.
  - deep_mastery: interactive; larger confusable set; explicit per-pair outcomes and fuller ErrorLog-ready table.
  - quick_review: one-shot refresh; compact confusion grid.
  - clinical_bridge: stepwise; clinical or action-level near misses organized in a short risk-and-fix matrix.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves pairs -> scoring -> logging and waits.
validation:
  test_cases:
  - topic: near-miss distinctions
    expected_outputs:
    - Adversarial near-miss results with discrimination accuracy
    - ErrorLog updates (error_type and fix_applied per miss)
    pass_criteria:
    - All required outputs for M-RET-006 are present.
    - The response stays inside the correct stage rules.
  - topic: confusable concepts
    expected_outputs:
    - Adversarial near-miss results with discrimination accuracy
    - ErrorLog updates (error_type and fix_applied per miss)
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Retrieval blocks can collapse into explanation unless the tutor protects the attempt-first rule.
