id: M-ORG-002
name: Comparison Table
category: ENCODE
subcategory: org
description: Create a side-by-side table comparing 2-4 confusable concepts across shared features. Highlight discriminating features. Builds differential diagnosis skill.
control_stage: ENCODE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- visual
- comparison
- discrimination
- table
- clinical
- encode
purpose: Organize the material into a visible structure so relationships, sequence, contrast, or hierarchy become easier to remember and explain.
not_for: This is not for isolated trivia, free-form brainstorming, or content that has no meaningful structure to map.
best_fit_topics:
- Structures, pathways, lists, tables, and maps with visible relationships
- Material that benefits from spatial or hierarchical organization
poor_fit_topics:
- Single isolated facts that only need a quick cue
- Highly abstract content with no separable parts or relationships
learner_state_required: Source material is loaded. The learner can see or recall the parts and is ready to organize them into a structure.
inputs:
- description: 2-4 confusable concepts to compare
  required: true
- description: List of comparison dimensions/features
  required: true
- description: Source material for accuracy
  required: true
outputs:
- name: Completed comparison table
  description: Completed comparison table
  format: 2-column or multi-row table
- name: Discriminating features highlighted
  description: Discriminating features highlighted
  format: short, checkable artifact
- name: Differential rules (1-2 per comparison)
  description: Differential rules (1-2 per comparison)
  format: 2-column or multi-row table
- name: Error list from initial attempt
  description: Error list from initial attempt
  format: short, checkable artifact
artifact_schemas:
  Completed comparison table: table
  Discriminating features highlighted: string
  Differential rules (1-2 per comparison): table
  Error list from initial attempt: string
produces:
- Completed comparison table
- Discriminating features highlighted
- Differential rules (1-2 per comparison)
- Error list from initial attempt
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs: &id001
- Completed comparison table
- Discriminating features highlighted
- Differential rules (1-2 per comparison)
- Error list from initial attempt
success_criteria:
- 'All required outputs are present and checkable: Completed comparison table, Discriminating features highlighted, Differential rules (1-2 per comparison), Error list from initial attempt.'
- 'The method reaches its stop condition: All cells filled; Discriminators identified.'
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Completed comparison table, Discriminating features highlighted.'
steps:
- step: 1
  name: Table With Concepts As Columns
  action: Create table with concepts as columns
  tutor_does: 'Guide the learner to Create table with concepts as columns. Keep in mind: 2-4 concepts optimal; more gets unwieldy'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: 2-4 concepts optimal; more gets unwieldy'
- step: 2
  name: List Comparison Dimensions As Rows
  action: List comparison dimensions as rows
  tutor_does: 'Guide the learner to List comparison dimensions as rows. Keep in mind: Common dimensions: mechanism, presentation, treatment, prognosis'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Common dimensions: mechanism, presentation, treatment, prognosis'
- step: 3
  name: Each Cell From Memory First
  action: Fill each cell from memory first
  tutor_does: 'Guide the learner to Fill each cell from memory first. Keep in mind: Retrieval before lookup'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Retrieval before lookup'
- step: 4
  name: Source Material And Correct Errors
  action: Check source material and correct errors
  tutor_does: 'Guide the learner to Check source material and correct errors. Keep in mind: Note which cells you got wrong'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Note which cells you got wrong'
- step: 5
  name: Highlight The Discriminating Features
  action: Highlight the discriminating features
  tutor_does: 'Guide the learner to Highlight the discriminating features. Keep in mind: These are the key differentiators'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: These are the key differentiators'
- step: 6
  name: Generate 1 2 If Then
  action: Generate 1-2 "If...then" rules from discriminators
  tutor_does: "Guide the learner to Generate 1-2 \"If...then\" rules from discriminators. Keep in mind: Example: 'If painless jaundice \u2192 think pancreatic head cancer'"
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: "Example: 'If painless jaundice \u2192 think pancreatic head cancer"
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: "This gating rule is part of the method\u2019s execution contract."
- rule: Keep output scoped to mapped objectives only.
  why: "This gating rule is part of the method\u2019s execution contract."
allowed_moves:
- Help learner identify 2-4 confusable concepts and comparison dimensions
- Prompt learner to fill table cells from memory FIRST before checking source
- Guide learner to check source material and correct errors after initial attempt
- Prompt learner to identify the most discriminating features
- Guide generation of 1-2 "If...then" differential rules from discriminators
- Suggest limiting to 5-7 comparison rows for clinical relevance
- Note which cells the learner got wrong for targeted review
- Use Socratic questioning to help learner discover discriminators
forbidden_moves:
- Fill the comparison table FOR the learner
- Allow looking up source material before the learner attempts from memory
- Accept a table without identified discriminating features
- Skip the "If...then" rule generation step
- Accept more than 4 concepts in a single table without splitting
- Deliver a passive comparison instead of guiding table construction
- Present information outside the objective scope
- Move to retrieval before discriminators and rules are generated
stuck_protocol: Reduce the scope to fewer nodes or rows, restate the parts in plain language, and then rebuild the structure one relationship at a time. If needed, switch to a simpler map or flowchart.
failure_modes:
- mode: Too many comparison dimensions
  detection: "The learner or tutor starts doing too many comparison dimensions or the artifact stops satisfying the method\u2019s required checks."
  recovery: Limit to 5-7 rows; prioritize clinical relevance
  fallback_method: M-ILV-002
- mode: No discriminators identified
  detection: "The learner or tutor starts doing no discriminators identified or the artifact stops satisfying the method\u2019s required checks."
  recovery: "Force ranking \u2014 which row is MOST differentiating?"
  fallback_method: M-ORG-001
- mode: Looking up before trying
  detection: "The learner or tutor starts doing looking up before trying or the artifact stops satisfying the method\u2019s required checks."
  recovery: Fill from memory first, then verify
  fallback_method: M-ORG-004
default_duration_min: 7
energy_cost: medium
best_stage: review
mechanisms:
- discrimination
- elaboration
- dual_coding
evidence:
  citation: Alfieri, Nokes-Malach, and Schunn (2013); Richland and McDonough (2010); Richland and Simms (2015); Loibl, Tillema, Rummel, and van Gog (2020); Blair, Banes, and Martin (2024)
  finding: 'Comparison Table is best supported as a guided comparison method that helps learners discriminate confusable alternatives by aligning the same dimensions across cases. Comparison research shows that side-by-side alignment helps learners notice deep features, form better categories, and transfer distinctions more reliably than studying examples in isolation. More recent instructional work adds the practical boundary condition: the table only helps when the dimensions are meaningful and the learner must actively fill them rather than passively read a completed chart. The practical implication for this method is to force a memory-first fill, highlight the real discriminators, and end with short if-then rules that can be reused during later retrieval.'
  source: https://doi.org/10.1080/00461520.2013.775712; https://doi.org/10.1016/j.cedpsych.2009.09.001; https://doi.org/10.1002/wcs.1336; https://doi.org/10.1007/s11251-020-09504-7; https://doi.org/10.1007/s11251-024-09661-z
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
related_methods:
- id: M-ILV-002
  relationship: Use when the learner needs a fuller side-by-side teaching pass before encoding the table
- id: M-RET-006
  relationship: Use when the finished discriminators should be stress-tested with near-miss retrieval prompts
facilitation_prompt: |-
  You are running M-ORG-002 (Comparison Table) in the ENCODE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Completed comparison table, Discriminating features highlighted, Differential rules, and Error list from initial attempt.
  Build a side-by-side table for 2-4 confusable concepts. Fill it from memory first, verify against the source, highlight the real discriminators, and finish with short if-then rules.
  Preset behavior:
  - exam_cram: one-shot; smallest useful table plus one if-then rule per comparison.
  - deep_mastery: interactive; dimension-by-dimension fill with explicit error correction and fuller rules.
  - quick_review: one-shot refresh; compact discriminator table plus one rule block.
  - clinical_bridge: stepwise; applied differential grid with clue, likely confusion, and confirming feature columns.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves table -> correction -> discriminator rules and waits.
validation:
  test_cases:
  - topic: Structures, pathways, lists, tables, and maps with visible relationships
    expected_outputs: *id001
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Single isolated facts that only need a quick cue
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain before the learner attempts the required move.
  - LLMs may drift outside scope when the topic is broad or ambiguous.
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: One-shot; build the smallest useful comparison table with the key discriminators and one if-then rule per concept pair.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Interactive; fill the table dimension by dimension, surface error corrections, and write fuller differential rules at the end.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: One-shot refresh; compress the artifact into a compact discriminator table plus one carry-forward rule block.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Stepwise; use an applied differential grid with clue, likely confusion, and confirming feature columns.
