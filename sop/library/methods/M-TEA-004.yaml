id: M-TEA-004
name: Modality Switch
category: teach
subcategory: modality-bridge
description: Choose the best first representation for the concept and switch the explanation into that modality before overload sets in.
control_stage: TEACH
status: draft
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- teach
- modality
- representation
- scaffold
- visual
- modality-bridge
- teaching
- explanation
purpose: Choose the best first representation for the concept and switch the explanation into that modality before overload sets in. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use a PRIME method when the learner first needs orientation or objective framing.
best_fit_topics:
- 'A single bounded concept or pathway that can be taught in one pass: Modality Switch'
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Concept type
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
- name: Chosen modality
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
- name: Re-expressed teaching chunk
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
- name: Modality rationale
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
required_outputs:
- Concept type
- Chosen modality
- Re-expressed teaching chunk
success_criteria:
- The learner-facing explanation artifact is faithful to Modality Switch and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Concept type is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Opening Step
  action: Identify the concept type
  tutor_does: 'Identify the concept type. Examples: spatial, mechanism, definition, procedure, compare/contrast'
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Opening Step: Identify the concept type"'
- step: 2
  name: Step 2
  action: Choose the best first representation
  tutor_does: Choose the best first representation. Image, motion, words, or table
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Step 2: Choose the best first representation"'
- step: 3
  name: Modality Shift
  action: Re-express the concept in that modality
  tutor_does: Re-express the concept in that modality. Keep the explanation minimal and objective-scoped
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Modality Shift: Re-express the concept in that modality"'
- step: 4
  name: Modality Shift
  action: State why this modality was chosen
  tutor_does: State why this modality was chosen. Make the teaching move explicit
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Modality Shift: State why this modality was chosen"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: TEACH methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Switch from prose to image, motion, table, or other clearer representation
- Explain why the new modality better fits the concept
- Keep the chunk small and objective-scoped
- Add a second modality only if the first still leaves confusion
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Keep pushing a weak modality after confusion is obvious
- Use multiple modalities at once without a clear lead representation
- Turn the switch into a quiz about preference or confidence
- Drift outside the active objective scope
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For TEACH, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Wrong modality chosen for the concept
  detection: The output no longer matches the method’s core purpose.
  recovery: Switch immediately and restate the chunk in the stronger modality.
  fallback_method: M-TEA-006
- mode: Too many modalities at once
  detection: The output no longer matches the method’s core purpose.
  recovery: Start with one dominant modality and add a second only if needed.
  fallback_method: M-TEA-006
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
mechanisms:
- scaffolding
- dual_coding
- cognitive_load
- elaboration
- transfer
