id: M-TEA-004
name: Modality Switch
category: EXPLAIN
subcategory: modality-switch
description: Choose the best first representation for the concept and switch the explanation into that modality before overload sets in.
control_stage: EXPLAIN
status: draft
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- explain
- modality
- representation
- scaffold
- visual
- modality-switch
- teaching
- explanation
purpose: Choose the best first representation for the concept and switch the explanation into that modality before overload sets in. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use an ORIENT method when the learner first needs orientation or objective framing.
best_fit_topics:
- 'A single bounded concept or pathway that can be taught in one pass: Modality Switch'
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Concept type
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
- name: Chosen modality
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
- name: Re-expressed teaching chunk
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
- name: Modality rationale
  description: Learner-facing teaching artifact for modality switch.
  format: bulleted artifact
artifact_schemas:
  Concept type: bullet_list
  Chosen modality: bullet_list
  Re-expressed teaching chunk: bullet_list
  Modality rationale: bullet_list
produces:
- Concept type
- Chosen modality
- Re-expressed teaching chunk
- Modality rationale
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Concept type
- Chosen modality
- Re-expressed teaching chunk
success_criteria:
- The learner-facing explanation artifact is faithful to Modality Switch and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Concept type is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Opening Step
  action: Identify the concept type
  tutor_does: 'Identify the concept type. Examples: spatial, mechanism, definition, procedure, compare/contrast'
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Opening Step: Identify the concept type"'
- step: 2
  name: Step 2
  action: Choose the best first representation
  tutor_does: Choose the best first representation. Image, motion, words, or table
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Step 2: Choose the best first representation"'
- step: 3
  name: Modality Shift
  action: Re-express the concept in that modality
  tutor_does: Re-express the concept in that modality. Keep the explanation minimal and objective-scoped
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Modality Shift: Re-express the concept in that modality"'
- step: 4
  name: Modality Shift
  action: State why this modality was chosen
  tutor_does: State why this modality was chosen. Make the teaching move explicit
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Modality Shift: State why this modality was chosen"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: EXPLAIN methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Switch from prose to image, motion, table, or other clearer representation
- Explain why the new modality better fits the concept
- Keep the chunk small and objective-scoped
- Add a second modality only if the first still leaves confusion
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Keep pushing a weak modality after confusion is obvious
- Use multiple modalities at once without a clear lead representation
- Turn the switch into a quiz about preference or confidence
- Drift outside the active objective scope
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For EXPLAIN, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Wrong modality chosen for the concept
  detection: The output no longer matches the method's core purpose.
  recovery: Switch immediately and restate the chunk in the stronger modality.
  fallback_method: M-TEA-006
- mode: Too many modalities at once
  detection: The output no longer matches the method's core purpose.
  recovery: Start with one dominant modality and add a second only if needed.
  fallback_method: M-TEA-006
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
mechanisms:
- multimedia_learning
- modality_effect
- dual_coding
- cognitive_load_management
- scaffolding
- transfer
evidence:
  citation: Mayer and Moreno (2003); Ginns (2005); Low and Sweller (2014); Liu, Lin, Gao, and Paas (2019); Haavisto, Jaakkola, and Lepola (2023); Cromley and Chen (2025)
  finding: Research on multimedia learning and modality effects supports switching explanations into the representation that best distributes processing across channels and lowers split attention, rather than simply adding more media. Classical Mayer and Sweller work plus meta-analytic evidence support benefits for visuals paired with spoken language over picture-plus-written-text formats under many novice-learning conditions, but recent classroom-context studies show the effect depends on pacing, learner control, and the specific media used. The practical implication for this method is to choose one lead modality that fits the concept type, keep redundant text low, and add a second modality only when it resolves a specific bottleneck.
  source: https://doi.org/10.1207/S15326985EP3801_6; https://doi.org/10.1016/j.learninstruc.2005.07.001; https://doi.org/10.1017/CBO9781139547369.012; https://doi.org/10.1111/bjet.12605; https://doi.org/10.1016/j.compedu.2023.104775; https://doi.org/10.1016/j.edurev.2025.100730
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest useful switch; choose one dominant representation only. Prefer a compact compare table, mini flow, or spatial bullet sketch and add at most one line of prose support.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fuller switch with one lead modality and one complementary support modality. Pause after the first re-expression and add the second representation only if it removes a real bottleneck.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Refresh pass for already-seen material; compress Concept type and Modality rationale and convert the chunk into the single fastest discriminating format, usually a two-column table or terse procedure bullets.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied switch; render the explanation as a cue table or finding-to-action grid, optionally preceded by one line of scene-setting, so the representation changes what the learner notices or does.
related_methods:
- id: M-TEA-006
  relationship: Use when the learner needs a stepwise depth ladder
- id: M-HOOK-003
  relationship: Use when a mnemonic hook would stick better
facilitation_prompt: |
  You are running M-TEA-004 (Modality Switch) in the EXPLAIN stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Concept type, Chosen modality, Re-expressed teaching chunk, and Modality rationale.
  Teach one bounded concept by identifying its type, choosing the lowest-friction lead representation, re-expressing the chunk in that modality, and stating why the switch helps. Keep one modality dominant and add a second only if it resolves a real bottleneck.
  Preset behavior:
  - exam_cram: one-shot; choose one dominant representation only; output terse bullets, a mini flow, or a two-column table plus a one-line rationale.
  - deep_mastery: interactive; use labeled sections; start with one lead modality, pause after the first switch, and add one complementary second representation only if needed.
  - quick_review: one-shot refresh; compress concept typing and rationale and convert the chunk into the fastest discriminating format, usually a table or terse procedure bullets.
  - clinical_bridge: stepwise; use a cue table or finding-to-action grid, with optional one-line scene-setting, so the switch is tied to noticing or action.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves concept type -> modality choice -> re-expression -> rationale and waits.
validation:
  test_cases:
  - topic: Single concept explanation for Modality Switch
    expected_outputs:
    - Concept type
    - Chosen modality
    - Re-expressed teaching chunk
    - Modality rationale
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Modality Switch.
    - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  - topic: A slightly harder variant with one confusable or clinical wrinkle
    expected_outputs:
    - Concept type
    - Chosen modality
    - Re-expressed teaching chunk
    - Modality rationale
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Modality Switch.
    - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  acceptance_criteria:
  - Required outputs appear and the main learner-facing artifact is faithful to Modality Switch.
  - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  known_issues:
  - Some prompts may over-run the time budget if the source material is very dense.
  - Without a clear topic boundary, the method can broaden instead of teaching one useful chunk.
