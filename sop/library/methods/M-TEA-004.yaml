id: M-TEA-004
name: Modality Switch
category: encode
description: Choose the best first representation for the concept and switch the explanation into that modality before overload sets in.
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
control_stage: TEACH
status: draft
tags:
- teach
- modality
- representation
- scaffold
- visual
mechanisms:
- scaffolding
- dual_coding
- cognitive_load
stipulations:
- Choose the representation that reduces confusion fastest.
- Switch modality before the learner is buried in a weak representation.
knobs:
  guidance_level: medium
  output_format: bullets
constraints:
  non_assessment: true
  no_scored_checks: true
  objective_scope_required: true
inputs:
- Target concept
- Concept type
- Available representation options
steps:
- step: 1
  action: Identify the concept type
  notes: 'Examples: spatial, mechanism, definition, procedure, compare/contrast'
- step: 2
  action: Choose the best first representation
  notes: Image, motion, words, or table.
- step: 3
  action: Re-express the concept in that modality
  notes: Keep the explanation minimal and objective-scoped.
- step: 4
  action: State why this modality was chosen
  notes: Make the teaching move explicit.
outputs:
- Concept type
- Chosen modality
- Re-expressed teaching chunk
- Modality rationale
stop_criteria:
- Concept type is named
- One modality is selected and used
- Rationale is explicit
failure_modes:
- mode: Wrong modality chosen for the concept
  mitigation: Switch immediately and restate the chunk in the stronger modality.
- mode: Too many modalities at once
  mitigation: Start with one dominant modality and add a second only if needed.
evidence:
  citation: Mayer (2009)
  finding: Matching representation and segmenting explanation helps novice comprehension
  source: control-plane migration
evidence_raw: Mayer (2009); matching representation and segmenting explanation helps novice comprehension
facilitation_prompt: 'You are running M-TEA-004 (Modality Switch) in TEACH stage.

  This method is non-assessment. Choose the clearest first representation for the concept and switch into it.

  Return exactly:

  1) ConceptType

  2) ChosenModality

  3) ReExpressedChunk

  4) ModalityRationale

  Prefer one strong modality over a cluttered mixed explanation.

  '
gating_rules:
- Pick one dominant modality first.
- Keep the representation choice tied to the concept type.
- Do not add scored checks or retrieval probes.
artifact_type: notes
allowed_moves:
- Switch from prose to image, motion, table, or other clearer representation
- Explain why the new modality better fits the concept
- Keep the chunk small and objective-scoped
- Add a second modality only if the first still leaves confusion
forbidden_moves:
- Keep pushing a weak modality after confusion is obvious
- Use multiple modalities at once without a clear lead representation
- Turn the switch into a quiz about preference or confidence
- Drift outside the active objective scope
required_outputs:
- Concept type
- Chosen modality
- Re-expressed teaching chunk
- Modality rationale
