id: M-PRE-002
name: Overarching Pre-Question Set
category: prime
description: Generate 3-5 broad why/how/where-fit questions that jointly cover the whole selected material or module slice before deep study to set conceptual hooks.
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
control_stage: PRIME
status: validated
tags:
- priming
- prequestions
- metacognition
- sop-core
mechanisms:
- generation
- elaboration
stipulations:
- Use broad conceptual questions only (no narrow fact checks).
- Questions are non-scored orientation prompts in PRIME.
- The 3-5 prompt cap is a final grouping cap, not permission to cherry-pick isolated details. Inventory the full selected scope first, then write prompts broad enough to cover it.
- If learner anxiety is high, reduce to 1-2 scaffolded prompts or skip.
when_to_use:
- New topic where conceptual framing is unclear.
- Learner benefits from curiosity hooks before details.
when_not_to_use:
- Learner shows high anxiety with open-ended prompts.
- Session time is too short to process questions meaningfully.
knobs:
  priming_scope: single_focus
  guidance_level: medium
constraints:
  non_assessment: true
  no_scored_checks: true
  question_cap_min: 3
  question_cap_max: 5
inputs:
- Topic title or lecture heading
- Full heading structure or major sections for the selected material/module slice
steps:
- step: 1
  action: Inventory the full set of major sections, concepts, and transitions from the selected scope
  notes: Use the whole selected material/module slice before narrowing. Do not cherry-pick.
- step: 2
  action: Compress that inventory into 3-5 broad conceptual prompts
  notes: Prefer stems like Why, How, Where does this fit. Each prompt should cover a broad cluster rather than an isolated detail.
- step: 3
  action: Rank prompts by expected leverage
  notes: Choose top 1-2 prompts to carry into next method.
- step: 4
  action: Record unresolved prompts as follow-up targets
  notes: Use these as CALIBRATE/ENCODE inputs.
outputs:
- PreQuestionSet
- PriorityPrompts
- FollowUpTargets
stop_criteria:
- 3-5 broad prompts jointly cover the full selected scope
- Priority prompts selected
- 3 minutes elapsed
failure_modes:
- mode: Prompts become detailed quiz items
  mitigation: Reframe to conceptual why/how/fit questions only.
- mode: Learner anxiety rises from open prompts
  mitigation: Reduce to 1-2 scaffolded prompts or skip method.
- mode: Prompts are too vague to use downstream
  mitigation: Attach each prompt to one explicit objective tag.
logging_fields:
- prequestion_count
- priority_prompt_count
- skipped_for_anxiety
evidence:
  citation: Jamison et al. (2023/2024)
  finding: Prequestions improve downstream learning when paired with structured follow-up.
  source: research synthesis
evidence_strength: high
primary_citations:
- Jamison et al. (2023/2024)
- Roediger & Karpicke (2006)
evidence_raw: Prequestions potentiate later learning and retrieval when scaffolded.
facilitation_prompt: 'You are running M-PRE-002 (Overarching Pre-Question Set) in PRIME stage.

  This method is non-assessment.

  This method is orientation only and never scored.

  First account for the full selected source/module scope, then compress it into exactly 3-5 broad conceptual prompts.
  Treat the 3-5 cap as a final grouping cap, not as permission to ignore supported content.

  Prompt style:

  - Why does this matter?

  - How does it work at a high level?

  - Where does it fit in the module?


  Then return:

  1) PreQuestionSet

  2) PriorityPrompts (top 1-2)

  3) FollowUpTargets


  If learner anxiety is high, reduce to 1-2 scaffolded prompts or skip and route to M-PRE-010.

  '
gating_rules:
- Do not assess or score the learner in PRIME.
- Stay at orientation level and avoid full solution reveal.
artifact_type: notes
allowed_moves:
- Generate 3-5 broad conceptual why/how/where-fit questions that jointly cover the full selected scope
- Preview material structure through question framing
- Build curiosity and anticipation for upcoming content
- Rank prompts by expected leverage for downstream use
- Reduce to 1-2 scaffolded prompts if learner anxiety is high
- Record unresolved prompts as follow-up targets
forbidden_moves:
- Score, grade, or assess learner responses to the questions
- Generate narrow fact-check or quiz-style questions
- Cherry-pick a few isolated details while ignoring the rest of the selected source or module slice
- Teach new detailed content or reveal answers
- Run retrieval practice or correctness checks
- Make confidence or mastery judgments
- Generate more than 5 questions (hard cap)
- Drift into detail paragraphs instead of broad conceptual prompts
required_outputs:
- PreQuestionSet (3-5 broad conceptual prompts that jointly cover the full selected scope)
- PriorityPrompts (top 1-2 prompts for downstream use)
- FollowUpTargets list
