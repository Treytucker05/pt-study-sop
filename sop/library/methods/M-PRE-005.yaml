id: M-PRE-005
name: Skeleton Concept Hierarchy
category: prime
subcategory: hierarchy-skeleton
description: Generate a bare concept hierarchy (topic core -> 4-6 umbrella categories -> short descriptors) that still covers the full selected scope without deep explanations.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- organization
- visual
- grouping
- chunking
- prime
- hierarchy-skeleton
- orientation
- prior-knowledge
- hierarchy
purpose: Generate a bare concept hierarchy (topic core -> 4-6 umbrella categories -> short descriptors) that still covers the full selected scope without deep explanations. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- Dense material with a clear underlying structure or hierarchy
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: SkeletonMap
  description: Structured artifact that captures the key skeleton concept hierarchy relationships.
  format: structured map or nested bullets
- name: CategoryLabels
  description: Activation or structure artifact for skeleton concept hierarchy.
  format: bulleted artifact
- name: CrossLinks
  description: Activation or structure artifact for skeleton concept hierarchy.
  format: bulleted artifact
required_outputs:
- SkeletonMap
- CategoryLabels
- CrossLinks
success_criteria:
- 'Core structure is captured in the required outputs: SkeletonMap, CategoryLabels.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- SkeletonMap is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
steps:
- step: 1
  name: Opening Step
  action: Set central node as topic
  tutor_does: Set central node as topic. Single core node only
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Opening Step: Set central node as topic"'
- step: 2
  name: Step 2
  action: Inventory all major supported sections, then derive 4-6 first-ring categories
  tutor_does: Inventory all major supported sections, then derive 4-6 first-ring categories. Categories should be mutually distinct umbrella groups that still cover the full selected scope
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 2: Inventory all major supported sections, then derive 4-6 first-ring categories"'
- step: 3
  name: Step 3
  action: Attach 1-2 descriptor tokens under each category
  tutor_does: Attach 1-2 descriptor tokens under each category. Descriptors are labels, not explanations, and should stay representative rather than cherry-picked
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 3: Attach 1-2 descriptor tokens under each category"'
- step: 4
  name: Step 4
  action: Add cross-links between categories where needed
  tutor_does: Add cross-links between categories where needed. Use short relation labels only
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Step 4: Add cross-links between categories where needed"'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: 'Max Depth: 2'
  why: Carried forward from the legacy method card.
allowed_moves:
- Generate a bare concept hierarchy with central topic node
- Derive 4-6 first-ring umbrella categories that are mutually distinct and collectively cover the full selected scope
- Attach 1-2 descriptor tokens (labels, not explanations) under each category
- Add cross-links between categories with short relation labels
- Orient the learner to the topic's conceptual structure
- Use the configured map_format (ascii_tree default)
- Activate prior knowledge with a bounded free recall or orientation prompt
forbidden_moves:
- Score, grade, or assess the learner
- Turn the map into paragraph notes or explanations
- Cherry-pick only a few subtopics while leaving major supported sections out of the hierarchy
- Teach new detailed content beyond structural labels
- Exceed max depth of 2 levels
- Exceed node_count_cap (6 default)
- Run quizzes or retrieval prompts
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Map turns into paragraph notes
  detection: The output no longer matches the method’s core purpose.
  recovery: Enforce descriptor-only output.
  fallback_method: M-PRE-008
- mode: Too many nodes causing overload
  detection: The output no longer matches the method’s core purpose.
  recovery: Apply node_count_cap and drop leaf-level detail.
  fallback_method: M-PRE-008
default_duration_min: 5
energy_cost: medium
best_stage: first_exposure
mechanisms:
- elaboration
- discrimination
- scaffolding
- prior_knowledge_activation
- organization
evidence:
  citation: Novak & Cañas (2008)
  finding: Concept mapping supports meaningful learning when structures are constrained and explicit.
  source: research synthesis
knobs:
