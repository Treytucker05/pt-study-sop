id: M-ENC-008
name: Mechanism Trace
category: encode
subcategory: gen
description: 'Trace the causal mechanism step-by-step: what triggers what, and why. Build a cause→effect chain from input to output. Especially useful for pathophysiology and physiological pathways.'
control_stage: TEACH
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- causal-reasoning
- mechanism
- pathophysiology
- transfer
- clinical
purpose: Force the learner to actively generate, explain, sequence, or transform the material so encoding is deeper than passive review.
not_for: This is not for passive reading, copying answers, or letting the tutor do the cognitive work for the learner.
best_fit_topics:
- Concepts the learner can explain, transform, or generate in their own words
- Mechanisms and causal chains that benefit from active elaboration
poor_fit_topics:
- Pure passive rereading or copy-paste note taking
- Items that are still completely unknown and cannot yet be transformed
learner_state_required: Source material is loaded. The learner has a bounded concept and is ready to generate, explain, or transform it before seeing help.
inputs:
- description: Pathway or mechanism to trace
  required: true
- description: Source material with mechanism details
  required: true
- description: Flowchart template or blank paper
  required: true
outputs:
- name: Complete mechanism chain (trigger to outcome)
  description: Complete mechanism chain (trigger to outcome)
  format: short, checkable artifact
- name: Because statements for each step
  description: Because statements for each step
  format: short, checkable artifact
- name: Branch points identified
  description: Branch points identified
  format: short, checkable artifact
- name: Verification status
  description: Verification status
  format: short, checkable artifact
required_outputs: &id001
- Complete mechanism chain (trigger to outcome)
- Because statements for each step
- Branch points identified
- Verification status
success_criteria:
- 'All required outputs are present and checkable: Complete mechanism chain (trigger to outcome), Because statements for each step, Branch points identified, Verification status.'
- 'The method reaches its stop condition: Chain reaches final outcome; All "because" statements filled.'
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Complete mechanism chain (trigger to outcome), Because statements for each step.'
steps:
- step: 1
  name: The Trigger Initial Cause Or
  action: Identify the trigger (initial cause or stimulus)
  tutor_does: 'Guide the learner to Identify the trigger (initial cause or stimulus). Keep in mind: Example: ''ACE inhibitor blocks ACE enzyme'''
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: ''ACE inhibitor blocks ACE enzyme'
- step: 2
  name: Ask
  action: 'Ask: ''What happens next as a direct result?'
  tutor_does: 'Guide the learner to Ask: ''What happens next as a direct result?''. Keep in mind: Write the immediate downstream effect'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Write the immediate downstream effect'
- step: 3
  name: Repeat Step 2 Until You
  action: Repeat step 2 until you reach the final outcome
  tutor_does: 'Guide the learner to Repeat step 2 until you reach the final outcome. Keep in mind: Each step must cause the next'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Each step must cause the next'
- step: 4
  name: Add Because Statements At Each
  action: Add "because" statements at each arrow
  tutor_does: 'Guide the learner to Add "because" statements at each arrow. Keep in mind: Why does A cause B? Fill in the mechanism.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Why does A cause B? Fill in the mechanism.'
- step: 5
  name: Chain Against Source Material
  action: Verify chain against source material
  tutor_does: 'Guide the learner to Verify chain against source material. Keep in mind: Flag any errors or gaps'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Flag any errors or gaps'
- step: 6
  name: Note Branch Points Where Mechanisms
  action: Note branch points where mechanisms diverge
  tutor_does: 'Guide the learner to Note branch points where mechanisms diverge. Keep in mind: Real pathways often have multiple effects'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Real pathways often have multiple effects'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Explain the trigger and downstream chain in plain language before adding finer detail
- Help learner identify the trigger (initial cause or stimulus) of the mechanism
- Prompt "What happens next as a direct result?" at each step
- Require "because" statements at every causal arrow
- Guide learner to look for branch points where mechanisms diverge
- Prompt verification of chain against source material
- Flag vague "because" statements and ask for specific molecular/cellular detail
- Require explicit intermediate steps (A to B to C, not A to C)
- Use Socratic questioning to help learner discover missing links
forbidden_moves:
- Accept vague "because" statements without specific mechanism detail
- Allow skipping intermediate steps in the causal chain
- Skip source verification of the completed chain
- Deliver a long ungated lecture without using the mechanism trace as the teaching scaffold
- Accept linear-only thinking without exploring branch points
- Present information outside the objective scope
- Move to retrieval before the mechanism trace is complete
stuck_protocol: Offer one smaller hint, one simpler example, or one step back in the chain; then require the learner to continue actively.
failure_modes:
- mode: Skipping intermediate steps
  detection: The learner or tutor starts doing skipping intermediate steps or the artifact stops satisfying the method’s required checks.
  recovery: Require explicit A→B→C, not A→C
  fallback_method: M-ENC-011
- mode: Vague "because" statements
  detection: The learner or tutor starts doing vague "because" statements or the artifact stops satisfying the method’s required checks.
  recovery: Must cite specific molecular/cellular mechanism
  fallback_method: M-ENC-005
- mode: Linear thinking only
  detection: The learner or tutor starts doing linear thinking only or the artifact stops satisfying the method’s required checks.
  recovery: Actively look for branch points and parallel effects
  fallback_method: M-INT-006
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- elaboration
- transfer
- generation
evidence:
  citation: Kulasegaram et al. (2013)
  finding: Causal reasoning with biomedical mechanisms supports diagnostic transfer to novel cases
  source: seed_methods.py
