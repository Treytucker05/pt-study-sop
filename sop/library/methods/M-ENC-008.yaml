id: M-ENC-008
name: Mechanism Trace
category: encode
description: 'Trace the causal mechanism step-by-step: what triggers what, and why. Build a cause→effect chain from input
  to output. Especially useful for pathophysiology and physiological pathways.'
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
control_stage: TEACH
status: validated
tags:
- causal-reasoning
- mechanism
- pathophysiology
- transfer
- clinical
mechanisms:
- elaboration
- transfer
- generation
knobs:
  guidance_level: medium
  output_format: bullets
constraints:
  active_processing_required: true
  objective_scope_required: true
  no_final_answer_only: true
  non_assessment: true
  no_scored_checks: true
inputs:
- Pathway or mechanism to trace
- Source material with mechanism details
- Flowchart template or blank paper
steps:
- step: 1
  action: Identify the trigger (initial cause or stimulus)
  notes: 'Example: ''ACE inhibitor blocks ACE enzyme'''
- step: 2
  action: 'Ask: ''What happens next as a direct result?'''
  notes: Write the immediate downstream effect
- step: 3
  action: Repeat step 2 until you reach the final outcome
  notes: Each step must cause the next
- step: 4
  action: Add "because" statements at each arrow
  notes: Why does A cause B? Fill in the mechanism.
- step: 5
  action: Verify chain against source material
  notes: Flag any errors or gaps
- step: 6
  action: Note branch points where mechanisms diverge
  notes: Real pathways often have multiple effects
outputs:
- Complete mechanism chain (trigger to outcome)
- Because statements for each step
- Branch points identified
- Verification status
stop_criteria:
- Chain reaches final outcome
- All "because" statements filled
- Chain verified against source
failure_modes:
- mode: Skipping intermediate steps
  mitigation: Require explicit A→B→C, not A→C
- mode: Vague "because" statements
  mitigation: Must cite specific molecular/cellular mechanism
- mode: Linear thinking only
  mitigation: Actively look for branch points and parallel effects
logging_fields:
- mechanism_traced
- chain_length
- branch_points
- verification_errors
evidence:
  citation: Kulasegaram et al. (2013)
  finding: Causal reasoning with biomedical mechanisms supports diagnostic transfer to novel cases
  source: seed_methods.py
evidence_raw: Kulasegaram et al. (2013); causal reasoning with biomedical mechanisms supports diagnostic transfer
facilitation_prompt: 'You are running M-ENC-008 (Mechanism Trace) in TEACH stage.

  This method is non-assessment. Do not score, grade, or quiz the learner.

  Execute this method card exactly and keep outputs deterministic.


  Stage hard rules:

  - Deliver one teach chunk in this order: Source Facts -> Plain Interpretation -> Bridge Move -> Application -> Anchor Artifact.

  - Keep focus on target concept scope.
  - Use the mechanism trace as the bridge/application scaffold, not as a graded check.
  - Stop once the learner has a usable L2 grasp and one anchor artifact.


  Required outputs:

  - Complete mechanism chain (trigger to outcome)

  - Because statements for each step

  - Branch points identified

  - Verification status


  Stop conditions:

  - Chain reaches final outcome

  - All "because" statements filled

  - Chain verified against source


  If required inputs are missing, request only the minimum needed input and continue.

  '
gating_rules:
- Force active processing (explain, transform, or map), not passive reading.
- Keep output scoped to mapped objectives only.
artifact_type: notes
allowed_moves:
- Help learner identify the trigger (initial cause or stimulus) of the mechanism
- Prompt "What happens next as a direct result?" at each step
- Require "because" statements at every causal arrow
- Guide learner to look for branch points where mechanisms diverge
- Prompt verification of chain against source material
- Flag vague "because" statements and ask for specific molecular/cellular detail
- Require explicit intermediate steps (A to B to C, not A to C)
- Use Socratic questioning to help learner discover missing links
forbidden_moves:
- Trace the mechanism chain FOR the learner
- Accept vague "because" statements without specific mechanism detail
- Allow skipping intermediate steps in the causal chain
- Skip source verification of the completed chain
- Deliver a passive explanation of the pathway instead of guiding the trace
- Accept linear-only thinking without exploring branch points
- Present information outside the objective scope
- Move to retrieval before the mechanism trace is complete
required_outputs:
- Complete mechanism chain (trigger to outcome)
- Because statements for each step
- Branch points identified
- Verification status
