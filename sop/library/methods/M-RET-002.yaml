id: M-RET-002
name: Sprint Quiz
category: RETRIEVE
subcategory: sprint-quiz
description: Rapid-fire Q&A with Tutor. 10-15 questions in 5 min. Track accuracy for RSR.
control_stage: RETRIEVE
status: validated
version: '1.6'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- retrieve
- retrieval
- quiz
- speed
- rsr
- ai-assisted
purpose: Sprint Quiz exists to run a sprint quiz that pressures short-answer retrieval and records accuracy plus latency for RSR tracking. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use CONSOLIDATE if the learner needs an anchor first.
best_fit_topics:
- rapid short-answer retrieval
- single-topic fact checks
- latency and accuracy logging
poor_fit_topics:
- long lectures
- unbounded essay answers
- notes-open comparison before attempt
learner_state_required: The learner already has source material or an anchor available, the source will be closed for recall, and a retrieval target exists.
inputs:
- description: Topic or concept set for quiz
  required: true
- description: Tutor AI (or pre-made question set)
  required: true
- description: Timer (5 min recommended)
  required: true
- description: Scoring tracker (correct/incorrect tally)
  required: true
outputs:
- name: RSR percentage (correct/total)
  description: A structured output for a sprint quiz that pressures short-answer retrieval and records accuracy plus latency for RSR tracking.
  format: structured response
- name: List of missed questions with correct answers
  description: A structured output for a sprint quiz that pressures short-answer retrieval and records accuracy plus latency for RSR tracking.
  format: bulleted or tabular list
- name: Weak anchor flags (uncertain but correct items)
  description: A compact reference artifact with the minimum definitions, rules, examples, near-misses, and traps needed for later retrieval.
  format: formatted study artifact
- name: Topics needing re-encoding
  description: A structured output for a sprint quiz that pressures short-answer retrieval and records accuracy plus latency for RSR tracking.
  format: structured response
artifact_schemas:
  RSR percentage (correct/total): scored_items
  List of missed questions with correct answers: bullet_list
  Weak anchor flags (uncertain but correct items): ordered_steps
  Topics needing re-encoding: scored_items
produces:
- RSR percentage (correct/total)
- List of missed questions with correct answers
- Weak anchor flags (uncertain but correct items)
- Topics needing re-encoding
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- RSR percentage (correct/total)
- List of missed questions with correct answers
- Weak anchor flags (uncertain but correct items)
- Topics needing re-encoding
success_criteria:
- All required outputs are present for M-RET-002.
- A genuine attempt-first recall happened before any comparison or feedback.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: RSR percentage (correct/total).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Quiz Setup
  action: Set the topic scope, question count, and closed-note rule before starting
  tutor_does: Set the topic scope, confirm the sprint size, and enforce closed-note conditions before the first question appears.
  learner_does: Confirms readiness, closes materials, and agrees to attempt from memory before any feedback.
  max_lines: 6
  check: Are materials closed and is the sprint scope tight enough to produce a real retrieval signal?
  example: 'Example: Tutor says, "Closed notes, 12 questions, stroke localization only." Learner says, "Ready."'
- step: 2
  name: Start Timer
  action: Start the sprint timer and begin the rapid question block
  tutor_does: Start the timer, begin the question stream, and keep pace high enough to discourage overthinking.
  learner_does: Answers from memory under time pressure and does not open notes during the attempt window.
  max_lines: 6
  check: Is the sprint pace preserving speed pressure instead of turning into a slow review?
  example: 'Example: Tutor starts a 5-minute block and immediately asks Question 1.'
- step: 3
  name: Commit Answers
  action: Require a committed answer for each item before any comparison or reveal
  tutor_does: Require a best-effort answer for every item and block hedging, hints, or answer leaks during the first attempt.
  learner_does: Commits to an answer, marks uncertainty honestly, and keeps moving without waiting for help.
  max_lines: 6
  check: Is each response a real attempt rather than a hedge, hint request, or stall?
  example: 'Example: Learner gives a best-effort answer instead of saying, "I think maybe..."'
- step: 4
  name: Score Responses
  action: Mark correct and incorrect responses only after the committed attempt is complete
  tutor_does: Tally correct and incorrect items cleanly after the attempt point for each question or after the timed block, depending on the active preset.
  learner_does: Accepts the score readout, notes misses, and does not reopen debate on already-scored items during the sprint.
  max_lines: 6
  check: Was scoring delayed until after commitment and kept clean enough for RSR tracking?
  example: 'Example: Tutor marks the response incorrect, gives the correct answer, and advances immediately.'
- step: 5
  name: Flag Weak Anchors
  action: Mark uncertain-but-correct items as weak anchors for later review
  tutor_does: Flag near-misses, hesitation items, or low-confidence correct answers as weak anchors instead of treating them as fully secure.
  learner_does: Identifies which correct answers felt shaky or slow and agrees to carry them forward for repair.
  max_lines: 6
  check: Are shaky correct answers being separated from strong retrieval wins?
  example: 'Example: Tutor tags a correct-but-hesitant answer as a weak anchor rather than a clean win.'
- step: 6
  name: Calculate RSR and Route
  action: Calculate RSR, list misses, and name what needs re-encoding next
  tutor_does: Calculate the final RSR, list missed questions with correct answers, and route low-signal areas back to encoding or consolidation work.
  learner_does: Reviews the sprint results, notes the weak anchors, and accepts the next-step routing.
  max_lines: 6
  check: Does the final output include RSR, misses, weak anchors, and a clear re-encoding target?
  example: 'Example: Tutor closes with "RSR 73%, weak anchors on ACA vs MCA, re-encode stroke localization before the next sprint."'
constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Deliver rapid-fire questions (10-15) within timed block
- Require committed answer before revealing feedback
- Provide corrective feedback AFTER each answer is committed
- Track running accuracy tally for RSR calculation
- Flag uncertain-but-correct items as weak anchors
- Enforce RSR threshold at 85% for advance
- Route back to ENCODE on RSR below 80%
- Use varied question formats (definition, application, comparison)
- Enforce time constraints for desirable difficulty
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Reveal answer before learner commits to a response
- Accept hedged or uncommitted answers ("I think maybe...")
- Provide hints during first attempt at any question
- Allow reference materials during quiz
- Skip RSR calculation at end of block
- Teach new material during retrieval
- Skip tracking weak anchors (uncertain but correct)
- Remove time pressure from the sprint format
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 5
energy_cost: medium
best_stage: review
mechanisms:
- retrieval
- testing
- calibration
- spacing
evidence:
  citation: Yang, Luo, Vadillo, Yu, and Shanks (2021); Agarwal, Nunes, and Blunt (2021); Little and McDaniel (2015); Walsh and Horgan (2024)
  finding: Sprint Quiz is best supported as a short, high-frequency retrieval block that samples recall quickly enough to expose both clean misses and weak anchors. Meta-analytic retrieval-practice evidence supports brief quiz-like testing for retention gains, classroom reviews support frequent low-stakes quizzing when it yields actionable follow-up, and transfer-oriented quiz research shows that the format can reveal whether knowledge is stable or merely familiar. The practical implication for this method is to keep the block short, force direct answers before feedback, and log both outright misses and hesitant correct responses so the next routing move is based on evidence rather than impressions.
  source: https://doi.org/10.1037/bul0000309; https://doi.org/10.1007/s10648-021-09595-9; https://doi.org/10.1037/a0021782; https://doi.org/10.1007/s11251-024-09680-w
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest sprint. Use 10 high-yield questions, terse score bullets, and only the most decision-relevant misses and weak anchors.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest sprint. Use 15 questions, keep a fuller per-item score trace, and return a richer weak-anchor and routing analysis.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh sprint. Use 10-12 questions and present the result as a compact score table with one-line route guidance.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied sprint. Use rapid applied prompts or mini-scenarios and show misses, weak anchors, and route decisions in a short clinical-style table.
related_methods:
- id: M-REF-003
  relationship: Quiz misses are easier to analyze against a compact anchor
- id: M-OVR-001
  relationship: Exit tickets can capture what remained muddy after the sprint
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - 'If I''m stuck: do NOT repeat the same explanation. Pick exactly one recovery move (simpler ladder, format switch, side-by-side contrast, tiny clinical case).'
  - Execute ONE step at a time. Do not advance to the next step until I say NEXT.
  replaces_with:
  - Closed-note recall. No hints at any point. After each committed answer, reveal the correct answer only when the active preset allows it, and keep tally clean for RSR.
  - If stuck on a question, force a best-effort answer or mark a miss and move on. Do not re-teach during the sprint.
  - Macro flow may vary by preset, but the attempt-first rule is never relaxed.
  reason: Sprint Quiz depends on cold recall, speed pressure, and clean scoring. The override preserves retrieval validity while allowing preset-specific pacing and output style.
facilitation_prompt: |-
  You are running M-RET-002 (Sprint Quiz) in the RETRIEVE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: RSR percentage, List of missed questions with correct answers, Weak anchor flags, and Topics needing re-encoding.
  Run a short closed-note quiz with attempt-first answers, then score it cleanly and route from the pattern. Keep it fast, do not teach during the quiz, and flag uncertain correct answers separately from stable wins.
  Preset behavior:
  - exam_cram: one-shot; 10 questions; terse bullets; only the biggest misses and weak anchors.
  - deep_mastery: interactive; 15 questions; fuller per-item trace and richer routing analysis.
  - quick_review: one-shot refresh; 10-12 questions; compact score table plus one route call.
  - clinical_bridge: stepwise; applied prompts or mini-scenarios with misses and route decisions in a short table.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves quiz -> scoring -> routing and waits.
validation:
  test_cases:
  - topic: rapid short-answer retrieval
    expected_outputs:
    - RSR percentage (correct/total)
    - List of missed questions with correct answers
    - Weak anchor flags (uncertain but correct items)
    pass_criteria:
    - All required outputs for M-RET-002 are present.
    - The response stays inside the correct stage rules.
  - topic: single-topic fact checks
    expected_outputs:
    - List of missed questions with correct answers
    - Weak anchor flags (uncertain but correct items)
    - Topics needing re-encoding
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Retrieval blocks can collapse into explanation unless the tutor protects the attempt-first rule.
