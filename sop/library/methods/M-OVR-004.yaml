id: M-OVR-004
name: Post-Learn Brain Dump
category: OVERLEARN
subcategory: closure
description: "Close all materials. Write everything you remember from the session \u2014 stories, connections, details, anything. Then open materials, compare, identify gaps, and fill them in. Different from Free Recall Blurt: this is comprehensive session-level closure, not topic-level retrieval practice."
control_stage: OVERLEARN
status: core
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- recall
- brain-dump
- metacognition
- gap-detection
- closure
- session-wrap
purpose: Post-Learn Brain Dump exists to run a comprehensive post-learn brain dump that captures the session story, compares against source material, and fills gaps. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for initial teaching, discovery, or broad remediation. Use EXPLAIN or REFERENCE first if understanding is not already present.
best_fit_topics:
- session-level closure recall
- compare-and-repair
- gap filling
poor_fit_topics:
- narrow topic recall only
- item-by-item tutoring
- deep new teaching
learner_state_required: Core understanding already exists, retrieval is reasonably stable, and the learner is ready for short fluency reps rather than new instruction.
inputs:
- description: Completed study session (all blocks done)
  required: true
- description: Blank paper or text area
  required: true
- description: Timer (5 min dump + 2 min gap-fill)
  required: true
- description: Session materials (closed during dump, opened for gap-fill)
  required: true
outputs:
- name: Brain dump text (raw recall output)
  description: A raw recall transcript with gaps marked, followed by comparison notes and gap repair.
  format: free-response text
- name: Gap list (what was missing or wrong)
  description: A structured output for a comprehensive post-learn brain dump that captures the session story, compares against source material, and fills gaps.
  format: bulleted or tabular list
- name: Gap-fill annotations (one-line corrections)
  description: A structured output for a comprehensive post-learn brain dump that captures the session story, compares against source material, and fills gaps.
  format: structured response
- name: Session retention estimate (percentage of material recalled)
  description: A structured output for a comprehensive post-learn brain dump that captures the session story, compares against source material, and fills gaps.
  format: structured response
artifact_schemas:
  Brain dump text (raw recall output): paragraph
  Gap list (what was missing or wrong): bullet_list
  Gap-fill annotations (one-line corrections): scored_items
  Session retention estimate (percentage of material recalled): scored_items
produces:
- Brain dump text (raw recall output)
- Gap list (what was missing or wrong)
- Gap-fill annotations (one-line corrections)
- Session retention estimate (percentage of material recalled)
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Brain dump text (raw recall output)
- Gap list (what was missing or wrong)
- Gap-fill annotations (one-line corrections)
- Session retention estimate (percentage of material recalled)
success_criteria:
- All required outputs are present for M-OVR-004.
- The rep set stays brief, fluent, and below the fatigue threshold.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Brain dump text (raw recall output).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: "Close ALL materials \u2014"
  action: "Close ALL materials \u2014 notes, slides, textbook, everything. Materials must be completely out of sight"
  tutor_does: "Run close all materials \u2014 notes, slides, textbook, everything. materials must be completely out of sight as a bounded fluency rep and stop before fatigue lowers accuracy."
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is the learner already stable enough for fluency reps?
  example: 'Tutor: "Keep this to a short, fluent rep set." Learner: "Understood."'
- step: 2
  name: Set timer for 5
  action: "Set timer for 5 minutes. Write everything you remember from this session. Stream of consciousness. Stories, facts, connections, pictures, analogies \u2014 anything that comes to mind"
  tutor_does: "Run set timer for 5 minutes. write everything you remember from this session. stream of consciousness. stories, facts, connections, pictures, analogies \u2014 anything that comes to mind as a bounded fluency rep and stop before fatigue lowers accuracy."
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor asks for the next short answer and keeps the pace brisk.
- step: 3
  name: When stuck, write "?"
  action: When stuck, write "?" and keep going. Gaps are data, not failures. Mark them and move on
  tutor_does: Run when stuck, write "?" and keep going. gaps are data, not failures. mark them and move on as a bounded fluency rep and stop before fatigue lowers accuracy.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor identifies one weak spot and asks for one more clean repetition.
- step: 4
  name: Timer ends. Open materials
  action: Timer ends. Open materials and compare your dump to the session content. Spend max 2 minutes on this comparison
  tutor_does: Run timer ends. open materials and compare your dump to the session content. spend max 2 minutes on this comparison as a bounded fluency rep and stop before fatigue lowers accuracy.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Has the learner compared the output against the source or answer key?
  example: Tutor closes the rep set and records the final level of fluency.
- step: 5
  name: "Identify gaps \u2014 what"
  action: "Identify gaps \u2014 what did you miss? What was wrong?. Circle or highlight missing items. These are priority review targets"
  tutor_does: "Run identify gaps \u2014 what did you miss? what was wrong?. circle or highlight missing items. these are priority review targets as a bounded fluency rep and stop before fatigue lowers accuracy."
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor closes the rep set and records the final level of fluency.
- step: 6
  name: Fill gaps with brief
  action: Fill gaps with brief annotations (not full re-study). One-line corrections or additions only. This is gap-fill, not re-learning
  tutor_does: Run fill gaps with brief annotations (not full re-study). one-line corrections or additions only. this is gap-fill, not re-learning as a bounded fluency rep and stop before fatigue lowers accuracy.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor closes the rep set and records the final level of fluency.
constraints:
- rule: Understanding must already exist before fluency reps begin
  why: Overlearning hardens what is already known; it does not teach from scratch.
- rule: Keep reps short and bounded to avoid fatigue loops
  why: Excess repetition lowers accuracy and wastes the fluency window.
- rule: Stop when the cap is reached or accuracy starts to sag
  why: The point is durable fluency, not endless repetition.
- rule: Do not introduce new material during the rep set
  why: New content belongs in TEACH or REFERENCE, not OVERLEARN.
allowed_moves:
- Ensure all materials are closed before dump phase begins
- Set timer for 5 minutes for free recall dump
- Accept stream-of-consciousness recall (stories, facts, connections, analogies)
- Mark gaps with "?" during dump phase
- Open materials after 5-minute dump for comparison (max 2 min)
- "Identify gaps \u2014 what was missed or wrong"
- Fill gaps with one-line annotations only (not full re-study)
- Compute session retention estimate
- Encourage starting with any single fragment if learner feels blank
- Run short fluent reps on already-understood material
- Tighten wording and reduce hesitation across repetitions
- Stop when accuracy falls or the cap is reached
- Convert the stable material into an artifact for later review
forbidden_moves:
- Allow peeking at materials during the dump phase
- Exceed 7-minute total time cap (5 dump + 2 gap-fill)
- Turn gap-fill into comprehensive re-study
- Accept "I forgot everything" without pushing for at least one fragment
- Skip the gap comparison phase after dump
- Provide new teaching content during this block
- Allow gap-fill annotations longer than one line per gap
- Run this for very short sessions (<15 min) where Exit Ticket suffices
- Introduce brand-new content
- Push through fatigue after the cap
- Let the session drift into broad teaching
stuck_protocol: Shorten the rep, narrow the item, and stop before fatigue changes the quality of the response.
failure_modes:
- mode: The session turns into new teaching
  detection: The tutor starts adding unfamiliar content or long explanations.
  recovery: Cut back to the known material and keep the rep set bounded.
  fallback_method: M-REF-003
- mode: Fluency collapses from fatigue
  detection: Latency rises and errors accumulate across repeated reps.
  recovery: Stop the set early, capture the weak item, and defer another rep to later.
  fallback_method: M-RET-003
- mode: The output becomes bloated
  detection: Responses become long, unfocused, or repetitive.
  recovery: Require shorter answers and a tighter format, then continue.
  fallback_method: M-OVR-002
default_duration_min: 7
energy_cost: medium
best_stage: consolidation
mechanisms:
- retrieval
- generation
- metacognition
- consolidation
- error_detection
evidence:
  citation: Roediger and Karpicke (2006); Yang, Luo, Vadillo, Yu, and Shanks (2021); Agarwal, Nunes, and Blunt (2021); Carter and Agarwal (2025)
  finding: "Post-Learn Brain Dump is best supported as a retrieval-plus-feedback closure routine that uses session-level recall to consolidate the arc of a study block and expose what still falls out after learning. Foundational testing-effect work and newer meta-analytic retrieval evidence support recall attempts over passive review, classroom retrieval reviews support brief end-of-session testing for consolidation and diagnosis, and recent instructional work supports closing with a fast evidence-generating check rather than a vague recap. The practical implication for this method is to keep the first pass closed-note and comprehensive, compare against the session materials only after the dump ends, and use one-line gap fills to sharpen the next session\u2019s targets instead of reopening a full teaching loop."
  source: https://doi.org/10.1111/j.1467-9280.2006.01693.x; https://doi.org/10.1037/bul0000309; https://doi.org/10.1007/s10648-021-09595-9; https://doi.org/10.1177/00986283251352475
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest closure. Use a 5-minute session dump, terse bullets for gaps, and one concrete fill target.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest closure. Keep the full narrative dump, compare it carefully against the session materials, and return a richer gap-fill handoff.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh closure. Use a compact Learned-Missed-Fill table plus a quick session retention estimate.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied closure. Organize the dump as a session handoff matrix with recalled actions, missed risks, gap fills, and the next practical target.
related_methods:
- id: M-RET-001
  relationship: Post-learn dumps compare recall against prior retrieval output
- id: M-REF-003
  relationship: A one-page anchor is the best comparison artifact
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - 'If I''m stuck: do NOT repeat the same explanation. Pick exactly one recovery move (simpler ladder, format switch, side-by-side contrast, tiny clinical case).'
  replaces_with:
  - "Two distinct phases with different reveal rules. Phase 1 (dump): closed-note, no hints, no recovery moves \u2014 same as RET-001. Phase 2 (gap-fill): open materials, write missing content directly into the artifact."
  - If stuck during the dump phase, write '?' and continue. Do not switch format or rebuild upward. Recovery moves are only for the open-note gap-fill phase, where they are unnecessary anyway.
  reason: Post-Learn Brain Dump is closed-note dump + open-note gap-fill in one method. The two phases have opposite reveal rules; CI's single rule cannot serve both.
facilitation_prompt: |-
  You are running M-OVR-004 (Post-Learn Brain Dump) in the OVERLEARN stage.
  Use only the loaded source and session context. Ask only for missing required inputs.
  Produce: Brain dump text, Gap list, Gap-fill annotations, and Session retention estimate.
  Run one comprehensive closed-note session dump before any comparison. Keep the first pass broad and attempt-first, then compare against the session materials and patch only the biggest gaps with brief corrections.
  Preset behavior:
  - exam_cram: one-shot; 5-minute dump; terse gap bullets; one concrete fill target.
  - deep_mastery: interactive; full narrative dump; careful compare-against-source and richer gap-fill handoff.
  - quick_review: one-shot refresh; compact Learned-Missed-Fill table plus quick retention estimate.
  - clinical_bridge: stepwise; applied handoff matrix with recalled actions, missed risks, gap fills, and next practical target.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves dump -> compare -> gap fill and waits.
validation:
  test_cases:
  - topic: session-level closure recall
    expected_outputs:
    - Brain dump text (raw recall output)
    - Gap list (what was missing or wrong)
    - Gap-fill annotations (one-line corrections)
    pass_criteria:
    - All required outputs for M-OVR-004 are present.
    - The response stays inside the correct stage rules.
  - topic: compare-and-repair
    expected_outputs:
    - Gap list (what was missing or wrong)
    - Gap-fill annotations (one-line corrections)
    - Session retention estimate (percentage of material recalled)
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Fluency reps can become fatiguing or repetitive unless the tutor stops at the cap and keeps items bounded.
