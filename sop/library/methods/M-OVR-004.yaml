id: M-OVR-004
name: Post-Learn Brain Dump
category: overlearn
subcategory: closure
description: 'Close all materials. Write everything you remember from the session — stories, connections, details, anything.
  Then open materials, compare, identify gaps, and fill them in. Different from Free Recall Blurt: this is comprehensive session-level
  closure, not topic-level retrieval practice.'
control_stage: OVERLEARN
status: core
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- recall
- brain-dump
- metacognition
- gap-detection
- closure
- session-wrap
purpose: Post-Learn Brain Dump exists to run a comprehensive post-learn brain dump that captures the session story, compares
  against source material, and fills gaps. It turns the current stage into a clean, reusable signal instead of a vague study
  session.
not_for: This is not for initial teaching, discovery, or broad remediation. Use TEACH or REFERENCE first if understanding
  is not already present.
best_fit_topics:
- session-level closure recall
- compare-and-repair
- gap filling
poor_fit_topics:
- narrow topic recall only
- item-by-item tutoring
- deep new teaching
learner_state_required: Core understanding already exists, retrieval is reasonably stable, and the learner is ready for short
  fluency reps rather than new instruction.
inputs:
- description: Completed study session (all blocks done)
  required: true
- description: Blank paper or text area
  required: true
- description: Timer (5 min dump + 2 min gap-fill)
  required: true
- description: Session materials (closed during dump, opened for gap-fill)
  required: true
outputs:
- name: Brain dump text (raw recall output)
  description: A raw recall transcript with gaps marked, followed by comparison notes and gap repair.
  format: free-response text
- name: Gap list (what was missing or wrong)
  description: A structured output for a comprehensive post-learn brain dump that captures the session story, compares against
    source material, and fills gaps.
  format: bulleted or tabular list
- name: Gap-fill annotations (one-line corrections)
  description: A structured output for a comprehensive post-learn brain dump that captures the session story, compares against
    source material, and fills gaps.
  format: structured response
- name: Session retention estimate (percentage of material recalled)
  description: A structured output for a comprehensive post-learn brain dump that captures the session story, compares against
    source material, and fills gaps.
  format: structured response
required_outputs:
- Brain dump text (raw recall output)
- Gap list (what was missing or wrong)
- Gap-fill annotations (one-line corrections)
- Session retention estimate (percentage of material recalled)
success_criteria:
- All required outputs are present for M-OVR-004.
- The rep set stays brief, fluent, and below the fatigue threshold.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Brain dump text (raw recall output).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
