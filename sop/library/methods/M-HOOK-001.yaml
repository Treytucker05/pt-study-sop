id: M-HOOK-001
name: KWIK Hook
category: ENCODE
subcategory: hook
description: "Structured 6-step encoding protocol for new terms and concepts. Start by turning the word into something it sounds like, state the real meaning/function, create a picture for the meaning, link the sound-picture to the meaning-picture, personalize it so it sticks, then lock it as a reusable note/card. Each step is gated \u2014 do not skip ahead."
control_stage: ENCODE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- mnemonic
- kwik
- hook
- gated
- sop-core
- dual-coding
- encode
purpose: Create a compact memory cue that links a term or concept to a vivid sound, image, or body-based anchor without losing the real meaning.
not_for: This is not for teaching the whole concept from scratch, replacing source truth, or turning a mnemonic into a false fact claim.
best_fit_topics:
- Short labels, terms, and anchors that need fast recall
- Material that benefits from a vivid sound/image cue
poor_fit_topics:
- Long mechanistic explanations that need comprehension first
- Unstable or ambiguous material with no clear cue
learner_state_required: Source material is loaded. The learner has one bounded term or concept and is ready to actively build a cue around its true meaning.
inputs:
- description: New term or concept to encode
  required: true
- description: Definition or meaning from source material
  required: true
- description: Blank note area for hook creation
  required: true
outputs:
- name: KWIK hook (sound cue + meaning link scene)
  description: KWIK hook (sound cue + meaning link scene)
  format: short cue plus explanation
- name: Anki card draft (optional)
  description: Anki card draft (optional)
  format: short, checkable artifact
- name: Session log entry
  description: Session log entry
  format: short, checkable artifact
artifact_schemas:
  KWIK hook (sound cue + meaning link scene): string
  Anki card draft (optional): string
  Session log entry: string
produces:
- KWIK hook (sound cue + meaning link scene)
- Anki card draft (optional)
- Session log entry
requires:
- artifact: TEACH_close_artifact
  optional: false
  alternatives: []
required_outputs: &id001
- KWIK hook (sound cue + meaning link scene)
- Session log entry
success_criteria:
- 'All required outputs are present and checkable: KWIK hook (sound cue + meaning link scene), Session log entry.'
- 'The method reaches its stop condition: All 6 steps completed; Hook feels "locked" (resonance confirmed).'
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: KWIK hook (sound cue + meaning link scene), Session log entry.'
steps:
- step: 1
  name: Word Sound
  action: 'Word Sound: Turn the word into something it sounds like'
  tutor_does: 'Guide the learner to Word Sound: Turn the word into something it sounds like. Keep in mind: Find a phonetic cue, rhyme, or sound-alike proxy. Example: ''Sartorius'' sounds like ''sartorial''.'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Does the learner have the right term and true meaning before the cue is built?
  example: 'Example: Find a phonetic cue, rhyme, or sound-alike proxy. Example: ''Sartorius'' sounds like ''sartorial''.'
- step: 2
  name: Real Meaning
  action: 'Real Meaning: State the true meaning or function in one sentence'
  tutor_does: 'Guide the learner to Real Meaning: State the true meaning or function in one sentence. Keep in mind: Must come from source material (Source-Lock)'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Must come from source material (Source-Lock)'
- step: 3
  name: Meaning Picture
  action: 'Meaning Picture: Create a vivid picture that shows what the term means or does'
  tutor_does: 'Guide the learner to Meaning Picture: Create a vivid picture that shows what the term means or does. Keep in mind: Build a concrete picture for the real meaning before linking it to the sound cue'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Build a concrete picture for the real meaning before linking it to the sound cue'
- step: 4
  name: Link
  action: 'Link: Connect the sound-picture to the meaning-picture in one vivid scene'
  tutor_does: 'Guide the learner to Link: Connect the sound-picture to the meaning-picture in one vivid scene. Keep in mind: Make the scene active so the word-sound naturally points back to the real meaning'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Make the scene active so the word-sound naturally points back to the real meaning'
- step: 5
  name: Personalize
  action: 'Personalize: Add emotion, absurdity, or personal relevance and say why it clicks'
  tutor_does: 'Guide the learner to Personalize: Add emotion, absurdity, or personal relevance and say why it clicks. Keep in mind: Say: ''This clicks because...'' and make the linked scene memorable to YOU'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Say: ''This clicks because...'' and make the linked scene memorable to YOU'
- step: 6
  name: Lock
  action: 'Lock: Record the hook as an Anki card or session log entry'
  tutor_does: 'Guide the learner to Lock: Record the hook as an Anki card or session log entry. Keep in mind: Capture for spaced repetition'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is the final artifact captured and ready to keep or review?
  example: 'Example: Capture for spaced repetition'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Use the full KWIK workflow only
  why: Prevents collapsing the method into a lighter mnemonic lane that serves a different purpose.
- rule: Confirm the learner understands the concept's function before building the hook.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Hooks support understanding; they do not replace explanation.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: If a hook uses broader teaching knowledge or analogy, do not present it as if it came directly from source material.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: This is full KWIK for deeper ENCODE work, not the lightweight live mnemonic slot between TEACH and FULL CALIBRATE.
  why: Keeps the method honest and prevents a common misuse described in the source file.
allowed_moves:
- Explain concept function in one clear sentence before hook building begins
- Guide learner through each of the 6 gated steps in order
- Suggest phonetic cues or rhymes if learner is stuck on the Word Sound step
- Prompt learner to create both a meaning picture and the final linked scene (do not create them for the learner)
- Use Socratic questioning to deepen personal connection at the Personalize step
- Provide scaffold hints at any step if learner is stuck for >30 seconds
- Confirm resonance by asking learner to articulate why the hook clicks
- Connect hook to prior knowledge or related concepts
forbidden_moves:
- Skip any of the 6 gated steps or allow out-of-order execution
- Create the final linked scene or mnemonic FOR the learner
- Accept "I understand" without the learner demonstrating resonance
- Move to Lock step without explicit resonance confirmation
- Present hook-derived associations as source-material facts
- Deliver a passive lecture about the term instead of guiding hook creation
- Present information outside the objective scope
- Proceed to retrieval practice before encoding is complete
- Use this card as the full KWIK path only; do not collapse it into the lightweight live mnemonic slot
stuck_protocol: Shrink to one term, restate the real meaning in plain language, then try a simpler sound cue, image cue, or body cue. If the cue still does not click, switch to a lighter mnemonic lane or ask for one concrete example.
failure_modes:
- mode: Skipping steps
  detection: "The learner or tutor starts doing skipping steps or the artifact stops satisfying the method\u2019s required checks."
  recovery: Gate each step; don't proceed without completion
  fallback_method: M-HOOK-002
- mode: Image too abstract
  detection: "The learner or tutor starts doing image too abstract or the artifact stops satisfying the method\u2019s required checks."
  recovery: Make it concrete, visual, and bizarre
  fallback_method: M-HOOK-003
- mode: Sound cue forced
  detection: "The learner or tutor starts doing sound cue forced or the artifact stops satisfying the method\u2019s required checks."
  recovery: If phonetics don't work, try acronym or first-letter cue
  fallback_method: M-GEN-001
- mode: Sound cue never connects back to the actual meaning
  detection: "The learner or tutor starts doing sound cue never connects back to the actual meaning or the artifact stops satisfying the method\u2019s required checks."
  recovery: Build a separate meaning picture first, then force one linked scene joining sound and meaning
  fallback_method: M-HOOK-002
- mode: Weak personal connection
  detection: "The learner or tutor starts doing weak personal connection or the artifact stops satisfying the method\u2019s required checks."
  recovery: Add emotion, stakes, or personal relevance - why does this matter to YOU?
  fallback_method: M-HOOK-003
default_duration_min: 3
energy_cost: medium
best_stage: first_exposure
mechanisms:
- dual_coding
- elaboration
- generation
- emotional_encoding
evidence:
  citation: Bellezza (1981); Pressley, Levin, and Delaney (1982); Chiu and Hawkins (2023); Mocko, Wagler, and Lesser (2024)
  finding: KWIK Hook is best supported as a keyword-style mnemonic method that works when the learner builds an explicit sound cue, meaning image, and linking scene rather than memorizing a tutor-authored slogan. Mnemonic reviews and keyword-method research support interactive verbal-plus-image hooks for bounded recall targets, and newer classroom work shows that mnemonic gains are strongest when the learner actually generates or meaningfully personalizes the cue. The practical implication for this method is to force a learner attempt first, keep the target concept stable before hooking it, tie the sound cue back to the true meaning, and lock the final hook with a short distortion guard so the mnemonic does not replace the concept itself.
  source: https://doi.org/10.3102/00346543051002247; https://doi.org/10.3102/00346543052001061; https://doi.org/10.23971/jefl.v13i2.6313; https://doi.org/10.1080/26939169.2024.2334905
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
related_methods:
- id: M-HOOK-002
  relationship: Use when the same target only needs a fast lightweight cue instead of the full KWIK build
- id: M-OVR-002
  relationship: Use when the final hook should be converted into an Anki card artifact
facilitation_prompt: |-
  You are running M-HOOK-001 (KWIK Hook) in the ENCODE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: KWIK hook, optional Anki card draft if requested, and Session log entry.
  Build one full mnemonic by getting a learner-made sound cue first, stating the real meaning, creating a meaning picture, linking the sound and meaning scenes, personalizing the hook, and locking it with a distortion guard.
  Preset behavior:
  - exam_cram: one-shot; one clean hook block plus one-line distortion guard.
  - deep_mastery: interactive; full six-step build with explicit learner ownership and optional card lock.
  - quick_review: one-shot refresh; compact Sound | Meaning | Link | Lock table.
  - clinical_bridge: stepwise; cue-to-action or red-flag hook tied back to correct use.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves sound cue -> meaning -> link scene -> lock and waits.
validation:
  test_cases:
  - topic: Short labels, terms, and anchors that need fast recall
    expected_outputs: *id001
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Long mechanistic explanations that need comprehension first
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain before the learner attempts the required move.
  - LLMs may drift outside scope when the topic is broad or ambiguous.
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: One-shot; return one clean hook block with sound cue, meaning link, and a one-line distortion guard.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Interactive; walk all six steps, keep the learner-owned cue explicit, and include the optional card lock at the end.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: One-shot refresh; present the hook as a compact Sound | Meaning | Link | Lock table.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Stepwise; tie the hook to an applied cue-to-action or red-flag use case so the mnemonic points back to correct use.
