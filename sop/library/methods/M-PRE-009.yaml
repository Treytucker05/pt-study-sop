id: M-PRE-009
name: Syntopical Big-Picture Synthesis
category: PRIME
subcategory: syntopical-big-picture-synthesis
description: Synthesize top-level structure across 2-3 sources into one module-level hierarchy with cross-links.
control_stage: PRIME
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- prime
- syntopical
- synthesis
- hierarchy
- orientation
- prior-knowledge
- multiple-texts
- integration
purpose: Syntopical Big-Picture Synthesis exists to merge the top-level structures of 2-3 sources into one high-level hierarchy with cross-links, conflict flags, and follow-up targets before deeper work begins. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- Multi-source modules where 2-3 texts need one shared high-level map before detail study
- Topics with prior notes, objective context, or overlapping source structures
- Material where cross-source agreement and disagreement matter more than one source alone
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
- Single-source topics that do not need cross-source synthesis
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: UnifiedTopDownTree
  description: Unified high-level hierarchy synthesized across the selected sources.
  format: bulleted or nested hierarchy
- name: CrossSourceLinks
  description: Short list of where major concepts align, overlap, or bridge across sources.
  format: bulleted or tabular list
- name: ConflictFlags
  description: Source-grounded contradictions, mismatches, or unresolved differences that need later clarification.
  format: bulleted or tabular list
- name: FollowUpTargets
  description: Next-pass targets created from conflict flags, thin bridges, or unresolved cross-source gaps.
  format: bulleted or tabular list
artifact_schemas:
  UnifiedTopDownTree: bullet_list
  CrossSourceLinks: bullet_list
  ConflictFlags: bullet_list
  FollowUpTargets: bullet_list
produces:
- UnifiedTopDownTree
- CrossSourceLinks
- ConflictFlags
- FollowUpTargets
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- UnifiedTopDownTree
- CrossSourceLinks
- ConflictFlags
success_criteria:
- All required outputs are present for M-PRE-009.
- The method stays non-assessive and does not score the learner.
- The synthesis stays top-level, uses no more than 3 sources, and makes both overlaps and unresolved conflicts explicit.
partial_criteria:
- UnifiedTopDownTree is present but cross-source links or conflict flags are incomplete.
- The output is useful but too source-by-source, too detailed, or missing one major cross-source relationship.
steps:
- step: 1
  name: Opening Step
  action: Extract top-level pillars from each source
  tutor_does: Extract top-level pillars from each source. Only headings and conceptual anchors.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Opening Step: Extract top-level pillars from each source"'
- step: 2
  name: Step 2
  action: Merge overlapping pillars into one unified structure
  tutor_does: Merge overlapping pillars into one unified structure. Preserve source-specific distinctions where needed.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 2: Merge overlapping pillars into one unified structure"'
- step: 3
  name: Step 3
  action: Add cross-links and conflict notes
  tutor_does: Add cross-links and conflict notes. Mark unresolved conflicts as follow-up targets.
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Step 3: Add cross-links and conflict notes"'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Source Cap Hard Lock
  why: The method inherits this as a hard rule from the legacy card.
allowed_moves:
- Extract top-level pillars from each source (headings and conceptual anchors only)
- Merge overlapping pillars into one unified top-down structure
- Add cross-links between sources where concepts overlap
- Flag contradictions or conflicts between sources for follow-up
- Synthesize structure across 2-3 sources at a high level
- Preserve source-specific distinctions where needed
- Activate prior knowledge with a bounded free recall or orientation prompt
- Keep the synthesis source-grounded and top-level
forbidden_moves:
- Score, grade, or assess the learner
- Teach new detailed content or provide in-depth explanations
- Deep-dive into details when resolving contradictions
- Exceed source_cap (3 default) for synthesis
- Run quizzes, retrieval prompts, or correctness checks
- Run this method with only one source
- Summarize paragraph-level content instead of structural pillars
- Flatten away meaningful source-specific differences just to make the tree look neat
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Scope too broad
  detection: The output no longer matches the method's core purpose.
  recovery: Reduce to an objective-aligned scaffold and continue.
  fallback_method: M-PRE-010
- mode: Drift into testing
  detection: The tutor starts judging answers or asking the learner to prove mastery.
  recovery: Return to orientation-only behavior.
  fallback_method: M-PRE-010
default_duration_min: 6
energy_cost: low
best_stage: first_exposure
mechanisms:
- schema_activation
- integration
- scaffolding
- prior_knowledge_activation
- organization
- multiple_text_comprehension
evidence:
  citation: Alexander and List (2017); Yukhymenko-Lescroart, Goldman, Lawless, Pellegrino, and Shanahan (2022); Espinas and Wanzek (2024); Schallert, List, and Alexander (2025)
  finding: >-
    Syntopical Big-Picture Synthesis is best supported as a multiple-text
    orientation move that helps learners build a top-level integrated structure
    across a small number of sources before they dive into details. Research on
    multiple-text comprehension emphasizes that integration across documents
    depends on identifying shared ideas, preserving source-specific differences,
    and making intertextual links explicit rather than simply summarizing each
    source in isolation. The practical implication for this method is to keep
    the synthesis bounded to 2-3 sources, extract pillars only, merge overlaps
    into one unified tree, and flag unresolved conflicts for later study
    instead of forcing premature resolution.
  source: https://doi.org/10.1080/00461520.2017.1328309; https://doi.org/10.1080/01443410.2020.1811840; https://doi.org/10.1177/09388982241275650; https://doi.org/10.1080/00461520.2025.2592823
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: one_shot
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest synthesis pass. Return one terse unified tree, 2-3 cross-source links, and only the highest-yield conflict flags.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full synthesis pass. Keep separate sections for source pillars, unified tree, cross-source links, conflict flags, and follow-up targets.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render a compact table with source, shared pillar, cross-link, and conflict status columns before the final hierarchy.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied synthesis pass. Use a clinic-facing table with source, unified pillar, practical overlap, and conflict-risk columns before the final tree.
related_methods:
- id: M-PRE-010
  relationship: Use to set the objective frame before synthesizing multiple sources
- id: M-PRE-008
  relationship: Use when a single source needs a compact structural spine instead of cross-source merging
system_prompt_override:
  relaxes:
  - Highly interactive. One small teaching chunk, one short check, or one question at a time.
  - Ask only one question at a time.
  - Do not do more than one step at a time.
  - Within TEACH, deliver ONE chunk at a time, check in, then continue.
  replaces_with:
  - Produce the full UnifiedTopDownTree, CrossSourceLinks, ConflictFlags, and FollowUpTargets artifact when enough context is present. Do not force a source-by-source interview unless the preset explicitly asks for interactive or stepwise delivery.
  - Keep the synthesis top-level and source-grounded. Preserve conflicts as conflicts instead of resolving them with extra teaching.
  reason: Syntopical Big-Picture Synthesis is primarily an artifact-style PRIME method. Over-chunking it or resolving contradictions too early weakens the multiple-source orientation value.
facilitation_prompt: |
  You are running M-PRE-009 (Syntopical Big-Picture Synthesis) in the PRIME stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: UnifiedTopDownTree, CrossSourceLinks, ConflictFlags, and FollowUpTargets.
  Extract top-level pillars from 2-3 sources, merge overlaps into one unified hierarchy, add cross-source links, and flag unresolved conflicts for later study. Keep it orientation-only, non-assessive, and top-level; do not drift into paragraph summaries or source-by-source explanation.
  Preset behavior:
  - exam_cram: one-shot; terse unified tree, 2-3 cross-source links, and only the highest-yield conflict flags.
  - deep_mastery: interactive; labeled sections for source pillars, unified tree, links, conflicts, and follow-up targets.
  - quick_review: one-shot refresh; compact source / shared-pillar / link / conflict table plus final tree.
  - clinical_bridge: stepwise; clinic-facing source / unified-pillar / practical-overlap / conflict-risk table.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves source pillars -> unified tree -> links and conflicts and waits.
validation:
  test_cases:
  - topic: First pass on Syntopical Big-Picture Synthesis with prior notes present
    expected_outputs:
    - UnifiedTopDownTree
    - CrossSourceLinks
    - ConflictFlags
    - FollowUpTargets
    pass_criteria:
    - All required outputs are present.
    - The synthesis uses no more than 3 sources and keeps the tree top-level.
    - The output identifies where sources overlap and where conflicts remain.
  - topic: Dense review topic where the learner needs orientation before detail
    expected_outputs:
    - UnifiedTopDownTree
    - CrossSourceLinks
    - ConflictFlags
    - FollowUpTargets
    pass_criteria:
    - All required outputs are present.
    - No scored probe, quiz behavior, or grading language appears in the response.
    - The artifact stays structural rather than becoming a source-by-source recap.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs sometimes flatten away source-specific distinctions when building the unified tree.
  - If the sources do not actually overlap enough, the synthesis can become forced rather than clarifying.
