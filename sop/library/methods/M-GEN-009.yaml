id: M-GEN-009
name: Palpation Anchor
category: encode
subcategory: hook
description: Pair a deep anatomical structure with a visible or palpable surface landmark on your own
  body. Physically locate it, name it, and link it to the structure's clinical function. Turns abstract
  anatomy into kinesthetic memory.
control_stage: ENCODE
status: draft
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- encode
- anatomy
- palpation
- kinesthetic
- pt-specific
purpose: Create a compact memory cue that links a term or concept to a vivid sound, image, or body-based
  anchor without losing the real meaning.
not_for: This is not for teaching the whole concept from scratch, replacing source truth, or turning a
  mnemonic into a false fact claim.
best_fit_topics:
- Short labels, terms, and anchors that need fast recall
- Material that benefits from a vivid sound/image cue
poor_fit_topics:
- Long mechanistic explanations that need comprehension first
- Unstable or ambiguous material with no clear cue
learner_state_required: Source material is loaded. The learner has one bounded term or concept and is
  ready to actively build a cue around its true meaning.
inputs:
- description: Target anatomical structure name
  required: true
- description: Surface landmark location (or request to identify one)
  required: true
- description: Clinical function or relevance
  required: true
outputs:
- name: StructureName
  description: StructureName
  format: short, checkable artifact
- name: SurfaceLandmark
  description: SurfaceLandmark
  format: short, checkable artifact
- name: PalpationNote (what you felt)
  description: PalpationNote (what you felt)
  format: short, checkable artifact
- name: ClinicalLink
  description: ClinicalLink
  format: short, checkable artifact
- name: AnchorLine (one-line summary)
  description: AnchorLine (one-line summary)
  format: short cue plus explanation
required_outputs: &id001
- Structure name and function
- Surface landmark location
- Palpation note (what was felt)
- Clinical link
- Anchor line (one-line summary)
success_criteria:
- 'All required outputs are present and checkable: Structure name and function, Surface landmark location,
  Palpation note (what was felt), Clinical link, Anchor line (one-line summary).'
- 'The method reaches its stop condition: Structure named with function; Surface landmark identified.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Structure name and function,
  Surface landmark location.'
steps:
- step: 1
  name: Name The Deep Structure And
  action: Name the deep structure and its clinical function
  tutor_does: 'Guide the learner to Name the deep structure and its clinical function. Keep in mind: State
    what it does and why a PT would need to know it.'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Does the learner have the right term and true meaning before the cue is built?
  example: 'Example: State what it does and why a PT would need to know it.'
- step: 2
  name: The Surface Landmark Where The
  action: Identify the surface landmark where the structure can be felt or located
  tutor_does: 'Guide the learner to Identify the surface landmark where the structure can be felt or located.
    Keep in mind: Bone prominence, tendon, pulse point, skin crease, etc.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Bone prominence, tendon, pulse point, skin crease, etc.'
- step: 3
  name: Physically Palpate The Landmark On
  action: Physically palpate the landmark on your own body
  tutor_does: 'Guide the learner to Physically palpate the landmark on your own body. Keep in mind: Actually
    touch it. No skipping this step.'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Actually touch it. No skipping this step.'
- step: 4
  name: What You Feel And Name
  action: State what you feel and name the structure underneath
  tutor_does: 'Guide the learner to State what you feel and name the structure underneath. Keep in mind:
    Under this bump/ridge/groove is [structure].'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Under this bump/ridge/groove is [structure].'
- step: 5
  name: One Clinical Link How Would
  action: Create one clinical link — how would you use this landmark with a patient?
  tutor_does: 'Guide the learner to Create one clinical link — how would you use this landmark with a
    patient?. Keep in mind: Goniometry landmark, manual muscle test position, injection site, etc.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Goniometry landmark, manual muscle test position, injection site, etc.'
- step: 6
  name: Record The Anchor Structure Landmark
  action: Record the anchor — structure, landmark, feel, clinical link
  tutor_does: 'Guide the learner to Record the anchor — structure, landmark, feel, clinical link. Keep
    in mind: One line you can review later.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: One line you can review later.'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within the target scope
  why: Prevents drift and keeps the artifact useful.
- rule: Physical action required
  why: Preserves the method-specific guardrail from the source file.
- rule: Safe palpation only
  why: Preserves the method-specific guardrail from the source file.
- rule: Use for anatomical structures that have a surface landmark (bone, tendon, pulse point, etc.).
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Not every structure is palpable — skip if no reliable landmark exists.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Learner must physically touch the landmark on their own body, not just read about it.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Safe palpation only — no deep pressure on nerves, arteries, or vulnerable structures.
  why: Keeps the method honest and prevents a common misuse described in the source file.
allowed_moves:
- Name the structure and its clinical function
- Guide the learner to the correct surface landmark
- Ask the learner to palpate and describe what they feel
- Prompt for one clinical application
- Help the learner create a one-line anchor summary
- Skip the method if no landmark is available and suggest an alternative
forbidden_moves:
- Continue without the learner physically palpating
- Suggest deep pressure on vulnerable structures
- Use for structures with no surface landmark
- Accept a verbal-only answer without physical action
- Replace the kinesthetic experience with a description
stuck_protocol: Shrink to one term, restate the real meaning in plain language, then try a simpler sound
  cue, image cue, or body cue. If the cue still does not click, switch to a lighter mnemonic lane or ask
  for one concrete example.
failure_modes:
- mode: Structure has no reliable surface landmark
  detection: The learner or tutor starts doing structure has no reliable surface landmark or the artifact
    stops satisfying the method’s required checks.
  recovery: Skip this method for that structure. Use Draw-Label or Embodied Walkthrough instead.
  fallback_method: M-ENC-016
- mode: Learner only reads about the landmark without palpating
  detection: The learner or tutor starts doing learner only reads about the landmark without palpating
    or the artifact stops satisfying the method’s required checks.
  recovery: Enforce physical action — pause until learner confirms they are touching it.
  fallback_method: M-ENC-001
- mode: Unsafe palpation (deep pressure on nerve or artery)
  detection: The learner or tutor starts doing unsafe palpation (deep pressure on nerve or artery) or
    the artifact stops satisfying the method’s required checks.
  recovery: Remind learner to use light touch only. Flag vulnerable structures.
  fallback_method: M-ENC-013
default_duration_min: 3
energy_cost: medium
best_stage: first_exposure
mechanisms:
- embodied_cognition
- dual_coding
- generation
- motor_encoding
evidence:
  citation: Klatzky et al. (1989); James & Gauthier (2009)
  finding: Haptic exploration and motor encoding strengthen spatial memory for body-part knowledge. Embodied
    encoding outperforms visual-only for anatomy retention.
  source: research review
knobs:
  output_format: bullets
  guidance_level: medium
  family: GEN
  evidence_raw: Klatzky et al. (1989) haptic exploration improves spatial memory; James & Gauthier (2009)
    motor experience with objects enhances visual recognition.
  gating_rules:
  - Use only for structures with reliable surface landmarks.
  - Enforce physical palpation — not optional.
  - Safe palpation only.
  stipulations:
  - Use for anatomical structures that have a surface landmark (bone, tendon, pulse point, etc.).
  - Not every structure is palpable — skip if no reliable landmark exists.
  - Learner must physically touch the landmark on their own body, not just read about it.
  - Safe palpation only — no deep pressure on nerves, arteries, or vulnerable structures.
  artifact_type: notes
related_methods:
- id: M-ENC-016
  relationship: Embodied walkthrough cousin method
- id: M-ENC-001
  relationship: Hook fallback for fast recall
- id: M-ENC-013
  relationship: Memory palace if the anchor needs placement
