  2. The Surface Landmark Where The\n   Tutor does: Guide the learner to Identify the surface landmark\
  \ where the structure can be felt or located. Keep in mind: Bone prominence, tendon, pulse point, skin\
  \ crease, etc.\n   Learner does: Performs the requested cognitive move and shares the result before\
