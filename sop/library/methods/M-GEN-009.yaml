  \ is [structure].\n   Learner does: Performs the requested cognitive move and shares the result before\
  \ moving on.\n   Example: Example: Under this bump/ridge/groove is [structure].\n   Check: Is this step\
  \ complete and ready for the next move?\n   Then STOP and wait for the learner.\n5. One Clinical Link\
  \ How Would\n   Tutor does: Guide the learner to Create one clinical link — how would you use this landmark\
  \ with a patient?. Keep in mind: Goniometry landmark, manual muscle test position, injection site, etc.\n\
  \   Learner does: Performs the requested cognitive move and shares the result before moving on.\n  \
