id: M-TEA-005
name: Jingle / Rhyme Hook
category: encode
description: Compress a fixed ordered list or stable sequence into a short jingle or rhyme after the learner understands the meaning of the items.
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
control_stage: TEACH
status: draft
tags:
- teach
- mnemonic
- sequence
- hook
- rhyme
mechanisms:
- dual_coding
- elaboration
- generation
stipulations:
- Meaning comes before the hook.
- Use this only for fixed sequences or stable ordered sets.
- Name the distortion risk if the jingle oversimplifies the source.
knobs:
  output_format: bullets
constraints:
  non_assessment: true
  no_scored_checks: true
  objective_scope_required: true
inputs:
- Fixed sequence or ordered list
- Plain-language meaning of each step
steps:
- step: 1
  action: State the sequence and what each step means
  notes: Confirm meaning before compression.
- step: 2
  action: Build a short rhyme, cadence, or jingle
  notes: Keep it brief enough to repeat easily.
- step: 3
  action: Map the hook back to the real sequence
  notes: Make the correspondence explicit.
- step: 4
  action: Name one distortion risk or simplification limit
  notes: Prevent mnemonic drift.
outputs:
- Sequence statement
- Jingle or rhyme hook
- Hook-to-sequence map
- Distortion warning
stop_criteria:
- Hook is short and repeatable
- Sequence mapping is explicit
- One distortion warning is stated
failure_modes:
- mode: Hook comes before meaning
  mitigation: Restate the real sequence first, then rebuild the hook.
- mode: Hook distorts the order or content
  mitigation: Add a mapping line and explicit warning.
evidence:
  citation: Paivio (1991)
  finding: Verbal plus image-linked hooks can improve retention when grounded in meaning
  source: control-plane migration
evidence_raw: Paivio (1991); verbal plus image-linked hooks can improve retention when grounded in meaning
facilitation_prompt: 'You are running M-TEA-005 (Jingle / Rhyme Hook) in TEACH stage.

  This method is non-assessment. Build the hook only after the meaning is clear.

  Return exactly:

  1) SequenceStatement

  2) JingleOrRhyme

  3) HookSequenceMap

  4) DistortionWarning

  Use this only for fixed ordered material and state the simplification limit clearly.

  '
gating_rules:
- Confirm meaning before mnemonic compression.
- Use only for fixed sequences or stable ordered sets.
- Map the hook back to the real sequence before stopping.
artifact_type: notes
allowed_moves:
- Build a short repeatable rhyme or cadence for a fixed sequence
- Restate the sequence in plain language first
- Explain exactly how the hook maps back to the real order
- Name one limit or distortion risk
forbidden_moves:
- Use the hook before the learner understands the sequence
- Apply the hook to unstable or highly nuanced mechanisms
- Leave the hook unmapped to the real sequence
- Treat the mnemonic as source evidence
required_outputs:
- Sequence statement
- Jingle or rhyme hook
- Hook-to-sequence map
- Distortion warning
