id: M-TEA-005
name: Jingle / Rhyme Hook
category: teach
subcategory: mnemonic-hook
description: Compress a fixed ordered list or stable sequence into a short jingle or rhyme after the learner understands the meaning of the items.
control_stage: TEACH
status: draft
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- teach
- mnemonic
- sequence
- hook
- rhyme
- mnemonic-hook
- teaching
- explanation
purpose: Compress a fixed ordered list or stable sequence into a short jingle or rhyme after the learner understands the meaning of the items. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use a PRIME method when the learner first needs orientation or objective framing.
best_fit_topics:
- Terms or patterns that need a compact recall hook
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Sequence statement
  description: Learner-facing teaching artifact for jingle / rhyme hook.
  format: bulleted artifact
- name: Jingle or rhyme hook
  description: Learner-facing teaching artifact for jingle / rhyme hook.
  format: one-line hook plus recall cue
- name: Hook-to-sequence map
  description: Structured artifact that captures the key jingle / rhyme hook relationships.
  format: structured map or nested bullets
- name: Distortion warning
  description: Learner-facing teaching artifact for jingle / rhyme hook.
  format: bulleted artifact
required_outputs:
- Sequence statement
- Jingle or rhyme hook
- Hook-to-sequence map
success_criteria:
- The learner-facing explanation artifact is faithful to Jingle / Rhyme Hook and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Sequence statement is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Sequence
  action: State the sequence and what each step means
  tutor_does: State the sequence and what each step means. Confirm meaning before compression
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Sequence: State the sequence and what each step means"'
- step: 2
  name: Mnemonic Hook
  action: Build a short rhyme, cadence, or jingle
  tutor_does: Build a short rhyme, cadence, or jingle. Keep it brief enough to repeat easily
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Mnemonic Hook: Build a short rhyme, cadence, or jingle"'
- step: 3
  name: Sequence
  action: Map the hook back to the real sequence
  tutor_does: Map the hook back to the real sequence. Make the correspondence explicit
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Sequence: Map the hook back to the real sequence"'
- step: 4
  name: Step 4
  action: Name one distortion risk or simplification limit
  tutor_does: Name one distortion risk or simplification limit. Prevent mnemonic drift
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Step 4: Name one distortion risk or simplification limit"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: TEACH methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Build a short repeatable rhyme or cadence for a fixed sequence
- Restate the sequence in plain language first
- Explain exactly how the hook maps back to the real order
- Name one limit or distortion risk
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Use the hook before the learner understands the sequence
- Apply the hook to unstable or highly nuanced mechanisms
- Leave the hook unmapped to the real sequence
- Treat the mnemonic as source evidence
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For TEACH, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Hook comes before meaning
  detection: The output no longer matches the method’s core purpose.
  recovery: Restate the real sequence first, then rebuild the hook.
  fallback_method: M-TEA-007
- mode: Hook distorts the order or content
  detection: The output no longer matches the method’s core purpose.
  recovery: Add a mapping line and explicit warning.
  fallback_method: M-TEA-007
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
mechanisms:
- dual_coding
- elaboration
- generation
- scaffolding
- transfer
- cueing
evidence:
  citation: Paivio (1991)
  finding: Verbal plus image-linked hooks can improve retention when grounded in meaning
  source: control-plane migration
knobs:
  output_format: bullets
  guidance_level: medium
  artifact_type: notes
related_methods:
