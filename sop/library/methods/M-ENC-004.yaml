id: M-ENC-004
name: Teach-Back
category: encode
subcategory: gen
description: Explain the concept aloud as if teaching a classmate. Identify points where explanation breaks
  down.
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- verbal
- feynman
- deep-processing
- sop-core
purpose: Force the learner to actively generate, explain, sequence, or transform the material so encoding
  is deeper than passive review.
not_for: This is not for passive reading, copying answers, or letting the tutor do the cognitive work
  for the learner.
best_fit_topics:
- Concepts the learner can explain, transform, or generate in their own words
- Mechanisms and causal chains that benefit from active elaboration
poor_fit_topics:
- Pure passive rereading or copy-paste note taking
- Items that are still completely unknown and cannot yet be transformed
learner_state_required: Source material is loaded. The learner has a bounded concept and is ready to generate,
  explain, or transform it before seeing help.
inputs:
- description: Concept to teach
  required: true
- description: Imaginary student (or real one)
  required: true
- description: Recording device (optional)
  required: false
outputs:
- name: Verbal explanation (recorded or noted)
  description: Verbal explanation (recorded or noted)
  format: concise prose bullets or short paragraph
- name: Breakdown points list
  description: Breakdown points list
  format: short, checkable artifact
- name: Targeted review areas
  description: Targeted review areas
  format: short, checkable artifact
required_outputs: &id001
- Verbal explanation (recorded or noted)
- Breakdown points list
- Targeted review areas
success_criteria:
- 'All required outputs are present and checkable: Verbal explanation (recorded or noted), Breakdown points
  list, Targeted review areas.'
- 'The method reaches its stop condition: Full explanation delivered; Breakdown points identified.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Verbal explanation (recorded
  or noted), Breakdown points list.'
steps:
- step: 1
  name: The Concept You Will Teach
  action: State the concept you will teach
  tutor_does: 'Guide the learner to State the concept you will teach. Keep in mind: Be specific about
    scope'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Be specific about scope'
- step: 2
  name: The Concept Aloud As If
  action: Explain the concept aloud as if to a first-year student
  tutor_does: 'Guide the learner to Explain the concept aloud as if to a first-year student. Keep in mind:
    Use simple language; avoid jargon'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Use simple language; avoid jargon'
- step: 3
  name: Note Any Points Where You
  action: Note any points where you stumble or hesitate
  tutor_does: 'Guide the learner to Note any points where you stumble or hesitate. Keep in mind: These
    are knowledge gaps'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: These are knowledge gaps'
- step: 4
  name: Answer The Imaginary Student S
  action: Answer the imaginary student's "why?" and "how?" questions
  tutor_does: 'Guide the learner to Answer the imaginary student''s "why?" and "how?" questions. Keep
    in mind: Force yourself to go deeper'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Force yourself to go deeper'
- step: 5
  name: Breakdown Points
  action: Identify breakdown points
  tutor_does: 'Guide the learner to Identify breakdown points. Keep in mind: Where did the explanation
    fail?'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Where did the explanation fail?'
- step: 6
  name: To Source For Breakdown Areas
  action: Return to source for breakdown areas only
  tutor_does: 'Guide the learner to Return to source for breakdown areas only. Keep in mind: Targeted
    review, not full re-read'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Targeted review, not full re-read'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Teach-back is a guided explanation block, not a surprise graded evaluation.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Use learner breakdowns to steer targeted review rather than to judge performance harshly.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Ask the learner to state the concept they will teach
- Prompt the learner to explain the concept aloud in simple language
- Listen to the explanation and note stumbles or hesitations
- Ask follow-up "why?" and "how?" questions to push for deeper explanation
- Identify breakdown points where the explanation falters
- Guide learner to source material ONLY for identified breakdown areas
- Use breakdown points to steer targeted review, not harsh judgment
- Provide gentle scaffolding if learner cannot start their explanation
forbidden_moves:
- Explain the concept FOR the learner instead of having them teach back
- Allow reading from source material during the teach-back
- Skip the "why?" and "how?" follow-up questions
- Accept "I understand" without a verbal demonstration of understanding
- Switch into strict grading or evaluation mode unless chain explicitly requests it
- Deliver a passive lecture instead of facilitating the teach-back
- Move to retrieval before encoding is complete
- Use breakdown points to spring an unexpected verdict on performance
stuck_protocol: Offer one smaller hint, one simpler example, or one step back in the chain; then require
  the learner to continue actively.
failure_modes:
- mode: Reading instead of explaining
  detection: The learner or tutor starts doing reading instead of explaining or the artifact stops satisfying
    the method’s required checks.
  recovery: Close source material during teach-back
  fallback_method: M-ENC-007
- mode: Skipping "dumb" questions
  detection: The learner or tutor starts doing skipping "dumb" questions or the artifact stops satisfying
    the method’s required checks.
  recovery: Force "why?" after every statement
  fallback_method: M-ENC-005
- mode: Not identifying breakdowns
  detection: The learner or tutor starts doing not identifying breakdowns or the artifact stops satisfying
    the method’s required checks.
  recovery: Record and listen back; gaps become obvious
  fallback_method: M-ELB-002
default_duration_min: 5
energy_cost: high
best_stage: review
mechanisms:
- generation
- elaboration
- calibration
evidence:
  citation: Nestojko et al. (2014)
  finding: Expecting to teach enhances encoding and organization of information
  source: seed_methods.py
knobs:
  guidance_level: medium
  output_format: bullets
  evidence_raw: Nestojko et al. (2014); expecting to teach enhances encoding and organization
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  stipulations:
  - Teach-back is a guided explanation block, not a surprise graded evaluation.
  - Use learner breakdowns to steer targeted review rather than to judge performance harshly.
  logging_fields:
  - concept_taught
  - breakdown_count
  - fluency_rating
  - targeted_review_items
  artifact_type: notes
related_methods:
- id: M-ENC-007
  relationship: Similar self-explanation move
- id: M-ENC-005
  relationship: Why-chain fallback for deeper causality
- id: M-ELB-002
  relationship: Clinical application if the learner needs context
