purpose: Extract a compact structural spine from source material before detail work. Build high-signal nodes and link every node to at least one objective. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Structural Extraction'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: StructuralSpine
  description: Structured artifact that captures the key structural extraction relationships.
  format: ordered bullets
- name: Objective linkage map
  description: Structured artifact that captures the key structural extraction relationships.
  format: structured map or nested bullets
- name: UnknownNodeList
  description: Activation or structure artifact for structural extraction.
  format: bulleted artifact
- name: PriorityNodes
  description: Activation or structure artifact for structural extraction.
  format: bulleted artifact
required_outputs:
- StructuralSpine
- Objective linkage map
- UnknownNodeList
success_criteria:
- 'Core structure is captured in the required outputs: StructuralSpine, Objective linkage map.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- StructuralSpine is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
steps:
- step: 1
  name: Opening Step
  action: Resolve objective scope and objective set
  tutor_does: Resolve objective scope and objective set. Objective context can come from M-PRE-010 in current flow OR existing North Star from prior sessions; module_all uses all active module objectives; single_focus uses only the selected objective
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Opening Step: Resolve objective scope and objective set"'
- step: 2
  name: Step 2
  action: Extract structural spine nodes
  tutor_does: Extract structural spine nodes. Keep node count <= node_cap; prefer mechanism/decision nodes over trivia
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 2: Extract structural spine nodes"'
- step: 3
  name: Step 3
  action: Link each node to objective IDs
  tutor_does: Link each node to objective IDs. Any unlinked node is removed when objective_link_required=true
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 3: Link each node to objective IDs"'
- step: 4
  name: Step 4
  action: Mark unknown or low-confidence nodes
