id: M-PRE-008
name: Structural Extraction
category: prime
subcategory: structure-extraction
description: Extract a compact structural spine from source material before detail work. Build high-signal nodes and link every node to at least one objective.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- prime
- structure
- orientation
- schema-priming
