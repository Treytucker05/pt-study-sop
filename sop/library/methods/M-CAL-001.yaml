id: M-CAL-001
name: Micro Precheck
category: CALIBRATE
subcategory: micro-precheck
description: Run a short scored micro-calibrate baseline (2-5 minutes) at session opening to estimate readiness before EXPLAIN.
control_stage: CALIBRATE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- calibrate
- diagnostic
- baseline
- readiness
- micro-precheck
purpose: Micro Precheck exists to run a short scored micro-baseline that estimates readiness before EXPLAIN without turning the block into instruction. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for teaching new material, extended explanation, or open-ended discussion. Use EXPLAIN when the goal is instruction and use CONSOLIDATE when the goal is artifact building.
best_fit_topics:
- single-objective readiness checks
- brief baseline probes
- confidence calibration before teaching
poor_fit_topics:
- deep teaching or explanation
- open-ended essays
- out-of-scope objectives
learner_state_required: Source material is loaded, the objective scope is known, and the learner is ready for a diagnostic attempt rather than a lesson.
inputs:
- description: Active objective targets
  required: true
- description: Calibrate item set aligned to scope
  required: true
- description: objective_scope and focus objective context
  required: true
outputs:
- name: CalibrateItemResults (per-item correctness, latency, confidence)
  description: Per-item scored log capturing answer quality, latency, and confidence for the micro baseline.
  format: structured log
- name: ReadinessSnapshot (accuracy summary)
  description: Short readiness summary of overall performance across the probe set.
  format: short summary paragraph or bullets
- name: CalibrationGapSummary (predicted vs actual gap)
  description: Short comparison between learner confidence and actual performance.
  format: short summary paragraph or bullets
- name: DominantErrorSeed (highest-frequency error class)
  description: Highest-frequency miss pattern that should shape the next routing decision.
  format: bulleted or tabular list
- name: MicroCalibrateSnapshot (opening readiness signal for TEACH routing)
  description: Opening readiness signal that helps route the learner to the next stage without drifting into teaching.
  format: short summary paragraph or bullets
artifact_schemas:
  CalibrateItemResults (per-item correctness, latency, confidence): scored_items
  ReadinessSnapshot (accuracy summary): paragraph
  CalibrationGapSummary (predicted vs actual gap): paragraph
  DominantErrorSeed (highest-frequency error class): bullet_list
  MicroCalibrateSnapshot (opening readiness signal for TEACH routing): paragraph
produces:
- CalibrateItemResults (per-item correctness, latency, confidence)
- ReadinessSnapshot (accuracy summary)
- CalibrationGapSummary (predicted vs actual gap)
- DominantErrorSeed (highest-frequency error class)
- MicroCalibrateSnapshot (opening readiness signal for TEACH routing)
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- CalibrateItemResults (per-item correctness, latency, confidence)
- ReadinessSnapshot (accuracy summary)
- CalibrationGapSummary (predicted vs actual gap)
- DominantErrorSeed (highest-frequency error class)
- MicroCalibrateSnapshot (opening readiness signal for TEACH routing)
success_criteria:
- All required outputs are present for M-CAL-001.
- The block remains diagnostic only and no teaching is introduced before the attempt.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: CalibrateItemResults (per-item correctness, latency, confidence).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Start timed calibrate block.
  action: Start timed calibrate block. Use max_duration_min hard cap.
  tutor_does: Present start timed calibrate block. use max_duration_min hard cap as a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 6
  check: Is the scope set and is the learner ready for a diagnostic attempt?
  example: 'Tutor: "Start timed calibrate block. Use max_duration_min hard cap." Learner: "Ready."'
- step: 2
  name: Deliver item_count short items
  action: Deliver item_count short items with no hints first. Attempt required for each item.
  tutor_does: Present deliver item_count short items with no hints first. attempt required for each item as a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor shows one brief probe and records answer, confidence, and latency.
- step: 3
  name: Capture correctness, latency, and
  action: Capture correctness, latency, and confidence per item. Confidence tagging required before correctness feedback.
  tutor_does: Present capture correctness, latency, and confidence per item. confidence tagging required before correctness feedback as a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor summarizes the weakest pattern and states whether the learner is ready to route onward.
- step: 4
  name: Compute quick readiness snapshot.
  action: Compute quick readiness snapshot. Summarize accuracy, calibration gap, and dominant error class.
  tutor_does: Present compute quick readiness snapshot. summarize accuracy, calibration gap, and dominant error class as a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor gives a short diagnostic prompt; learner responds with a best attempt.
constraints:
- rule: Diagnostic only; no teaching before or during the probe
  why: Calibration must measure readiness, not change the learner state by explanation.
- rule: Require one genuine attempt before hints or answer reveal
  why: The diagnostic signal is only trustworthy when the learner has to produce a response first.
- rule: Keep scope tied to the active objective set
  why: Calibration is only useful when the items match what the learner is supposed to know.
- rule: Respect item-count and time caps from the source file
  why: Short calibration blocks preserve low-friction routing and reduce fatigue.
allowed_moves:
- Run 2-5 scored items within hard 5-minute cap
- Require one best-attempt response per item before hints or answer reveal
- Capture per-item correctness, latency, and confidence
- Provide minimal hint only after failed first attempt
- Compute quick readiness snapshot (accuracy, calibration gap, dominant error class)
- Keep all items constrained to active objective scope
- Mark miss and move on if single item stalls the block
- Replace out-of-scope items with objective-linked items
- Run short scored probes inside the declared scope
- Capture answer, confidence, and latency for each item
- Provide only minimal clarification after the learner attempts an item
- Summarize readiness and route the learner to the next stage
forbidden_moves:
- Reveal full answer before learner attempt
- Provide hints before first attempt on any item
- Exceed 5-minute hard time cap
- Present items outside active objective scope
- Switch into teaching mode during calibration
- Skip confidence capture for any item
- Teach or explain content deeply (this is diagnostic only)
- Run more than 5 items (scope is 2-5)
- Teach the concept before the learner attempts the probe
- Reveal the full answer before the attempt
- Expand beyond the active objective scope
stuck_protocol: Use one simpler probe, narrow the objective scope, and keep the block diagnostic only.
failure_modes:
- mode: Learner asks for teaching before attempting
  detection: The response contains requests for explanation instead of a first attempt.
  recovery: Restate the diagnostic rule, reduce the item to one short probe, and require an attempt.
  fallback_method: M-CAL-004
- mode: Probe is too broad to score cleanly
  detection: The learner stalls, guesses, or gives a very long response with no clear target.
  recovery: Narrow the scope to one objective or one subskill and rerun the probe.
  fallback_method: M-CAL-001
- mode: The block drifts into EXPLAIN
  detection: The tutor starts explaining content or giving step-by-step instruction.
  recovery: Stop the explanation, reset to a diagnostic prompt, and summarize only the readiness signal.
  fallback_method: M-CAL-003
default_duration_min: 4
energy_cost: medium
best_stage: first_exposure
mechanisms:
- calibration
- retrieval
- metacognitive_monitoring
- formative_assessment
- diagnostic_pretesting
- readiness_signaling
evidence:
  citation: Black and Wiliam (1998); Hattie and Timperley (2007); Wisniewski, Zierer, and Hattie (2020); Soderstrom and Bjork (2023); Amos and Yao (2024); Pan, Wang, and Zhu (2024)
  finding: Micro Precheck is best supported as a short formative diagnostic that gathers usable evidence before instruction, not as a disguised mini-lesson. Black and Wiliam's foundational review supports brief classroom assessments that surface current understanding so teaching can be adjusted in real time. Hattie and Timperley plus the later feedback meta-analysis show that the value of a check depends on whether it yields actionable information about the gap between current and desired performance, rather than vague praise or extra exposition. Recent classroom pretesting work shows that short low-stakes pretests at the start of lectures can improve later learning and help students notice what to study, while recent classroom and meta-analytic formative-assessment studies support concise questioning and other brief checks when they produce interpretable readiness signals that can guide the next instructional move.
  source: https://doi.org/10.1080/0969595980050102; https://doi.org/10.3102/003465430298487; https://doi.org/10.3389/fpsyg.2019.03087; https://doi.org/10.1007/s10648-023-09805-6; https://doi.org/10.1080/13803611.2024.2363831; https://www.nature.com/articles/s41599-024-04086-y
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest precheck. Use 2 short items, terse score bullets, a one-line readiness call, and only the single dominant error seed.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full micro-diagnostic. Use 4-5 items, keep the per-item log explicit, and give a fuller calibration-gap readout before routing.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh check for already-seen material. Use 2-3 items, compress the narrative summaries, and render the result as a compact score table plus one route decision.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied readiness check. Use brief cue-based or mini-scenario probes, show route-relevant misses in a decision table, and emphasize whether the learner is ready for the next applied step.
related_methods:
- id: M-CAL-002
  relationship: Escalate to fuller probes when the micro baseline is too coarse
- id: M-CAL-004
  relationship: Use a story-level confidence check when item-level probing is too much
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - 'If I''m stuck: do NOT repeat the same explanation. Pick exactly one recovery move (simpler ladder, format switch, side-by-side contrast, tiny clinical case).'
  replaces_with:
  - Score each item objectively. After the learner's first attempt, reveal the correct answer immediately so it can be scored. No hints at any point — hints invalidate the diagnostic signal.
  - If learner is stuck, mark the item as a miss and move on. Do not switch representation, do not teach, do not give a clinical case. Stuck = data, not a recovery cue.
  reason: CALIBRATE methods require objective scoring with no teaching or hints during the diagnostic window. Progressive hints and CI-style stuck-recovery moves both contaminate the readiness signal this method is designed to capture.
facilitation_prompt: |
  You are running M-CAL-001 (Micro Precheck) in the CALIBRATE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: CalibrateItemResults, ReadinessSnapshot, CalibrationGapSummary, DominantErrorSeed, and MicroCalibrateSnapshot.
  Run a short scored readiness check before EXPLAIN. Keep it diagnostic only, require one real attempt before any answer reveal, capture confidence before feedback, and stop at the item or time cap.
  Preset behavior:
  - exam_cram: one-shot; 2 items; terse score bullets; one-line readiness call.
  - deep_mastery: interactive; 4-5 items; explicit per-item log; fuller calibration-gap summary before routing.
  - quick_review: one-shot refresh; 2-3 items; compact score table plus one route decision.
  - clinical_bridge: stepwise; use brief applied probes or mini-scenarios and summarize misses in a route-focused decision table.
  If no preset is specified, use the default knobs. One-shot returns the full diagnostic artifact in one bounded reply; interactive or stepwise mode moves probe -> scoring -> snapshot and waits.
validation:
  test_cases:
  - topic: single-objective readiness checks
    expected_outputs:
    - CalibrateItemResults (per-item correctness, latency, confidence)
    - ReadinessSnapshot (accuracy summary)
    - CalibrationGapSummary (predicted vs actual gap)
    pass_criteria:
    - All required outputs for M-CAL-001 are present.
    - The response stays inside the correct stage rules.
  - topic: brief baseline probes
    expected_outputs:
    - CalibrationGapSummary (predicted vs actual gap)
    - DominantErrorSeed (highest-frequency error class)
    - MicroCalibrateSnapshot (opening readiness signal for TEACH routing)
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - If the learner wants teaching during a diagnostic block, the tutor may need to restate the no-teach rule and narrow the probe scope.
