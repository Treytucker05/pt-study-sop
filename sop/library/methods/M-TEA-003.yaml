id: M-TEA-003
name: Clinical Anchor Mini-Case
category: encode
description: Use one tiny patient scene to show why the concept matters clinically without turning the block into a full case drill.
default_duration_min: 5
energy_cost: medium
best_stage: first_exposure
control_stage: TEACH
status: draft
tags:
- teach
- clinical
- anchor
- relevance
- case
mechanisms:
- elaboration
- transfer
- scaffolding
stipulations:
- The case is an anchor, not an assessment.
- Keep the clinical scene small enough that it supports the concept instead of replacing it.
knobs:
  output_format: bullets
constraints:
  non_assessment: true
  no_scored_checks: true
  objective_scope_required: true
inputs:
- Target concept
- One clinically relevant consequence or decision point
- Source anchors for the concept
steps:
- step: 1
  action: State the concept in plain language
  notes: What matters clinically and why?
- step: 2
  action: Give one tiny patient scene
  notes: Use only enough detail to make the concept matter.
- step: 3
  action: Tie the scene back to the concept
  notes: Explain why the concept changes what you notice or do.
- step: 4
  action: Name one boundary on overgeneralizing
  notes: Keep the case from turning into a universal rule.
outputs:
- Mini-case scene
- Concept-to-case link
- Clinical significance statement
- Overgeneralization boundary
stop_criteria:
- One mini-case is presented
- Concept relevance is explicit
- One boundary is named
failure_modes:
- mode: Case is too big and becomes a full reasoning drill
  mitigation: Shrink the scene to one decision point.
- mode: Case feels detached from the concept
  mitigation: Restate exactly why this concept matters in the scene.
evidence:
  citation: Schmidt and Rikers (2007)
  finding: Clinically anchored explanation supports later script formation and transfer
  source: control-plane migration
evidence_raw: Schmidt and Rikers (2007); clinically anchored explanation supports later script formation and transfer
facilitation_prompt: 'You are running M-TEA-003 (Clinical Anchor Mini-Case) in TEACH stage.

  This method is non-assessment. Use one tiny patient scene as an anchor, not as a drill.

  Return exactly:

  1) MiniCase

  2) ConceptLink

  3) ClinicalSignificance

  4) BoundaryNote

  Keep the case small and return to the core concept before stopping.

  '
gating_rules:
- Keep the case bounded to one concept and one clinical consequence.
- Return to the concept explicitly after the scene.
- Name one overgeneralization boundary.
artifact_type: notes
allowed_moves:
- Use one short patient vignette to make the concept matter
- Explain why the concept changes what is noticed or done
- Name one limit to the case takeaway
- Keep the anchor clinically realistic but compact
forbidden_moves:
- Turn the case into a full scored reasoning exercise
- Add broad management detail unrelated to the concept
- Let the case replace the concept explanation
- Skip the overgeneralization boundary
required_outputs:
- Mini-case scene
- Concept-to-case link
- Clinical significance statement
- Overgeneralization boundary
