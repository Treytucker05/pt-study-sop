id: M-TEA-003
name: Clinical Anchor Mini-Case
category: EXPLAIN
subcategory: clinical-anchor-mini-case
description: Use one tiny example scene to show why the concept matters practically without turning the block into a full case drill.
control_stage: EXPLAIN
status: draft
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- explain
- clinical
- anchor
- relevance
- case
- mini-case
- applied
- explanation
purpose: Use one tiny example scene to show why the concept matters practically without turning the block into a full case drill. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use an ORIENT method when the learner first needs orientation or objective framing.
best_fit_topics:
- Clinical or applied concepts that become clearer in scenario form
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material is loaded and the learner is ready for a bounded teaching pass, not a full assessment.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: Mini-case scene
  description: Short clinical scenario that anchors the target concept.
  format: short vignette plus takeaways
- name: Concept-to-case link
  description: Learner-facing teaching artifact for clinical anchor mini-case.
  format: short vignette plus takeaways
- name: Clinical significance statement
  description: Learner-facing teaching artifact for clinical anchor mini-case.
  format: bulleted artifact
- name: Overgeneralization boundary
  description: Learner-facing teaching artifact for clinical anchor mini-case.
  format: bulleted artifact
artifact_schemas:
  Mini-case scene: paragraph
  Concept-to-case link: paragraph
  Clinical significance statement: bullet_list
  Overgeneralization boundary: bullet_list
produces:
- Mini-case scene
- Concept-to-case link
- Clinical significance statement
- Overgeneralization boundary
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Mini-case scene
- Concept-to-case link
- Clinical significance statement
success_criteria:
- The learner-facing explanation artifact is faithful to Clinical Anchor Mini-Case and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- Mini-case scene is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Opening Step
  action: State the concept in plain language
  tutor_does: State the concept in plain language. What matters practically and why?
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Opening Step: State the concept in plain language"'
- step: 2
  name: Step 2
  action: Give one tiny example scene
  tutor_does: Give one tiny example scene. Use only enough detail to make the concept matter
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Step 2: Give one tiny example scene"'
- step: 3
  name: Step 3
  action: Tie the scene back to the concept
  tutor_does: Tie the scene back to the concept. Explain why the concept changes what you notice or do
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Step 3: Tie the scene back to the concept"'
- step: 4
  name: Step 4
  action: Name one boundary on overgeneralizing
  tutor_does: Name one boundary on overgeneralizing. Keep the case from turning into a universal rule
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: What part feels clearest, and what part still needs one more example?
  example: 'Example: "Step 4: Name one boundary on overgeneralizing"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: EXPLAIN methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Use one short patient vignette to make the concept matter
- Explain why the concept changes what is noticed or done
- Name one limit to the case takeaway
- Keep the anchor practically realistic but compact
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
- Translate back to the canonical terms or mechanism at the end
forbidden_moves:
- Turn the case into a full scored reasoning exercise
- Add broad management detail unrelated to the concept
- Let the case replace the concept explanation
- Skip the overgeneralization boundary
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For EXPLAIN, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: Case is too big and becomes a full reasoning drill
  detection: The case becomes a lecture and stops pointing to the clinical anchor.
  recovery: Shrink the scene to one decision point.
  fallback_method: M-TEA-001
- mode: Case feels detached from the concept
  detection: The case becomes a lecture and stops pointing to the clinical anchor.
  recovery: Restate exactly why this concept matters in the scene.
  fallback_method: M-TEA-001
default_duration_min: 5
energy_cost: medium
best_stage: first_exposure
mechanisms:
- guided_elaboration
- near_transfer_preparation
- scaffolding
- contextualization
- relevance_signaling
evidence:
  citation: The Cognition and Technology Group at Vanderbilt (1990); Thistlethwaite, Davies, Ekeocha, Kidd, Macdougall, Matthews, Purkis, and Clay (2012); Moghadami, Amini, Moghadami, Dalal, and Charlin (2021); Xu, Ang, Soh, and Ponnamperuma (2021); Wark, Drovandi, McGee, Alele, Mwangi, and Malau-Aduli (2025)
  finding: >-
    Clinical Anchor Mini-Case is best supported as a bounded explanatory
    anchor, not as a stand-alone case drill. Anchored-instruction theory
    supports using a realistic but compact scene to make knowledge usable in
    context, while case-based-learning reviews show that cases are helpful for
    relevance and engagement but have heterogeneous outcome evidence when
    treated as a broad pedagogy. Stronger direct support comes from
    clinical-reasoning studies: illness-script and other structured reasoning
    interventions improve diagnostic reasoning when learners compare salient
    case cues against organized conceptual structure instead of just hearing a
    story. The practical implication for this method is to keep the scene
    sparse, make the cue-to-concept link explicit, and end with one limit on
    overgeneralizing rather than inflating the vignette into full case-based
    reasoning.
  source: https://doi.org/10.3102/0013189X019006002; https://doi.org/10.3109/0142159X.2012.680939; https://doi.org/10.1186/s12909-021-02522-0; https://doi.org/10.1007/s11606-021-06916-0; https://doi.org/10.5334/pme.1986
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest usable anchor; keep the scene to a few lines, make the link and significance one-liners, and end with a terse boundary built for last-minute review.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fuller anchored explanation; keep the same four outputs, add a brief cue-to-concept-to-action chain, and pause once after the scene so the learner can confirm what the anchor is doing before the tie-back.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Refresh version for already-seen material; compress the scene to a cue sketch and spend most of the space on the concept-to-case link and the overgeneralization boundary.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied cue-table version; render the anchor with finding, implication, action, and limit language so the case supports fast real-world discrimination without becoming a full workup.
related_methods:
- id: M-TEA-001
  relationship: Use if a story bridge is more useful than a case
- id: M-TEA-008
  relationship: Use if the learner needs fading support after the case
facilitation_prompt: |
  You are running M-TEA-003 (Clinical Anchor Mini-Case) in the EXPLAIN stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Mini-case scene, Concept-to-case link, Clinical significance statement, and Overgeneralization boundary.
  Teach one bounded concept with one compact clinically relevant scene. State the concept plainly, show one tiny case, tie the scene back to what the concept changes in noticing or action, and end with one boundary on overgeneralizing.
  Preset behavior:
  - exam_cram: one-shot; 2-3 sentence scene; one-line link, significance, and boundary.
  - deep_mastery: interactive; labeled sections; add one brief cue-to-concept-to-action line and pause after the scene before the tie-back.
  - quick_review: one-shot refresh; compress the scene to a cue sketch and focus on the link plus the boundary.
  - clinical_bridge: stepwise; use a compact cue table with finding, implication, action, and limit language.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves scene -> tie-back -> boundary and waits.
validation:
  test_cases:
  - topic: Single concept explanation for Clinical Anchor Mini-Case
    expected_outputs:
    - Mini-case scene
    - Concept-to-case link
    - Clinical significance statement
    - Overgeneralization boundary
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Clinical Anchor Mini-Case.
    - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  - topic: A slightly harder variant with one confusable or clinical wrinkle
    expected_outputs:
    - Mini-case scene
    - Concept-to-case link
    - Clinical significance statement
    - Overgeneralization boundary
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Clinical Anchor Mini-Case.
    - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  acceptance_criteria:
  - Required outputs appear and the main learner-facing artifact is faithful to Clinical Anchor Mini-Case.
  - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  known_issues:
  - Some prompts may over-run the time budget if the source material is very dense.
  - Without a clear topic boundary, the method can broaden instead of teaching one useful chunk.
