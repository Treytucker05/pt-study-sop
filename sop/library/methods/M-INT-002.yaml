  \ result before moving on.\n   Example: Example: Physical exam findings, lab tests, imaging\n   Check:\
  \ Has the learner attempted retrieval or application before any corrective help?\n   Then STOP and wait\
  \ for the learner.\n4. Ask\n   Tutor does: Guide the learner to Ask: How would you intervene?. Keep\
  \ in mind: Treatment, precautions, patient education\n   Learner does: Attempts retrieval, application,\
  \ or comparison from memory before asking for support.\n   Example: Example: Treatment, precautions,\
