id: M-OVR-002
name: Anki Card Draft
category: overlearn
subcategory: cards
description: Draft 3-5 Anki cards for the session's key concepts. Use cloze or basic format. Brain syncs to Anki.
control_stage: OVERLEARN
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- anki
- spaced-repetition
- artifacts
purpose: Anki Card Draft exists to run a small Anki drafting pass that turns session concepts into reviewable cloze or basic
  cards. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for initial teaching, discovery, or broad remediation. Use TEACH or REFERENCE first if understanding
  is not already present.
best_fit_topics:
- card drafting
- cloze/basic item writing
- review deck preparation
poor_fit_topics:
- research-heavy synthesis
- large deck engineering
- new topic teaching
learner_state_required: The learner already understands the core material well enough to draft cards without turning them
  into a teaching session.
inputs:
- description: Session notes and key concepts
  required: true
- description: Anki card template (cloze or basic)
  required: true
- description: Card draft staging area (Brain or text file)
  required: true
- description: Target deck name
  required: true
outputs:
- name: 3-5 drafted Anki cards in canonical CARD block format
