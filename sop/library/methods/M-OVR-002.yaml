id: M-OVR-002
name: Anki Card Draft
category: OVERLEARN
subcategory: anki-card-draft
description: Draft 3-5 Anki cards for the session's key concepts. Use cloze or basic format. Brain syncs to Anki.
control_stage: OVERLEARN
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- overlearn
- anki
- spaced-repetition
- flashcards
- retrieval
- card-design
- artifacts
purpose: Anki Card Draft exists to run a small Anki drafting pass that turns session concepts into reviewable cloze or basic cards. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for initial teaching, discovery, or broad remediation. Use EXPLAIN or CONSOLIDATE first if understanding is not already present.
best_fit_topics:
- card drafting
- cloze/basic item writing
- review deck preparation
poor_fit_topics:
- research-heavy synthesis
- large deck engineering
- new topic teaching
learner_state_required: The learner already understands the core material well enough to draft cards without turning them into a teaching session.
inputs:
- description: Session notes and key concepts
  required: true
- description: Anki card template (cloze or basic)
  required: true
- description: Card draft staging area (Brain or text file)
  required: true
- description: Target deck name
  required: true
outputs:
- name: 3-5 drafted Anki cards in canonical CARD block format
  description: A draft card set for later Anki import or refinement.
  format: formatted study artifact
- name: Each card tagged by topic and source
  description: Tag-clean card metadata for filtering, source tracing, and later study organization.
  format: formatted study artifact
- name: Cards staged in Brain for Anki sync
  description: Staged card artifact ready for later sync into Anki.
  format: formatted study artifact
- name: Card count logged to session record
  description: Short log showing the final number of drafted cards for the session.
  format: structured log
artifact_schemas:
  3-5 drafted Anki cards in canonical CARD block format: ordered_steps
  Each card tagged by topic and source: ordered_steps
  Cards staged in Brain for Anki sync: ordered_steps
  Card count logged to session record: scored_items
produces:
- 3-5 drafted Anki cards in canonical CARD block format
- Each card tagged by topic and source
- Cards staged in Brain for Anki sync
- Card count logged to session record
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- 3-5 drafted Anki cards in canonical CARD block format
- Each card tagged by topic and source
- Cards staged in Brain for Anki sync
- Card count logged to session record
success_criteria:
- All required outputs are present for M-OVR-002.
- The rep set stays brief, fluent, and below the fatigue threshold.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: 3-5 drafted Anki cards in canonical CARD block format.'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Review Session Notes
  action: Review session notes and identify 3-5 highest-value concepts. Prioritize weak anchors, new vocabulary, and easily confused items.
  tutor_does: Review the session and select 3-5 concepts worth locking in. Keep the list small, source-grounded, and high value.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is the learner already stable enough for fluency reps?
  example: 'Tutor: "Keep this to a short, fluent rep set." Learner: "Understood."'
- step: 2
  name: Choose Card Format
  action: Choose card format for each concept (cloze vs. basic Q&A). Cloze for vocabulary or facts; Basic for why questions and processes.
  tutor_does: Choose the format that gives the cleanest retrieval prompt for each concept. Keep the front simple and the answer recoverable.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor asks for the next short answer and keeps the pace brisk.
- step: 3
  name: Draft Card Fronts
  action: Draft the front of each card (question or cloze deletion). One fact per card — no double-barreled cards.
  tutor_does: Draft clear fronts that test one retrievable target at a time. Split overloaded cards before moving on.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is the artifact ready to save or reuse later?
  example: Tutor identifies one weak spot and asks for one more clean repetition.
- step: 4
  name: Draft Card Backs
  action: Draft the back of each card (answer). Keep answers concise — elaboration goes in the Extra field.
  tutor_does: Draft concise answers that preserve clean recall. Keep explanations secondary to the retrievable target.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is the artifact ready to save or reuse later?
  example: Tutor closes the rep set and records the final level of fluency.
- step: 5
  name: Add Context Tags
  action: Add context tags (topic, source, date). Tags enable filtered study and tracking.
  tutor_does: Add topic, source, and date tags so the card set remains traceable and reusable later.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor closes the rep set and records the final level of fluency.
- step: 6
  name: Stage Cards For Sync
  action: Stage cards for sync to Anki via Brain. Brain's Anki integration handles the actual sync.
  tutor_does: Stage the completed cards so they can be synced later without reformatting.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor closes the rep set and records the final level of fluency.
- step: 7
  name: Final Format Check
  action: Final format check before submit. Verify output contains only CARD blocks and exact label lines.
  tutor_does: Run a final format and atomicity check. Clean up any card that is overloaded, vague, or off-spec before submit.
  learner_does: Replies quickly and accurately, keeps answers compact, and stops when the cap is reached.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor closes the rep set and records the final level of fluency.
constraints:
- rule: Understanding must already exist before fluency reps begin
  why: Overlearning hardens what is already known; it does not teach from scratch.
- rule: Keep reps short and bounded to avoid fatigue loops
  why: Excess repetition lowers accuracy and wastes the fluency window.
- rule: Stop when the cap is reached or accuracy starts to sag
  why: The point is durable fluency, not endless repetition.
- rule: Do not introduce new material during the rep set
  why: New content belongs in EXPLAIN or CONSOLIDATE, not OVERLEARN.
allowed_moves:
- Guide learner to identify 3-5 highest-value concepts from session
- Help choose card format per concept (cloze for facts or vocabulary, basic for why or process)
- Enforce single-fact-per-card rule
- Require exact label format (CARD N, Type, Front, Back, Tags)
- Add context tags (topic, source, date) to each card
- Split double-barreled cards into separate cards
- Simplify overly complex cards if the answer takes too long to recall
- Stage cards for Anki sync via Brain
- Run short fluent reps on already-understood material
- Tighten wording and reduce hesitation across repetitions
- Stop when accuracy falls or the cap is reached
- Convert the stable material into an artifact for later review
forbidden_moves:
- Accept double-barreled cards (multiple facts per card)
- Accept cards for material not yet understood (cards are for retention, not learning)
- Output anything other than canonical CARD blocks (no prose, no markdown tables, no JSON)
- Accept fewer than 3 cards
- Accept more than 5 cards
- Skip Type, Front, Back, or Tags labels on any card
- Create cards with essay-length answers
- Teach or explain new content during card drafting
- Skip the final format check before submit
- Introduce brand-new content
- Push through fatigue after the cap
- Let the session drift into broad teaching
stuck_protocol: Shorten the rep, narrow the item, and stop before fatigue changes the quality of the response.
failure_modes:
- mode: The session turns into new teaching
  detection: The tutor starts adding unfamiliar content or long explanations.
  recovery: Cut back to the known material and keep the rep set bounded.
  fallback_method: M-REF-003
- mode: Fluency collapses from fatigue
  detection: Latency rises and errors accumulate across repeated reps.
  recovery: Stop the set early, capture the weak item, and defer another rep to later.
  fallback_method: M-RET-003
- mode: The output becomes bloated
  detection: Responses become long, unfocused, or repetitive.
  recovery: Require shorter answers and a tighter format, then continue.
  fallback_method: M-OVR-002
default_duration_min: 5
energy_cost: low
best_stage: consolidation
mechanisms:
- distributed_practice
- retrieval_practice
- generative_encoding
- self_testing
- cue_design
- knowledge_organization
evidence:
  citation: Cepeda, Pashler, Vul, Wixted, and Rohrer (2006); Rohrer and Pashler (2007); Schmidmaier, Ebersbach, Schiller, Hege, Holzer, and Fischer (2011); Lin, McDaniel, and Miyatsu (2018); Pan, Zung, Imundo, Zhang, and Qiu (2023); Wothe, Wanberg, Hohle, Sakher, Bosacker, Khan, Olson, and Satin (2023); Gilbert, Frommeyer, Brittain, Stewart, Turner, Stolfi, and Parmelee (2023)
  finding: >-
    Anki Card Draft is best supported as a small retrieval-heavy, spaced-review
    artifact for already-understood material, not as a substitute for
    first-pass teaching. Foundational spacing work by Cepeda and colleagues and
    applied guidance from Rohrer and Pashler support distributing review over
    time rather than cramming. Electronic flashcard studies support retesting
    over restudying and suggest that flashcards work best when they demand
    actual retrieval. Card-design studies add two important refinements:
    learner-generated flashcards outperform premade ones on delayed tests, and
    conceptual or less detail-saturated flashcards can outperform overly
    specific cards for some learners and materials. Recent curriculum-based
    studies of Anki use in medical education show positive but not universal
    associations with performance, which supports Anki as a strong optional
    review tool rather than a guaranteed advantage. The practical implication
    for this method is to draft a small number of source-grounded cards, keep
    each card clean and atomic enough for stable recall, favor learner-
    generated prompts, and rely on later spaced review for the real retention
    payoff.
  source: https://doi.org/10.1037/0033-2909.132.3.354; https://doi.org/10.1111/j.1467-8721.2007.00500.x; https://doi.org/10.1111/j.1365-2923.2011.04043.x; https://doi.org/10.1016/j.jarmac.2018.05.003; https://doi.org/10.1037/mac0000083; https://doi.org/10.1177/23821205231173289; https://doi.org/10.1007/s40670-023-01826-8
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest card pass. Draft 3 ultra-lean, high-yield cards, usually cloze-heavy, with minimal commentary and no extra explanatory text beyond what the card needs.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest card pass. Draft 5 cards with a deliberate mix of cloze and basic formats, include a short concept-selection section and an explicit atomicity or quality check before the final clean CARD blocks.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass for already-seen material. Draft 3-4 highest-yield cards, summarize concept-to-format choices in a compact table, then print the final CARD blocks with minimal narrative.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied pass. Favor cue-to-action, discriminator, or mechanism cards over bare definition cards, prefer basic Q&A when action or consequence matters, and organize the draft as an applied review matrix before final CARD blocks.
related_methods:
- id: M-REF-003
  relationship: Anki cards should be grounded in a compact reference anchor
- id: M-RET-003
  relationship: Cloze retrieval is a natural test of drafted cards
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - Highly interactive. One teaching chunk (8-12 lines max), one check, one question at a time.
  replaces_with:
  - Output canonical CARD blocks directly. No hint-and-attempt cycle on cards being drafted. The card is both prompt and answer, so render both sides together.
  - Render complete cards during the draft step. Step gating still applies between concept selection, format choice, card drafting, and final review.
  reason: Anki Card Draft writes prompt-and-answer pairs as the artifact. Hint gating and tiny teaching chunks distort the card-writing workflow.
facilitation_prompt: |
  You are running M-OVR-002 (Anki Card Draft) in the OVERLEARN stage.
  Use only the loaded source and learner context. Ask only for missing required inputs.
  Produce: drafted Anki cards, card tags, staged cards, and card count log.
  Draft 3-5 review-ready cards from already-understood material. Keep cards source-grounded, atomic, and format-clean; use cloze for tight facts and vocabulary, basic Q&A for why, mechanism, or process; output final cards only as canonical CARD blocks with Type, Front, Back, and Tags lines; do not drift into new teaching.
  Preset behavior:
  - exam_cram: one-shot; 3 ultra-lean cards; mostly cloze or direct fact locks; minimal commentary.
  - deep_mastery: interactive; 5 cards; mixed cloze and basic; include a brief atomicity check before finalizing.
  - quick_review: one-shot refresh; 3-4 highest-yield cards; compact concept-to-format table, then final CARD blocks.
  - clinical_bridge: stepwise; 3-5 applied cue-to-action or discriminator cards; favor basic over cloze when action or consequence matters.
  If no preset is specified, use the default knobs. One-shot returns the full card artifact in one bounded reply; interactive or stepwise mode moves concept selection -> format choice -> card draft -> final check and waits.
validation:
  test_cases:
  - topic: card drafting
    expected_outputs:
    - 3-5 drafted Anki cards in canonical CARD block format
    - Each card tagged by topic and source
    - Cards staged in Brain for Anki sync
    pass_criteria:
    - All required outputs for M-OVR-002 are present.
    - The response stays inside the correct stage rules.
  - topic: cloze/basic item writing
    expected_outputs:
    - Each card tagged by topic and source
    - Cards staged in Brain for Anki sync
    - Card count logged to session record
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Some card-authoring rules, such as the exact 3-5 card cap or strict one-fact-per-card enforcement, remain workflow heuristics rather than directly validated experimental thresholds.
