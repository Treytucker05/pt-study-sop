id: M-REF-001
name: Error Autopsy
category: reference
subcategory: autopsy
description: 'Review errors from retrieval practice. For each error: (1) What did I say? (2) What''s correct? (3) Why did
  I confuse them? (4) What cue will prevent this next time? Metacognitive error analysis.'
control_stage: REFERENCE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- error-analysis
- metacognition
- correction
- evidence-based
purpose: Error Autopsy exists to run a structured error autopsy that turns retrieval misses into durable prevention cues and
  artifact-ready notes. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for quizzing the learner or introducing new material. Use RETRIEVE when the goal is memory testing and
  TEACH when the goal is explanation.
best_fit_topics:
- retrieval misses
- wrong-answer analysis
- prevention cue building
poor_fit_topics:
- pure lecture mode
- testing without artifact creation
- vague self-critique
learner_state_required: Recent misses or objectives are available, the source is loaded, and the goal is artifact creation
  rather than assessment.
inputs:
- description: List of errors from recent retrieval practice
  required: true
- description: Correct answers for each error
  required: true
- description: Reference materials for deep understanding
  required: true
- description: Error autopsy template (4-column format)
  required: true
outputs:
- name: Completed error autopsy table (all 4 columns for every error)
  description: Four-column analysis of what was said, what is correct, why the confusion happened, and what cue prevents recurrence.
  format: structured table
- name: Root cause analysis for each error (Column 3 filled with specific conceptual confusion)
  description: A reusable reference artifact that supports later retrieval for a structured error autopsy that turns retrieval
    misses into durable prevention cues and artifact-ready notes.
  format: structured response
- name: Discrimination cues created (Column 4 with actionable prevention strategy)
  description: A reusable reference artifact that supports later retrieval for a structured error autopsy that turns retrieval
    misses into durable prevention cues and artifact-ready notes.
  format: structured response
- name: Anki card candidates identified from high-value errors
  description: A draft card set for later Anki import or refinement.
  format: formatted study artifact
required_outputs:
- Completed error autopsy table (all 4 columns for every error)
- Root cause analysis for each error (Column 3 filled with specific conceptual confusion)
- Discrimination cues created (Column 4 with actionable prevention strategy)
- Anki card candidates identified from high-value errors
