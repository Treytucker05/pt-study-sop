id: M-REF-001
name: Error Autopsy
category: REFERENCE
subcategory: error-autopsy
description: >-
  Review recent retrieval misses in a four-column autopsy: what I said, what
  is correct, why I confused it, and what cue will prevent the error next
  time.
control_stage: REFERENCE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- reference
- error-analysis
- metacognition
- correction
- prevention-cues
- feedback
purpose: Error Autopsy exists to run a structured error autopsy that turns retrieval misses into durable prevention cues and artifact-ready notes. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for quizzing the learner or introducing new material. Use RETRIEVE when the goal is memory testing and TEACH when the goal is explanation.
best_fit_topics:
- retrieval misses
- wrong-answer analysis
- prevention cue building
poor_fit_topics:
- pure lecture mode
- testing without artifact creation
- vague self-critique
learner_state_required: Recent misses or objectives are available, the source is loaded, and the goal is artifact creation rather than assessment.
inputs:
- description: List of errors from recent retrieval practice
  required: true
- description: Correct answers for each error
  required: true
- description: Reference materials for deep understanding
  required: true
- description: Error autopsy template (4-column format)
  required: true
outputs:
- name: Completed error autopsy table (all 4 columns for every error)
  description: Four-column analysis of what was said, what is correct, why the confusion happened, and what cue prevents recurrence.
  format: structured table
- name: Root cause analysis for each error (Column 3 filled with specific conceptual confusion)
  description: Specific explanation of the misconception, interference pattern, or reasoning failure behind each miss.
  format: structured response
- name: Discrimination cues created (Column 4 with actionable prevention strategy)
  description: Specific prevention cues that can be reused in later retrieval or review.
  format: structured response
- name: Anki card candidates identified from high-value errors
  description: Draft card candidates generated from the most reusable or exam-relevant autopsies.
  format: formatted study artifact
artifact_schemas:
  Completed error autopsy table (all 4 columns for every error): table
  Root cause analysis for each error (Column 3 filled with specific conceptual confusion): scored_items
  Discrimination cues created (Column 4 with actionable prevention strategy): scored_items
  Anki card candidates identified from high-value errors: ordered_steps
produces:
- Completed error autopsy table (all 4 columns for every error)
- Root cause analysis for each error (Column 3 filled with specific conceptual confusion)
- Discrimination cues created (Column 4 with actionable prevention strategy)
- Anki card candidates identified from high-value errors
requires:
- artifact: Gap list (missing items identified)
  optional: false
  alternatives:
  - Accuracy assessment (correct vs incorrect items)
  - CalibrationGapSummary (predicted vs actual gap)
required_outputs:
- Completed error autopsy table (all 4 columns for every error)
- Root cause analysis for each error (Column 3 filled with specific conceptual confusion)
- Discrimination cues created (Column 4 with actionable prevention strategy)
- Anki card candidates identified from high-value errors
success_criteria:
- All required outputs are present for M-REF-001.
- A reusable artifact is produced and preserved instead of a loose discussion transcript.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Completed error autopsy table (all 4 columns for every error).'
- The method stayed in the correct stage but the prevention cues or root-cause analysis remain too vague to reuse later.
steps:
- step: 1
  name: Collect the source errors
  action: Collect all errors from the recent retrieval session, including sprint quiz misses, free recall gaps, or exam review errors.
  tutor_does: Capture the full miss set in stable wording so the later table rows stay source-linked and reusable.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 8
  check: Has the source material been collected and organized for artifact building?
  example: 'Tutor: "Collect the source errors and keep them in the original wording where possible." Learner: "Ready."'
- step: 2
  name: Record the wrong answer
  action: For each error, write Column 1 as what I said, preserving the exact wrong answer without sanitizing it.
  tutor_does: Capture the learner's original response exactly enough that the later cue still matches the original confusion.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor adds a single row to the artifact and keeps the column structure consistent.
- step: 3
  name: Record the correct answer
  action: Write Column 2 as what is correct, using the accurate answer with source citation if possible.
  tutor_does: Capture the correct answer directly and source-link it so the artifact supports later review rather than another quiz loop.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is this step complete and ready to advance?
  example: Tutor writes the anchor answer in a format that can be reused later.
- step: 4
  name: Analyze the confusion
  action: Write Column 3 as why I confused them, identifying the conceptual confusion, interference, or reasoning failure.
  tutor_does: Capture the real cause of the miss and push past shallow explanations like I rushed or I guessed.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is this step complete and ready to advance?
  example: Tutor saves the artifact and asks for one final verification.
- step: 5
  name: Build the prevention cue
  action: Write Column 4 as what cue will prevent this next time, creating a discrimination cue or mnemonic that prevents recurrence.
  tutor_does: Capture a prevention cue that is specific enough to block the exact confusion from happening again.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is this step complete and ready to advance?
  example: Tutor saves the artifact and asks for one final verification.
- step: 6
  name: Convert high-value rows into cards
  action: Convert high-value autopsies into Anki cards because error-based cards are high-yield for exam prep.
  tutor_does: Capture only the most reusable or exam-relevant rows as card candidates while keeping the autopsy table as the primary artifact.
  learner_does: Supplies or confirms the source content and helps save the artifact for later retrieval.
  max_lines: 10
  check: Is the artifact ready to save or reuse later?
  example: Tutor saves the artifact and asks for one final verification.
constraints:
- rule: Artifact-first; do not turn the block into teaching or testing
  why: Reference methods exist to build later-use assets, not to run a lesson or a quiz.
- rule: Keep the structure deterministic and reusable
  why: Later retrieval depends on stable headers, rows, and cue language.
- rule: Preserve source language when it helps later recognition
  why: Exact wording can become the cue that makes retrieval possible.
- rule: Do not start retrieval drills until the reference target exists
  why: The artifact is the prerequisite for later recall work.
allowed_moves:
- Analyze errors from retrieval practice systematically
- Require root-cause analysis for each error because Column 3 is mandatory
- Push for specific discrimination cues, not vague study-more resolutions
- Challenge defensive attributions and redirect them into learning analysis
- Help the learner identify patterns across multiple errors such as recurring confusion types
- Convert high-value error analyses into Anki card candidates
- Build discrimination cues that prevent specific recurrence
- Map errors to applied clinical context where relevant
- Organize misses into a reusable artifact
- Preserve exact cues or definitions when they help later retrieval
- Create compact lists, tables, or anchors that can be reused later
- Tag content so RETRIEVE can target it later
forbidden_moves:
- Accept superficial analysis such as I was wrong without why
- Skip Column 3 because root cause is mandatory for every error
- Skip Column 4 because no closure exists without a specific prevention strategy
- Accept defensive attribution as valid analysis
- Generate the error autopsy table for the learner without their input
- Skip artifact creation because the 4-column table is the required output
- Introduce entirely new content not yet encoded
- Rush through errors without full 4-column analysis for each
- Accept vague prevention cues such as be more careful
- Turn the block into a lecture or quiz
- Hide the source relationship between notes and evidence
- Produce an artifact that cannot be reused later
stuck_protocol: Collapse to a smaller artifact, keep the same headers, and capture one row at a time.
failure_modes:
- mode: Artifact becomes a loose discussion transcript
  detection: There is no stable table, header, or reusable structure.
  recovery: Reformat into a fixed artifact template with explicit fields.
  fallback_method: M-REF-003
- mode: The learner tries to use the block as a quiz
  detection: The prompt turns into right-or-wrong testing instead of artifact building.
  recovery: Reframe as capture-and-organize, not assess-and-grade.
  fallback_method: M-REF-004
- mode: Source language gets lost
  detection: Key terms are paraphrased too aggressively and cues become fuzzy.
  recovery: Restore the original wording where it matters most and add a short note beside it.
  fallback_method: M-REF-001
default_duration_min: 5
energy_cost: medium
best_stage: exam_prep
mechanisms:
- error_correction
- metacognitive_monitoring
- elaboration
- discrimination
- corrective_feedback
- self_explanation
evidence:
  citation: Metcalfe (2017); Metcalfe, Xu, Vuorre, Siegler, Wiliam, and Bjork (2024); Zhang and Fiorella (2024); Clark, Kaw, and Guldiken (2023)
  finding: >-
    Error Autopsy is best supported as a learn-from-errors and
    corrective-feedback method, not as generic mistake review. Research on
    learning from errors shows that errors followed by corrective feedback can
    improve learning when learners actively process the mismatch between their
    response and the correct answer instead of merely seeing the answer. More
    recent classroom and problem-solving studies suggest that repeated
    reflection and scaffolded self-explaining feedback improve how students
    interpret mistakes, refine their metacognition, and transfer the
    correction to later performance. The practical implication for this method
    is to preserve the original wrong answer, record the correct answer with
    source support, force a real root-cause analysis, and end with a concrete
    prevention cue that can be reused in later retrieval.
  source: https://doi.org/10.1146/annurev-psych-010416-044022; https://doi.org/10.1111/bjep.12651; https://doi.org/10.1016/j.cedpsych.2024.102326; https://doi.org/10.1177/03064190231164719
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest autopsy pass. Build a compact 4-column table for the top 2-3 errors, use terse root-cause lines, and convert only the single highest-yield miss into a card candidate.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full autopsy pass. Keep the full 4-column table, add a short pattern summary across errors, and produce multiple card candidates from the most reusable misses.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh autopsy pass. Use one compact error table plus a short pattern list and a minimal card-candidate block.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied autopsy pass. Frame the root cause and prevention cue in terms of clinical discrimination, trigger context, and what wrong move the confusion would cause in practice.
related_methods:
- id: M-RET-001
  relationship: Retrieval misses are the source material for the autopsy
- id: M-REF-003
  relationship: Useful when autopsy findings need a compact reference anchor
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - Highly interactive. One teaching chunk (8-12 lines max), one check, one question at a time.
  replaces_with:
  - The misses are inputs from a prior RETRIEVE block. Write the correct answer directly into Column 2 with source citation. Do not re-quiz the learner.
  - Render the full structured artifact when ready. Preserve exact wrong answers and prevention cues instead of fragmenting the table into quiz-like turns.
  reason: Error Autopsy is artifact-building. Column 2 is the corrective reference, and the method loses value if the tutor turns it back into another retrieval gate.
facilitation_prompt: |
  You are running M-REF-001 (Error Autopsy) in the REFERENCE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Completed error autopsy table, Root cause analysis, Discrimination cues, and Anki card candidates.
  Turn recent misses into a 4-column autopsy that preserves the wrong answer, records the correct answer, explains the confusion, and ends with a concrete prevention cue. Keep it artifact-first and do not turn the block into a quiz or lecture.
  Preset behavior:
  - exam_cram: one-shot; compact table for the top 2-3 errors; terse cue lines; one card candidate.
  - deep_mastery: interactive; full table; cross-error pattern summary; multiple card candidates.
  - quick_review: one-shot refresh; compact table plus short pattern list.
  - clinical_bridge: stepwise; prevention cues phrased as clinical discriminators and wrong-move prevention.
  If no preset is specified, use the default knobs. One-shot returns the full autopsy artifact in one bounded reply; interactive or stepwise mode moves errors -> table -> cues -> cards and waits.
validation:
  test_cases:
  - topic: retrieval misses
    expected_outputs:
    - Completed error autopsy table (all 4 columns for every error)
    - Root cause analysis for each error (Column 3 filled with specific conceptual confusion)
    - Discrimination cues created (Column 4 with actionable prevention strategy)
    pass_criteria:
    - All required outputs for M-REF-001 are present.
    - The response stays inside the correct stage rules.
  - topic: wrong-answer analysis
    expected_outputs:
    - Root cause analysis for each error (Column 3 filled with specific conceptual confusion)
    - Discrimination cues created (Column 4 with actionable prevention strategy)
    - Anki card candidates identified from high-value errors
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Artifact building can drift into teaching unless the tutor keeps the structure explicit and source-linked.
