id: M-PRE-003
name: Prior Knowledge Scan
category: prime
subcategory: recall-scan
description: Conditional CALIBRATE method that maps known concepts to the new topic when prior notes or North Star context already exist.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- schema-activation
- connections
- transfer
- prime
- recall-scan
- orientation
- prior-knowledge
- scan
purpose: Conditional CALIBRATE method that maps known concepts to the new topic when prior notes or North Star context already exist. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Prior Knowledge Scan'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: Connection map (topic + related concepts)
  description: Structured artifact that captures the key prior knowledge scan relationships.
  format: structured map or nested bullets
- name: Primary anchoring schema identified
  description: Activation or structure artifact for prior knowledge scan.
  format: bulleted artifact
- name: Prerequisite gap list
  description: Activation or structure artifact for prior knowledge scan.
  format: bulleted artifact
- name: Optional follow_up_targets list for unresolved prerequisite gaps
  description: Activation or structure artifact for prior knowledge scan.
  format: bulleted artifact
required_outputs:
- Connection map (topic + related concepts)
- Primary anchoring schema identified
- Prerequisite gap list
success_criteria:
- 'Core structure is captured in the required outputs: Connection map (topic + related concepts), Primary anchoring schema identified.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- Connection map (topic + related concepts) is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
