constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: No Retrieval Grading
  why: The method inherits this as a hard rule from the legacy card.
allowed_moves:
- Map known concepts to the new topic via connection mapping
- Ask learner to list 3-5 related concepts they already know
- Draw arrows showing relationships between concepts (causes, part of, similar to)
- Identify the strongest connection as primary anchoring schema
- Note prerequisite gaps non-judgmentally
- Connect to previously learned material from any course
- Prompt with broader categories if no connections found
forbidden_moves:
- Score, grade, or assess connection quality
- Run on first-contact content with no prior notes or North Star context
- Teach new detailed content or explain the topic
- Reveal full answers or solutions
- Run retrieval grading or correctness checks
- Make confidence or mastery judgments
- Spend excessive time perfecting the visual map (text list is acceptable)
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: No prior context available
  detection: The output no longer matches the method’s core purpose.
  recovery: Skip M-PRE-003 and run M-PRE-010 then M-PRE-008
  fallback_method: M-PRE-010
- mode: No connections found
  detection: The output no longer matches the method’s core purpose.
  recovery: Prompt with broader categories - anatomy, physiology, pathology
  fallback_method: M-PRE-010
default_duration_min: 3
