id: M-PRE-003
name: Prior Knowledge Scan
category: PRIME
subcategory: prior-knowledge-scan
description: Map a new topic to 3-5 related concepts the learner already knows so the strongest prior schema and prerequisite gaps are visible before deeper work.
control_stage: PRIME
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- prime
- schema-activation
- connections
- transfer
- recall-scan
- orientation
- prior-knowledge
- mapping
purpose: Prior Knowledge Scan exists to surface the best existing schema for a new topic by linking it to related concepts the learner already knows. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- New or complex material that benefits from being linked to known concepts before detail
- Topics with prior notes, objective context, or an obvious structure to surface
- Material where transfer or prerequisite relationships matter more than raw recall
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
- Topics where the learner truly has no usable related concepts to connect
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: Connection map (topic + related concepts)
  description: Structured map showing the new topic, related known concepts, and labeled relationship types.
  format: structured map or nested bullets
- name: Primary anchoring schema identified
  description: Strongest known concept or schema to use as the main anchor for the new topic.
  format: bulleted or tabular list
- name: Prerequisite gap list
  description: Weak or missing prerequisite links that should be reviewed before deeper study.
  format: bulleted or tabular list
- name: Optional follow_up_targets list for unresolved prerequisite gaps
  description: Downstream targets created from unresolved weak links or missing prerequisites.
  format: bulleted or tabular list
artifact_schemas:
  Connection map (topic + related concepts): tree_map
  Primary anchoring schema identified: bullet_list
  Prerequisite gap list: bullet_list
  Optional follow_up_targets list for unresolved prerequisite gaps: bullet_list
produces:
- Connection map (topic + related concepts)
- Primary anchoring schema identified
- Prerequisite gap list
- Optional follow_up_targets list for unresolved prerequisite gaps
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Connection map (topic + related concepts)
- Primary anchoring schema identified
- Prerequisite gap list
success_criteria:
- All required outputs are present for M-PRE-003.
- The method stays non-assessive and does not score the learner.
- The final artifact shows at least one usable anchor schema plus clear prerequisite gaps for next-pass work.
partial_criteria:
- Connection map (topic + related concepts) is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
steps:
- step: 1
  name: Write the new topic at center of page
  action: Write the new topic at center of page.
  tutor_does: Write the new topic at center of page. This becomes the hub for connection mapping.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: This becomes the hub for connection mapping.'
- step: 2
  name: List 3-5 related concepts you already know
  action: List 3-5 related concepts you already know.
  tutor_does: List 3-5 related concepts you already know. These can come from this course, other courses, or general knowledge.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Which known concepts feel closest or most relevant to the new topic?
  example: 'Example: These can be from this course, other courses, or general knowledge.'
- step: 3
  name: Draw arrows showing how each relates to the new topic
  action: Draw arrows showing how each relates to the new topic.
  tutor_does: Draw arrows showing how each relates to the new topic. Label arrows with relationship types such as causes, part of, similar to, contrasts with, or supports.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Are the relationships labeled clearly enough to show why each concept belongs on the map?
  example: 'Example: Label arrows with relationship type: causes, part of, similar to.'
- step: 4
  name: Identify the strongest connection
  action: Identify the strongest connection.
  tutor_does: Identify the strongest connection. This becomes the primary anchoring schema.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Which connection is strong enough to serve as the main organizing anchor?
  example: 'Example: This becomes your primary anchoring schema.'
- step: 5
  name: Note any prerequisite gaps
  action: Note any prerequisite gaps.
  tutor_does: Note any prerequisite gaps. If a connection feels weak, flag it for review instead of forcing it.
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: If a connection feels weak, flag it for review.'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: No Retrieval Grading
  why: The method inherits this as a hard rule from the legacy card.
allowed_moves:
- Map known concepts to the new topic via connection mapping
- Ask the learner to list 3-5 related concepts they already know
- Draw arrows showing relationships between concepts such as causes, part of, similar to, or supports
- Identify the strongest connection as the primary anchoring schema
- Note prerequisite gaps non-judgmentally
- Connect to previously learned material from any course
- Prompt with broader categories if no connections are found
forbidden_moves:
- Score, grade, or assess connection quality
- Run on first-contact content with no prior notes or North Star context
- Teach new detailed content or explain the topic
- Reveal full answers or solutions
- Run retrieval grading or correctness checks
- Make confidence or mastery judgments
- Spend excessive time perfecting the visual map
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: No prior context available
  detection: The learner has no notes, anchors, or usable adjacent concepts to map.
  recovery: Skip M-PRE-003 and run M-PRE-010, then M-PRE-008.
  fallback_method: M-PRE-010
- mode: No connections found
  detection: The learner cannot generate any related concepts and the map stays empty.
  recovery: Prompt with broader categories such as anatomy, physiology, pathology, systems, or clinical tasks.
  fallback_method: M-PRE-010
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
mechanisms:
- prior_knowledge_activation
- schema_activation
- transfer
- elaboration
- scaffolding
- organization
evidence:
  citation: Dochy, Segers, and Buehl (1999); Hattan, Alexander, and Lupo (2024); van Kesteren, Krabbendam, and Meeter (2018); Brand, Loibl, and Rummel (2025a); Brand, Loibl, and Rummel (2025b)
  finding: >-
    Prior Knowledge Scan is best supported as a schema-activation and
    connection-mapping move that prepares learners to interpret new material by
    linking it to related concepts they already know. Reviews on prior
    knowledge and newer syntheses on activation show that learning improves when
    relevant existing knowledge is brought into play and organized around the
    current goal rather than left implicit. Reactivation and preparatory
    learning studies reinforce that even partial but relevant activation can
    prepare later learning, especially when the learner can identify which
    existing schema is strongest and where the prerequisite links are weak. The
    practical implication for this method is to keep the scan brief, map only a
    few high-value related concepts, label the type of relationship, choose one
    primary anchoring schema, and flag weak prerequisites for follow-up instead
    of correcting the map as if it were a graded concept test.
  source: https://doi.org/10.3102/00346543069002145; https://doi.org/10.3102/00346543221148478; https://doi.org/10.1038/s41539-018-0027-8; https://doi.org/10.1007/s11251-025-09727-6; https://doi.org/10.1007/s10648-025-10074-8
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest pass. Use 3 related concepts, one strongest anchor, and 1-2 prerequisite gaps as terse bullets.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full mapping pass. Keep separate sections for the connection map, relationship labels, primary anchoring schema, prerequisite gaps, and follow-up targets.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render the output as a compact table with known concept, relationship type, anchor strength, and gap columns.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied orientation pass. Use a clinic-facing table with known concept, why it matters clinically, relationship to the new topic, and missing prerequisite columns.
related_methods:
- id: M-PRE-001
  relationship: Follow with a quick recall dump
- id: M-PRE-014
  relationship: Use when the main goal is to find blind spots
system_prompt_override:
  relaxes:
  - Highly interactive. One small teaching chunk, one short check, or one question at a time.
  - Ask only one question at a time.
  - Do not do more than one step at a time.
  - Within TEACH, deliver ONE chunk at a time, check in, then continue.
  replaces_with:
  - Use the scan to expose connections and weak prerequisites only. Do not correct the map as right or wrong and do not teach the new topic while drawing it.
  - Keep the artifact compact. A rough text map is enough if the relationships and primary anchor are visible.
  reason: Prior Knowledge Scan is a short PRIME mapping pass. If the tutor starts correcting or expanding content, the scan stops being an orientation tool.
facilitation_prompt: |
  You are running M-PRE-003 (Prior Knowledge Scan) in the PRIME stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Connection map, Primary anchoring schema identified, Prerequisite gap list, and optional follow_up_targets.
  Put the new topic at the center, list 3-5 related concepts the learner already knows, label how each one connects to the new topic, choose the strongest anchor schema, and flag weak prerequisite links for follow-up. Keep it orientation-only, non-assessive, and source-grounded; do not correct the map as if it were a graded concept check and do not teach the new topic while scanning.
  Preset behavior:
  - exam_cram: one-shot; 3 related concepts, one strongest anchor, and 1-2 gaps as terse bullets.
  - deep_mastery: interactive; labeled sections for connection map, relationship labels, anchor schema, gaps, and follow-up targets.
  - quick_review: one-shot refresh; compact known-concept / relationship / anchor-strength / gap table.
  - clinical_bridge: stepwise; clinic-facing known-concept / relevance / relationship / missing-prerequisite table.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves topic hub -> related concepts -> relationship labels -> strongest anchor -> gap flags and waits.
validation:
  test_cases:
  - topic: First pass on Prior Knowledge Scan with prior notes present
    expected_outputs:
    - Connection map (topic + related concepts)
    - Primary anchoring schema identified
    - Prerequisite gap list
    - Optional follow_up_targets list for unresolved prerequisite gaps
    pass_criteria:
    - All required outputs are present.
    - The output identifies what is connected, what is weak, and what to do next.
    - No scoring or grading language appears.
  - topic: Dense review topic where the learner needs orientation before detail
    expected_outputs:
    - Connection map (topic + related concepts)
    - Primary anchoring schema identified
    - Prerequisite gap list
    - Optional follow_up_targets list for unresolved prerequisite gaps
    pass_criteria:
    - All required outputs are present.
    - The map stays brief and orienting rather than turning into topic explanation.
    - No scored probe, quiz behavior, or grading language appears in the response.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs sometimes over-explain instead of staying at orientation level.
  - If objective context is weak, the method can drift unless the prompt locks scope early.
