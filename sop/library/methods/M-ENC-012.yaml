id: M-ENC-012
name: Clinical Decision Tree
category: encode
description: 'Build a branching decision diagram: presentation → key findings → differential → tests → diagnosis. Scaffolds
  clinical reasoning into explicit decision points.'
default_duration_min: 10
energy_cost: high
best_stage: exam_prep
control_stage: ENCODE
status: validated
tags:
- visual
- mermaid
- clinical-reasoning
- decision-tree
- differential
mechanisms:
- elaboration
- discrimination
- transfer
knobs:
  guidance_level: medium
  output_format: bullets
constraints:
  active_processing_required: true
  objective_scope_required: true
  no_final_answer_only: true
inputs:
- Clinical presentation or chief complaint
- Differential diagnosis list
- Source material with diagnostic criteria
steps:
- step: 1
  action: Start with the chief complaint at top
  notes: 'Example: ''Chest Pain'''
- step: 2
  action: Branch by key discriminating questions
  notes: What single question best splits the differential?
- step: 3
  action: At each branch, add the most likely diagnoses
  notes: Narrow the differential with each decision point
- step: 4
  action: Add the confirmatory test or finding for each diagnosis
  notes: What clinches the diagnosis?
- step: 5
  action: Verify each branch against clinical guidelines
  notes: Use Source-Lock for accuracy
- step: 6
  action: Add "red flags" that skip the tree (emergencies)
  notes: Safety-critical findings that override the algorithm
outputs:
- Clinical decision tree
- Red flag list
- Confirmatory test per diagnosis
- Mermaid code (if using dashboard)
stop_criteria:
- All major diagnoses included
- Decision points are truly discriminating
- Tree verified against guidelines
failure_modes:
- mode: Too many branches at one node
  mitigation: Limit to 2-3 branches per decision point
- mode: Non-discriminating questions
  mitigation: Each question must meaningfully narrow differential
- mode: Missing red flags
  mitigation: Always include "skip to emergency" path
logging_fields:
- presentation_type
- diagnoses_included
- decision_depth
- red_flags_count
- verification_status
evidence:
  citation: Charlin et al. (2000)
  finding: Decision trees scaffold clinical reasoning and support diagnostic accuracy
  source: seed_methods.py
evidence_raw: Charlin et al. (2000); decision trees scaffold clinical reasoning
facilitation_prompt: 'You are running M-ENC-012 (Clinical Decision Tree) in ENCODE stage.

  Execute this method card exactly and keep outputs deterministic.


  Stage hard rules:

  - Force active learner processing.

  - Prefer transformation over passive lecture.

  - Keep focus on target concept scope.


  Required outputs:

  - Clinical decision tree

  - Red flag list

  - Confirmatory test per diagnosis

  - Mermaid code (if using dashboard)


  Stop conditions:

  - All major diagnoses included

  - Decision points are truly discriminating

  - Tree verified against guidelines


  If required inputs are missing, request only the minimum needed input and continue.

  '
gating_rules:
- Force active processing (explain, transform, or map), not passive reading.
- Keep output scoped to mapped objectives only.
artifact_type: decision-tree
allowed_moves:
- Help learner identify the chief complaint as the tree root
- Prompt learner to choose key discriminating questions at each branch point
- Guide learner to add most likely diagnoses at terminal branches
- Prompt learner to specify confirmatory test or finding for each diagnosis
- Ask learner to identify red flags that skip the tree (emergencies)
- Prompt verification of each branch against clinical guidelines
- Suggest limiting to 2-3 branches per decision point to avoid complexity
- Provide Mermaid syntax guidance if using dashboard editor
forbidden_moves:
- Build the decision tree FOR the learner
- Provide diagnoses or branch questions without learner involvement
- Accept non-discriminating questions at decision points
- Allow more than 3 branches at a single node without justification
- Skip the red flag / emergency pathway identification
- Skip source verification against clinical guidelines
- Deliver a passive differential diagnosis instead of guiding tree construction
- Move to retrieval before the tree is verified against guidelines
required_outputs:
- Clinical decision tree
- Red flag list
- Confirmatory test per diagnosis
