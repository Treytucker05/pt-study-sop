id: M-RET-001
name: Timed Brain Dump
category: RETRIEVE
subcategory: dump
description: Close materials. Set timer. Write everything you remember about the topic. No peeking. Compare after. Timed constraint adds desirable difficulty.
control_stage: RETRIEVE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- recall
- testing-effect
- self-assessment
purpose: Timed Brain Dump exists to run a timed free-recall dump that exposes what the learner can retrieve cold and what still needs repair. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use REFERENCE if the learner needs an anchor first.
best_fit_topics:
- free recall under time pressure
- broad topic recall
- gap marking and comparison
poor_fit_topics:
- open-note review
- answer-reveal first workflows
- deep teaching during recall
learner_state_required: The learner already has source material or an anchor available, the source will be closed for recall, and a retrieval target exists.
inputs:
- description: Topic or concept to recall
  required: true
- description: Blank paper or text area
  required: true
- description: Timer (5 min recommended)
  required: true
- description: Reference materials (closed during recall, opened for comparison)
  required: true
outputs:
- name: Free recall dump with gaps marked
  description: A raw recall transcript with gaps marked, followed by comparison notes and gap repair.
  format: free-response text
- name: Accuracy assessment (correct vs incorrect items)
  description: A structured output for a timed free-recall dump that exposes what the learner can retrieve cold and what still needs repair.
  format: structured response
- name: Gap list (missing items identified)
  description: A structured output for a timed free-recall dump that exposes what the learner can retrieve cold and what still needs repair.
  format: bulleted or tabular list
- name: RSR percentage estimate
  description: A structured output for a timed free-recall dump that exposes what the learner can retrieve cold and what still needs repair.
  format: structured response
artifact_schemas:
  Free recall dump with gaps marked: paragraph
  Accuracy assessment (correct vs incorrect items): scored_items
  Gap list (missing items identified): bullet_list
  RSR percentage estimate: scored_items
produces:
- Free recall dump with gaps marked
- Accuracy assessment (correct vs incorrect items)
- Gap list (missing items identified)
- RSR percentage estimate
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Free recall dump with gaps marked
- Accuracy assessment (correct vs incorrect items)
- Gap list (missing items identified)
- RSR percentage estimate
success_criteria:
- All required outputs are present for M-RET-001.
- A genuine attempt-first recall happened before any comparison or feedback.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Free recall dump with gaps marked.'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Close all materials and
  action: "Close all materials and reference sources. Materials must be completely hidden \u2014 no peeking allowed"
  tutor_does: "Run close all materials and reference sources. materials must be completely hidden \u2014 no peeking allowed while protecting the attempt-first rule, then compare only after recall is complete."
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Are all materials closed and is the learner ready to attempt recall?
  example: 'Tutor: "Close your notes. Do not peek." Learner: "Notes are closed."'
- step: 2
  name: Set timer for 5
  action: Set timer for 5 minutes. Time pressure adds desirable difficulty
  tutor_does: Run set timer for 5 minutes. time pressure adds desirable difficulty while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor starts the timer and asks for a free-response dump.
- step: 3
  name: Write everything you remember
  action: "Write everything you remember about the topic. Stream of consciousness \u2014 include facts, relationships, examples, anything"
  tutor_does: "Run write everything you remember about the topic. stream of consciousness \u2014 include facts, relationships, examples, anything while protecting the attempt-first rule, then compare only after recall is complete."
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor marks gaps with question marks and compares them after the attempt window ends.
- step: 4
  name: When stuck, write "?"
  action: "When stuck, write \"?\" and move to next thing you remember. Gaps are valuable data \u2014 mark them explicitly"
  tutor_does: "Run when stuck, write \"?\" and move to next thing you remember. gaps are valuable data \u2014 mark them explicitly while protecting the attempt-first rule, then compare only after recall is complete."
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor compares to the source and notes missing items.
- step: 5
  name: Stop when timer ends
  action: "Stop when timer ends or you've exhausted recall. Don't extend time \u2014 constraint is the feature"
  tutor_does: "Run stop when timer ends or you've exhausted recall. don't extend time \u2014 constraint is the feature while protecting the attempt-first rule, then compare only after recall is complete."
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor compares to the source and notes missing items.
- step: 6
  name: Open materials and compare
  action: Open materials and compare your output to the source. Mark correct items, identify missing items, note errors
  tutor_does: Run open materials and compare your output to the source. mark correct items, identify missing items, note errors while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Has the learner compared the output against the source or answer key?
  example: Tutor compares to the source and notes missing items.
constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Prompt free recall with topic cue only
- Enforce closed-note gate before recall begins
- Start and enforce hard 5-minute timer
- Provide corrective feedback AFTER timer ends and recall is complete
- Mark gaps explicitly with question marks during recall
- Score accuracy against source material during comparison step
- Route back to ENCODE or REFERENCE on repeated misses
- Track RSR percentage estimate
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Reveal answers or source content before recall attempt
- Provide hints during the recall phase
- Extend timer past 5 minutes (constraint is the feature)
- Allow peeking at materials during recall
- Skip the source comparison step after recall
- Teach new material during retrieval
- Accept blank output without pushing for at least one recall attempt
- Remove time pressure (desirable difficulty)
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 5
energy_cost: medium
best_stage: review
mechanisms:
- retrieval
- generation
- calibration
evidence:
  citation: Roediger and Karpicke (2006); Yang, Luo, Vadillo, Yu, and Shanks (2021); Agarwal, Nunes, and Blunt (2021)
  finding: Timed Brain Dump is best supported as a free-recall retrieval routine whose value comes from the retrieval attempt itself, the visibility of omissions, and the compare-after feedback pass. Classic testing-effect work shows that recall attempts can outperform rereading on delayed retention, recent meta-analytic work confirms broad benefits for retrieval practice across materials and settings, and classroom reviews support retrieval as a practical way to surface what students can and cannot yet pull from memory. The practical implication for this method is to keep the first pass closed-note and time-bounded, treat gaps as usable data, and use the comparison step for repair rather than for helping during the attempt.
  source: https://doi.org/10.1111/j.1467-9280.2006.01693.x; https://doi.org/10.1037/bul0000309; https://doi.org/10.1007/s10648-021-09595-9
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest dump. Use a 3-minute closed-note burst, terse bullets for the recall output, and a short miss list plus one repair target.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest dump. Use the full time cap, keep the raw recall verbatim, and return a fuller item-by-item comparison plus a ranked repair list.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Use a compact dump plus a three-column table for correct, partial, and missed content with a quick RSR estimate.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied dump. Emphasize signs, actions, and discriminators from the session, then organize misses in a handoff table tied to the next practical review move.
related_methods:
- id: M-REF-003
  relationship: A one-page anchor is a good compare-against source artifact
- id: M-REF-001
  relationship: Error autopsy turns misses into prevention cues
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - 'If I''m stuck: do NOT repeat the same explanation. Pick exactly one recovery move (simpler ladder, format switch, side-by-side contrast, tiny clinical case).'
  replaces_with:
  - "Closed-note recall only. No hints at any point during the recall window \u2014 not before, not progressive, not after first attempt. Comparison and answer reveal happen only after the timer ends."
  - If stuck, learner writes '?' and moves to the next item. Tutor does NOT switch format, give a clinical case, or rebuild upward. Gaps are the data.
  reason: RETRIEVE methods test cold recall under closed-note conditions. CI's 'progressive hints' explicitly violates RET's no-hints rule, and CI's recovery moves are all forms of re-teaching during the recall window.
facilitation_prompt: |-
  You are running M-RET-001 (Timed Brain Dump) in the RETRIEVE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Free recall dump with gaps marked, Accuracy assessment, Gap list, and RSR percentage estimate.
  Run one timed closed-note dump before any comparison. Keep the attempt window clean, mark gaps instead of teaching through them, then compare against the source only after the timer ends.
  Preset behavior:
  - exam_cram: one-shot; 3-minute dump; terse bullets; one repair target.
  - deep_mastery: interactive; full-cap dump; verbatim recall plus fuller comparison and ranked repair list.
  - quick_review: one-shot refresh; compact dump plus correct-partial-missed table and quick RSR.
  - clinical_bridge: stepwise; applied recall focused on signs, actions, and discriminators with a handoff-style miss table.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves dump -> compare -> repair and waits.
validation:
  test_cases:
  - topic: free recall under time pressure
    expected_outputs:
    - Free recall dump with gaps marked
    - Accuracy assessment (correct vs incorrect items)
    - Gap list (missing items identified)
    pass_criteria:
    - All required outputs for M-RET-001 are present.
    - The response stays inside the correct stage rules.
  - topic: broad topic recall
    expected_outputs:
    - Accuracy assessment (correct vs incorrect items)
    - Gap list (missing items identified)
    - RSR percentage estimate
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Retrieval blocks can collapse into explanation unless the tutor protects the attempt-first rule.
