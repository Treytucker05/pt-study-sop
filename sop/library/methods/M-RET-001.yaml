constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Prompt free recall with topic cue only
- Enforce closed-note gate before recall begins
- Start and enforce hard 5-minute timer
- Provide corrective feedback AFTER timer ends and recall is complete
- Mark gaps explicitly with question marks during recall
- Score accuracy against source material during comparison step
- Route back to ENCODE or REFERENCE on repeated misses
- Track RSR percentage estimate
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Reveal answers or source content before recall attempt
- Provide hints during the recall phase
- Extend timer past 5 minutes (constraint is the feature)
- Allow peeking at materials during recall
- Skip the source comparison step after recall
- Teach new material during retrieval
- Accept blank output without pushing for at least one recall attempt
- Remove time pressure (desirable difficulty)
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 5
energy_cost: medium
best_stage: review
mechanisms:
