id: M-RET-001
name: Timed Brain Dump
category: retrieve
description: Close materials. Set timer. Write everything you remember about the topic. No peeking. Compare after. Timed constraint adds desirable difficulty.
default_duration_min: 5
energy_cost: medium
best_stage: review
control_stage: RETRIEVE
status: validated
tags:
- recall
- testing-effect
- self-assessment
mechanisms:
- retrieval
- generation
- calibration
stipulations:
- If a chain or learner-ready gate is active, do not start retrieval until that gate is satisfied.
knobs:
  difficulty: medium
  feedback_timing: after_attempt
constraints:
  attempt_required_before_feedback: true
  closed_note_first: true
  route_back_on_repeated_miss: true
inputs:
- Topic or concept to recall
- Blank paper or text area
- Timer (5 min recommended)
- Reference materials (closed during recall, opened for comparison)
steps:
- step: 1
  action: Close all materials and reference sources
  notes: Materials must be completely hidden — no peeking allowed
- step: 2
  action: Set timer for 5 minutes
  notes: Time pressure adds desirable difficulty
- step: 3
  action: Write everything you remember about the topic
  notes: Stream of consciousness — include facts, relationships, examples, anything
- step: 4
  action: When stuck, write "?" and move to next thing you remember
  notes: Gaps are valuable data — mark them explicitly
- step: 5
  action: Stop when timer ends or you've exhausted recall
  notes: Don't extend time — constraint is the feature
- step: 6
  action: Open materials and compare your output to the source
  notes: Mark correct items, identify missing items, note errors
outputs:
- Free recall dump (raw text with gaps marked)
- Accuracy assessment (what was correct vs. incorrect)
- Gap list (what was missing)
- RSR percentage estimate
stop_criteria:
- Timer ends (hard stop)
- You've exhausted everything you can recall
- Comparison with source is complete
failure_modes:
- mode: Peeking during recall
  mitigation: Physically move materials out of sight before starting
- mode: Stopping too early when recall feels hard
  mitigation: Push through the difficulty — that's where learning happens
- mode: Skipping the comparison step
  mitigation: Comparison is mandatory — it's where you learn what you missed
logging_fields:
- recall_word_count
- accuracy_percent
- gaps_identified
- rsr_estimate
evidence:
  citation: Roediger & Karpicke (2006)
  finding: testing effect — retrieval practice > re-reading for long-term retention
  source: seed_methods.py
evidence_raw: Roediger & Karpicke (2006); testing effect — retrieval practice > re-reading for long-term retention
facilitation_prompt: 'You are running M-RET-001 (Timed Brain Dump) in RETRIEVE stage.

  Execute this method card exactly and keep outputs deterministic.


  Stage hard rules:

  - Require learner attempt first.

  - Do not reveal full answer before attempt.

  - Capture errors and route signals.
  - If the chain requires learner readiness before retrieval, confirm readiness first.


  Required outputs:

  - Free recall dump (raw text with gaps marked)

  - Accuracy assessment (what was correct vs. incorrect)

  - Gap list (what was missing)

  - RSR percentage estimate


  Stop conditions:

  - Timer ends (hard stop)

  - You''ve exhausted everything you can recall

  - Comparison with source is complete


  If required inputs are missing, request only the minimum needed input and continue.

  This is retrieval, not surprise evaluation. If a learner-ready gate is active, honor it explicitly before the dump begins.

  '
gating_rules:
- Require closed-note recall first, then feedback.
- If repeated misses occur, route back to ENCODE or REFERENCE.
artifact_type: notes
allowed_moves:
- Prompt free recall with topic cue only
- Enforce closed-note gate before recall begins
- Start and enforce hard 5-minute timer
- Provide corrective feedback AFTER timer ends and recall is complete
- Mark gaps explicitly with question marks during recall
- Score accuracy against source material during comparison step
- Route back to ENCODE or REFERENCE on repeated misses
- Track RSR percentage estimate
forbidden_moves:
- Reveal answers or source content before recall attempt
- Provide hints during the recall phase
- Extend timer past 5 minutes (constraint is the feature)
- Allow peeking at materials during recall
- Skip the source comparison step after recall
- Teach new material during retrieval
- Accept blank output without pushing for at least one recall attempt
- Remove time pressure (desirable difficulty)
required_outputs:
- Free recall dump with gaps marked
- Accuracy assessment (correct vs incorrect items)
- Gap list (missing items identified)
- RSR percentage estimate
