id: M-RET-001
name: Timed Brain Dump
category: retrieve
subcategory: dump
description: Close materials. Set timer. Write everything you remember about the topic. No peeking. Compare after. Timed constraint
  adds desirable difficulty.
control_stage: RETRIEVE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- recall
- testing-effect
- self-assessment
purpose: Timed Brain Dump exists to run a timed free-recall dump that exposes what the learner can retrieve cold and what
  still needs repair. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use REFERENCE if the learner needs
  an anchor first.
best_fit_topics:
- free recall under time pressure
- broad topic recall
- gap marking and comparison
poor_fit_topics:
- open-note review
- answer-reveal first workflows
- deep teaching during recall
learner_state_required: The learner already has source material or an anchor available, the source will be closed for recall,
  and a retrieval target exists.
inputs:
- description: Topic or concept to recall
  required: true
- description: Blank paper or text area
  required: true
- description: Timer (5 min recommended)
  required: true
- description: Reference materials (closed during recall, opened for comparison)
  required: true
outputs:
- name: Free recall dump with gaps marked
  description: A raw recall transcript with gaps marked, followed by comparison notes and gap repair.
  format: free-response text
- name: Accuracy assessment (correct vs incorrect items)
  description: A structured output for a timed free-recall dump that exposes what the learner can retrieve cold and what still
    needs repair.
  format: structured response
- name: Gap list (missing items identified)
  description: A structured output for a timed free-recall dump that exposes what the learner can retrieve cold and what still
    needs repair.
  format: bulleted or tabular list
- name: RSR percentage estimate
  description: A structured output for a timed free-recall dump that exposes what the learner can retrieve cold and what still
    needs repair.
  format: structured response
required_outputs:
- Free recall dump with gaps marked
- Accuracy assessment (correct vs incorrect items)
- Gap list (missing items identified)
- RSR percentage estimate
success_criteria:
- All required outputs are present for M-RET-001.
- A genuine attempt-first recall happened before any comparison or feedback.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Free recall dump with gaps marked.'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
