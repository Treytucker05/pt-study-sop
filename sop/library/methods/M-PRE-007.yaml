id: M-PRE-007
name: Pre-Test
category: prime
subcategory: diagnostic
description: Attempt to answer questions on the topic BEFORE studying it. Getting answers wrong primes the brain to encode the correct information more deeply.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- pre-testing
