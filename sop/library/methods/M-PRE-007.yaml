id: M-PRE-007
name: Pre-Test
category: PRIME
subcategory: pre-test
description: Attempt to answer questions on the topic before studying it. Wrong answers, guesses, and confidence ratings create encoding hooks for later learning.
control_stage: PRIME
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- prime
- pre-testing
- priming
- desirable-difficulty
- diagnostic
- orientation
- prior-knowledge
- calibration
purpose: Pre-Test exists to generate a short low-stakes answer attempt before study begins so the learner enters the material with active questions, guesses, and confidence signals already on the table. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: Not for summative grading, gatekeeping, or immediate answer explanation. Use CALIBRATE when the goal is scored readiness routing and use TEACH or REFERENCE when the goal is explanation.
best_fit_topics:
- New or complex material where a short prediction attempt can prime later learning
- Topics with prior notes, objective context, or likely partially-known question formats
- Material where calibration awareness matters as much as initial correctness
poor_fit_topics:
- Brand-new content with absolutely no usable prior cues
- Summative or high-stakes testing situations
- Study blocks where the tutor plans to reveal answers immediately instead of delaying answer checking
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: Pre-test answers (with confidence ratings)
  description: Short pre-study question set with guessed answers and confidence for each item.
  format: prompt set with brief answers
- name: Encoding priming for correct answers
  description: Short list of what the learner should watch for during study based on the questions attempted.
  format: bulleted or tabular list
- name: Calibration baseline
  description: Low-stakes baseline comparing answer attempts with confidence levels before answer checking.
  format: bulleted or tabular list
artifact_schemas:
  Pre-test answers (with confidence ratings): map
  Encoding priming for correct answers: bullet_list
  Calibration baseline: bullet_list
produces:
- Pre-test answers (with confidence ratings)
- Encoding priming for correct answers
- Calibration baseline
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Pre-test answers (with confidence ratings)
- Encoding priming for correct answers
- Calibration baseline
success_criteria:
- All required outputs are present for M-PRE-007.
- The method stays low-stakes and non-summative even though it records answer attempts and confidence.
- The artifact preserves unanswered or wrong attempts for later answer checking instead of collapsing into immediate explanation.
partial_criteria:
- Pre-test answers (with confidence ratings) is present but the watch-for cues or calibration baseline are incomplete.
- The output is usable but drifts toward explanation, answer reveal, or scoring language.
steps:
- step: 1
  name: Question Set
  action: Read pre-test questions without looking at source material
  tutor_does: Read pre-test questions without looking at source material. Questions can come from Tutor, past exams, or learning objectives.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 5
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Question Set: Read pre-test questions without looking at source material"'
- step: 2
  name: Question Set
  action: Attempt to answer each question - guess if uncertain
  tutor_does: Attempt to answer each question - guess if uncertain. Wrong answers are valuable; they prime encoding.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 5
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Question Set: Attempt to answer each question - guess if uncertain"'
- step: 3
  name: Step 3
  action: Rate confidence for each answer (1-5)
  tutor_does: Rate confidence for each answer (1-5). Calibration awareness is part of the benefit.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 3: Rate confidence for each answer (1-5)"'
- step: 4
  name: Step 4
  action: Do not check answers yet
  tutor_does: Do not check answers yet. Answers come during study; the gap creates encoding motivation.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 5
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 4: Do NOT check answers yet"'
- step: 5
  name: Step 5
  action: Keep pre-test visible during study
  tutor_does: Keep pre-test visible during study. Check answers as you encounter them in the material.
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Step 5: Keep pre-test visible during study"'
constraints:
- rule: Do not treat the pre-test as a summative grade or gatekeeping decision
  why: PRIME methods orient and prime later learning instead of certifying mastery.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Confidence Capture Required
  why: The method inherits this as a hard rule from the legacy card.
- rule: 'Short Window Min: 2'
  why: Carried forward from the legacy method card.
- rule: 'Short Window Max: 5'
  why: Carried forward from the legacy method card.
allowed_moves:
- Present 3-5 pre-test questions on the upcoming topic
- Require the learner to attempt every question (guessing is the point)
- Capture confidence ratings (1-5 or H/M/L) for each answer
- Record answer attempts diagnostically to establish a calibration baseline
- Keep the pre-test visible during subsequent study for delayed answer checking
- Include a mix of difficulty levels (some answerable from prior knowledge)
- Encourage guessing when uncertain (wrong answers prime encoding)
forbidden_moves:
- Teach new content or provide explanations during the pre-test
- Reveal correct answers before study begins (delay until ENCODE or later study)
- Let the learner check answers immediately after answering
- Make mastery judgments or grade the learner summatively
- Skip confidence capture for any item
- Lecture or provide extended feedback on answers
- Use pre-test results to gatekeep or block further study
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Checking answers immediately
  detection: The output no longer matches the method's core purpose.
  recovery: Delay answer checking until the learner encounters the material during study.
  fallback_method: M-PRE-007
- mode: Refusing to guess
  detection: The output no longer matches the method's core purpose.
  recovery: Require an answer attempt for every question and restate that guessing is part of the method.
  fallback_method: M-PRE-007
default_duration_min: 4
energy_cost: low
best_stage: first_exposure
mechanisms:
- pretesting
- retrieval_attempt
- errorful_generation
- metacognitive_monitoring
- encoding_priming
- calibration
evidence:
  citation: Richland, Kornell, and Kao (2009); Glass, Brill, and Ingate (2008); Little and Bjork (2016); Pan and Carpenter (2024); Mera, Dianova, and Marin-Garcia (2025)
  finding: >-
    Pre-Test is best supported as a low-stakes pretesting and prediction move
    that creates encoding hooks before study, not as an early grading event.
    Foundational pretesting studies showed that attempting answers before study
    can improve later learning even when many initial responses are wrong, and
    classroom work suggests the same pattern can transfer to educational
    settings when the pretest stays brief and is followed by later exposure to
    the correct information. More recent review and robustness work shows the
    effect depends on timing, question format, and what is later studied, which
    means the method should stay short, require real guesses, capture
    confidence, and delay answer checking rather than collapsing into immediate
    correction.
  source: https://doi.org/10.1037/a0016496; https://doi.org/10.1080/01443410701777280; https://doi.org/10.3758/s13421-016-0621-z; https://doi.org/10.1007/s10648-023-09814-5; https://doi.org/10.3758/s13421-025-01813-x
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: one_shot
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest pretest pass. Use 3 questions, terse guessed answers with confidence, and a one-line watch-for cue per item.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full pretest pass. Use 4-5 questions, keep answer attempts and calibration notes explicit, and end with a richer study watchlist without revealing answers.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render a compact table with question, guess, confidence, and what-to-watch columns plus a short calibration note.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied pretest pass. Use short case or cue-based questions and render the result as a clinical guess / confidence / study-watch matrix.
related_methods:
- id: M-PRE-014
  relationship: Use to surface blind spots before generating more pre-test prompts
- id: M-PRE-010
  relationship: Use when objective framing is still too weak to build a good question set
system_prompt_override:
  relaxes:
  - Highly interactive. One small teaching chunk, one short check, or one question at a time.
  - Ask only one question at a time.
  - Do not do more than one step at a time.
  - Within TEACH, deliver ONE chunk at a time, check in, then continue.
  replaces_with:
  - Produce the full pre-test artifact when enough context is present. Keep the questions, answer attempts, and confidence together rather than dragging the method into a long Socratic exchange.
  - Do not reveal correct answers during the pre-test. The artifact should prime later study, not resolve it.
  reason: Pre-Test is a short priming pass. Over-chunking it or correcting answers immediately destroys the intended pretesting effect.
facilitation_prompt: |
  You are running M-PRE-007 (Pre-Test) in the PRIME stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Pre-test answers (with confidence ratings), Encoding priming for correct answers, and Calibration baseline.
  Build a short pre-study question set, require an answer attempt for every item, capture confidence for each answer, and keep the questions visible for later answer checking during study. Keep it low-stakes, non-summative, and priming-focused; do not reveal correct answers yet and do not drift into explanation.
  Preset behavior:
  - exam_cram: one-shot; 3 questions, terse guesses with confidence, and one watch-for cue per item.
  - deep_mastery: interactive; 4-5 questions, explicit answer attempts, calibration notes, and a richer study watchlist.
  - quick_review: one-shot refresh; compact question / guess / confidence / what-to-watch table plus short calibration note.
  - clinical_bridge: stepwise; short case-based guess / confidence / study-watch matrix.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves questions -> answer attempts -> confidence -> watchlist and waits.
validation:
  test_cases:
  - topic: First pass on Pre-Test with prior notes present
    expected_outputs:
    - Pre-test answers (with confidence ratings)
    - Encoding priming for correct answers
    - Calibration baseline
    pass_criteria:
    - All required outputs are present.
    - The output preserves answer attempts and confidence without revealing answers.
    - The artifact identifies what to watch for during later study.
  - topic: Dense review topic where the learner needs orientation before detail
    expected_outputs:
    - Pre-test answers (with confidence ratings)
    - Encoding priming for correct answers
    - Calibration baseline
    pass_criteria:
    - All required outputs are present.
    - No premature answer reveal or teaching drift appears in the response.
    - The method stays low-stakes rather than becoming a graded quiz.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs sometimes reveal answers too early unless the no-check-yet rule is explicit.
  - If the question set is too broad or too difficult, the learner may stop guessing and the priming value drops.
