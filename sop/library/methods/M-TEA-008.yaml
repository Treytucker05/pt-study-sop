id: M-TEA-008
name: Worked Example -> Completion Fade
category: EXPLAIN
subcategory: worked-example-fade
description: Model one full example or worked solution, then reuse the same task structure with a few steps omitted so the learner fills the missing pieces before full independence.
control_stage: EXPLAIN
status: draft
version: '1.3'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- explain
- worked-example
- completion
- fading
- scaffolding
- novice
- worked-example-fade
- example
purpose: Model one full example or worked solution, then reuse the same task structure with a few steps omitted so the learner fills the missing pieces before full independence. Use it to teach one bounded concept by turning the source into a learner-facing bridge that preserves the real mechanism.
not_for: Not for open-ended brainstorming, scoring, or broad coverage of unrelated material. Use an ORIENT method when the learner first needs orientation or objective framing.
best_fit_topics:
- 'A single bounded concept or pathway that can be taught in one pass: Worked Example to Completion Fade'
- Topics that benefit from a bridge, contrast, case, example, or mnemonic
poor_fit_topics:
- Unbounded chapters that need broad coverage first
- Material that should be assessed rather than taught
learner_state_required: Source material and target skill are loaded, and the learner is ready to watch one worked example before completing the last step.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target concept, process, or comparison to teach
  required: true
- description: Learner familiarity signal or prerequisite anchor
  required: false
outputs:
- name: FullyWorkedExample
  description: Fully worked example that shows the concept in action.
  format: worked example with brief annotations
- name: FadePoints
  description: Learner-facing teaching artifact for worked example to completion fade.
  format: bulleted artifact
- name: CompletionPrompt
  description: Learner-facing teaching artifact for worked example to completion fade.
  format: bulleted artifact
- name: LearnerFilledSteps
  description: Learner-facing teaching artifact for worked example to completion fade.
  format: bulleted artifact
- name: FadeDecision
  description: Learner-facing teaching artifact for worked example to completion fade.
  format: bulleted artifact
- name: CarryForwardWeakPoint
  description: Learner-facing teaching artifact for worked example to completion fade.
  format: bulleted artifact
artifact_schemas:
  FullyWorkedExample: ordered_steps
  FadePoints: bullet_list
  CompletionPrompt: bullet_list
  LearnerFilledSteps: bullet_list
  FadeDecision: bullet_list
  CarryForwardWeakPoint: bullet_list
produces:
- FullyWorkedExample
- FadePoints
- CompletionPrompt
- LearnerFilledSteps
- FadeDecision
- CarryForwardWeakPoint
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- FullyWorkedExample
- FadePoints
- CompletionPrompt
success_criteria:
- The learner-facing explanation artifact is faithful to Worked Example -> Completion Fade and stays bounded.
- The method includes a concrete bridge, example, or discriminating cue that makes the idea easier to hold.
- The output ends with a clear carry-forward signal instead of drifting into a full lecture.
partial_criteria:
- FullyWorkedExample is present but the bridge or example is underdeveloped.
- The explanation is usable but still too broad, too abstract, or too long for fast learner uptake.
steps:
- step: 1
  name: Worked Example
  action: Present one fully worked example
  tutor_does: Present one fully worked example. Walk through the complete structure and name why each step is there before asking the learner to perform it
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Can you complete the last step without the support line?
  example: 'Example: "Worked Example: Present one fully worked example"'
- step: 2
  name: Step 2
  action: Mark the critical decision points
  tutor_does: Mark the critical decision points. Highlight the steps or cues that make the example work so the learner knows what to watch for
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Can you complete the last step without the support line?
  example: 'Example: "Step 2: Mark the critical decision points"'
- step: 3
  name: Completion Fade
  action: Fade 1-2 steps in a near-match example
  tutor_does: Fade 1-2 steps in a near-match example. Reuse the same structure, then omit only the most instruction-worthy pieces instead of the whole task
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Can you complete the last step without the support line?
  example: 'Example: "Completion Fade: Fade 1-2 steps in a near-match example"'
- step: 4
  name: Step 4
  action: Have the learner fill the missing steps and explain why
  tutor_does: Have the learner fill the missing steps and explain why. Require short reasoning for each filled step without turning the block into a scored quiz
  learner_does: Listens, tracks the explanation, and responds with the requested cue or check-in.
  max_lines: 4
  check: Can you complete the last step without the support line?
  example: 'Example: "Step 4: Have the learner fill the missing steps and explain why"'
- step: 5
  name: Completion Fade
  action: Decide whether to deepen the fade or hold scaffold
  tutor_does: Decide whether to deepen the fade or hold scaffold. If the learner fills the gaps cleanly, remove one more support; if not, briefly re-model the weak step and try again
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Can you complete the last step without the support line?
  example: 'Example: "Completion Fade: Decide whether to deepen the fade or hold scaffold"'
constraints:
- rule: Do not turn the method into a test or quiz
  why: EXPLAIN methods should build understanding, not create avoidable performance pressure.
- rule: Stay faithful to the source and keep the chunk bounded
  why: The learner needs a clear bridge, not an unbounded lecture.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Require the relevant objective or context before running
  why: The method needs a bounded target to stay useful.
allowed_moves:
- Model the complete example step-by-step before learner production
- Highlight decision points or cues that explain why each step works
- Remove 1-2 steps from a near-match example for learner completion
- Ask the learner to justify the filled steps in brief
- Re-model a weak step and retry with lighter fade if needed
- Bridge the source into a learner-facing explanation, story, contrast, example, or mnemonic
- Use a concise check-in to see whether the explanation landed
forbidden_moves:
- Start with a blank solve instead of a worked example
- Change to a different problem family on the first fade pass
- Omit so many steps that the activity becomes an assessment
- Score the learner or stress speed during initial fading
- Accept filled steps without any why/cue explanation
- Turn the method into a quiz or scored assessment
- Lose fidelity to the source or wander beyond the bounded topic
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For EXPLAIN, fall back to M-TEA-004 or M-TEA-006.
failure_modes:
- mode: The tutor fades too much too early
  detection: The output no longer matches the method's core purpose.
  recovery: Return to a lighter fade with only 1-2 missing steps on the same structure.
  fallback_method: M-TEA-004
- mode: The completion task changes the problem type instead of reusing the same family
  detection: The output no longer matches the method's core purpose.
  recovery: Keep the first faded pass as a near-match of the original worked example.
  fallback_method: M-TEA-004
default_duration_min: 8
energy_cost: medium
best_stage: first_exposure
mechanisms:
- worked_examples
- guidance_fading
- schema_formation
- self_explanation
- scaffolding
- elaboration
- transfer
evidence:
  citation: Renkl and Atkinson (2003); Atkinson, Renkl, and Merrill (2003); Salden, Aleven, Schwonke, and Renkl (2010); McGinn, Young, Huyghe, and Booth (2023); Miller-Cotto and Auxter (2021); Bisra, Liu, Nesbit, Salimi, and Winne (2018)
  finding: Worked Example -> Completion Fade is best supported as a novice-first scaffolding method in which learners study a complete solution, then complete a near-match with a small number of missing steps before moving toward greater independence. Foundational fading studies support this example-to-completion transition, especially when learners are prompted to attend to underlying principles rather than just copy steps. Adaptive-fading research suggests support should be removed based on learner performance rather than on a rigid schedule. Classroom studies show example-based assignments can improve authentic algebra and standardized-assessment outcomes, but they also show that extra self-explanation prompts are not automatically additive, so prompts should stay brief, targeted, and light enough to avoid overload.
  source: https://doi.org/10.1207/S15326985EP3801_3; https://doi.org/10.1037/0022-0663.95.4.774; https://doi.org/10.1007/s11251-009-9107-8; https://doi.org/10.1080/19345747.2023.2243254; https://doi.org/10.1080/01443410.2019.1646411; https://doi.org/10.1007/s10648-018-9434-x
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: adaptive_light
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest useful fade; keep the worked example lean, omit only one late step in the near-match example, and make the fade decision terse and test-oriented.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_progressive
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full scaffolded pass; use richer annotations on the worked example, usually fade two steps in the near-match example, and require a brief why-cue for each learner-filled step before naming the next fade.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: adaptive_light
    output_layout: bullets
    explanation_density: lean
    behavior: Refresh pass for already-seen material; compress the worked example to a skeleton, focus on FadePoints and CompletionPrompt, and keep learner fill plus fade decision short.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied fade; cast the worked example as a short case or real-use task, frame decision points as discriminators or consequences, and tie the fade decision to the next practical move.
related_methods:
- id: M-TEA-004
  relationship: Use when a modality switch is needed to bridge the example
- id: M-TEA-001
  relationship: Use if the concept is really sequential
facilitation_prompt: |
  You are running M-TEA-008 (Worked Example -> Completion Fade) in the EXPLAIN stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: FullyWorkedExample, FadePoints, CompletionPrompt, LearnerFilledSteps, FadeDecision, and CarryForwardWeakPoint.
  Teach one bounded task by showing one full example, marking the critical decision points, fading 1-2 steps in a near-match example, having the learner fill the gaps with brief why-cues, and then deciding whether to deepen the fade or hold scaffold. Stay in the same problem family, remain source-faithful, and do not turn the first fade into a quiz.
  Preset behavior:
  - exam_cram: one-shot; lean worked example, one omitted late step, terse cue bullets, and a one-line fade decision.
  - deep_mastery: interactive; fuller annotations, usually two omitted steps, brief why-cues for each learner-filled step, and an explicit next-fade recommendation.
  - quick_review: one-shot refresh; compress the worked example to a skeleton and focus most of the space on FadePoints, CompletionPrompt, and CarryForwardWeakPoint.
  - clinical_bridge: stepwise; use a short applied case, frame decision points as discriminators or consequences, and tie FadeDecision to the next practical move.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode stops between phases and waits.
validation:
  test_cases:
  - topic: Single concept explanation for Worked Example to Completion Fade
    expected_outputs:
    - FullyWorkedExample
    - FadePoints
    - CompletionPrompt
    - LearnerFilledSteps
    - FadeDecision
    - CarryForwardWeakPoint
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Worked Example to Completion Fade.
    - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  - topic: A slightly harder variant with one confusable or confusable wrinkle
    expected_outputs:
    - FullyWorkedExample
    - FadePoints
    - CompletionPrompt
    - LearnerFilledSteps
    - FadeDecision
    - CarryForwardWeakPoint
    pass_criteria:
    - Required outputs appear and the main learner-facing artifact is faithful to Worked Example to Completion Fade.
    - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  acceptance_criteria:
  - Required outputs appear and the main learner-facing artifact is faithful to Worked Example to Completion Fade.
  - The explanation includes a concrete bridge, example, or cue that would help a real learner remember it.
  - The method ends with a bounded check-in or carry-forward cue rather than an open-ended lecture.
  known_issues:
  - Some prompts may over-run the time budget if the source material is very dense.
  - Without a clear topic boundary, the method can broaden instead of teaching one useful chunk.
