id: M-ELB-004
name: Illness Script Builder
category: ELABORATE
subcategory: illness-script-builder
description: For a condition, build the illness script by naming enabling conditions, the pathophysiological fault, and the clinical consequences, then compare it against source and add differentiators.
control_stage: ELABORATE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- elaborate
- illness-script
- clinical-reasoning
- pathology
- causal-chain
- differential
purpose: Illness Script Builder exists to elaborate already-encoded material by forcing the learner to build a disease script from risk context through mechanism to consequences, verify it against source, and separate it from look-alikes. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
- Conditions whose clinical reasoning depends on linking risk context, mechanism, and consequences
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or elaborate
- Topics without a meaningful causal pathway or discriminating look-alikes
learner_state_required: The target concept has already been taught or encoded. The learner can attempt retrieval, comparison, or application before seeing the answer.
inputs:
- description: Condition or disease to script
  required: true
- description: Source material with pathophysiology
  required: true
- description: Illness script template
  required: true
outputs:
- name: Complete illness script (3 parts)
  description: Completed illness script covering enabling conditions, pathophysiological fault, and clinical consequences.
  format: concise prose bullets or short paragraph
- name: Causal chain diagram
  description: Short causal chain connecting enabling conditions to fault to consequences.
  format: labeled visual structure
- name: Comparison to textbook
  description: Comparison against source showing what was missing, wrong, or incomplete.
  format: 2-column or multi-row table
- name: Discriminating features
  description: Features that separate this illness script from similar or confusable conditions.
  format: bulleted or tabular list
artifact_schemas:
  Complete illness script (3 parts): paragraph
  Causal chain diagram: tree_map
  Comparison to textbook: table
  Discriminating features: bullet_list
produces:
- Complete illness script (3 parts)
- Causal chain diagram
- Comparison to textbook
- Discriminating features
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Complete illness script (enabling conditions, pathophysiological fault, clinical consequences)
- Causal chain diagram (enabling -> fault -> consequences)
- Comparison to textbook version (gaps identified)
- Discriminating features vs. similar conditions
success_criteria:
- All required outputs are present for M-ELB-004.
- The illness script clearly links enabling conditions to mechanism and consequences rather than listing disconnected facts.
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Complete illness script (enabling conditions, pathophysiological fault, clinical consequences).'
- The script is usable but the comparison or discriminating features remain too thin to support differential reasoning.
steps:
- step: 1
  name: Write the enabling conditions
  action: Write enabling conditions such as who gets this, what risk factors matter, and what epidemiologic profile fits.
  tutor_does: Guide the learner to name the population, risk factors, and enabling context with enough specificity to anchor the script.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Elderly, smoker, male, hypertension.'
- step: 2
  name: Write the pathophysiological fault
  action: Write the pathophysiological fault by stating what goes wrong and what mechanism drives it.
  tutor_does: Guide the learner to name the central fault and the mechanism that produces the disease state.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Atherosclerotic plaque rupture leads to thrombosis.'
- step: 3
  name: Write the clinical consequences
  action: Write the clinical consequences by naming the expected signs, symptoms, or findings that follow from the fault.
  tutor_does: Guide the learner to name consequences that follow from the mechanism rather than listing disconnected facts.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Chest pain, dyspnea, diaphoresis, ST elevation.'
- step: 4
  name: Connect the causal chain
  action: Connect the three parts with causal arrows.
  tutor_does: Guide the learner to show explicitly how enabling conditions raise risk, how the fault emerges, and how the consequences follow.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Enabling conditions -> fault -> consequences.'
- step: 5
  name: Compare to the source version
  action: Compare your script to the textbook or source version.
  tutor_does: Guide the learner to identify what was missed, imprecise, or wrong instead of silently replacing the script.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Note what you missed or got wrong.'
- step: 6
  name: Add the discriminators
  action: Add discriminating features versus similar conditions.
  tutor_does: Guide the learner to state what separates this illness script from look-alikes and to phrase at least one unlike-X contrast.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What separates this illness script from look-alikes?'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading
  why: This gating rule is part of the method's execution contract.
- rule: Keep output scoped to mapped objectives only
  why: This gating rule is part of the method's execution contract.
allowed_moves:
- Ask probing questions about each illness script component such as enabling conditions, fault, and consequences
- Require explicit causal links between the three script parts
- Challenge generic enabling conditions and demand specific risk factors ranked by importance
- Push for discriminating features versus similar conditions
- Require comparison to textbook or source version with gap identification
- Use Socratic questioning to expose missing pathophysiological links
- Demand the learner articulate unlike-X contrasts for confusable conditions
- Question consequences that lack explicit mechanism links
forbidden_moves:
- Accept consequences without explicit pathophysiological mechanism linking them
- Accept generic or incomplete enabling conditions
- Skip the discriminating features step versus similar conditions
- Build the illness script for the learner
- Accept an illness script missing any of the three required parts
- Teach new content because interrogation uses what was already encoded
- Skip the comparison to textbook or source version
- Move on without a causal chain connecting all three parts
- Accept one-word or surface-level answers without probing
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or route back to ENCODE or REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Consequences without mechanism
  detection: The learner or tutor starts doing consequences without mechanism or the artifact stops satisfying the method's required checks.
  recovery: Require an explicit pathophysiological link from fault to finding.
  fallback_method: M-ELB-002
- mode: Generic enabling conditions
  detection: The learner or tutor starts doing generic enabling conditions or the artifact stops satisfying the method's required checks.
  recovery: Force prioritization of the most important risk factors and context.
  fallback_method: M-ELB-003
- mode: Not discriminating from similar conditions
  detection: The learner or tutor starts doing not discriminating from similar conditions or the artifact stops satisfying the method's required checks.
  recovery: Add at least one unlike-X contrast tied to a concrete script difference.
  fallback_method: M-GEN-007
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- illness_scripts
- causal_reasoning
- elaboration
- knowledge_organization
- differential_diagnosis
- error_correction
evidence:
  citation: Schmidt and Rikers (2007); Charlin, Boshuizen, Custers, and Feltovich (2007); Keemink, Custers, van Dijk, and ten Cate (2018); Lubarsky, Dory, Audétat, Custers, and Charlin (2020); Delavari, Monajemi, Baradaran, Myint, Yaghmae, and Soltani Arabshahi (2020)
  finding: Illness Script Builder is best supported as a clinical-reasoning organization method that helps learners structure disease knowledge into a usable script rather than a loose list of facts. Foundational illness-script and clinical-reasoning work argues that expert diagnosis depends on organized scripts linking enabling conditions, underlying fault, and consequences. More recent instructional studies suggest that explicit script-focused teaching and script-writing activities can improve learners' ability to interpret cases, explain mechanisms, and move toward more organized reasoning. The practical implication for this method is to require all three script parts, make the causal chain explicit, compare the draft against source material, and end with discriminators versus similar conditions so the learner leaves with a script that is both mechanistic and clinically differentiable.
  source: https://doi.org/10.1111/j.1365-2923.2007.02915.x; https://doi.org/10.1111/j.1365-2923.2007.02924.x; https://doi.org/10.5116/ijme.5a5b.24a9; https://doi.org/10.36834/cmej.36631; https://doi.org/10.47176/mjiri.34.9
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest script pass. Return terse bullets for enabling conditions, fault, and consequences, one simple arrow chain, one short source-gap list, and one look-alike discriminator.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full script pass. Build a richer three-part script, keep the causal chain explicit, compare against source in more detail, and include two look-alike contrasts before closing.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh script pass. Use a compact table with columns for enabling conditions, fault, consequences, and discriminator, followed by a brief source-gap table.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied script pass. Tie the script to patient-facing cues by emphasizing risk profile, mechanism-linked findings, red flags, and differentiators that change the next clinical move.
related_methods:
