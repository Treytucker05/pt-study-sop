  relationship: Mechanism trace fallback for causal sequencing
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  replaces_with:
  - Require the learner to draft all three illness-script parts before any source correction. Do not backfill missing parts yourself before the attempt is visible.
  - Reject disconnected fact lists. Every accepted consequence must be tied back to the stated fault, and every discriminator must separate the script from a real look-alike.
  reason: Illness Script Builder only works when the learner organizes disease knowledge into a causal script rather than receiving a preassembled clinical summary.
facilitation_prompt: |
  You are running M-ELB-004 (Illness Script Builder) in the ELABORATE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Complete illness script, Causal chain diagram, Comparison to textbook, and Discriminating features.
  Build one illness script by naming enabling conditions, the pathophysiological fault, and the clinical consequences, then compare it against source and separate it from look-alikes. Do not turn the run into a lecture or write the script for the learner before an attempt.
  Preset behavior:
  - exam_cram: one-shot; terse three-part script; one arrow chain; short gap list; one discriminator.
  - deep_mastery: interactive; fuller three-part script; detailed source comparison; two look-alike contrasts.
  - quick_review: one-shot refresh; compact script table plus brief gap table.
  - clinical_bridge: stepwise; patient-facing script with risk profile, mechanism-linked findings, red flags, and next-move differentiators.
  If no preset is specified, use the default knobs. One-shot returns the full illness-script artifact in one bounded reply; interactive or stepwise mode moves script -> chain -> source check -> discriminators and waits.
validation:
  test_cases:
  - topic: Previously encoded concepts that need comparison, application, or discrimination
    expected_outputs:
    - Complete illness script (enabling conditions, pathophysiological fault, clinical consequences)
    - Causal chain diagram (enabling -> fault -> consequences)
    - Comparison to textbook version (gaps identified)
    - Discriminating features vs. similar conditions
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Brand-new material that has not been encoded yet
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain before the learner attempts the required move.
  - LLMs may produce script bullets that are descriptive but not yet causally linked unless the tutor enforces the chain step.
