id: M-INT-004
name: Side-by-Side Comparison
category: INTERROGATE
subcategory: side-by-side-comparison
description: Place two confusable concepts in a comparison table, fill the key rows from memory first, then verify against source and mark the discriminators.
control_stage: INTERROGATE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- interrogate
- comparison
- discrimination
- differential
- table
- contrasting-cases
- retrieval
purpose: Side-by-Side Comparison exists to interrogate already-encoded material by forcing the learner to contrast two confusable concepts row by row, correct memory errors against source, and name the highest-yield discriminators. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
- Pairs of concepts that are easily confused and need a crisp differential cue
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or interrogation
- Pairs that are too unrelated to support a meaningful contrast table
learner_state_required: The target concepts have already been taught or encoded. The learner can attempt retrieval, comparison, or application before seeing the answer.
inputs:
- description: Two confusable concepts
  required: true
- description: Comparison dimensions (features to compare)
  required: true
- description: Source material for accuracy
  required: true
outputs:
- name: Side-by-side comparison table
  description: Completed comparison table with both concepts contrasted across the key dimensions.
  format: 2-column or multi-row table
- name: Discriminating features highlighted
  description: Highest-yield differentiators that separate the two concepts under pressure.
  format: bulleted or tabular list
- name: Error list from initial attempt
  description: Rows or cells that required correction after source verification.
  format: bulleted or tabular list
artifact_schemas:
  Side-by-side comparison table: table
  Discriminating features highlighted: bullet_list
  Error list from initial attempt: bullet_list
produces:
- Side-by-side comparison table
- Discriminating features highlighted
- Error list from initial attempt
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Side-by-side comparison table (5-7 rows minimum)
- Discriminating features highlighted (the key differentiators)
- Error list from initial memory-first attempt
success_criteria:
- All required outputs are present for M-INT-004.
- The table includes at least 5-7 useful dimensions and ends with a clear discriminator rather than a list of generic similarities.
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Side-by-side comparison table (5-7 rows minimum).'
- The comparison is usable but still too shallow because the differentiators or correction notes are weak.
steps:
- step: 1
  name: Choose the confusable pair
  action: Choose two concepts you frequently confuse.
  tutor_does: Guide the learner to choose two concepts that are genuinely easy to mix up so the comparison produces a useful differential.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: The more confusable, the more valuable.'
- step: 2
  name: Build the table frame
  action: Create a two-column table.
  tutor_does: Guide the learner to set one column per concept and prepare the table before any source check or correction.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: One column per concept.'
- step: 3
  name: Set the comparison rows
  action: List 5-7 comparison dimensions as rows.
  tutor_does: Guide the learner to choose rows that expose the differences, such as definition, mechanism, presentation, treatment, or prognosis.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Include definition, mechanism, presentation, treatment, and prognosis.'
- step: 4
  name: Fill from memory first
  action: Fill each cell from memory first.
  tutor_does: Guide the learner to complete the cells from memory before any verification so the errors and confusions stay visible.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Retrieval before verification.'
- step: 5
  name: Verify and correct
  action: Verify and correct against source.
  tutor_does: Guide the learner to check each row against the source and record which cells or rows were wrong rather than silently replacing them.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Note which cells you got wrong.'
- step: 6
  name: Highlight the discriminators
  action: Highlight the key discriminating features.
  tutor_does: Guide the learner to mark the rows or cues that most reliably separate the two concepts and to name the single highest-yield discriminator.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What is the one thing that best distinguishes them?'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading
  why: This gating rule is part of the method's execution contract.
- rule: Keep output scoped to mapped objectives only
  why: This gating rule is part of the method's execution contract.
allowed_moves:
- Ask probing questions about why the features differ between the two concepts
- Challenge the learner to rank which row is the strongest discriminator
- Require memory-first filling before source verification
- Push for 5-7 comparison dimensions, not fewer
- Demand explicit discriminating features rather than generic summaries
- Question cells where the learner seems uncertain or vague
- Use Socratic questioning to expose confusion between the two concepts
- Require the learner to articulate what was wrong in the initial attempt and why
forbidden_moves:
- Accept a table with fewer than 5 comparison dimensions
- Provide the comparison table or fill cells for the learner
- Allow source lookup before the memory-first attempt
- Skip discriminating feature identification
- Accept features that are identical across both concepts without probing for useful contrast
- Teach new content because interrogation uses what was already encoded
- Move on without the learner identifying at least one key discriminator
- Accept one-word or surface-level answers without probing
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or route back to ENCODE or REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Features too similar across concepts
  detection: The learner or tutor starts doing features too similar across concepts or the artifact stops satisfying the method's required checks.
  recovery: Focus on rows where the concepts differ rather than rows where they overlap.
  fallback_method: M-ORG-002
- mode: Not identifying discriminators
  detection: The learner or tutor starts doing not identifying discriminators or the artifact stops satisfying the method's required checks.
  recovery: Force ranking and choose the most differentiating row.
  fallback_method: M-INT-006
- mode: Looking up before trying
  detection: The learner or tutor starts doing looking up before trying or the artifact stops satisfying the method's required checks.
  recovery: Reset to a memory-first pass before reopening the source.
  fallback_method: M-INT-002
default_duration_min: 7
energy_cost: medium
best_stage: review
mechanisms:
- comparison
- discrimination
- contrasting_cases
- structural_alignment
- retrieval_practice
- error_correction
evidence:
  citation: Alfieri, Nokes-Malach, and Schunn (2013); Richland and McDonough (2010); Richland and Simms (2015); Loibl, Tillema, Rummel, and van Gog (2020); Blair, Banes, and Martin (2024)
  finding: >-
    Side-by-Side Comparison is best supported as a guided comparison and
    discrimination method, not as a passive review table. Meta-analytic and
    review work on case comparison suggests that carefully aligned contrasts
    help learners notice deep structure, form better categories, and separate
    confusable alternatives more reliably than studying cases in isolation.
    More recent classroom and instructional studies show both the benefit and
    the constraint: contrasting cases can sharpen noticing and transfer, but
    the effect depends on having well-chosen dimensions and enough guidance to
    surface the deep features rather than leaving learners with shallow surface
    contrasts. The practical implication for this method is to require a
    memory-first table, enforce 5-7 meaningful dimensions, verify errors
    explicitly, and end by naming the highest-yield discriminator instead of
    stopping at generic compare-contrast prose.
  source: https://doi.org/10.1080/00461520.2013.775712; https://doi.org/10.1016/j.cedpsych.2009.09.001; https://doi.org/10.1002/wcs.1336; https://doi.org/10.1007/s11251-020-09504-7; https://doi.org/10.1007/s11251-024-09661-z
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest comparison pass. Build a 5-row sprint table, name 2-3 discriminator bullets, and log only the highest-value correction misses.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full comparison pass. Build a 7-row table, rank the discriminators, and keep a fuller correction log that explains where the initial confusion came from.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh comparison pass. Use one compact table with columns for dimension, concept A, concept B, and discriminator, followed by a short correction list.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied differential pass. Weight the rows toward presentation, red flags, testing, treatment, and prognosis so the final discriminators read like decision cues under pressure.
