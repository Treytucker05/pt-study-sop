id: M-INT-004
name: Side-by-Side Comparison
category: interrogate
subcategory: int
description: Place two confusable concepts in a comparison table (features, functions, clinical signs).
  Identify discriminating features. Builds differential diagnosis skill.
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- comparison
- discrimination
- differential
- table
purpose: Interrogate already-encoded material through comparison, application, retrieval, or transfer
  so the learner can discriminate it under pressure.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has
  not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or interrogation
learner_state_required: The target concept has already been taught or encoded. The learner can attempt
  retrieval, comparison, or application before seeing the answer.
inputs:
- description: Two confusable concepts
  required: true
- description: Comparison dimensions (features to compare)
  required: true
- description: Source material for accuracy
  required: true
outputs:
- name: Side-by-side comparison table
  description: Side-by-side comparison table
  format: 2-column or multi-row table
- name: Discriminating features highlighted
  description: Discriminating features highlighted
  format: short, checkable artifact
- name: Error list from initial attempt
  description: Error list from initial attempt
  format: short, checkable artifact
required_outputs: &id001
- Side-by-side comparison table (5-7 rows minimum)
- Discriminating features highlighted (the key differentiators)
- Error list from initial memory-first attempt
success_criteria:
- 'All required outputs are present and checkable: Side-by-side comparison table (5-7 rows minimum), Discriminating
  features highlighted (the key differentiators), Error list from initial memory-first attempt.'
- 'The method reaches its stop condition: Table complete (5-7 rows filled); Discriminators identified.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Side-by-side comparison
  table (5-7 rows minimum), Discriminating features highlighted (the key differentiators).'
steps:
- step: 1
  name: Two Concepts You Frequently Confuse
  action: Choose two concepts you frequently confuse
  tutor_does: 'Guide the learner to Choose two concepts you frequently confuse. Keep in mind: The more
    confusable, the more valuable'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: The more confusable, the more valuable'
- step: 2
  name: A Two Column Table
  action: Create a two-column table
  tutor_does: 'Guide the learner to Create a two-column table. Keep in mind: One column per concept'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: One column per concept'
- step: 3
  name: List 5 7 Comparison Dimensions
  action: List 5-7 comparison dimensions as rows
  tutor_does: 'Guide the learner to List 5-7 comparison dimensions as rows. Keep in mind: Include: definition,
    mechanism, presentation, treatment, prognosis'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Include: definition, mechanism, presentation, treatment, prognosis'
- step: 4
  name: Each Cell From Memory First
  action: Fill each cell from memory first
  tutor_does: 'Guide the learner to Fill each cell from memory first. Keep in mind: Retrieval before verification'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Retrieval before verification'
- step: 5
  name: And Correct Against Source
  action: Verify and correct against source
  tutor_does: 'Guide the learner to Verify and correct against source. Keep in mind: Note which cells
    you got wrong'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Note which cells you got wrong'
- step: 6
  name: Highlight The Key Discriminating Features
  action: Highlight the key discriminating features
  tutor_does: 'Guide the learner to Highlight the key discriminating features. Keep in mind: What''s the
    ONE thing that distinguishes them?'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What''s the ONE thing that distinguishes them?'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Ask probing questions about why features differ between concepts
- Challenge the learner to identify the MOST differentiating dimension
- Require memory-first filling before source verification
- Push for 5-7 comparison dimensions, not fewer
- Demand explicit discriminating features (the "one thing" that separates them)
- Question cells where the learner seems uncertain or vague
- Use Socratic questioning to expose confusion between the two concepts
- Require the learner to articulate what they got wrong and why
forbidden_moves:
- Accept a table with fewer than 5 comparison dimensions
- Provide the comparison table or fill cells FOR the learner
- Allow source lookup before memory-first attempt
- Skip discriminating feature identification
- Accept features that are identical across both concepts without probing for differences
- Teach new content — interrogation uses what was already encoded
- Move on without the learner identifying at least one key discriminator
- Accept one-word or surface-level answers without probing
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or
  route back to ENCODE/REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Features too similar across concepts
  detection: The learner or tutor starts doing features too similar across concepts or the artifact stops
    satisfying the method’s required checks.
  recovery: Focus on dimensions where they differ
  fallback_method: M-ENC-010
- mode: Not identifying discriminators
  detection: The learner or tutor starts doing not identifying discriminators or the artifact stops satisfying
    the method’s required checks.
  recovery: Force ranking — which row is MOST differentiating?
  fallback_method: M-INT-006
- mode: Looking up before trying
  detection: The learner or tutor starts doing looking up before trying or the artifact stops satisfying
    the method’s required checks.
  recovery: Fill from memory first
  fallback_method: M-INT-002
default_duration_min: 7
energy_cost: medium
best_stage: review
mechanisms:
- discrimination
- elaboration
evidence:
  citation: Alfieri et al. (2013)
  finding: Comparison-based learning improves discrimination and concept formation
  source: seed_methods.py
knobs:
  guidance_level: medium
  output_format: bullets
  required_when_confusable: true
  evidence_raw: Alfieri et al. (2013); comparison-based learning improves discrimination and concept formation
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  logging_fields:
  - concepts_compared
  - dimensions_used
  - discriminators_found
  - cells_corrected
  artifact_type: notes
related_methods:
- id: M-ENC-010
  relationship: Comparison-table cousin method
- id: M-INT-006
  relationship: Illness-script fallback if clinical discrimination is needed
- id: M-INT-002
  relationship: Clinical application fallback
