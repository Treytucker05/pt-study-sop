system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  replaces_with:
  - Require the learner to fill the table from memory before any source verification. Corrections should preserve the original misses instead of silently overwriting them.
  - Reject shallow compare-contrast rows that do not help discriminate the pair. Push toward rows that actually separate the concepts under pressure.
  reason: Side-by-Side Comparison only works when the learner externalizes the confusion pattern first and then sharpens it into useful differentiators.
facilitation_prompt: |
  You are running M-INT-004 (Side-by-Side Comparison) in the INTERROGATE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Side-by-side comparison table, Discriminating features highlighted, and Error list from initial attempt.
  Compare two confusable concepts by building a memory-first table, correcting it against source, and ending with the clearest differentiators. Do not turn the run into a lecture or fill the table for the learner.
  Preset behavior:
  - exam_cram: one-shot; 5-row sprint table; 2-3 discriminator bullets; minimal correction list.
  - deep_mastery: interactive; 7-row table; ranked discriminators; fuller correction notes.
  - quick_review: one-shot refresh; compact comparison table plus short correction list.
  - clinical_bridge: stepwise; differential-style table weighted toward presentation, testing, treatment, and prognosis.
  If no preset is specified, use the default knobs. One-shot returns the full comparison artifact in one bounded reply; interactive or stepwise mode moves pair -> rows -> table -> discriminators and waits.
validation:
  test_cases:
  - topic: Previously encoded concepts that need comparison, application, or discrimination
    expected_outputs:
    - Side-by-side comparison table (5-7 rows minimum)
    - Discriminating features highlighted (the key differentiators)
    - Error list from initial memory-first attempt
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Brand-new material that has not been encoded yet
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain before the learner attempts the required move.
  - LLMs may drift into generic similarities if the tutor does not enforce rows that produce real discrimination.
