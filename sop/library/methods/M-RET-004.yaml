id: M-RET-004
name: Mixed Practice
category: RETRIEVE
subcategory: interleaved
description: Interleave questions from 2-3 different topics in a single retrieval block. Builds discrimination and prevents blocked-practice illusion. Based on interleaving research (Rohrer et al.).
control_stage: RETRIEVE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- interleaving
- discrimination
- mixed
- evidence-based
purpose: Mixed Practice exists to run mixed retrieval practice that interleaves two or three topics to build discrimination and reduce blocked-practice illusion. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use REFERENCE if the learner needs an anchor first.
best_fit_topics:
- interleaving across topics
- discrimination training
- blocked-practice contrast
poor_fit_topics:
- blocked practice only
- single-topic drills
- teaching new material
learner_state_required: At least two topics are available and the learner can switch rapidly between them without needing fresh teaching.
inputs:
- description: 2-3 different topics for interleaving
  required: true
- description: Question bank or Tutor AI covering all topics
  required: true
- description: Timer (10 min recommended)
  required: true
- description: Randomization method (shuffle cards, AI random selection)
  required: true
