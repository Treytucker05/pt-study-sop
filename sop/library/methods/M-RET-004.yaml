constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Select 2-3 distinct but related topics for interleaving
- Randomize question order across topics (never block by topic)
- Require committed answer and topic classification before feedback
- Provide corrective feedback AFTER each answer is committed
- Track accuracy per topic separately
- Build confusion matrix showing which topics got mixed up
- Identify discrimination cues that distinguish topics
- Enforce time constraints (10 min)
- Route back to ENCODE on repeated misses in a topic
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Allow blocked practice (all topic A, then all topic B)
- Reveal answer before learner commits to a response
- Provide hints during first attempt
- Skip topic classification requirement per question
- Teach new material during retrieval
- Skip the confusion/discrimination reflection step
- Remove time constraints
- Accept answers without topic identification
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 10
energy_cost: high
best_stage: exam_prep
mechanisms:
- retrieval
- interleaving
- discrimination
- transfer
evidence:
  citation: Kang and Pashler (2012); Rohrer, Dedrick, Hartwig, and Cheung (2020); Brunmair and Richter (2019); Carvalho and Goldstone (2023)
  finding: Mixed Practice is best supported as an interleaved retrieval routine that improves later discrimination by forcing topic switching and comparison. Foundational interleaving work and later classroom studies show that mixed sets can outperform blocked formats on delayed performance when the learner must distinguish related categories or procedures, while broader interleaving reviews show that the benefit depends on the match between the mix and the discrimination demand. The practical implication for this method is to interleave genuinely confusable topics, score both answer accuracy and topic classification, and use the confusion pattern to decide what needs more focused repair.
  source: https://doi.org/10.1007/s11251-007-9015-8; https://doi.org/10.1037/edu0000367; https://doi.org/10.1007/s11251-020-09504-7; https://doi.org/10.1007/s10212-023-00723-3
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest interleave. Use 2 topics, a short mixed set, and terse bullets for per-topic accuracy plus one confusion cue.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest interleave. Use 3 topics, a longer mixed set, and a fuller confusion matrix plus discrimination insights by topic.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh interleave. Use a compact table with item number, topic, result, and confusion tag for fast pattern spotting.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied interleave. Mix applied scenarios from 2-3 confusable domains and return a short routing matrix centered on likely downstream mix-ups.
