id: M-HOOK-004
name: Memory Palace
category: encode
subcategory: hook
description: Use spatial memory to encode ordered sequences by associating items with familiar locations.
  Based on the ancient Method of Loci used by Greek orators and memory champions.
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- memory
- spatial
- sequence
- visualization
- kwik-inspired
purpose: Create a compact memory cue that links a term or concept to a vivid sound, image, or body-based
  anchor without losing the real meaning.
not_for: This is not for teaching the whole concept from scratch, replacing source truth, or turning a
  mnemonic into a false fact claim.
best_fit_topics:
- Short labels, terms, and anchors that need fast recall
- Material that benefits from a vivid sound/image cue
poor_fit_topics:
- Long mechanistic explanations that need comprehension first
- Unstable or ambiguous material with no clear cue
learner_state_required: Source material is loaded. The learner has one bounded term or concept and is
  ready to actively build a cue around its true meaning.
inputs:
- description: List of items to memorize (5-10 optimal)
  required: true
- description: Familiar location (home, route, etc.)
  required: true
- description: Imagination for vivid imagery
  required: true
outputs:
- name: Mental palace with placed items
  description: Mental palace with placed items
  format: labeled visual structure
- name: Retrieval accuracy check
  description: Retrieval accuracy check
  format: short, checkable artifact
- name: Weak links identified
  description: Weak links identified
  format: short, checkable artifact
required_outputs: &id001
- Mental palace with placed items
- Retrieval accuracy check
- Weak links identified
success_criteria:
- 'All required outputs are present and checkable: Mental palace with placed items, Retrieval accuracy
  check, Weak links identified.'
- 'The method reaches its stop condition: All items placed; Can retrieve forward and backward.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Mental palace with placed
  items, Retrieval accuracy check.'
steps:
- step: 1
  name: A Familiar Location
  action: Choose a familiar location
  tutor_does: 'Guide the learner to Choose a familiar location. Keep in mind: Must be deeply familiar
    (your home, daily route)'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Does the learner have the right term and true meaning before the cue is built?
  example: 'Example: Must be deeply familiar (your home, daily route)'
- step: 2
  name: 5 10 Specific Spots In
  action: Identify 5-10 specific spots in order
  tutor_does: 'Guide the learner to Identify 5-10 specific spots in order. Keep in mind: Door, couch,
    kitchen sink, bed, etc.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Door, couch, kitchen sink, bed, etc.'
- step: 3
  name: Vivid Absurd Image For Item
  action: Create vivid absurd image for item 1
  tutor_does: 'Guide the learner to Create vivid absurd image for item 1. Keep in mind: Exaggerated, emotional,
    bizarre'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Exaggerated, emotional, bizarre'
- step: 4
  name: Place Image At Location 1
  action: Place image at location 1
  tutor_does: 'Guide the learner to Place image at location 1. Keep in mind: Mentally "stick" it there'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Mentally "stick" it there'
- step: 5
  name: Continue For All Items
  action: Continue for all items
  tutor_does: 'Guide the learner to Continue for all items. Keep in mind: One item per location'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: One item per location'
- step: 6
  name: Walk Through Palace Mentally
  action: Walk through palace mentally
  tutor_does: 'Guide the learner to Walk through palace mentally. Keep in mind: Retrieve items in order'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Retrieve items in order'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
- rule: Confirm the true meaning before making the hook
  why: Hooks support recall; they do not replace understanding.
allowed_moves:
- Prompt learner to choose a deeply familiar location for the palace
- Guide learner to identify 5-10 specific spots in sequential order
- Suggest vivid, absurd, emotional imagery for each item placement
- Prompt learner to mentally place each item at its location (learner creates the loci)
- Guide the mental walkthrough to test retrieval in order
- Prompt forward and backward retrieval to verify completeness
- Identify weak links where retrieval breaks and suggest strengthening imagery
- Suggest splitting into multiple palaces if list exceeds 10 items
forbidden_moves:
- Create the palace locations or loci FOR the learner
- Dictate specific images instead of letting learner generate their own
- Allow unfamiliar or imagined locations (must be deeply known places)
- Accept bland or non-vivid imagery without prompting for absurdity/emotion
- Skip the mental walkthrough retrieval test
- Allow more than 10 items in a single palace without splitting
- Deliver a passive list review instead of guiding spatial encoding
- Move to retrieval before the learner can walk the palace without errors
stuck_protocol: Shrink to one term, restate the real meaning in plain language, then try a simpler sound
  cue, image cue, or body cue. If the cue still does not click, switch to a lighter mnemonic lane or ask
  for one concrete example.
failure_modes:
- mode: Locations not familiar
  detection: The learner or tutor starts doing locations not familiar or the artifact stops satisfying
    the method’s required checks.
  recovery: Use your actual home, not imagined places
  fallback_method: M-HOOK-002
- mode: Images not vivid/absurd
  detection: The learner or tutor starts doing images not vivid/absurd or the artifact stops satisfying
    the method’s required checks.
  recovery: Add action, emotion, exaggeration
  fallback_method: M-HOOK-003
- mode: Too many items
  detection: The learner or tutor starts doing too many items or the artifact stops satisfying the method’s
    required checks.
  recovery: Max 10 per palace; create new palace for more
  fallback_method: M-HOOK-005
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- dual_coding
- elaboration
- visualization
- generation
evidence:
  citation: Dresler et al. (2017)
  finding: fMRI study showed memory athletes using Method of Loci exhibit distinct patterns of functional
    brain connectivity; 40 days of loci training significantly improved recall in naive subjects
  source: Neuron, 93(5), 1227-1235
knobs:
  guidance_level: medium
  output_format: bullets
  evidence_raw: Dresler et al. (2017); fMRI shows Method of Loci training rewires functional connectivity
    and improves recall. Historical roots in Yates (1966), The Art of Memory.
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  logging_fields:
  - items_memorized
  - locations_used
  - retrieval_accuracy
  - time_to_build
  artifact_type: notes
related_methods:
- id: M-HOOK-002
  relationship: Mnemonic support for dense fact sets
- id: M-HOOK-003
  relationship: Rhyme hook fallback for ordered items
- id: M-HOOK-005
  relationship: Chain-linking alternative
