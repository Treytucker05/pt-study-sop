id: M-HOOK-004
name: Memory Palace
category: ENCODE
subcategory: hook
description: Use spatial memory to encode ordered sequences by associating items with familiar locations. Based on the ancient Method of Loci used by Greek orators and memory champions.
control_stage: ENCODE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- memory
- spatial
- sequence
- visualization
- kwik-inspired
- encode
purpose: Create a compact memory cue that links a term or concept to a vivid sound, image, or body-based anchor without losing the real meaning.
not_for: This is not for teaching the whole concept from scratch, replacing source truth, or turning a mnemonic into a false fact claim.
best_fit_topics:
- Short labels, terms, and anchors that need fast recall
- Material that benefits from a vivid sound/image cue
poor_fit_topics:
- Long mechanistic explanations that need comprehension first
- Unstable or ambiguous material with no clear cue
learner_state_required: Source material is loaded. The learner has one bounded term or concept and is ready to actively build a cue around its true meaning.
inputs:
- description: List of items to memorize (5-10 optimal)
  required: true
- description: Familiar location (home, route, etc.)
  required: true
- description: Imagination for vivid imagery
  required: true
outputs:
- name: Mental palace with placed items
  description: Mental palace with placed items
  format: labeled visual structure
- name: Retrieval accuracy check
  description: Retrieval accuracy check
  format: short, checkable artifact
- name: Weak links identified
  description: Weak links identified
  format: short, checkable artifact
artifact_schemas:
  Mental palace with placed items: tree_map
  Retrieval accuracy check: string
  Weak links identified: string
produces:
- Mental palace with placed items
- Retrieval accuracy check
- Weak links identified
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs: &id001
- Mental palace with placed items
- Retrieval accuracy check
- Weak links identified
success_criteria:
- 'All required outputs are present and checkable: Mental palace with placed items, Retrieval accuracy check, Weak links identified.'
- 'The method reaches its stop condition: All items placed; Can retrieve forward and backward.'
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Mental palace with placed items, Retrieval accuracy check.'
steps:
- step: 1
  name: A Familiar Location
  action: Choose a familiar location
  tutor_does: 'Guide the learner to Choose a familiar location. Keep in mind: Must be deeply familiar (your home, daily route)'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Does the learner have the right term and true meaning before the cue is built?
  example: 'Example: Must be deeply familiar (your home, daily route)'
- step: 2
  name: 5 10 Specific Spots In
  action: Identify 5-10 specific spots in order
  tutor_does: 'Guide the learner to Identify 5-10 specific spots in order. Keep in mind: Door, couch, kitchen sink, bed, etc.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Door, couch, kitchen sink, bed, etc.'
- step: 3
  name: Vivid Absurd Image For Item
  action: Create vivid absurd image for item 1
  tutor_does: 'Guide the learner to Create vivid absurd image for item 1. Keep in mind: Exaggerated, emotional, bizarre'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Exaggerated, emotional, bizarre'
- step: 4
  name: Place Image At Location 1
  action: Place image at location 1
  tutor_does: 'Guide the learner to Place image at location 1. Keep in mind: Mentally "stick" it there'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Mentally "stick" it there'
- step: 5
  name: Continue For All Items
  action: Continue for all items
  tutor_does: 'Guide the learner to Continue for all items. Keep in mind: One item per location'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: One item per location'
- step: 6
  name: Walk Through Palace Mentally
  action: Walk through palace mentally
  tutor_does: 'Guide the learner to Walk through palace mentally. Keep in mind: Retrieve items in order'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Retrieve items in order'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: "This gating rule is part of the method\u2019s execution contract."
- rule: Keep output scoped to mapped objectives only.
  why: "This gating rule is part of the method\u2019s execution contract."
- rule: Confirm the true meaning before making the hook
  why: Hooks support recall; they do not replace understanding.
allowed_moves:
- Prompt learner to choose a deeply familiar location for the palace
- Guide learner to identify 5-10 specific spots in sequential order
- Suggest vivid, absurd, emotional imagery for each item placement
- Prompt learner to mentally place each item at its location (learner creates the loci)
- Guide the mental walkthrough to test retrieval in order
- Prompt forward and backward retrieval to verify completeness
- Identify weak links where retrieval breaks and suggest strengthening imagery
- Suggest splitting into multiple palaces if list exceeds 10 items
forbidden_moves:
- Create the palace locations or loci FOR the learner
- Dictate specific images instead of letting learner generate their own
- Allow unfamiliar or imagined locations (must be deeply known places)
- Accept bland or non-vivid imagery without prompting for absurdity/emotion
- Skip the mental walkthrough retrieval test
- Allow more than 10 items in a single palace without splitting
- Deliver a passive list review instead of guiding spatial encoding
- Move to retrieval before the learner can walk the palace without errors
stuck_protocol: Shrink to one term, restate the real meaning in plain language, then try a simpler sound cue, image cue, or body cue. If the cue still does not click, switch to a lighter mnemonic lane or ask for one concrete example.
failure_modes:
- mode: Locations not familiar
  detection: "The learner or tutor starts doing locations not familiar or the artifact stops satisfying the method\u2019s required checks."
  recovery: Use your actual home, not imagined places
  fallback_method: M-HOOK-002
- mode: Images not vivid/absurd
  detection: "The learner or tutor starts doing images not vivid/absurd or the artifact stops satisfying the method\u2019s required checks."
  recovery: Add action, emotion, exaggeration
  fallback_method: M-HOOK-003
- mode: Too many items
  detection: "The learner or tutor starts doing too many items or the artifact stops satisfying the method\u2019s required checks."
  recovery: Max 10 per palace; create new palace for more
  fallback_method: M-HOOK-005
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- dual_coding
- elaboration
- visualization
- generation
evidence:
  citation: Bellezza (1981); Dresler et al. (2017); Gross, Rebok, Unverzagt, Willis, and Brandt (2014); Wagner et al. (2021)
  finding: Memory Palace is best supported as a method-of-loci strategy for ordered recall when the learner uses a fixed familiar route and one vivid image per locus. Mnemonic reviews identify loci as especially well suited to serial-order learning, and modern training studies show that method-of-loci practice can produce large recall gains and more durable memory in ordinary learners, not just memory athletes. The practical implication for this method is to keep the route stable, limit the number of loci, place one strong image at each stop, and finish with an explicit walk-through that exposes weak links before the sequence is trusted.
  source: https://doi.org/10.3102/00346543051002247; https://doi.org/10.1016/j.neuron.2017.02.003; https://doi.org/10.1080/0361073X.2014.882204; https://doi.org/10.1126/sciadv.abc7606
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
related_methods:
- id: M-HOOK-005
  relationship: Use when the sequence needs narrative chaining rather than spatial placement
- id: M-OVR-003
  relationship: Use when the palace sequence should be turned into a later drill sheet
facilitation_prompt: |-
  You are running M-HOOK-004 (Memory Palace) in the ENCODE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Mental palace with placed items, Retrieval accuracy check, and Weak links identified.
  Encode one ordered sequence with a fixed familiar route, one vivid image per locus, and a final retrieval walk that exposes weak placements before the palace is locked.
  Preset behavior:
  - exam_cram: one-shot; 5-locus micro-palace and one quick retrieval walk.
  - deep_mastery: interactive; 8-10 loci, refined images, fuller retrieval walk, weak-link repair notes.
  - quick_review: one-shot refresh; Locus | Image | Item | Weak link? table.
  - clinical_bridge: stepwise; route-to-action grid for applied ordered steps or red flags.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves route -> placements -> retrieval walk and waits.
validation:
  test_cases:
  - topic: Short labels, terms, and anchors that need fast recall
    expected_outputs: *id001
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Long mechanistic explanations that need comprehension first
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain before the learner attempts the required move.
  - LLMs may drift outside scope when the topic is broad or ambiguous.
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: One-shot; build a 5-locus micro-palace with item placements and one quick retrieval walk.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Interactive; map 8-10 loci, refine the images, and run a fuller retrieval walk with weak-link repair notes.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: One-shot refresh; present Locus | Image | Item | Weak link? in a compact table.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Stepwise; use a route-to-action grid so each locus anchors a practical step, red flag, or ordered decision point.
