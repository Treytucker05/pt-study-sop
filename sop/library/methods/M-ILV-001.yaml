id: M-ILV-001
name: Cross-Topic Link
category: INTERLEAVE
subcategory: cross-topic-link
description: Identify 2-3 meaningful links between the current topic and topics from other courses, then name the shared principle behind each link.
control_stage: INTERLEAVE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- interleave
- integration
- transfer
- cross-course
- shared-principles
- big-picture
purpose: Cross-Topic Link exists to interleave already-encoded material by forcing the learner to connect the current topic to other domains, explain why the links hold, and name the shared principles beneath them. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
- Topics whose value increases when connected across anatomy, physiology, pathology, pharmacology, or clinical reasoning
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or interleave
- Topics that cannot yet be linked because the prerequisite domains are not available
learner_state_required: The target concept has already been taught or encoded. The learner can attempt retrieval, comparison, or application before seeing the answer.
inputs:
- description: Current topic
  required: true
- description: Access to previous course notes
  required: false
outputs:
- name: Cross-topic connection list (2-3 connections)
  description: Two or three concrete cross-topic links worth carrying forward.
  format: bulleted or tabular list
- name: Explanatory sentences (each with a because clause)
  description: One explanatory sentence for each connection using an explicit because-clause.
  format: bulleted list or short paragraph set
- name: Shared principles identified for each connection
  description: General rule, mechanism, or structure that explains why the connection holds.
  format: bulleted or tabular list
artifact_schemas:
  Cross-topic connection list (2-3 connections): bullet_list
  Explanatory sentences (each with a because clause): bullet_list
  Shared principles identified for each connection: bullet_list
produces:
- Cross-topic connection list (2-3 connections)
- Explanatory sentences (each with a because clause)
- Shared principles identified for each connection
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Cross-topic connection list (2-3 connections)
- Explanatory sentences (each with a because clause)
- Shared principles identified for each connection
success_criteria:
- All required outputs are present for M-ILV-001.
- The learner identifies 2-3 links and explains each one with a because-clause tied to a shared principle.
- The learner stays active and the tutor does not give away the answer before the required attempt or transformation.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Explanatory sentences (each with a because clause).'
- The method stayed in the correct stage but the links remained too vague or too intra-course to be useful.
steps:
- step: 1
  name: State the current topic
  action: State the current topic clearly.
  tutor_does: Guide the learner to name the current topic clearly and identify the core concept that should anchor the links.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What is the core concept?'
- step: 2
  name: Brainstorm cross-course candidates
  action: Brainstorm connections to other courses.
  tutor_does: Guide the learner to brainstorm possible links across anatomy, physiology, pathology, pharmacology, clinical, or other relevant domains.
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Think anatomy, physiology, pathology, pharmacology, or clinical.'
- step: 3
  name: Pick the strongest links
  action: Identify 2-3 strongest cross-topic links.
  tutor_does: Guide the learner to select the strongest links based on shared mechanism, shared structure, or cause-effect chain rather than loose theme overlap.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Look for shared mechanisms, shared structures, or cause-effect chains.'
- step: 4
  name: Explain each link
  action: Write a sentence explaining each connection.
  tutor_does: Guide the learner to write one sentence per connection using a because-clause that explains how the link operates.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: [Topic A] connects to [Topic B] because...'
- step: 5
  name: Name the shared principle
  action: Identify the shared principle underlying the connection.
  tutor_does: Guide the learner to name the general rule, mechanism, or structure that underlies each connection.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What general rule applies to both?'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Ask probing questions about why connections exist and demand because-statements
- Challenge vague or superficial connections and require a specific shared mechanism
- Push for cross-course connections, not just within-course links
- Require identification of the underlying shared principle
- Use Socratic questioning to help the learner discover deeper connections
- Suggest alternative connection dimensions if the learner is stuck, such as shared structure, cause-effect, or shared mechanism
- Demand that the learner explain how the connection operates, not just that it exists
forbidden_moves:
- Accept connections without explanatory because-statements
- Accept only within-course connections when a cross-course link is available
- Provide the connections for the learner
- Accept listing without explanation of shared principles
- Skip the shared principle identification step
- Teach new content because interrogation uses what was already encoded
- Move on with fewer than 2 connections identified
- Accept one-word or surface-level answers without probing
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or route back to ENCODE/REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Connections too vague
  detection: The learner or tutor starts doing connections too vague or the artifact stops satisfying the method’s required checks.
  recovery: Require a specific shared mechanism or structure.
  fallback_method: M-ORG-001
- mode: Only within-course connections
  detection: The learner or tutor starts doing only within-course connections or the artifact stops satisfying the method’s required checks.
  recovery: At least one connection must come from a different course or domain when possible.
  fallback_method: M-ELB-001
- mode: Listing without explaining
  detection: The learner or tutor starts doing listing without explaining or the artifact stops satisfying the method’s required checks.
  recovery: Each connection needs an explicit because-statement.
  fallback_method: M-ILV-002
default_duration_min: 3
energy_cost: medium
best_stage: consolidation
mechanisms:
- transfer
- knowledge_integration
- elaboration
- analogical_reasoning
- schema_abstraction
- relational_reasoning
evidence:
  citation: Barnett and Ceci (2002); Richland and Simms (2015); Lehmann, Rott, and Schmidt-Borcherding (2019); Fries, Son, Givvin, et al. (2021); Lehmann (2022)
  finding: Cross-Topic Link is best supported as an explicit knowledge-integration and transfer method, not as a loose brainstorming exercise. Far-transfer research and analogy-informed learning theory both suggest that flexible use of knowledge depends on seeing structural relationships across contexts rather than storing topics as isolated units. More recent instructional and integration work also suggests that learners build more coherent knowledge when connections are made explicit, practiced repeatedly, and explained rather than merely noticed. The practical implication for this method is to require 2-3 concrete links, force a because-clause for each one, and name the shared principle so the learner leaves with a reusable cross-domain rule rather than a vague association.
  source: https://doi.org/10.1037/0033-2909.128.4.612; https://doi.org/10.1002/wcs.1336; https://doi.org/10.1007/s11251-018-9472-2; https://doi.org/10.1007/s10648-020-09561-x; https://doi.org/10.1007/s10212-021-00577-7
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest linkage pass. Return 2 concise cross-topic links, 2 because-sentences, and 2 shared-principle bullets.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full integration pass. Build 3 links, explain each one in fuller prose, and include a dedicated section on why the shared principle matters across courses.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh linkage pass. Use a compact table with columns for current topic, linked topic, because, and shared principle.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied linkage pass. Anchor the links to patient care or clinical reasoning by showing how anatomy, physiology, pathology, or treatment logic converge in practice.
related_methods:
- id: M-ORG-001
  relationship: Concept map fallback for networked links
- id: M-ELB-001
  relationship: Analogy bridge cousin method
- id: M-ILV-002
  relationship: Comparison fallback if the links are confusion-driven
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  replaces_with:
  - Require the learner to propose candidate links before you refine them. You may offer a domain menu, but do not supply the final cross-topic network before an attempt.
  - Reject vague thematic associations. Every accepted link must include both a because-clause and a named shared principle.
  reason: Cross-Topic Link only works when the learner performs the relational integration work rather than receiving a prebuilt list of connections.
facilitation_prompt: |
  You are running M-ILV-001 (Cross-Topic Link) in the INTERLEAVE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Cross-topic connection list, Explanatory sentences, and Shared principles.
  Build 2-3 meaningful links between the current topic and other domains, explain each one with a because-clause, and name the shared principle without turning the run into a lecture or a loose brainstorm.
  Preset behavior:
  - exam_cram: one-shot; 2 terse links; because-sentences; principle bullets.
  - deep_mastery: interactive; 3 fuller links with a dedicated shared-principle section.
  - quick_review: one-shot refresh; compact connection table.
  - clinical_bridge: stepwise; cross-domain links tied to patient care or clinical reasoning.
  If no preset is specified, use the default knobs. One-shot returns the full linkage artifact in one bounded reply; interactive or stepwise mode moves topic -> candidates -> links -> principles and waits.
validation:
  test_cases:
  - topic: Previously encoded concepts that need comparison, application, or discrimination
    expected_outputs:
    - Cross-topic connection list (2-3 connections)
    - Explanatory sentences (each with a because clause)
    - Shared principles identified for each connection
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Brand-new material that has not been encoded yet
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain before the learner attempts the required move.
  - LLMs may generate thematic but structurally weak links if the tutor does not enforce the because-clause and shared-principle steps.
