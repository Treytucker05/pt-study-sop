id: M-ENC-001
name: KWIK Hook
category: encode
description: 'Structured 6-step encoding protocol for new terms. Sound (phonetic cue) → Function (true meaning) → Image (vivid
  visual tied to function) → Entwine (PIE method: personal meaning) → Resonance (learner confirms it clicks) → Lock (record
  as card/log). Each step is gated — don''t skip ahead.'
default_duration_min: 3
energy_cost: medium
best_stage: first_exposure
control_stage: ENCODE
status: validated
tags:
- mnemonic
- kwik
- hook
- gated
- sop-core
- dual-coding
mechanisms:
- dual_coding
- elaboration
- generation
- emotional_encoding
stipulations:
- Confirm the learner understands the concept's function before building the hook.
- Hooks support understanding; they do not replace explanation.
- If a hook uses broader teaching knowledge or analogy, do not present it as if it came directly from source material.
knobs:
  guidance_level: medium
  output_format: bullets
constraints:
  active_processing_required: true
  objective_scope_required: true
  no_final_answer_only: true
inputs:
- New term or concept to encode
- Definition or meaning from source material
- Blank note area for hook creation
steps:
- step: 1
  action: 'Sound: Find a phonetic cue or rhyme that sounds like the term'
  notes: 'Example: ''Sartorius'' sounds like ''Sartorial'' (relating to tailoring)'
- step: 2
  action: 'Function: State the true meaning/function in one sentence'
  notes: Must come from source material (Source-Lock)
- step: 3
  action: 'Image: Create a vivid mental image that connects sound to function'
  notes: The weirder/more emotional, the better for retention
- step: 4
  action: 'Entwine: Connect the image with personal meaning (PIE method)'
  notes: Add emotion, absurdity, or personal experience. Why does this matter to YOU?
- step: 5
  action: 'Resonance: Confirm aloud that the hook makes sense to you'
  notes: 'Say: ''This clicks because...'''
- step: 6
  action: 'Lock: Record the hook as an Anki card or session log entry'
  notes: Capture for spaced repetition
outputs:
- KWIK hook (sound-function-image triplet)
- Anki card draft (optional)
- Session log entry
stop_criteria:
- All 6 steps completed
- Hook feels "locked" (resonance confirmed)
- 3 minutes elapsed per term
failure_modes:
- mode: Skipping steps
  mitigation: Gate each step; don't proceed without completion
- mode: Image too abstract
  mitigation: Make it concrete, visual, and bizarre
- mode: Sound cue forced
  mitigation: If phonetics don't work, try acronym or first-letter cue
- mode: Weak personal connection
  mitigation: Add emotion, stakes, or personal relevance - why does this matter to YOU?
logging_fields:
- term_encoded
- hook_type
- resonance_confirmed
- card_created
evidence:
  citation: Paivio (1991)
  finding: Dual-coding theory — combining verbal + visual improves retention by creating multiple retrieval paths
  source: seed_methods.py
evidence_raw: Paivio (1991); dual-coding theory — combining verbal + visual improves retention
facilitation_prompt: 'You are running M-ENC-001 (KWIK Hook) in ENCODE stage.

  Execute this method card exactly and keep outputs deterministic.


  Stage hard rules:

  - Force active learner processing.

  - Prefer transformation over passive lecture.

  - Keep focus on target concept scope.
  - Confirm concept function before mnemonic elaboration begins.
  - Treat hooks as memory supports, not as evidence claims.


  Required outputs:

  - KWIK hook (sound-function-image triplet)

  - Anki card draft (optional)

  - Session log entry


  Stop conditions:

  - All 6 steps completed

  - Hook feels "locked" (resonance confirmed)

  - 3 minutes elapsed per term


  If required inputs are missing, request only the minimum needed input and continue.

  If you use analogy or broader teaching knowledge to make a hook vivid, label it as a teaching support rather than as sourced fact.

  '
gating_rules:
- Force active processing (explain, transform, or map), not passive reading.
- Keep output scoped to mapped objectives only.
artifact_type: notes
allowed_moves:
- Explain concept function in one clear sentence before hook building begins
- Guide learner through each of the 6 gated steps in order
- Suggest phonetic cues or rhymes if learner is stuck on Sound step
- Prompt learner to create their own vivid image (do not create it for them)
- Use Socratic questioning to deepen personal connection at Entwine step
- Provide scaffold hints at any step if learner is stuck for >30 seconds
- Confirm resonance by asking learner to articulate why the hook clicks
- Connect hook to prior knowledge or related concepts
forbidden_moves:
- Skip any of the 6 gated steps or allow out-of-order execution
- Create the hook image or mnemonic FOR the learner
- Accept "I understand" without the learner demonstrating resonance
- Move to Lock step without explicit resonance confirmation
- Present hook-derived associations as source-material facts
- Deliver a passive lecture about the term instead of guiding hook creation
- Present information outside the objective scope
- Proceed to retrieval practice before encoding is complete
required_outputs:
- KWIK hook (sound-function-image triplet)
- Session log entry
