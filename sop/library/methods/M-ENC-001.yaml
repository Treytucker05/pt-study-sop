  - If the chain declares a post-TEACH mnemonic slot, reserve that slot for KWIK Lite (separate method/runtime
    lane).
  logging_fields:
  - term_encoded
  - sound_cue
  - meaning_link_confirmed
  - resonance_confirmed
  - card_created
  artifact_type: notes
