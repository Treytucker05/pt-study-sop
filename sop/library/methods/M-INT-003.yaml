id: M-INT-003
name: Cross-Topic Link
category: interrogate
subcategory: int
description: Identify 2-3 connections between this topic and topics from other courses. Look for shared
  principles.
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- integration
- cross-course
- big-picture
- transfer
purpose: Interrogate already-encoded material through comparison, application, retrieval, or transfer
  so the learner can discriminate it under pressure.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has
  not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or interrogation
learner_state_required: The target concept has already been taught or encoded. The learner can attempt
  retrieval, comparison, or application before seeing the answer.
inputs:
- description: Current topic
  required: true
- description: Access to previous course notes (optional)
  required: false
outputs:
- name: Cross-topic connection list (2-3)
  description: Cross-topic connection list (2-3)
  format: short, checkable artifact
- name: Explanatory sentences
  description: Explanatory sentences
  format: short, checkable artifact
- name: Shared principles identified
  description: Shared principles identified
  format: short, checkable artifact
required_outputs: &id001
- Cross-topic connection list (2-3 connections)
- Explanatory sentences (each with a "because" clause)
- Shared principles identified for each connection
success_criteria:
- 'All required outputs are present and checkable: Cross-topic connection list (2-3 connections), Explanatory
  sentences (each with a "because" clause), Shared principles identified for each connection.'
- 'The method reaches its stop condition: 2-3 connections identified; Each explained in one sentence.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Cross-topic connection
  list (2-3 connections), Explanatory sentences (each with a "because" clause).'
steps:
- step: 1
  name: The Current Topic Clearly
  action: State the current topic clearly
  tutor_does: 'Guide the learner to State the current topic clearly. Keep in mind: What''s the core concept?'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What''s the core concept?'
- step: 2
  name: Brainstorm Connections To Other Courses
  action: Brainstorm connections to other courses
  tutor_does: 'Guide the learner to Brainstorm connections to other courses. Keep in mind: Think: anatomy,
    physiology, pathology, pharmacology, clinical'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Think: anatomy, physiology, pathology, pharmacology, clinical'
- step: 3
  name: 2 3 Strongest Cross Topic
  action: Identify 2-3 strongest cross-topic links
  tutor_does: 'Guide the learner to Identify 2-3 strongest cross-topic links. Keep in mind: Look for:
    shared mechanisms, shared structures, cause-effect chains'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Look for: shared mechanisms, shared structures, cause-effect chains'
- step: 4
  name: A Sentence Explaining Each Connection
  action: Write a sentence explaining each connection
  tutor_does: 'Guide the learner to Write a sentence explaining each connection. Keep in mind: Format:
    ''[Topic A] connects to [Topic B] because...'''
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Format: ''[Topic A] connects to [Topic B] because...'
- step: 5
  name: The Shared Principle Underlying The
  action: Identify the shared principle underlying the connection
  tutor_does: 'Guide the learner to Identify the shared principle underlying the connection. Keep in mind:
    What general rule applies to both?'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What general rule applies to both?'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Ask probing questions about why connections exist (demand "because" statements)
- Challenge vague or superficial connections — require specific shared mechanisms
- Push for cross-course connections, not just within-course links
- Require identification of the underlying shared principle
- Use Socratic questioning to help learner discover deeper connections
- Suggest alternative connection dimensions if learner is stuck (shared structure, cause-effect, shared
  mechanism)
- Demand the learner explain HOW the connection operates, not just that it exists
forbidden_moves:
- Accept connections without explanatory "because" statements
- Accept only within-course connections (at least one must be cross-course)
- Provide the connections FOR the learner
- Accept listing without explanation of shared principles
- Skip the shared principle identification step
- Teach new content — interrogation uses what was already encoded
- Move on with fewer than 2 connections identified
- Accept one-word or surface-level answers without probing
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or
  route back to ENCODE/REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Connections too vague
  detection: The learner or tutor starts doing connections too vague or the artifact stops satisfying
    the method’s required checks.
  recovery: Require specific shared mechanism or structure
  fallback_method: M-ENC-009
- mode: Only within-course connections
  detection: The learner or tutor starts doing only within-course connections or the artifact stops satisfying
    the method’s required checks.
  recovery: At least one must be from a different course
  fallback_method: M-INT-001
- mode: Listing without explaining
  detection: The learner or tutor starts doing listing without explaining or the artifact stops satisfying
    the method’s required checks.
  recovery: Each connection needs a "because" statement
  fallback_method: M-INT-004
default_duration_min: 3
energy_cost: medium
best_stage: consolidation
mechanisms:
- elaboration
- transfer
evidence:
  citation: Pugh & Bergin (2006)
  finding: Interest and retention deepen when learners see cross-domain connections
  source: seed_methods.py
knobs:
  guidance_level: medium
  output_format: bullets
  evidence_raw: Pugh & Bergin (2006); interest deepens when learners see cross-domain connections
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  logging_fields:
  - topic_linked
  - cross_topics
  - shared_principles
  artifact_type: notes
related_methods:
- id: M-ENC-009
  relationship: Concept map fallback for networked links
- id: M-INT-001
  relationship: Analogy bridge cousin method
- id: M-INT-004
  relationship: Comparison fallback if the links are confusion-driven
