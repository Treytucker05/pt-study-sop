id: M-CAL-002
name: Full Calibrate Probes
category: calibrate
description: Run the FULL CALIBRATE probe set after TEACH-close artifact to generate scored evidence for routing.
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
control_stage: CALIBRATE
status: validated
calibrate_phase: full
calibrate_scope: post_teach
tags:
- calibrate
- confidence
- metacognition
- risk-detection
- full-calibrate
mechanisms:
- metacognitive_monitoring
- calibration
stipulations:
- This is FULL CALIBRATE and runs after TEACH close artifact.
- Confidence must be captured before correctness feedback.
- High-confidence misses are highest-priority risk signals.
- Confidence alone cannot lower difficulty without performance evidence.
when_to_use:
- After TEACH close artifact is produced.
- Before ENCODE method selection and retrieval scheduling.
when_not_to_use:
- Never as a replacement for opening MICRO-CALIBRATE.
- Skip only when a validated full-calibrate result already exists for the same objective scope.
knobs:
  item_count: 6
  max_duration_min: 5
  confidence_scale: HML
  miscalibration_threshold: 0.2
constraints:
  full_calibrate_stage: true
  confidence_before_feedback_required: true
  confidence_only_adaptation_disallowed: true
gating_rules:
- Run scored probes only after TEACH-close artifact exists.
- Capture confidence before correctness feedback for every attempted item.
- Treat this block as diagnostic-only; do not teach or explain content deeply.
- Never lower difficulty based on confidence alone; require correctness/latency corroboration.
- Preserve a single confidence_scale throughout the block.
inputs:
- TEACH-close artifact (anchor/map/table/flow)
- Full-calibrate probe set aligned to objective scope
- Item correctness
- Item latency
steps:
- step: 1
  action: Run item_count scored probes against current objective scope
  notes: Use max_duration_min hard cap.
- step: 2
  action: Apply confidence tag before correctness feedback on each probe
  notes: Use configured confidence_scale.
- step: 3
  action: Identify high-confidence misses and low-confidence hits
  notes: Both are miscalibration signals.
- step: 4
  action: Compute full-calibrate bias and emit risk flags
  notes: Feeds M-CAL-003 priority ranking and ENCODE routing.
outputs:
- FullCalibrateItemResults
- ConfidenceTaggedResults
- HighConfidenceMisses
- LowConfidenceHits
- CalibrationRiskFlags
- FullCalibrateSnapshot
artifact_type: notes
stop_criteria:
- item_count probes attempted or timer cap reached
- Every attempted item has confidence tag
- FullCalibrateSnapshot and risk flags generated
failure_modes:
- mode: Learner always picks same confidence level
  mitigation: Collapse scale to HML and continue.
- mode: Confidence captured after feedback
  mitigation: Invalidate tag and re-prompt before revealing correctness.
- mode: Confidence manipulated to force easier flow
  mitigation: Weight adaptation by correctness and latency first.
logging_fields:
- item_count_attempted
- item_count_correct
- confidence_scale
- high_confidence_miss_count
- low_confidence_hit_count
- calibration_bias_score
- risk_flag_count
evidence:
  citation: Metcalfe (2017)
  finding: Calibration monitoring supports targeted corrective learning.
  source: control-plane migration
evidence_strength: high
primary_citations:
- Metcalfe (2017)
- Dunlosky et al. (2013)
evidence_raw: Confidence-calibration signals improve targeting of corrective study actions.
allowed_moves:
- Run scored full-calibrate probes against TEACH-covered objective scope
- Apply confidence tag to each item using configured confidence scale
- Capture confidence BEFORE revealing correctness feedback
- Identify high-confidence misses (overconfidence signals)
- Identify low-confidence hits (underconfidence signals)
- Compute calibration bias summary (confidence vs correctness pattern)
- Emit risk flags for downstream routing
- Collapse scale to HML if learner always picks same level
- Invalidate and re-prompt if confidence captured after feedback
forbidden_moves:
- Run this block before TEACH-close artifact exists
- Reveal correctness before confidence tag is captured (never reverse order)
- Teach or explain content during calibration (diagnostic only)
- Lower difficulty based on confidence alone (requires correctness/latency corroboration)
- Skip confidence capture for any attempted item
- Switch into teaching or tutoring mode
- Change confidence scale mid-block
- Use confidence data to bypass performance-based routing
required_outputs:
- FullCalibrateItemResults (per-item correctness, latency, confidence)
- ConfidenceTaggedResults (per-item confidence + correctness)
- HighConfidenceMisses (overconfidence items)
- LowConfidenceHits (underconfidence items)
- CalibrationRiskFlags (routing signals for downstream methods)
- FullCalibrateSnapshot (post-TEACH diagnostic summary)
facilitation_prompt: 'You are running M-CAL-002 (Full Calibrate Probes) in CALIBRATE stage.

  This is FULL CALIBRATE and must run after TEACH-close artifact.


  Requirements:

  - Run {item_count} scored probes within {max_duration_min} minutes.

  - Tag each item with confidence ({confidence_scale}) before correctness feedback.

  - Detect and list high-confidence misses and low-confidence hits.

  - Compute calibration risk using {miscalibration_threshold} as alert boundary.


  Return exactly:

  1) FullCalibrateItemResults

  2) ConfidenceTaggedResults

  3) HighConfidenceMisses

  4) LowConfidenceHits

  5) CalibrationRiskFlags

  6) FullCalibrateSnapshot


  Do not teach content here. This method is diagnostic routing only.

  '
