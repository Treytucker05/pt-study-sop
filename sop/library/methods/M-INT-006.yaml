id: M-INT-006
name: Illness Script Builder
category: interrogate
subcategory: int
description: 'For a condition, build the illness script: (1) enabling conditions, (2) pathophysiological
  fault, (3) clinical consequences. Compare your script to the textbook version.'
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- illness-script
- clinical-reasoning
- pathology
- sop-core
purpose: Interrogate already-encoded material through comparison, application, retrieval, or transfer
  so the learner can discriminate it under pressure.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has
  not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or interrogation
learner_state_required: The target concept has already been taught or encoded. The learner can attempt
  retrieval, comparison, or application before seeing the answer.
inputs:
- description: Condition/disease to script
  required: true
- description: Source material with pathophysiology
  required: true
- description: Illness script template
  required: true
outputs:
- name: Complete illness script (3 parts)
  description: Complete illness script (3 parts)
  format: concise prose bullets or short paragraph
- name: Causal chain diagram
  description: Causal chain diagram
  format: labeled visual structure
- name: Comparison to textbook
  description: Comparison to textbook
  format: 2-column or multi-row table
- name: Discriminating features
  description: Discriminating features
  format: short, checkable artifact
required_outputs: &id001
- Complete illness script (enabling conditions, pathophysiological fault, clinical consequences)
- Causal chain diagram (enabling -> fault -> consequences)
- Comparison to textbook version (gaps identified)
- Discriminating features vs. similar conditions
success_criteria:
- 'All required outputs are present and checkable: Complete illness script (enabling conditions, pathophysiological
  fault, clinical consequences), Causal chain diagram (enabling -> fault -> consequences), Comparison
  to textbook version (gaps identified), Discriminating features vs. similar conditions.'
- 'The method reaches its stop condition: All three script parts completed; Causal chain drawn.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Complete illness script
  (enabling conditions, pathophysiological fault, clinical consequences), Causal chain diagram (enabling
  -> fault -> consequences).'
steps:
- step: 1
  name: Enabling Conditions
  action: 'Write Enabling Conditions: Who gets this? Risk factors? Epidemiology?'
  tutor_does: 'Guide the learner to Write Enabling Conditions: Who gets this? Risk factors? Epidemiology?.
    Keep in mind: Example: ''Elderly, smoker, male, hypertension'''
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: ''Elderly, smoker, male, hypertension'
- step: 2
  name: Pathophysiological Fault
  action: 'Write Pathophysiological Fault: What goes wrong? Mechanism?'
  tutor_does: 'Guide the learner to Write Pathophysiological Fault: What goes wrong? Mechanism?. Keep
    in mind: Example: ''Atherosclerotic plaque rupture leads to thrombosis'''
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: ''Atherosclerotic plaque rupture leads to thrombosis'
- step: 3
  name: Clinical Consequences
  action: 'Write Clinical Consequences: What symptoms and signs result?'
  tutor_does: 'Guide the learner to Write Clinical Consequences: What symptoms and signs result?. Keep
    in mind: Example: ''Chest pain, dyspnea, diaphoresis, ST elevation'''
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: ''Chest pain, dyspnea, diaphoresis, ST elevation'
- step: 4
  name: The Three Parts With Causal
  action: Connect the three parts with causal arrows
  tutor_does: 'Guide the learner to Connect the three parts with causal arrows. Keep in mind: Enabling
    leads to Fault leads to Consequences'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Enabling leads to Fault leads to Consequences'
- step: 5
  name: Your Script To Textbook Source
  action: Compare your script to textbook/source version
  tutor_does: 'Guide the learner to Compare your script to textbook/source version. Keep in mind: Note
    what you missed or got wrong'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Note what you missed or got wrong'
- step: 6
  name: Add Discriminating Features Vs Similar
  action: Add discriminating features vs. similar conditions
  tutor_does: 'Guide the learner to Add discriminating features vs. similar conditions. Keep in mind:
    What separates this illness script from look-alikes?'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: What separates this illness script from look-alikes?'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Ask probing questions about each illness script component (enabling conditions, fault, consequences)
- Require explicit causal links between the three script parts
- Challenge generic enabling conditions — demand specific risk factors ranked by importance
- Push for discriminating features vs. similar conditions
- Require comparison to textbook/source version with gap identification
- Use Socratic questioning to expose missing pathophysiological links
- Demand the learner articulate "unlike [X] which has..." for confusable conditions
- Question consequences that lack explicit mechanism links
forbidden_moves:
- Accept consequences without explicit pathophysiological mechanism linking them
- Accept generic or incomplete enabling conditions
- Skip the discriminating features step (vs. similar conditions)
- Build the illness script FOR the learner
- Accept an illness script missing any of the three required parts
- Teach new content — interrogation uses what was already encoded
- Skip the comparison to textbook/source version
- Move on without causal chain connecting all three parts
- Accept one-word or surface-level answers without probing
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or
  route back to ENCODE/REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Consequences without mechanism
  detection: The learner or tutor starts doing consequences without mechanism or the artifact stops satisfying
    the method’s required checks.
  recovery: Require explicit pathophysiological link
  fallback_method: M-INT-002
- mode: Generic enabling conditions
  detection: The learner or tutor starts doing generic enabling conditions or the artifact stops satisfying
    the method’s required checks.
  recovery: Be specific — which risk factors are most important?
  fallback_method: M-INT-005
- mode: Not discriminating from similar conditions
  detection: The learner or tutor starts doing not discriminating from similar conditions or the artifact
    stops satisfying the method’s required checks.
  recovery: Always add "unlike [X] which has...
  fallback_method: M-ENC-008
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- elaboration
- generation
- transfer
evidence:
  citation: Schmidt & Rikers (2007)
  finding: Illness scripts are the cognitive structure underlying expert clinical reasoning
  source: seed_methods.py
knobs:
  guidance_level: medium
  output_format: bullets
  evidence_raw: Schmidt & Rikers (2007); illness scripts are the cognitive structure underlying expert
    clinical reasoning
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  logging_fields:
  - condition_scripted
  - enabling_conditions_count
  - consequences_count
  - discriminators_added
  artifact_type: notes
related_methods:
- id: M-INT-002
  relationship: Clinical application cousin method
- id: M-INT-005
  relationship: Case walkthrough fallback
- id: M-ENC-008
  relationship: Mechanism trace fallback for causal sequencing
