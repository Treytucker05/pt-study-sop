id: M-HOOK-003
name: Jingle / Rhyme Hook
category: encode
subcategory: hook
description: Compress a fixed ordered list or stable sequence into a short jingle or rhyme. Learner must
  attempt their own compression BEFORE the AI offers one. Check for interference with existing hooks before
  finalizing.
control_stage: ENCODE
status: draft
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- encode
- mnemonic
- sequence
- hook
- rhyme
purpose: Create a compact memory cue that links a term or concept to a vivid sound, image, or body-based
  anchor without losing the real meaning.
not_for: This is not for teaching the whole concept from scratch, replacing source truth, or turning a
  mnemonic into a false fact claim.
best_fit_topics:
- Short labels, terms, and anchors that need fast recall
- Material that benefits from a vivid sound/image cue
poor_fit_topics:
- Long mechanistic explanations that need comprehension first
- Unstable or ambiguous material with no clear cue
learner_state_required: Source material is loaded. The learner has one bounded term or concept and is
  ready to actively build a cue around its true meaning.
inputs:
- description: Fixed sequence or ordered list
  required: true
- description: Plain-language meaning of each step
  required: true
- description: List of existing hooks for interference check (if any)
  required: true
outputs:
- name: SequenceStatement
  description: SequenceStatement
  format: short, checkable artifact
- name: LearnerAttempt
  description: LearnerAttempt
  format: short, checkable artifact
- name: FinalJingleOrRhyme
  description: FinalJingleOrRhyme
  format: short cue plus explanation
- name: HookSequenceMap
  description: HookSequenceMap
  format: labeled visual structure
- name: InterferenceCheck
  description: InterferenceCheck
  format: short, checkable artifact
- name: DistortionWarning
  description: DistortionWarning
  format: short, checkable artifact
required_outputs: &id001
- Sequence statement
- Learner attempt
- Jingle or rhyme hook
- Hook-to-sequence map
- Interference check result
- Distortion warning
success_criteria:
- 'All required outputs are present and checkable: Sequence statement, Learner attempt, Jingle or rhyme
  hook, Hook-to-sequence map, Interference check result, Distortion warning.'
- 'The method reaches its stop condition: Learner has attempted their own version (even if rough); Hook
  is short and repeatable.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Sequence statement, Learner
  attempt.'
steps:
- step: 1
  name: The Sequence And Confirm Meaning
  action: State the sequence and confirm meaning of each item
  tutor_does: 'Guide the learner to State the sequence and confirm meaning of each item. Keep in mind:
    Meaning must be locked before compression.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Does the learner have the right term and true meaning before the cue is built?
  example: 'Example: Meaning must be locked before compression.'
- step: 2
  name: The Learner To Attempt Their
  action: Ask the learner to attempt their own rhyme or cadence
  tutor_does: 'Guide the learner to Ask the learner to attempt their own rhyme or cadence. Keep in mind:
    Generation-first. Learner tries before AI offers help. Even a rough attempt counts.'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Generation-first. Learner tries before AI offers help. Even a rough attempt counts.'
- step: 3
  name: If Learner Is Stuck Offer
  action: If learner is stuck, offer one AI-authored jingle as a scaffold
  tutor_does: 'Guide the learner to If learner is stuck, offer one AI-authored jingle as a scaffold. Keep
    in mind: Scaffolding only — learner still personalizes or modifies it.'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Scaffolding only — learner still personalizes or modifies it.'
- step: 4
  name: The Hook Back To The
  action: Map the hook back to the real sequence explicitly
  tutor_does: 'Guide the learner to Map the hook back to the real sequence explicitly. Keep in mind: Make
    every line-to-item correspondence clear.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Make every line-to-item correspondence clear.'
- step: 5
  name: For Interference With Existing Hooks
  action: Check for interference with existing hooks
  tutor_does: 'Guide the learner to Check for interference with existing hooks. Keep in mind: If this
    jingle rhymes or cadences like a previous one for a different sequence, flag it and modify.'
  learner_does: Supplies the target term or concept, then reacts to the cue and confirms whether it clicks.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: If this jingle rhymes or cadences like a previous one for a different sequence, flag
    it and modify.'
- step: 6
  name: One Distortion Risk Or Simplification
  action: State one distortion risk or simplification limit
  tutor_does: 'Guide the learner to State one distortion risk or simplification limit. Keep in mind: Prevent
    mnemonic drift.'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Prevent mnemonic drift.'
constraints:
- rule: Require active learner processing
  why: The method only works when the learner is doing the cognitive work.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Learner generation required
  why: Preserves the method-specific guardrail from the source file.
- rule: Meaning comes before the hook. Always.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Use ONLY for fixed sequences or stable ordered sets.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Learner must attempt their own jingle first (generation-first rule).
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: '{''Check for interference'': ''does the new hook rhyme or cadence clash with an existing hook?''}'
  why: Keeps the method honest and prevents a common misuse described in the source file.
allowed_moves:
- Ask the learner to attempt their own rhyme or cadence first
- Scaffold with an AI-authored version only if learner is stuck
- Restate the sequence in plain language
- Map each hook line back to the real item
- Check for interference with existing hooks
- Name one limit or distortion risk
forbidden_moves:
- Use before the learner understands the sequence
- Offer an AI-authored jingle before the learner attempts their own
- Apply to unstable or highly nuanced mechanisms
- Leave the hook unmapped to the real sequence
- Skip the interference check
- Treat the mnemonic as source evidence
stuck_protocol: Shrink to one term, restate the real meaning in plain language, then try a simpler sound
  cue, image cue, or body cue. If the cue still does not click, switch to a lighter mnemonic lane or ask
  for one concrete example.
failure_modes:
- mode: Hook built before meaning is clear
  detection: The learner or tutor starts doing hook built before meaning is clear or the artifact stops
    satisfying the method’s required checks.
  recovery: Restate the real sequence first, then rebuild.
  fallback_method: M-HOOK-002
- mode: Learner skips generation and just receives the AI's version
  detection: The learner or tutor starts doing learner skips generation and just receives the ai's version
    or the artifact stops satisfying the method’s required checks.
  recovery: Enforce generation-first — ask "try your own first, even if it's rough.
  fallback_method: M-ENC-014
- mode: Hook interferes with an existing hook for a different sequence
  detection: The learner or tutor starts doing hook interferes with an existing hook for a different sequence
    or the artifact stops satisfying the method’s required checks.
  recovery: Run interference check. Modify cadence or key words to differentiate.
  fallback_method: M-ENC-001
- mode: Hook distorts order or content
  detection: The learner or tutor starts doing hook distorts order or content or the artifact stops satisfying
    the method’s required checks.
  recovery: Add mapping line and explicit distortion warning.
  fallback_method: M-HOOK-002
default_duration_min: 3
energy_cost: low
best_stage: first_exposure
mechanisms:
- dual_coding
- elaboration
- generation
evidence:
  citation: Paivio (1991); Dunlosky et al. (2013)
  finding: Rhyme and rhythm improve ordered recall through dual coding, but only when the learner actively
    generates the association.
  source: control-plane migration + research review
knobs:
  output_format: bullets
  family: HOOK
  guidance_level: medium
  evidence_raw: Paivio (1991); Dunlosky et al. (2013); keyword/keyword-based mnemonics show moderate effect
    but generation effect amplifies retention.
  gating_rules:
  - Confirm meaning before mnemonic compression.
  - Enforce learner generation-first.
  - Use only for fixed sequences or stable ordered sets.
  - Run interference check before finalizing.
  - Map the hook back to the real sequence before stopping.
  stipulations:
  - Meaning comes before the hook. Always.
  - Use ONLY for fixed sequences or stable ordered sets.
  - Learner must attempt their own jingle first (generation-first rule).
  - Check for interference: does the new hook rhyme or cadence clash with an existing hook?
  - Name the distortion risk if the jingle oversimplifies the source.
  artifact_type: notes
related_methods:
- id: M-HOOK-002
  relationship: Shorter mnemonic fallback
- id: M-ENC-014
  relationship: Chain-linking fallback for ordered lists
- id: M-ENC-001
  relationship: Full KWIK fallback for deeper hooks
