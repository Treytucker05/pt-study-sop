id: M-GEN-008
name: Embodied Walkthrough
category: ENCODE
subcategory: embodied-walkthrough
description: Use safe body movement, gesture, or positioning to act out a process, spatial relation, or clinical sequence, then map each movement back to the real structure or mechanism.
control_stage: ENCODE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- encode
- embodied
- gesture
- movement
- kinesthetic
- sequence
- spatial
- procedure
purpose: Embodied Walkthrough exists to turn a bounded process, spatial relation, or procedure slice into a safe movement-based encoding pass that must still exit as real language or a sketch. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for passive reading, copying answers, letting the tutor do the cognitive work for the learner, or drifting into full physical skill coaching.
best_fit_topics:
- Processes, spatial relations, or procedure slices that can be reduced to 2-5 meaningful landmarks
- Anatomy, mechanisms, or handoff points where safe gestures can stand in for real structure or flow
- Content that benefits from a movement cue plus a verbal or sketched map-back
poor_fit_topics:
- Pure passive rereading or copy-paste note taking
- Items that are still completely unknown and cannot yet be transformed
- Full technique training, graded performance correction, or any task that would require unsafe motion
learner_state_required: Source material is loaded. The learner has a bounded concept and enough safe space for small movements or hand gestures, and is ready to map the movement back into real terminology before seeing help.
inputs:
- description: Target process, spatial relation, or procedure slice
  required: true
- description: 2-5 key steps, landmarks, or transitions to embody
  required: true
- description: Enough open space for safe small movements or hand gestures
  required: true
outputs:
- name: MovementMap
  description: Step-by-step map from landmark to safe gesture to real meaning.
  format: bulleted or tabular list
- name: EmbodiedRunthrough
  description: Short record showing the learner performed the sequence with live narration.
  format: short summary paragraph or bullets
- name: TransitionNotes
  description: Named changes at each handoff, transition, or decision point in the walkthrough.
  format: bulleted or tabular list
- name: MapBackExplanation
  description: Verbal or sketched translation of the movement sequence back into canonical terms.
  format: short summary paragraph or bullets
- name: SafetyBoundaryNote
  description: Explicit note keeping the run within safe, simplified, low-load movement boundaries.
  format: short summary paragraph or bullets
artifact_schemas:
  MovementMap: bullet_list
  EmbodiedRunthrough: paragraph
  TransitionNotes: bullet_list
  MapBackExplanation: paragraph
  SafetyBoundaryNote: paragraph
produces:
- MovementMap
- EmbodiedRunthrough
- TransitionNotes
- MapBackExplanation
- SafetyBoundaryNote
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- MovementMap
- EmbodiedRunthrough
- TransitionNotes
- MapBackExplanation
- SafetyBoundaryNote
success_criteria:
- All required outputs are present for M-GEN-008.
- The learner performs one full safe walkthrough with explicit narration rather than watching passively.
- The method ends with a clear map-back explanation or sketch instead of stopping at movement alone.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: MovementMap.'
- The walkthrough happened, but the transitions, gesture meanings, or map-back explanation stayed too vague to reuse.
steps:
- step: 1
  name: Define the 2-5 key landmarks or steps
  action: Define the 2-5 key landmarks or steps.
  tutor_does: Guide the learner to pick only the core sequence or spatial anchors worth embodying so the run stays bounded.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Are the landmarks few enough to embody but specific enough to mean something real?
  example: 'Example: Pick only the core sequence or spatial anchors worth embodying.'
- step: 2
  name: Assign one safe movement or gesture to each landmark
  action: Assign one safe movement or gesture to each landmark.
  tutor_does: Guide the learner to choose simple desk-safe cues that are easy to remember and clearly tied to real meaning.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is each gesture safe, simple, and clearly mapped to a landmark?
  example: 'Example: Keep each cue simple enough to remember and specific enough to mean something real.'
- step: 3
  name: Run the walkthrough slowly with live narration
  action: Run the walkthrough slowly with live narration.
  tutor_does: Guide the learner to perform each gesture and say what it stands for in real terminology while moving through the sequence.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is the learner narrating the real meaning of each movement rather than just acting it out?
  example: 'Example: The learner performs each gesture and says what it stands for in real terminology.'
- step: 4
  name: Freeze at transition points and name what changes
  action: Freeze at transition points and name what changes.
  tutor_does: Guide the learner to stop at each handoff and call out the key shift, decision point, or anatomical relationship.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Are the transition notes naming the actual change rather than repeating the same label?
  example: 'Example: Call out the key shift, decision point, or anatomical relationship at each handoff.'
- step: 5
  name: Re-run from memory and translate back into words or a sketch
  action: Re-run from memory and translate back into words or a sketch.
  tutor_does: Guide the learner to use movement as the cue but exit with a mapped-back explanation, list, or diagram.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Does the learner finish with a real map-back artifact instead of movement alone?
  example: 'Example: The movement is the cue, but the exit product is a mapped-back explanation, list, or diagram.'
constraints:
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: The learner must do the movement; tutor narration alone does not count
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Every gesture or position must map back to the real structure, cue, or mechanism in plain language
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Keep the movement safe, simplified, and low-load; never force painful or risky motions
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Use this to encode structure or sequence, not to perform full skill training or graded technique
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Require learner movement or gesture, not passive watching
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Help the learner choose 2-5 core steps or landmarks to embody
- Suggest simple desk-safe gestures, hand positions, or body orientations
- Prompt live narration of what each movement represents
- Freeze the walkthrough at key transition points to name the change
- Ask for a verbal map-back, quick list, or sketch after the movement run
- Shrink oversized motions into hand-only or desk-only versions when needed
forbidden_moves:
- Let the learner remain passive while the tutor does all the mapping
- Use unsafe, painful, or oversized motions
- Treat the gesture sequence as self-explanatory without concept labels
- Turn the block into graded performance coaching or physical correction
- End with movement only and no map-back explanation
stuck_protocol: Offer one smaller hint, one simpler example, or one step back in the chain, then require the learner to continue actively.
failure_modes:
- mode: The movements become random charades with no concept mapping
  detection: The learner performs gestures, but neither side can state what each gesture means in real terms.
  recovery: Pause and relabel each gesture in plain language before continuing.
  fallback_method: M-GEN-009
- mode: The walkthrough uses unsafe, painful, or oversized motions
  detection: The learner needs large, awkward, or uncomfortable movements to continue.
  recovery: Shrink to desk-safe gestures or hand positions only.
  fallback_method: M-INT-002
- mode: The learner performs gestures without saying what they mean
  detection: The walkthrough proceeds, but the narration or map-back stays empty.
  recovery: Require brief live narration or an immediate map-back after each step.
  fallback_method: M-ORG-003
- mode: The activity drifts into full skill performance coaching
  detection: The tutor starts correcting physical technique instead of encoding landmarks or sequence.
  recovery: Keep the scope to encoding the concept, landmarks, or sequence rather than perfect technique.
  fallback_method: M-GEN-009
default_duration_min: 6
energy_cost: medium
best_stage: first_exposure
mechanisms:
- embodied_cognition
- gesture_grounding
- enactment
- dual_coding
- generation
- transfer
evidence:
  citation: Kontra, Lyons, Fischer, and Beilock (2015); Alibali and Nathan (2012); Schmidt, Benzing, Wallman-Jones, Mavilidi, Lubans, and Paas (2019); Novack and Goldin-Meadow (2024); Kwon, Brush, Kim, and Seo (2025); Gómez Franco, Badilla-Quintana, Walker, Restrepo, and Glenberg (2025)
  finding: >-
    Embodied Walkthrough is best supported as a meaning-congruent gesture or
    movement method that helps learners encode sequences and spatial relations
    when the motion is explicitly tied to the concept and translated back into
    language or diagrams. The classic embodied-science and gesture literature
    supports the idea that physical experience and representational gesture can
    deepen understanding of abstract material, but both review work and newer
    classroom studies point to an important boundary condition: movement helps
    when it is task-relevant and concept-mapped, not when it is random activity
    or performance coaching. Recent classroom and mixed-reality studies
    reinforce the same practical lesson in different settings by showing
    benefits for comprehension, vocabulary, and transfer when students map
    concepts onto bodily movement and then reuse that mapping during later
    problem solving. The practical implication for this method is to keep the
    run small, make each gesture stand for one real landmark, freeze at
    transitions, and always finish with a verbal or sketched map-back so the
    body cue does not replace the concept.
  source: https://doi.org/10.1177/0956797615569355; https://doi.org/10.1080/10508406.2011.611446; https://doi.org/10.1016/j.psychsport.2018.12.017; https://doi.org/10.1017/9781108638869.022; https://doi.org/10.1177/07356331241291173; https://doi.org/10.1177/01427237251345858
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest pass. Use 2-3 desk-safe gestures only, return terse step -> gesture -> meaning bullets, one transition note, and one short map-back.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full protocol pass. Keep separate sections for MovementMap, EmbodiedRunthrough, TransitionNotes, MapBackExplanation, and SafetyBoundaryNote across 4-5 landmarks.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render a compact table with step, gesture, meaning, and transition columns plus a brief map-back note.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied pass. Use a handoff-style table with landmark, safe gesture, what changes here, cue or risk, and map-back line so the movement stays clinically relevant instead of theatrical.
related_methods:
- id: M-GEN-009
  relationship: Kinesthetic anchor cousin method when one gesture cue is enough
- id: M-INT-002
  relationship: Clinical application fallback when the learner needs a case frame instead of movement mapping
- id: M-ORG-003
  relationship: Flowchart fallback if the sequence needs a static visual structure
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - Highly interactive. One teaching chunk (8-12 lines max), one check, one question at a time.
  replaces_with:
  - Require the learner to choose or perform the gestures and say what each one means. Do not let the tutor act everything out while the learner watches.
  - Keep motions desk-safe, simplified, and low-load. If the movement becomes unsafe or starts turning into skill coaching, shrink it immediately and return to concept mapping.
  reason: Embodied Walkthrough only works when the learner owns the movement-to-meaning mapping and the motion stays a safe encoding cue rather than a performance task.
facilitation_prompt: |
  You are running M-GEN-008 (Embodied Walkthrough) in the ENCODE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: MovementMap, EmbodiedRunthrough, TransitionNotes, MapBackExplanation, and SafetyBoundaryNote.
  Have the learner embody 2-5 key landmarks with safe small gestures, narrate what each gesture means, freeze at transition points to name what changes, and then rerun from memory and translate the motion back into words or a sketch. Keep it low-load and concept-focused; do not let the tutor do the gestures for the learner, do not drift into physical coaching, and do not end with movement alone.
  Preset behavior:
  - exam_cram: one-shot; 2-3 gestures; terse step -> gesture -> meaning bullets plus one transition note and one short map-back.
  - deep_mastery: interactive; labeled sections for movement map, live runthrough, transition notes, map-back, and safety boundaries.
  - quick_review: one-shot refresh; compact step-gesture-meaning-transition table plus brief map-back note.
  - clinical_bridge: stepwise; applied table with landmark, gesture, what changes, cue or risk, and map-back line.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves landmark selection -> gesture assignment -> narrated walkthrough -> transition freeze -> map-back and waits.
validation:
  test_cases:
  - topic: Processes, spatial relations, or procedure slices that can be reduced to 2-5 meaningful landmarks
    expected_outputs:
    - MovementMap
    - EmbodiedRunthrough
    - TransitionNotes
    - MapBackExplanation
    - SafetyBoundaryNote
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Full technique training, graded performance correction, or unsafe motion demands
    expected_outputs:
    - Stuck protocol response
    - Either a smaller safe gesture scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks the motion safely or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain instead of making the learner own the gesture mapping.
  - Broad topics can tempt the tutor to add too many landmarks unless the run is kept tightly bounded.
