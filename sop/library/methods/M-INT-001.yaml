id: M-INT-001
name: Analogy Bridge
category: interrogate
description: Create an analogy linking this concept to something familiar. Test if the analogy holds at the edges.
default_duration_min: 3
energy_cost: medium
best_stage: review
control_stage: ENCODE
status: validated
tags:
- analogy
- transfer
- creative
- sop-core
mechanisms:
- elaboration
- transfer
- generation
stipulations:
- Analogies are teaching bridges, not source claims.
- Always return to the real concept after the analogy.
- Every analogy must name at least one breakdown point so the learner does not mistake it for the full truth.
knobs:
  guidance_level: medium
  output_format: bullets
constraints:
  active_processing_required: true
  objective_scope_required: true
  no_final_answer_only: true
inputs:
- Concept to analogize
- Familiar domain for comparison
steps:
- step: 1
  action: State the concept you want to understand better
  notes: Be specific about what aspect needs clarification
- step: 2
  action: Find a familiar domain with similar structure
  notes: 'Good sources: everyday objects, sports, cooking, machines'
- step: 3
  action: 'Map the analogy: A is to B as X is to Y'
  notes: Identify 3+ corresponding elements
- step: 4
  action: Test the edges — where does the analogy break down?
  notes: All analogies have limits; knowing them is part of learning
- step: 5
  action: Note what the breakdown teaches you
  notes: The failure points often reveal important nuances
outputs:
- Analogy statement (A is to B as X is to Y)
- Mapping table (3+ correspondences)
- Breakdown points (where analogy fails)
stop_criteria:
- Analogy created with 3+ mappings
- At least 1 breakdown point identified
- 3 minutes elapsed
failure_modes:
- mode: Analogy too superficial
  mitigation: Require structural mapping, not just surface similarity
- mode: Ignoring breakdown points
  mitigation: Force identification of at least one limitation
- mode: Familiar domain not actually familiar
  mitigation: Choose domains you know well
logging_fields:
- concept_analogized
- familiar_domain
- mapping_count
- breakdown_points
evidence:
  citation: Gentner (1983)
  finding: Analogical reasoning supports structural mapping and transfer across domains
  source: seed_methods.py
evidence_raw: Gentner (1983); analogical reasoning supports structural mapping and transfer
facilitation_prompt: 'You are running M-INT-001 (Analogy Bridge) in ENCODE stage.

  Execute this method card exactly and keep outputs deterministic.


  Stage hard rules:

  - Force active learner processing.

  - Prefer transformation over passive lecture.

  - Keep focus on target concept scope.
  - Treat analogies as explanatory bridges, not evidence.
  - Make the analogy limits explicit before moving on.


  Required outputs:

  - Analogy statement (A is to B as X is to Y)

  - Mapping table (3+ correspondences)

  - Breakdown points (where analogy fails)


  Stop conditions:

  - Analogy created with 3+ mappings

  - At least 1 breakdown point identified

  - 3 minutes elapsed


  If required inputs are missing, request only the minimum needed input and continue.

  Return to the actual concept after the analogy and distinguish explanation from source-backed fact.

  '
gating_rules:
- Force active processing (explain, transform, or map), not passive reading.
- Keep output scoped to mapped objectives only.
artifact_type: notes
allowed_moves:
- Ask probing questions about analogy structure and correspondences
- Challenge breakdown points — demand specifics on where the analogy fails
- Require structural mapping, not surface similarity (reject "they're both big")
- Push learner to find additional correspondences beyond initial attempt
- Question whether the familiar domain is truly familiar to the learner
- Use Socratic questioning to expose gaps in the mapping
- Demand the learner articulate what the breakdown teaches about the real concept
forbidden_moves:
- Accept surface-level analogy without structural mapping (e.g., "it's like a pump")
- Provide the analogy FOR the learner — the learner must generate it
- Skip identification of breakdown points
- Accept an analogy with fewer than 3 mapped correspondences
- Teach new content — interrogation uses what was already encoded
- Let the analogy stand unchallenged as a full explanation
- Move on without the learner distinguishing analogy from source-backed fact
- Present content outside the mapped objective scope
required_outputs:
- Analogy statement (A is to B as X is to Y)
- Mapping table (3+ correspondences)
- Breakdown points (where analogy fails and what that teaches)
