id: M-INT-001
name: Analogy Bridge
category: interrogate
subcategory: int
description: Create an analogy linking this concept to something familiar. Test if the analogy holds at
  the edges.
control_stage: TEACH
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- analogy
- transfer
- creative
- sop-core
purpose: Interrogate already-encoded material through comparison, application, retrieval, or transfer
  so the learner can discriminate it under pressure.
not_for: This is not for first exposure, direct lecturing, or introducing brand-new material that has
  not already been encoded.
best_fit_topics:
- Previously encoded concepts that need comparison, application, or discrimination
- Material the learner can retrieve without notes and test under pressure
poor_fit_topics:
- Brand-new material that has not been encoded yet
- Tasks that need direct teaching rather than retrieval or interrogation
learner_state_required: The target concept has already been taught or encoded. The learner can attempt
  retrieval, comparison, or application before seeing the answer.
inputs:
- description: Concept to analogize
  required: true
- description: Familiar domain for comparison
  required: true
outputs:
- name: Analogy statement (A is to B as X is to Y)
  description: Analogy statement (A is to B as X is to Y)
  format: short, checkable artifact
- name: Mapping table (3+ correspondences)
  description: Mapping table (3+ correspondences)
  format: 2-column or multi-row table
- name: Breakdown points (where analogy fails)
  description: Breakdown points (where analogy fails)
  format: short, checkable artifact
required_outputs: &id001
- Analogy statement (A is to B as X is to Y)
- Mapping table (3+ correspondences)
- Breakdown points (where analogy fails and what that teaches)
success_criteria:
- 'All required outputs are present and checkable: Analogy statement (A is to B as X is to Y), Mapping
  table (3+ correspondences), Breakdown points (where analogy fails and what that teaches).'
- 'The method reaches its stop condition: Analogy created with 3+ mappings; At least 1 breakdown point
  identified.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Analogy statement (A is
  to B as X is to Y), Mapping table (3+ correspondences).'
steps:
- step: 1
  name: The Concept You Want To
  action: State the concept you want to understand better
  tutor_does: 'Guide the learner to State the concept you want to understand better. Keep in mind: Be
    specific about what aspect needs clarification'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Be specific about what aspect needs clarification'
- step: 2
  name: A Familiar Domain With Similar
  action: Find a familiar domain with similar structure
  tutor_does: 'Guide the learner to Find a familiar domain with similar structure. Keep in mind: Good
    sources: everyday objects, sports, cooking, machines'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Good sources: everyday objects, sports, cooking, machines'
- step: 3
  name: The Analogy
  action: 'Map the analogy: A is to B as X is to Y'
  tutor_does: 'Guide the learner to Map the analogy: A is to B as X is to Y. Keep in mind: Identify 3+
    corresponding elements'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: Identify 3+ corresponding elements'
- step: 4
  name: The Edges Where Does The
  action: Test the edges — where does the analogy break down?
  tutor_does: 'Guide the learner to Test the edges — where does the analogy break down?. Keep in mind:
    All analogies have limits; knowing them is part of learning'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: All analogies have limits; knowing them is part of learning'
- step: 5
  name: Note What The Breakdown Teaches
  action: Note what the breakdown teaches you
  tutor_does: 'Guide the learner to Note what the breakdown teaches you. Keep in mind: The failure points
    often reveal important nuances'
  learner_does: Attempts retrieval, application, or comparison from memory before asking for support.
  max_lines: 8
  check: Has the learner attempted retrieval or application before any corrective help?
  example: 'Example: The failure points often reveal important nuances'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Analogies are teaching bridges, not source claims.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Always return to the real concept after the analogy.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Every analogy must name at least one breakdown point so the learner does not mistake it for the
    full truth.
  why: Keeps the method honest and prevents a common misuse described in the source file.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Propose an analogy when the learner needs a bridge into an unfamiliar mechanism
- Ask probing questions about analogy structure and correspondences
- Challenge breakdown points and make their limits explicit
- Require structural mapping, not surface similarity (reject "they're both big")
- Invite the learner to refine or extend the mapping after the initial bridge
- Question whether the familiar domain is truly familiar to the learner
- Use Socratic questioning to expose gaps in the mapping
- Demand a return to the real concept after the bridge move
forbidden_moves:
- Accept surface-level analogy without structural mapping (e.g., "it's like a pump")
- Skip identification of breakdown points
- Accept an analogy with fewer than 3 mapped correspondences
- Let the analogy stand unchallenged as a full explanation
- Move on without the learner distinguishing analogy from source-backed fact
- Present content outside the mapped objective scope
stuck_protocol: Reduce the scope, ask for a smaller retrieval target, compare with a near-neighbor, or
  route back to ENCODE/REFERENCE if recall keeps failing. Do not keep guessing indefinitely.
failure_modes:
- mode: Analogy too superficial
  detection: The learner or tutor starts doing analogy too superficial or the artifact stops satisfying
    the method’s required checks.
  recovery: Require structural mapping, not just surface similarity
  fallback_method: M-INT-003
- mode: Ignoring breakdown points
  detection: The learner or tutor starts doing ignoring breakdown points or the artifact stops satisfying
    the method’s required checks.
  recovery: Force identification of at least one limitation
  fallback_method: M-ENC-004
- mode: Familiar domain not actually familiar
  detection: The learner or tutor starts doing familiar domain not actually familiar or the artifact stops
    satisfying the method’s required checks.
  recovery: Choose domains you know well
  fallback_method: M-INT-004
default_duration_min: 3
energy_cost: medium
best_stage: review
mechanisms:
- elaboration
- transfer
- generation
evidence:
  citation: Gentner (1983)
  finding: Analogical reasoning supports structural mapping and transfer across domains
  source: seed_methods.py
knobs:
  guidance_level: medium
  output_format: bullets
  evidence_raw: Gentner (1983); analogical reasoning supports structural mapping and transfer
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  stipulations:
  - Analogies are teaching bridges, not source claims.
  - Always return to the real concept after the analogy.
  - Every analogy must name at least one breakdown point so the learner does not mistake it for the full
    truth.
  logging_fields:
  - concept_analogized
  - familiar_domain
  - mapping_count
  - breakdown_points
  artifact_type: notes
related_methods:
- id: M-INT-003
  relationship: Cross-topic transfer cousin method
- id: M-ENC-004
  relationship: Teach-back fallback if the analogy needs explanation
- id: M-INT-004
  relationship: Comparison fallback for discrimination
