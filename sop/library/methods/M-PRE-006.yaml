id: M-PRE-006
name: Structural Skimming + Pillar Mapping
category: prime
subcategory: skim-map
description: Rapidly skim headings and visual cues across the selected scope, then compress the structure into an ASCII concept map plus Obsidian-friendly hierarchy before deep reading.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- skimming
- structure
- pillars
- cognitive-load
- prime
- skim-map
- orientation
- prior-knowledge
- map
purpose: Rapidly skim headings and visual cues across the selected scope, then compress the structure into an ASCII concept map plus Obsidian-friendly hierarchy before deep reading. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- Dense material with a clear underlying structure or hierarchy
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: AsciiConceptMap
  description: Structured artifact that captures the key structural skimming plus pillar mapping relationships.
  format: structured map or nested bullets
- name: ObsidianHierarchy
  description: Structured artifact that captures the key structural skimming plus pillar mapping relationships.
  format: ASCII tree or nested bullets
required_outputs:
- AsciiConceptMap
- ObsidianHierarchy
success_criteria:
- 'Core structure is captured in the required outputs: AsciiConceptMap, ObsidianHierarchy.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- AsciiConceptMap is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
steps:
- step: 1
  name: Opening Step
  action: Scan structural cues only
  tutor_does: Scan structural cues only. Use headings, subheadings, bold terms, and diagrams across the selected slice
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Opening Step: Scan structural cues only"'
- step: 2
  name: Step 2
  action: Inventory the major supported sections and structural signals
  tutor_does: Inventory the major supported sections and structural signals. Account for the whole slice before grouping
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 2: Inventory the major supported sections and structural signals"'
- step: 3
  name: Step 3
  action: Compress the inventory into 3-5 top pillars
  tutor_does: Compress the inventory into 3-5 top pillars. Pillars should be broad umbrella buckets that collectively cover the selected scope
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 3: Compress the inventory into 3-5 top pillars"'
- step: 4
  name: Step 4
  action: Render the final structure as an ASCII concept map and Obsidian-friendly nested hierarchy
  tutor_does: Render the final structure as an ASCII concept map and Obsidian-friendly nested hierarchy. Keep descriptors structural, not explanatory
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Step 4: Render the final structure as an ASCII concept map and Obsidian-friendly nested hierarchy"'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Paragraph Summaries Disallowed
  why: The method inherits this as a hard rule from the legacy card.
allowed_moves:
- Scan structural cues only (headings, subheadings, bold terms, diagrams)
- Extract 3-5 top umbrella pillars representing conceptual buckets
- Render the final structure as an ASCII map plus Obsidian-friendly nested hierarchy
- Orient the learner to material structure before detail reading
- Activate prior knowledge with a bounded free recall or orientation prompt
- Summarize structure, objectives, gaps, or blind spots without scoring
- Link recalled ideas to the current objective or source packet
forbidden_moves:
- Score, grade, or assess the learner
- Summarize full paragraphs or detailed content
- Teach new detailed content beyond structural signals
- Exceed pillar_count cap
- Provide explanatory text instead of structural descriptors
- Score the learner or run retrieval grading
- Teach detailed content as the final answer
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: LLM drifts into paragraph summarization
  detection: The output no longer matches the method’s core purpose.
  recovery: Enforce structural-only extraction output.
  fallback_method: M-PRE-008
- mode: Too many pillars
  detection: The output no longer matches the method’s core purpose.
  recovery: Cap at pillar_count and merge related nodes.
  fallback_method: M-PRE-008
