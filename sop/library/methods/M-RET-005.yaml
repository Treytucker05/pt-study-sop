id: M-RET-005
name: Variable Retrieval
category: RETRIEVE
subcategory: variable
description: 'Retrieve the same concept in 3 different formats: (1) free recall, (2) application question, (3) compare/contrast. Varied retrieval contexts build more flexible memory traces.'
control_stage: RETRIEVE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- varied-practice
- transfer
- flexible-retrieval
purpose: Variable Retrieval exists to run variable retrieval that asks for the same concept in multiple formats so memory traces become more flexible. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for open-note review, answer-reveal first workflows, or deep teaching. Use REFERENCE if the learner needs an anchor first.
best_fit_topics:
- multi-format retrieval
- flexible recall contexts
- compare/contrast application
poor_fit_topics:
- single-format drilling only
- new-concept instruction
- unguarded answer reveals
learner_state_required: The learner already has source material or an anchor available, the source will be closed for recall, and a retrieval target exists.
inputs:
- description: Single concept or topic to retrieve
  required: true
- description: Three retrieval format prompts (free recall, application, compare/contrast)
  required: true
- description: Reference materials for verification (closed during retrieval)
  required: true
outputs:
- name: Three retrieval outputs (free recall, application, compare/contrast)
  description: A structured output for variable retrieval that asks for the same concept in multiple formats so memory traces become more flexible.
  format: structured response
- name: Accuracy assessment for each format
  description: A structured output for variable retrieval that asks for the same concept in multiple formats so memory traces become more flexible.
  format: structured response
- name: Difficulty ranking of formats
  description: A structured output for variable retrieval that asks for the same concept in multiple formats so memory traces become more flexible.
  format: structured response
- name: Flexibility gap identification
  description: A structured output for variable retrieval that asks for the same concept in multiple formats so memory traces become more flexible.
  format: structured response
