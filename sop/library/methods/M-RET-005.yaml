success_criteria:
- All required outputs are present for M-RET-005.
- A genuine attempt-first recall happened before any comparison or feedback.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Three retrieval outputs (free recall, application, compare/contrast).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: Select one concept to
  action: "Select one concept to practice in varied formats. Pick a concept you know reasonably well \u2014 this is for flexibility, not first learning"
  tutor_does: "Run select one concept to practice in varied formats. pick a concept you know reasonably well \u2014 this is for flexibility, not first learning while protecting the attempt-first rule, then compare only after recall is complete."
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Are all materials closed and is the learner ready to attempt recall?
  example: 'Tutor: "Close your notes. Do not peek." Learner: "Notes are closed."'
- step: 2
  name: Format 1 - Free
  action: "Format 1 - Free Recall: Write everything you know about the concept. No prompts, no structure \u2014 just dump what you remember"
  tutor_does: "Run format 1 - free recall: write everything you know about the concept. no prompts, no structure \u2014 just dump what you remember while protecting the attempt-first rule, then compare only after recall is complete."
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor starts the timer and asks for a free-response dump.
- step: 3
  name: 'Format 2 - Application:'
  action: 'Format 2 - Application: Answer a scenario question using the concept. Example: ''Patient presents with X, how does [concept] apply?'''
  tutor_does: 'Run format 2 - application: answer a scenario question using the concept. example: ''patient presents with x, how does [concept] apply?'' while protecting the attempt-first rule, then compare only after recall is complete.'
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor marks gaps with question marks and compares them after the attempt window ends.
- step: 4
  name: 'Format 3 - Compare/Contrast:'
  action: 'Format 3 - Compare/Contrast: Explain how this concept differs from a related one. Discrimination builds stronger memory traces'
  tutor_does: 'Run format 3 - compare/contrast: explain how this concept differs from a related one. discrimination builds stronger memory traces while protecting the attempt-first rule, then compare only after recall is complete.'
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Has the learner compared the output against the source or answer key?
  example: Tutor compares to the source and notes missing items.
- step: 5
  name: Review and verify all
  action: Review and verify all three outputs against source materials. Check for accuracy and completeness in each format
  tutor_does: Run review and verify all three outputs against source materials. check for accuracy and completeness in each format while protecting the attempt-first rule, then compare only after recall is complete.
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor compares to the source and notes missing items.
- step: 6
  name: Note which format was
  action: "Note which format was hardest \u2014 that's where your weakness is. Format difficulty reveals retrieval flexibility gaps"
  tutor_does: "Run note which format was hardest \u2014 that's where your weakness is. format difficulty reveals retrieval flexibility gaps while protecting the attempt-first rule, then compare only after recall is complete."
  learner_does: Produces recall from memory, marks gaps, and waits for comparison until the recall window closes.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor compares to the source and notes missing items.
constraints:
- rule: Closed-note first, open-note only after recall is complete
  why: The retrieval signal disappears if the source is visible during the attempt.
- rule: No hints or answer reveal before the learner attempts the item
  why: Attempt-first is required for a valid memory readout.
- rule: Compare against source only after the attempt window ends
  why: Comparison is for repair, not for helping the recall itself.
- rule: Stay within the timer or sprint cap
  why: Time pressure is part of the retrieval design.
allowed_moves:
- Present all three retrieval formats sequentially (free recall, application, compare/contrast)
- Require committed response for each format before feedback
- Provide corrective feedback AFTER each format is completed
- Verify all three outputs against source materials
- Identify which format was hardest (flexibility gap)
- Score accuracy for each format independently
- Use scenario-based application questions relevant to the concept
- Route back to ENCODE on repeated misses
- Force an attempt before any comparison or feedback
- Mark gaps explicitly with question marks or placeholders
- Compare to the source after the attempt window closes
- Track latency and accuracy when relevant
forbidden_moves:
- Reveal answers before learner completes each format attempt
- Provide hints during first attempt at any format
- Skip any of the three formats (especially compare/contrast)
- Allow reference materials during retrieval
- Teach new material during retrieval
- Accept vague or surface-level responses without pushing for depth
- Skip the verification step against source materials
- Use this on material not yet encoded (this is for flexibility, not first learning)
- Peek at materials during the recall window
- Give hints before the first attempt
- Teach new content during retrieval
stuck_protocol: Give one narrower cue, keep materials closed, and ask for a best-effort attempt before any feedback.
failure_modes:
- mode: Materials are open during recall
  detection: The learner can see the source or answer key before attempting the item.
  recovery: Close the materials, restart the timer, and repeat the item from scratch.
  fallback_method: M-REF-003
- mode: No attempt is made
  detection: The learner waits for hints or gives only "I do not know" without trying.
  recovery: Ask for a best effort answer, then mark the gap and continue.
  fallback_method: M-OVR-001
- mode: Comparison happens too early
  detection: Feedback or answer checking is introduced before the attempt window ends.
  recovery: Delay comparison until after recall, then capture gaps cleanly.
  fallback_method: M-REF-001
default_duration_min: 10
energy_cost: medium
best_stage: review
mechanisms:
- retrieval
- transfer
- elaboration
- varied_practice
evidence:
  citation: "Bjork, Dunlosky, and Kornell (2013); Yang, Luo, Vadillo, Yu, and Shanks (2021); McDermott, Agarwal, D\u2019Antonio, Roediger, and McDaniel (2021); Uesaka and Manalo (2025)"
  finding: Variable Retrieval is best supported as a varied-practice retrieval routine that checks whether a concept can survive changes in prompt format. Desirable-difficulty and retrieval-practice work supports the value of effortful recall, recent meta-analytic evidence confirms broad testing benefits, and classroom retrieval studies show that changing the question form can reveal brittle knowledge that one stable prompt would miss. The practical implication for this method is to hold the concept constant while varying the retrieval demand, then rank which formats fail so the learner can repair flexibility rather than just re-memorize one phrasing.
  source: https://doi.org/10.1016/S0022-5371(77)80016-9; https://doi.org/10.1037/bul0000309; https://doi.org/10.1080/87567555.2021.1910124; https://doi.org/10.1073/pnas.2413511121
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest flexibility check. Use one concept, three short formats, and terse bullets for score plus hardest format.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Fullest flexibility check. Use one or two concepts, keep all three formats explicit, and return a fuller format-difficulty comparison with repair targets.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh check. Use a compact table that compares free recall, application, and compare-contrast performance side by side.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied flexibility check. Use one concept across recall, applied decision, and contrast prompts, then organize failures in a short handoff table for the next practical review.
related_methods:
- id: M-REF-003
  relationship: Anchor artifacts supply the same concept in multiple formats
- id: M-OVR-002
  relationship: Anki cards can hold the multiple retrieval formats
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - 'If I''m stuck: do NOT repeat the same explanation. Pick exactly one recovery move (simpler ladder, format switch, side-by-side contrast, tiny clinical case).'
  replaces_with:
  - Closed-note retrieval across three formats (free recall, application, compare/contrast). No hints. Reveal correct answer only after the learner commits each attempt.
  - "If stuck on a format, mark a miss and proceed to the next format. The format switch built into the method IS the design \u2014 do not add CI's recovery moves on top."
  reason: Variable Retrieval already cycles through three retrieval formats by design. Adding CI's hint-then-recover layer over the top contaminates each format's retrieval signal.
facilitation_prompt: |-
  You are running M-RET-005 (Variable Retrieval) in the RETRIEVE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Three retrieval outputs, Accuracy assessment for each format, Difficulty ranking of formats, and Flexibility gap identification.
  Run the same concept through multiple retrieval formats without teaching between them. Hold the target concept steady, vary the prompt form, and use the pattern to find brittle knowledge.
  Preset behavior:
  - exam_cram: one-shot; one concept; three short formats; terse bullets and hardest-format callout.
  - deep_mastery: interactive; one or two concepts; explicit three-format comparison plus fuller repair targets.
  - quick_review: one-shot refresh; compact side-by-side format table.
  - clinical_bridge: stepwise; recall, applied decision, and contrast prompts with failures organized in a short handoff table.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves format 1 -> format 2 -> format 3 -> comparison and waits.
validation:
  test_cases:
  - topic: multi-format retrieval
    expected_outputs:
    - Three retrieval outputs (free recall, application, compare/contrast)
    - Accuracy assessment for each format
    - Difficulty ranking of formats
    pass_criteria:
    - All required outputs for M-RET-005 are present.
    - The response stays inside the correct stage rules.
  - topic: flexible recall contexts
    expected_outputs:
    - Accuracy assessment for each format
    - Difficulty ranking of formats
    - Flexibility gap identification
    pass_criteria:
    - The artifact is reusable without extra interpretation.
    - No forbidden move is triggered during the run.
  acceptance_criteria:
  - Every required output is present and checkable.
  - No forbidden moves from the source file are violated.
  - The facilitation prompt can be pasted into ChatGPT and run without extra context.
  known_issues:
  - Retrieval blocks can collapse into explanation unless the tutor protects the attempt-first rule.
