id: M-GEN-006
name: Self-Explanation Protocol
category: encode
subcategory: gen
description: After reading each paragraph or concept, pause and explain WHY each step follows from the
  previous one. Supports silent, spoken, or written verbalization modes. Focus on reasoning, not restating
  facts. Merges Think-Aloud Protocol (formerly M-GEN-006 slot).
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- self-explanation
- comprehension
- causal-reasoning
- metacognition
- verbal
- evidence-based
purpose: Force the learner to actively generate, explain, sequence, or transform the material so encoding
  is deeper than passive review.
not_for: This is not for passive reading, copying answers, or letting the tutor do the cognitive work
  for the learner.
best_fit_topics:
- Concepts the learner can explain, transform, or generate in their own words
- Mechanisms and causal chains that benefit from active elaboration
poor_fit_topics:
- Pure passive rereading or copy-paste note taking
- Items that are still completely unknown and cannot yet be transformed
learner_state_required: Source material is loaded. The learner has a bounded concept and is ready to generate,
  explain, or transform it before seeing help.
inputs:
- description: Text passage or concept sequence
  required: true
- description: Note-taking area (written mode) or quiet environment (spoken mode)
  required: true
- description: Timer (optional)
  required: false
outputs:
- name: Self-explanation notes or think-aloud log (per paragraph)
  description: Self-explanation notes or think-aloud log (per paragraph)
  format: concise prose bullets or short paragraph
- name: Inference gap list
  description: Inference gap list
  format: short, checkable artifact
- name: Confusion points flagged
  description: Confusion points flagged
  format: short, checkable artifact
- name: Comprehension checkpoints
  description: Comprehension checkpoints
  format: short, checkable artifact
required_outputs: &id001
- Self-explanation notes or think-aloud log (per paragraph)
- Inference gap list
- Confusion points flagged
- Comprehension checkpoints
success_criteria:
- 'All required outputs are present and checkable: Self-explanation notes or think-aloud log (per paragraph),
  Inference gap list, Confusion points flagged, Comprehension checkpoints.'
- 'The method reaches its stop condition: All paragraphs processed; Major gaps and confusion points flagged.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Self-explanation notes
  or think-aloud log (per paragraph), Inference gap list.'
steps:
- step: 1
  name: Read One Paragraph Or Concept
  action: Read one paragraph or concept unit
  tutor_does: 'Guide the learner to Read one paragraph or concept unit. Keep in mind: One unit at a time
    — don''t batch'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: One unit at a time — don''t batch'
- step: 2
  name: Stop And Explain Why This
  action: Stop and explain WHY this follows from the previous content
  tutor_does: 'Guide the learner to Stop and explain WHY this follows from the previous content. Keep
    in mind: Ask: ''Why does this make sense given what came before?'''
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Ask: ''Why does this make sense given what came before?'
- step: 3
  name: Predict What Comes Next Before
  action: Predict what comes next before reading on
  tutor_does: 'Guide the learner to Predict what comes next before reading on. Keep in mind: Prediction
    forces active engagement and exposes assumptions'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Prediction forces active engagement and exposes assumptions'
- step: 4
  name: Express Your Explanation In Your
  action: Express your explanation in your chosen verbalization mode
  tutor_does: 'Guide the learner to Express your explanation in your chosen verbalization mode. Keep in
    mind: Written forces precision; spoken exposes hesitation; silent is fastest but least accountable'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Written forces precision; spoken exposes hesitation; silent is fastest but least
    accountable'
- step: 5
  name: Any Inference Gaps Or Confusion
  action: Identify any inference gaps or confusion points
  tutor_does: 'Guide the learner to Identify any inference gaps or confusion points. Keep in mind: Where
    are you assuming knowledge you don''t have? Note confusion aloud if in spoken mode'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Where are you assuming knowledge you don''t have? Note confusion aloud if in spoken
    mode'
- step: 6
  name: Flag Gaps For Follow Up
  action: Flag gaps for follow-up
  tutor_does: 'Guide the learner to Flag gaps for follow-up. Keep in mind: These become targeted study
    items'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: These become targeted study items'
- step: 7
  name: Move To Next Unit And
  action: Move to next unit and repeat
  tutor_does: 'Guide the learner to Move to next unit and repeat. Keep in mind: Continue through entire
    passage'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Continue through entire passage'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Present one paragraph or concept unit at a time for processing
- Prompt learner to explain WHY current content follows from previous content
- Require prediction of what comes next before reading on
- Ask learner to express explanation in their chosen verbalization mode
- Require causal connectors (because, therefore, this leads to) in explanations
- Identify inference gaps and prompt learner to flag them
- Prompt learner to note confusion points for follow-up
- Adjust pacing based on verbalization mode (written requires more time)
forbidden_moves:
- Explain the reasoning FOR the learner instead of prompting self-explanation
- Allow the learner to just restate facts without causal reasoning
- Skip the prediction step before moving to next content unit
- Batch multiple paragraphs instead of processing one unit at a time
- Accept silent reading without explanation in spoken mode
- Skip "obvious" sections without explanation
- Deliver a passive summary instead of facilitating self-explanation
- Move to retrieval before all paragraphs are processed
stuck_protocol: Offer one smaller hint, one simpler example, or one step back in the chain; then require
  the learner to continue actively.
failure_modes:
- mode: Just restating facts
  detection: The learner or tutor starts doing just restating facts or the artifact stops satisfying the
    method’s required checks.
  recovery: Require causal connectors — "because", "therefore", "this leads to
  fallback_method: M-GEN-002
- mode: Skipping "obvious" sections
  detection: The learner or tutor starts doing skipping "obvious" sections or the artifact stops satisfying
    the method’s required checks.
  recovery: Explain everything; "obvious" often means "unexamined
  fallback_method: M-GEN-005
- mode: Not writing explanations (in written mode)
  detection: The learner or tutor starts doing not writing explanations (in written mode) or the artifact
    stops satisfying the method’s required checks.
  recovery: Written notes required; verbal insufficient for written mode
  fallback_method: M-GEN-007
- mode: Silent reading without explaining (in spoken mode)
  detection: The learner or tutor starts doing silent reading without explaining (in spoken mode) or the
    artifact stops satisfying the method’s required checks.
  recovery: Must vocalize; silent defeats the purpose of think-aloud
  fallback_method: M-GEN-002
- mode: Skipping prediction step
  detection: The learner or tutor starts doing skipping prediction step or the artifact stops satisfying
    the method’s required checks.
  recovery: Prediction is required — commit before reading ahead
  fallback_method: M-GEN-005
default_duration_min: 7
energy_cost: medium
best_stage: first_exposure
mechanisms:
- elaboration
- generation
- calibration
- feedback
evidence:
  citation: Chi et al. (1994)
  finding: Self-explanation rated moderate-high utility across domains; works by generating inferences
  source: Cognitive Science, 18(3), 439-477
knobs:
  verbalization_mode: written
  guidance_level: medium
  output_format: bullets
  evidence_raw: Chi et al. (1994); Dunlosky et al. (2013); self-explanation rated moderate-high utility
    across domains. Think-aloud verbalization (Ericsson & Simon, 1993) exposes reasoning gaps that silent
    processing misses.
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  logging_fields:
  - paragraphs_processed
  - explanations_generated
  - gaps_flagged
  - confusion_points
  - verbalization_mode_used
  - time_per_unit
  artifact_type: notes
related_methods:
- id: M-GEN-002
  relationship: Teach-back cousin method
- id: M-GEN-005
  relationship: Why-chain fallback for deeper causality
- id: M-GEN-007
  relationship: Mechanism trace if the explanation is mechanistic
