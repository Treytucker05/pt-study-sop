id: M-CAL-004
name: Story Confidence Tag
category: calibrate
subcategory: story
description: After receiving the big-picture narrative overview, rate your confidence in the story as a whole. Can you retell
  the narrative thread? Where does the story break down? Light-touch calibration that respects top-down learners — no item-level
  quizzing.
control_stage: CALIBRATE
status: core
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- calibrate
- confidence
- narrative
- top-down
- metacognition
purpose: Story Confidence Tag exists to run a light-touch story-confidence check that audits whether the learner can retell
  the big-picture narrative thread. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for teaching new material, extended explanation, or open-ended discussion. Use TEACH when the goal is
  instruction and use REFERENCE when the goal is artifact building.
best_fit_topics:
- big-picture narrative threads
- top-down retell confidence
- global story integrity
poor_fit_topics:
- item-level quizzing
- dense factual drilling
- diagnostic scoring of many facts
learner_state_required: A big-picture story or overview has already been presented and the learner can judge narrative confidence
  without item-level quizzing.
inputs:
- description: Completed narrative overview from PRIME or early ENCODE
  required: true
- description: The story thread the learner just received
  required: true
outputs:
- name: Story confidence rating (1-3 scale)
  description: A calibrated diagnostic output that supports routing for a light-touch story-confidence check that audits whether
    the learner can retell the big-picture narrative thread.
  format: structured response
- name: Fuzzy zones list (narrative breakdown points)
  description: A calibrated diagnostic output that supports routing for a light-touch story-confidence check that audits whether
    the learner can retell the big-picture narrative thread.
  format: bulleted or tabular list
- name: Priority encoding targets (focus areas for ENCODE phase)
  description: A calibrated diagnostic output that supports routing for a light-touch story-confidence check that audits whether
    the learner can retell the big-picture narrative thread.
  format: structured response
- name: Optional probe seed suggestions for M-CAL-002
  description: A tagged retrieval-question bank that can be reused later for practice or deck construction.
  format: bulleted or tabular list
required_outputs:
- Story confidence rating (1-3 scale)
- Fuzzy zones list (narrative breakdown points)
- Priority encoding targets (focus areas for ENCODE phase)
- Optional probe seed suggestions for M-CAL-002
success_criteria:
- All required outputs are present for M-CAL-004.
- The block remains diagnostic only and no teaching is introduced before the attempt.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Story confidence rating (1-3 scale).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
