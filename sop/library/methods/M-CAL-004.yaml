id: M-CAL-004
name: Story Confidence Tag
category: CALIBRATE
subcategory: story
description: "After receiving the big-picture narrative overview, rate your confidence in the story as a whole. Can you retell the narrative thread? Where does the story break down? Light-touch calibration that respects top-down learners \u2014 no item-level quizzing."
control_stage: CALIBRATE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- calibrate
- confidence
- narrative
- top-down
- metacognition
purpose: Story Confidence Tag exists to run a light-touch story-confidence check that audits whether the learner can retell the big-picture narrative thread. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for teaching new material, extended explanation, or open-ended discussion. Use EXPLAIN when the goal is instruction and use REFERENCE when the goal is artifact building.
best_fit_topics:
- big-picture narrative threads
- top-down retell confidence
- global story integrity
poor_fit_topics:
- item-level quizzing
- dense factual drilling
- diagnostic scoring of many facts
learner_state_required: A big-picture story or overview has already been presented and the learner can judge narrative confidence without item-level quizzing.
inputs:
- description: Completed narrative overview from PRIME or early ENCODE
  required: true
- description: The story thread the learner just received
  required: true
outputs:
- name: Story confidence rating (1-3 scale)
  description: A calibrated diagnostic output that supports routing for a light-touch story-confidence check that audits whether the learner can retell the big-picture narrative thread.
  format: structured response
- name: Fuzzy zones list (narrative breakdown points)
  description: A calibrated diagnostic output that supports routing for a light-touch story-confidence check that audits whether the learner can retell the big-picture narrative thread.
  format: bulleted or tabular list
- name: Priority encoding targets (focus areas for ENCODE phase)
  description: A calibrated diagnostic output that supports routing for a light-touch story-confidence check that audits whether the learner can retell the big-picture narrative thread.
  format: structured response
- name: Optional probe seed suggestions for M-CAL-002
  description: A tagged retrieval-question bank that can be reused later for practice or deck construction.
  format: bulleted or tabular list
artifact_schemas:
  Story confidence rating (1-3 scale): scored_items
  Fuzzy zones list (narrative breakdown points): bullet_list
  Priority encoding targets (focus areas for ENCODE phase): scored_items
  Optional probe seed suggestions for M-CAL-002: bullet_list
produces:
- Story confidence rating (1-3 scale)
- Fuzzy zones list (narrative breakdown points)
- Priority encoding targets (focus areas for ENCODE phase)
- Optional probe seed suggestions for M-CAL-002
requires:
- artifact: ConfidenceTaggedResults (per-item confidence + correctness)
  optional: true
  alternatives:
  - FullCalibrateItemResults (per-item correctness, latency, confidence)
  - CalibrateItemResults (per-item correctness, latency, confidence)
required_outputs:
- Story confidence rating (1-3 scale)
- Fuzzy zones list (narrative breakdown points)
- Priority encoding targets (focus areas for ENCODE phase)
- Optional probe seed suggestions for M-CAL-002
success_criteria:
- All required outputs are present for M-CAL-004.
- The block remains diagnostic only and no teaching is introduced before the attempt.
- The learner or tutor can point to the output artifact and reuse it later without ambiguity.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Story confidence rating (1-3 scale).'
- The method stayed in the correct stage but the final artifact needs one more pass to be reusable.
steps:
- step: 1
  name: 'Ask: "Can you see'
  action: "Ask: \"Can you see the whole story in your head? Rate 1-3: (1) fuzzy, (2) partial, (3) clear\". Quick gut check \u2014 no overthinking"
  tutor_does: "Present ask: \"can you see the whole story in your head? rate 1-3: (1) fuzzy, (2) partial, (3) clear\". quick gut check \u2014 no overthinking as a short diagnostic move and do not teach the answer before the attempt."
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 6
  check: Is the scope set and is the learner ready for a diagnostic attempt?
  example: "Tutor: \"Ask: \"Can you see the whole story in your head? Rate 1-3: (1) fuzzy, (2) partial, (3) clear\". Quick gut check \u2014 no overthinking.\" Learner: \"Ready.\""
- step: 2
  name: 'Ask: "Where does the'
  action: 'Ask: "Where does the story break down or get fuzzy?". Identify the weakest part of the narrative thread'
  tutor_does: 'Present ask: "where does the story break down or get fuzzy?". identify the weakest part of the narrative thread as a short diagnostic move and do not teach the answer before the attempt.'
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 6
  check: Is this step complete and ready to advance?
  example: Tutor shows one brief probe and records answer, confidence, and latency.
- step: 3
  name: Tag fuzzy areas as
  action: Tag fuzzy areas as priority targets for deeper encoding. These become the focus areas for ENCODE phase
  tutor_does: Present tag fuzzy areas as priority targets for deeper encoding. these become the focus areas for encode phase as a short diagnostic move and do not teach the answer before the attempt.
  learner_does: Attempts the item, reports confidence, and accepts routing feedback without turning the block into tutoring.
  max_lines: 8
  check: Is this step complete and ready to advance?
  example: Tutor summarizes the weakest pattern and states whether the learner is ready to route onward.
constraints:
- rule: Diagnostic only; no teaching before or during the probe
  why: Calibration must measure readiness, not change the learner state by explanation.
- rule: Require one genuine attempt before hints or answer reveal
  why: The diagnostic signal is only trustworthy when the learner has to produce a response first.
- rule: Keep scope tied to the active objective set
  why: Calibration is only useful when the items match what the learner is supposed to know.
- rule: Respect item-count and time caps from the source file
  why: Short calibration blocks preserve low-friction routing and reduce fatigue.
allowed_moves:
- Ask learner to rate story-level confidence on configured scale (1-3 or HML)
- Ask where the narrative breaks down or gets fuzzy
- Tag fuzzy areas as priority targets for deeper encoding
- Use brief retell prompt (2 sentences) to verify confidence accuracy
- Recalibrate if learner claims full understanding but cannot retell story arc
- Keep interaction under 2-minute hard cap
- Hand off flagged fuzzy zones into M-CAL-002 probe design
- Run short scored probes inside the declared scope
- Capture answer, confidence, and latency for each item
- Provide only minimal clarification after the learner attempts an item
- Summarize readiness and route the learner to the next stage
forbidden_moves:
- Present item-level quiz questions (story-level confidence only)
- Teach or explain content during calibration (diagnostic only)
- Break narrative immersion with detail-level assessment
- Skip confidence capture before any corrective feedback
- Exceed 2-minute hard cap
- Turn this into a quiz or pretest
- Provide corrective feedback on story content (capture only)
- Use this card as a replacement for M-CAL-002 / M-CAL-003
- Teach the concept before the learner attempts the probe
- Reveal the full answer before the attempt
- Expand beyond the active objective scope
stuck_protocol: Use one simpler probe, narrow the objective scope, and keep the block diagnostic only.
failure_modes:
- mode: Learner asks for teaching before attempting
  detection: The response contains requests for explanation instead of a first attempt.
  recovery: Restate the diagnostic rule, reduce the item to one short probe, and require an attempt.
  fallback_method: M-CAL-004
- mode: Probe is too broad to score cleanly
  detection: The learner stalls, guesses, or gives a very long response with no clear target.
  recovery: Narrow the scope to one objective or one subskill and rerun the probe.
  fallback_method: M-CAL-001
- mode: The block drifts into TEACH
  detection: The tutor starts explaining content or giving step-by-step instruction.
  recovery: Stop the explanation, reset to a diagnostic prompt, and summarize only the readiness signal.
  fallback_method: M-CAL-003
default_duration_min: 2
energy_cost: low
best_stage: first_exposure
mechanisms:
- metacognitive_monitoring
- calibration
- schema_assessment
evidence:
  citation: Metcalfe (2017); Rhodes (2019); Confidence judgments in real classroom settings (2011); Cho (2024)
  finding: Story Confidence Tag is best supported as a light-touch metacognitive monitoring move that collects a global confidence judgment and then asks where the learner's narrative thread breaks. Metacognition research shows that confidence judgments can guide study decisions, but classroom and concept-calibration work also shows that global confidence is often imperfect unless it is tied to a concrete task or breakdown point. The practical implication for this method is to keep the confidence tag simple, ask for the actual story-break location rather than a vague feeling, and use the fuzzy zones to route the learner toward encoding or fuller calibration rather than treating the rating itself as mastery evidence.
  source: https://doi.org/10.1146/annurev-psych-010416-044022; https://doi.org/10.1177/0098628319834381; https://doi.org/10.1080/00207590701436744; https://doi.org/10.1177/14757257231182301
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
related_methods:
- id: M-CAL-002
  relationship: Escalate here when the light-touch story tag is too coarse and a fuller probe set is needed
- id: M-GEN-007
  relationship: Use when the identified fuzzy zone should be encoded through a mechanism trace next
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - After each answer I rate confidence H/M/L.
  replaces_with:
  - This is confidence capture only. There is no scoreable 'correct' story. Do NOT correct the learner's retell. Tag fuzzy zones as encoding targets and end the block.
  - Use the configured 1-3 scale (fuzzy / partial / clear). Do not collapse to H/M/L unless the method's `knobs:` declares it.
  reason: Story Confidence Tag is light-touch top-down calibration with no item-level quizzing and no correctness scoring. CI's reveal-after-attempt and H/M/L scale both misfit this format.
facilitation_prompt: |-
  You are running M-CAL-004 (Story Confidence Tag) in the CALIBRATE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Story confidence rating, Fuzzy zones list, Priority encoding targets, and Optional probe seed suggestions.
  Run a light-touch global calibration check. Ask for the 1-3 story confidence rating, locate where the narrative thread breaks, and convert those fuzzy zones into the next encoding or probing targets.
  Preset behavior:
  - exam_cram: one-shot; confidence tag, one fuzzy zone, one priority target.
  - deep_mastery: interactive; confidence rating plus fuller retell check and richer routing handoff.
  - quick_review: one-shot refresh; Confidence | Story break | Next target table.
  - clinical_bridge: stepwise; applied routing grid from story-break point to next encoding or probe move.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves confidence tag -> fuzzy zone -> routing target and waits.
