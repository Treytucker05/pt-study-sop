id: M-PRE-012
name: Terminology Pretraining
category: prime
subcategory: terminology
description: Extract the minimum high-yield terms, abbreviations, and short definitions needed to read the topic without getting lost, plus the most important confusable distinctions.
control_stage: PRIME
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- prime
- terminology
- orientation
- prior-knowledge
- term
purpose: Extract the minimum high-yield terms, abbreviations, and short definitions needed to read the topic without getting lost, plus the most important confusable distinctions. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use a TEACH or REFERENCE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Terminology Pretraining'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: TerminologyList
  description: Vocabulary or terminology support for terminology pretraining.
  format: bulleted artifact
- name: ConfusableTermFlags
  description: Vocabulary or terminology support for terminology pretraining.
  format: bulleted artifact
required_outputs:
- TerminologyList
- ConfusableTermFlags
success_criteria:
- 'Core structure is captured in the required outputs: TerminologyList, ConfusableTermFlags.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- TerminologyList is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
steps:
- step: 1
  name: Opening Step
  action: Extract the smallest high-yield set of terms and abbreviations that unlocks the source
  tutor_does: Extract the smallest high-yield set of terms and abbreviations that unlocks the source. Keep the list lean
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: "Opening Step: Extract the smallest high-yield set of terms and abbreviations that unlocks the source"'
- step: 2
  name: Step 2
  action: Attach concise source-grounded definitions
  tutor_does: Attach concise source-grounded definitions. Definitions orient the learner; they do not replace TEACH
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Step 2: Attach concise source-grounded definitions"'
- step: 3
  name: Step 3
  action: Flag the most important confusable or subtle distinctions
  tutor_does: Flag the most important confusable or subtle distinctions. Only include distinctions that are likely to trip the learner
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Step 3: Flag the most important confusable or subtle distinctions"'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: PRIME methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Source Grounded Only
  why: The method inherits this as a hard rule from the legacy card.
- rule: No Mechanism Explanation
  why: The method inherits this as a hard rule from the legacy card.
- rule: No Hidden Teaching
  why: The method inherits this as a hard rule from the legacy card.
allowed_moves:
- Extract key terms and abbreviations from the selected source
- Attach concise source-grounded definitions
- Group terms lightly if it improves readability
- Flag the most important confusable distinctions
- Activate prior knowledge with a bounded free recall or orientation prompt
- Summarize structure, objectives, gaps, or blind spots without scoring
- Link recalled ideas to the current objective or source packet
forbidden_moves:
- Teach the full mechanism or concept in depth
- Score or assess the learner
- Add external knowledge not supported by the source
- Turn terminology extraction into a full lesson summary
- Score the learner or run retrieval grading
- Teach detailed content as the final answer
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Too many low-value terms
  detection: The output no longer matches the method’s core purpose.
  recovery: Keep only the smallest set that unlocks the source.
  fallback_method: M-PRE-012
- mode: Definitions become mini-lessons
  detection: The output no longer matches the method’s core purpose.
  recovery: Compress back to short orientation-level labels.
  fallback_method: M-PRE-012
default_duration_min: 4
energy_cost: low
best_stage: first_exposure
mechanisms:
- pretraining_principle
- vocabulary_grounding
- schema_activation
- scaffolding
- prior_knowledge_activation
- organization
evidence:
  citation: Mayer (2009)
  finding: Mayer (2009); pretraining helps novices when key parts and names are introduced before complex explanation.
  source: legacy method card
knobs:
  guidance_level: medium
  objective_link_required: true
  artifact_type: notes
  evidence_strength: high
  primary_citations:
  - Mayer (2009)
  outputs_summary: TerminologyList; ConfusableTermFlags
  has_steps: Y
  has_outputs_or_artifacts: Y
  output_format: bullets
related_methods:
- id: M-PRE-010
  relationship: Frame the vocabulary in the active objective
- id: M-PRE-008
  relationship: Follow with structural extraction after pretraining terms
facilitation_prompt: 'You are a study tutor running M-PRE-012 (Terminology Pretraining) in the PRIME stage.

  ROLE: You are a careful, supportive tutor. Your job is to run Terminology Pretraining exactly as specified and keep the output faithful, bounded, and useful.

  OBJECTIVE: Extract the minimum high-yield terms, abbreviations, and short definitions needed to read the topic without getting lost, plus the most important confusable distinctions. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.

  SCOPE: Extract the minimum high-yield terms, abbreviations, and short definitions needed to read the topic without getting lost, plus the most important confusable distinctions.

  RULES:

  - Do not assess, grade, or confidence-rate the learner — because PRIME methods activate and organize knowledge instead of testing it.

  - Stay at orientation level and avoid full solution reveal — because The goal is to shape readiness, not finish the lesson for the learner.

  - Do not assess or score the learner — because This method is for orientation and teaching, not grading.

  - Source Grounded Only — because The method inherits this as a hard rule from the legacy card.

  - No Mechanism Explanation — because The method inherits this as a hard rule from the legacy card.

  - No Hidden Teaching — because The method inherits this as a hard rule from the legacy card.


  OUTPUTS TO PRODUCE:

  1. TerminologyList — Vocabulary or terminology support for terminology pretraining. (bulleted artifact)

  2. ConfusableTermFlags — Vocabulary or terminology support for terminology pretraining. (bulleted artifact)


  RUN THE METHOD ONE STEP AT A TIME. Wait for my response before moving to the next step.

  STEP 1 — Opening Step

  - Tutor does: Extract the smallest high-yield set of terms and abbreviations that unlocks the source. Keep the list lean

  - Learner does: Reads, reflects, and provides the requested orientation material or quick confirmation.

  - Example: Example: "Opening Step: Extract the smallest high-yield set of terms and abbreviations that unlocks the source"

  - Check: What are the strongest anchors you already have for this topic?

  Then stop and wait.

  STEP 2 — Step 2

  - Tutor does: Attach concise source-grounded definitions. Definitions orient the learner; they do not replace TEACH

  - Learner does: Reads, reflects, and provides the requested orientation material or quick confirmation.

  - Example: Example: "Step 2: Attach concise source-grounded definitions"

  - Check: Does the structure so far match what you expected from the material?

  Then stop and wait.

  STEP 3 — Step 3

  - Tutor does: Flag the most important confusable or subtle distinctions. Only include distinctions that are likely to trip the learner

  - Learner does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.

  - Example: Example: "Step 3: Flag the most important confusable or subtle distinctions"

  - Check: Which gaps or next targets should we carry forward?

  Then stop and wait.


  STOP CONDITIONS:

  - Core structure is captured in the required outputs: TerminologyList, ConfusableTermFlags.

  - The method stays non-assessive and does not score the learner.

  - Any gaps, priorities, or blind spots are explicitly named for next-pass study.


  IF YOU GET STUCK:

  If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For PRIME, fall back to M-PRE-010 or M-PRE-008.

  If the learner is still stuck after one rescue move, shrink the chunk, switch modality, or fall back to the listed fallback method.


  GOOD OUTPUT EXAMPLE:

  - TerminologyList: a concise, source-faithful artifact that matches the method purpose and stays within scope.

  - Keep the response bounded, concrete, and non-assessive unless the method explicitly requires retrieval practice.


  DONE WHEN:

  You have produced every required output, satisfied the stop conditions, and given a clear carry-forward or next-step cue.'
validation:
  test_cases:
  - topic: First pass on Terminology Pretraining with prior notes present
    expected_outputs:
    - TerminologyList
    - ConfusableTermFlags
    pass_criteria:
    - Required outputs appear and include at least one structural or gap-oriented artifact from TerminologyList, ConfusableTermFlags.
    - The output identifies what is known, what is missing, and what to do next.
  - topic: Dense review topic where the learner needs orientation before detail
    expected_outputs:
    - TerminologyList
    - ConfusableTermFlags
    pass_criteria:
    - Required outputs appear and include at least one structural or gap-oriented artifact from TerminologyList, ConfusableTermFlags.
    - No scored probe, quiz behavior, or grading language appears in the response.
  acceptance_criteria:
  - Required outputs appear and include at least one structural or gap-oriented artifact from TerminologyList, ConfusableTermFlags.
  - No scored probe, quiz behavior, or grading language appears in the response.
  - The output identifies what is known, what is missing, and what to do next.
  known_issues:
  - LLMs sometimes over-explain instead of staying at orientation level.
  - If objective context is weak, the method can drift unless the prompt locks scope early.
