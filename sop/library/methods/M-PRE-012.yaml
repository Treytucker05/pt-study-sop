id: M-PRE-012
name: Terminology Pretraining
category: ORIENT
subcategory: terminology-pretraining
description: Extract the minimum high-yield terms, abbreviations, and short definitions needed to read the topic without getting lost, plus the most important confusable distinctions.
control_stage: ORIENT
status: validated
version: '1.3'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- orient
- terminology
- pretraining
- prior-knowledge
- vocabulary
purpose: Extract the minimum high-yield terms, abbreviations, and short definitions needed to read the topic without getting lost, plus the most important confusable distinctions. Use it to activate prior knowledge, surface structure, and identify missing nodes before deeper work.
not_for: Not for first-contact teaching, scored assessment, or full solution reveal. Use an EXPLAIN or CONSOLIDATE method when the goal is explanation rather than orientation.
best_fit_topics:
- 'New or complex material that needs a quick orientation pass: Terminology Pretraining'
- Topics with prior notes, objective context, or an obvious structure to surface
poor_fit_topics:
- Brand-new content with no context or source packet
- Scored retrieval or diagnostic testing
learner_state_required: Source material is loaded, the topic is bounded, and the learner has at least some prior context or an objective to orient around.
inputs:
- description: Source material loaded in chat
  required: true
- description: Target topic or objective scope
  required: true
- description: Prior notes, North Star, or prior-session context
  required: false
outputs:
- name: TerminologyList
  description: Vocabulary or terminology support for terminology pretraining.
  format: bulleted artifact
- name: ConfusableTermFlags
  description: Vocabulary or terminology support for terminology pretraining.
  format: bulleted artifact
artifact_schemas:
  TerminologyList: bullet_list
  ConfusableTermFlags: bullet_list
produces:
- TerminologyList
- ConfusableTermFlags
requires: []
required_outputs:
- TerminologyList
- ConfusableTermFlags
success_criteria:
- 'Core structure is captured in the required outputs: TerminologyList, ConfusableTermFlags.'
- The method stays non-assessive and does not score the learner.
- Any gaps, priorities, or blind spots are explicitly named for next-pass study.
partial_criteria:
- TerminologyList is present but gaps or priorities are incomplete.
- The output has useful structure but is missing one required linkage or objective tie.
steps:
- step: 1
  name: Select Bottleneck Terms
  action: Identify the smallest sufficient set of terms needed for gist and mechanism
  tutor_does: Identify the smallest sufficient set of terms needed to follow the source's gist and mechanism. Prioritize conceptually difficult, central, high-utility items. Include abbreviations only if they are indispensable to parse the source. Skip peripheral or inferable words.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: What are the strongest anchors you already have for this topic?
  example: 'Example: For shoulder complex — keep "scapulohumeral rhythm", "glenohumeral", "ABER position"; skip generic anatomy words you already know.'
- step: 2
  name: Functional Definitions
  action: Attach a concise definition plus one function/state/context cue
  tutor_does: For each term, give a concise definition AND one functional cue — what it does, where it is, or a sentence/context where it appears. Avoid dictionary-only glosses. Definitions orient the learner; they do not replace EXPLAIN.
  learner_does: Reads, reflects, and provides the requested orientation material or quick confirmation.
  max_lines: 4
  check: Does the structure so far match what you expected from the material?
  example: 'Example: "Glenohumeral joint = ball-and-socket joint of the shoulder; primary site of arm elevation and the joint most often dislocated."'
- step: 3
  name: Critical Contrasts
  action: Flag only the few confusable distinctions likely to derail comprehension
  tutor_does: Flag only the few confusable distinctions likely to derail comprehension. Express each as a one-line contrast (e.g., "X is the structure; Y is the process"). Do not produce a long confusion list.
  learner_does: Shares the final check-in signal or says what clicked, what is fuzzy, and what should be carried forward.
  max_lines: 4
  check: Which gaps or next targets should we carry forward?
  example: 'Example: "Abduction = moving away from midline; Adduction = moving toward midline."'
constraints:
- rule: Do not assess, grade, or confidence-rate the learner
  why: ORIENT methods activate and organize knowledge instead of testing it.
- rule: Stay at orientation level and avoid full solution reveal
  why: The goal is to shape readiness, not finish the lesson for the learner.
- rule: Do not assess or score the learner
  why: This method is for orientation and teaching, not grading.
- rule: Source Grounded Only
  why: The method inherits this as a hard rule from the legacy card.
- rule: No Mechanism Explanation
  why: The method inherits this as a hard rule from the legacy card.
- rule: No Hidden Teaching
  why: The method inherits this as a hard rule from the legacy card.
allowed_moves:
- Extract key terms and abbreviations from the selected source
- Attach concise source-grounded definitions
- Group terms lightly if it improves readability
- Flag the most important confusable distinctions
- Activate prior knowledge with a bounded free recall or orientation prompt
- Summarize structure, objectives, gaps, or blind spots without scoring
- Link recalled ideas to the current objective or source packet
forbidden_moves:
- Teach the full mechanism or concept in depth
- Score or assess the learner
- Add external knowledge not supported by the source
- Turn terminology extraction into a full lesson summary
- Score the learner or run retrieval grading
- Teach detailed content as the final answer
stuck_protocol: If the learner stalls, shrink the chunk, switch to a simpler example or contrast, and then return to the same method. For ORIENT, fall back to M-PRE-010 or M-PRE-008.
failure_modes:
- mode: Too many low-value terms
  detection: The output no longer matches the method’s core purpose.
  recovery: Keep only the smallest set that unlocks the source.
  fallback_method: M-PRE-012
- mode: Definitions become mini-lessons
  detection: The output no longer matches the method’s core purpose.
  recovery: Compress back to short orientation-level labels.
  fallback_method: M-PRE-012
default_duration_min: 4
energy_cost: low
best_stage: first_exposure
mechanisms:
- pretraining_principle
- vocabulary_grounding
- schema_construction
- scaffolding
- prerequisite_knowledge_building
- selection_and_signaling_of_central_terms
- cognitive_load_management
- active_processing
- semantic_integration
- metacognitive_calibration
evidence:
  citation: Mayer (2009); Stahl and Nagy (2006); Wright and Cervetti (2017); Cervetti, Fitzgerald, Hiebert, and Hebert (2023); Hattan, Alexander, and Lupo (2024)
  finding: Terminology pretraining is strongest when learners meet the names and characteristics of central concepts before a complex explanation or dense reading task. Vocabulary research further suggests that comprehension gains are most reliable when instruction is selective, contextualized, and tied to function or use rather than dictionary-only glosses. More recent review evidence suggests that prior knowledge activation usually needs explicit prompting and that these supports matter most when learners lack enough domain vocabulary to orient themselves independently.
  source: https://doi.org/10.1017/CBO9780511811678.014; https://www.routledge.com/Teaching-Word-Meanings/Stahl-Nagy/p/book/9781410615381; https://doi.org/10.1002/rrq.163; https://doi.org/10.1080/02702711.2023.2179146; https://doi.org/10.3102/00346543221148478
  needs_research: false
boundary_conditions:
  strongest_for:
  - Novices or learners with weak prior knowledge facing complex, terminology-dense material
  - Sources where a small set of terms is genuinely central to comprehension
  - Learners with weak reading comprehension or underdeveloped academic vocabulary
  - Designs that pair term support with context, use, comparison, or multiple encounters
  weakest_for:
  - Knowledgeable learners (expertise reversal — benefit shrinks or disappears)
  - Simple, familiar, or self-paced material where terminology is not the bottleneck
  - Peripheral or inferable words rather than conceptually central terms
  - Goals requiring far transfer when the method is used as a substitute for deeper instruction
knobs:
  guidance_level: medium
  delivery_mode: one_shot
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest usable primer; keep only the most test-relevant bottleneck terms, use terse functional cues, and flag just the highest-risk confusions.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Slower and fuller primer; group terms lightly, allow richer function or context cues, and pause once before the confusable contrasts to check that the structure feels right.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Refresh pass for previously seen material; keep only shaky, confusable, or easily forgotten terms and skip beginner-level glosses.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied orientation pass; tie each cue or contrast to practical relevance, chart language, exam findings, or bedside distinctions without drifting into full teaching.
related_methods:
- id: M-PRE-010
  relationship: Frame the vocabulary in the active objective
- id: M-PRE-008
  relationship: Follow with structural extraction after pretraining terms
system_prompt_override:
  relaxes:
  - Highly interactive. One small teaching chunk, one short check, or one question at a time.
  - Ask only one question at a time.
  - Do not do more than one step at a time.
  - Within EXPLAIN, deliver ONE chunk at a time, check in, then continue.
  replaces_with:
  - Ask only for missing required inputs, then run the method.
  - Default to one bounded terminology artifact; if the active preset uses interactive or stepwise pacing, preserve the same outputs and stop between sections.
  - Keep the term set selective, source-grounded, and orientation-level.
  - Match the output shape to the active preset while preserving functional cues and critical contrasts.
  reason: Terminology Pretraining works best as a compact orientation artifact. The override keeps the term list selective and usable while allowing preset-specific pacing and output shape.
facilitation_prompt: |
  You are running M-PRE-012 (Terminology Pretraining) in the ORIENT stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: TerminologyList and ConfusableTermFlags.
  Select the smallest sufficient set of high-yield terms and indispensable abbreviations. For each term, give a concise definition plus one function, state, or context cue. Flag only the few confusable distinctions most likely to derail reading.
  Stay source-grounded, non-assessive, and stop before mechanism teaching.
  Preset behavior:
  - exam_cram: one-shot; bullets; keep only the most test-relevant bottleneck terms; use terse cues and 2-3 critical contrasts.
  - deep_mastery: interactive; labeled sections; group terms lightly, allow richer functional cues, and ask one short check before ConfusableTermFlags.
  - quick_review: one-shot refresh; assume prior exposure; keep only shaky, easily confused, or easily forgotten terms and skip beginner-level glosses.
  - clinical_bridge: stepwise; use a table or tightly labeled sections and tie cues or contrasts to applied relevance, chart language, exam findings, or bedside distinctions.
  If no preset is specified, use the default knobs. One-shot returns both outputs in one bounded reply; interactive or stepwise mode moves section by section and waits.
validation:
  test_cases:
  - topic: First pass on Terminology Pretraining with prior notes present
    expected_outputs:
    - TerminologyList
    - ConfusableTermFlags
    pass_criteria:
    - Required outputs appear and include at least one structural or gap-oriented artifact from TerminologyList, ConfusableTermFlags.
    - The output identifies what is known, what is missing, and what to do next.
  - topic: Dense review topic where the learner needs orientation before detail
    expected_outputs:
    - TerminologyList
    - ConfusableTermFlags
    pass_criteria:
    - Required outputs appear and include at least one structural or gap-oriented artifact from TerminologyList, ConfusableTermFlags.
    - No scored probe, quiz behavior, or grading language appears in the response.
  acceptance_criteria:
  - Required outputs appear and include at least one structural or gap-oriented artifact from TerminologyList, ConfusableTermFlags.
  - No scored probe, quiz behavior, or grading language appears in the response.
  - The output identifies what is known, what is missing, and what to do next.
  known_issues:
  - LLMs sometimes over-explain instead of staying at orientation level.
  - If objective context is weak, the method can drift unless the prompt locks scope early.
  - Definition-only encoding is shallow; pair definitions with one function/state/context cue.
  - Near-transfer effects are much stronger than generalized-transfer effects.
  - Risk of illusion of understanding (misplaced meaning effect) when learners feel "I know this term" after only seeing a label and gloss.
  - Pretraining can become redundant or counterproductive for higher-knowledge learners (expertise reversal).
  - No validated optimal term count — prioritize selectivity over a fixed number.
  - Abbreviation handling has sparse direct evidence; include abbreviations only when indispensable to parse the source.
