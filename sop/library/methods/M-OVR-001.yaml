id: M-OVR-001
name: Exit Ticket
category: overlearn
subcategory: ticket
description: 'Answer three questions: (1) What did I learn? (2) What''s still muddy? (3) What''s my next action?'
control_stage: OVERLEARN
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- reflection
- meta
- wrap
- sop-core
purpose: Exit Ticket exists to run a bounded exit ticket that closes the session with takeaways, muddy points, and a concrete
  next action. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for initial teaching, discovery, or broad remediation. Use TEACH or REFERENCE first if understanding
  is not already present.
best_fit_topics:
- session closure reflection
- next-action planning
- muddy-point capture
poor_fit_topics:
- full remediation lectures
- raw assessment scoring
- new concept introduction
learner_state_required: Core understanding already exists, retrieval is reasonably stable, and the learner is ready for short
  fluency reps rather than new instruction.
inputs:
- description: Completed study session
  required: true
- description: Exit ticket template (3 questions)
  required: true
- description: Session notes or artifacts for reference
  required: true
outputs:
- name: Exit ticket (all 3 questions answered)
  description: A short session-closure artifact that captures takeaways, muddy points, and next actions.
  format: free-response text
- name: Key takeaways list (3-5 specific items)
  description: A structured output for a bounded exit ticket that closes the session with takeaways, muddy points, and a concrete
    next action.
  format: bulleted or tabular list
- name: Muddy points or weak anchors identified
  description: A compact reference artifact with the minimum definitions, rules, examples, near-misses, and traps needed for
    later retrieval.
  format: formatted study artifact
- name: Next action commitment (specific and actionable)
  description: A structured output for a bounded exit ticket that closes the session with takeaways, muddy points, and a concrete
    next action.
  format: structured response
- name: Questions for next session
  description: A structured output for a bounded exit ticket that closes the session with takeaways, muddy points, and a concrete
    next action.
  format: structured response
required_outputs:
- Exit ticket (all 3 questions answered)
- Key takeaways list (3-5 specific items)
- Muddy points or weak anchors identified
- Next action commitment (specific and actionable)
- Questions for next session
success_criteria:
