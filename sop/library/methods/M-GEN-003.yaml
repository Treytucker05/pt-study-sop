id: M-GEN-003
name: Draw-Label
category: ENCODE
subcategory: draw-label
description: Sketch the structure from memory, label it, inspect the gaps against the source, and redraw if the gap rate is still too high.
control_stage: ENCODE
status: validated
version: '1.2'
created: '2026-04-07'
updated: '2026-04-21'
tags:
- encode
- draw-label
- drawing
- diagram
- visual-organization
- anatomy
- pathways
purpose: Draw-Label exists to force the learner to reconstruct a structure visually from memory, expose exactly which labels or relations are missing, and repair only those gaps through a redraw loop. It turns the current stage into a clean, reusable signal instead of a vague study session.
not_for: This is not for isolated trivia, free-form brainstorming, or content that has no meaningful structure to map.
best_fit_topics:
- Structures, pathways, lists, tables, and maps with visible relationships
- Material that benefits from spatial or hierarchical organization
- Topics where reconstructing the layout helps expose missing parts or weak connections
poor_fit_topics:
- Single isolated facts that only need a quick cue
- Highly abstract content with no separable parts or relationships
- Topics so broad that one sketch cannot stay bounded
learner_state_required: Source material is loaded. The learner has a bounded structure to reconstruct and is ready to sketch and label it before checking the source.
inputs:
- description: Structure to draw (anatomy, pathway, diagram)
  required: true
- description: Blank paper or drawing surface
  required: true
- description: Source material for gap-filling
  required: true
outputs:
- name: Completed labeled diagram
  description: Learner-generated diagram or map reconstructed from memory and then completed after gap-checking.
  format: labeled visual structure
- name: Gap list (what was missing)
  description: Specific missing labels, links, or spatial relationships identified during source check.
  format: bulleted or tabular list
- name: Accuracy percentage
  description: Estimated proportion of labels or required parts recalled before gap-filling.
  format: short summary line or numeric score
artifact_schemas:
  Completed labeled diagram: tree_map
  Gap list (what was missing): bullet_list
  Accuracy percentage: paragraph
produces:
- Completed labeled diagram
- Gap list (what was missing)
- Accuracy percentage
requires:
- artifact: FinalLearningObjectives
  optional: true
  alternatives:
  - NorthStarSentence
  - North_Star
required_outputs:
- Completed labeled diagram
- Gap list (what was missing)
- Accuracy percentage
success_criteria:
- All required outputs are present for M-GEN-003.
- The learner sketches and labels from memory before consulting the source.
- The method ends with an explicit gap list and, when needed, a redraw loop instead of drifting into passive copying.
partial_criteria:
- 'One or more required outputs are present but one core artifact is incomplete: Completed labeled diagram.'
- The learner produced a sketch, but the gap list or accuracy estimate remained too vague to guide the next review move.
steps:
- step: 1
  name: Close or cover source material
  action: Close or cover source material before drawing.
  tutor_does: Guide the learner to hide the source so the first sketch is truly memory-based. Remind them that rough structure matters more than neatness.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is the source fully hidden so the learner has to reconstruct from memory?
  example: 'Example: Cover the notes or image reference before starting the sketch.'
- step: 2
  name: Sketch the basic structure outline
  action: Sketch the basic structure or outline from memory.
  tutor_does: Guide the learner to lay out the major parts and spatial relationships first instead of chasing artistic detail.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Does the sketch capture the major structure well enough to label?
  example: 'Example: Rough is fine; place the main nodes or regions where they belong.'
- step: 3
  name: Label as many parts as you can recall
  action: Label as many parts as you can recall from memory.
  tutor_does: Guide the learner to fill in labels aggressively from memory and leave blanks where uncertain rather than guessing silently.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Are uncertain labels left visible as blanks instead of being copied or hidden?
  example: 'Example: Label the vessels, nodes, or steps you know, and leave the rest blank.'
- step: 4
  name: Check source material for gaps
  action: Check source material for gaps.
  tutor_does: Guide the learner to compare the sketch against the source and record exactly which labels, links, or placements were missing.
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is there a concrete gap list rather than a vague impression of missing parts?
  example: 'Example: Note the two missing branches and the mislabeled junction.'
- step: 5
  name: Fill in missing labels with a different color
  action: Fill in missing labels with a different color.
  tutor_does: Guide the learner to make repaired labels visually distinct so the misses stay visible for later review.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Are repaired labels clearly distinguishable from the original recall attempt?
  example: 'Example: Use a second color or explicit mark for every filled gap.'
- step: 6
  name: Redraw from memory if more than 30 percent of labels were missing
  action: Redraw from memory if more than 30 percent of labels were missing.
  tutor_does: Guide the learner to run one more memory-based redraw when the gap rate is still too high, keeping the scope bounded to the same structure.
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is the redraw decision based on the actual gap rate rather than on frustration or aesthetics?
  example: 'Example: If more than about one-third of the labels were missing, redraw the same structure from memory.'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Prompt the learner to close source material before drawing
- Describe what to draw and which spatial relationships or sequence links matter most
- Encourage rough sketching focused on structure rather than artistic quality
- Prompt the learner to label as many parts as possible from memory
- After the attempt, guide the learner to check the source and log exact misses
- Suggest using a different color or mark for repaired labels
- Prompt a redraw if gap rate exceeds 30 percent
- Ask the learner to explain one key spatial or causal relationship in the diagram
forbidden_moves:
- Draw or sketch the diagram for the learner
- Provide labels before the learner attempts recall from memory
- Allow the learner to copy directly from source material while drawing the first pass
- Accept a diagram without gap tracking
- Skip the memory-first reconstruction step
- Focus feedback on artistic quality instead of structural accuracy
- Generate the outputs for the learner instead of reviewing their work
- Move to retrieval before encoding is complete
stuck_protocol: Reduce the scope to fewer nodes or rows, restate the parts in plain language, and rebuild the structure one relationship at a time. If needed, switch to a simpler map or flowchart.
failure_modes:
- mode: Looking at source while drawing
  detection: The learner consults the source during the first-pass sketch or the artifact no longer reflects memory-first reconstruction.
  recovery: Cover the source again and restart the first-pass sketch from memory.
  fallback_method: M-ORG-001
- mode: Focusing on artistic quality
  detection: The learner stalls on neatness, proportions, or style rather than structure and labels.
  recovery: Reset the standard to rough but structurally correct and continue with stick-figure level detail if needed.
  fallback_method: M-GEN-004
- mode: Not tracking gaps
  detection: Missing parts are filled in without being logged or visually marked.
  recovery: Require a visible gap list and a distinct mark or color for every repaired label.
  fallback_method: M-ORG-002
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- learner_generated_drawing
- dual_coding
- retrieval
- generative_learning
- spatial_organization
- error_highlighting
evidence:
  citation: Van Meter and Garner (2005); Wammes, Meade, and Fernandes (2016); Wammes, Meade, and Fernandes (2018); Wang, Yang, and Kyle Jr. (2023); Xie and Deng (2023); Dechamps, Leopold, and Leutner (2025)
  finding: >-
    Draw-Label is best supported as a learner-generated drawing method that
    improves learning when students must reconstruct and label a structure
    themselves, then inspect the drawing for missing or inaccurate elements.
    The classic learner-generated-drawing review and the drawing-effect
    experiments support drawing as more than decoration: it can strengthen
    memory by forcing selection, organization, elaboration, and multimodal
    encoding. Recent classroom studies show that drawing can improve delayed
    learning and motivation relative to simple rereading, but also show an
    important boundary condition: drawing does not help automatically unless it
    is tied to meaningful reconstruction or retrieval rather than shallow
    copying. The latest drawing-to-learn meta-analytic work sharpens the
    practical implication for this method: use memory-first sketching, make
    omissions visible, and support the learner in integrating the repaired
    labels back into a coherent structure instead of treating drawing as an art
    task.
  source: https://doi.org/10.1007/s10648-005-8136-3; https://doi.org/10.1080/17470218.2015.1094494; https://doi.org/10.1037/xlm0000445; https://doi.org/10.1186/s43031-023-00083-4; https://doi.org/10.1016/j.actpsy.2023.104039; https://doi.org/10.1007/s10648-025-10067-7
  needs_research: false
knobs:
  guidance_level: medium
  delivery_mode: stepwise
  fade_intensity: minimal
  output_layout: labeled_sections
  explanation_density: focused
presets:
  exam_cram:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: bullets
    explanation_density: lean
    behavior: Fastest sketch pass. Produce one rough labeled outline, a short miss list, and a single redraw call only if the gap rate is clearly above threshold.
  deep_mastery:
    guidance_level: high
    delivery_mode: interactive
    fade_intensity: adaptive_light
    output_layout: labeled_sections
    explanation_density: detailed
    behavior: Full reconstruction pass. Keep separate sections for first-pass sketch plan, recalled labels, gap log, repaired labels, and redraw decision.
  quick_review:
    guidance_level: light
    delivery_mode: one_shot
    fade_intensity: minimal
    output_layout: table
    explanation_density: lean
    behavior: Refresh pass. Render the output as a compact table with region or node, recalled label, missing piece, repair mark, and status columns.
  clinical_bridge:
    guidance_level: medium
    delivery_mode: stepwise
    fade_intensity: adaptive_light
    output_layout: table
    explanation_density: focused
    behavior: Applied anatomy or pathway pass. Use a clinical structure grid with location or step, label, function or significance, missing point, and repair note so the drawing doubles as a practical orientation tool.
related_methods:
- id: M-ORG-001
  relationship: Concept-map fallback for visual organization when free sketching is too open-ended
- id: M-GEN-004
  relationship: Alternative map-building method when the learner needs a more guided organizer
- id: M-ORG-002
  relationship: Comparison-table fallback when contrast matters more than spatial layout
system_prompt_override:
  relaxes:
  - Never reveal the full answer without letting me attempt first. Progressive hints, not solutions.
  - Highly interactive. One teaching chunk (8-12 lines max), one check, one question at a time.
  replaces_with:
  - Require one full memory-first sketch and label attempt before any source check. Do not preload labels or simplify the task into copying.
  - Treat missing labels, missing links, and misplaced parts as first-class outputs. Repair should stay scoped to those visible gaps and may trigger one redraw if the gap rate is still too high.
  reason: Draw-Label only works when the learner externalizes the structure from memory first and then uses the visible misses to guide repair. If the tutor supplies labels too early or lets the learner copy, the generative and diagnostic value collapses.
facilitation_prompt: |
  You are running M-GEN-003 (Draw-Label) in the ENCODE stage.
  Use only the loaded source. Ask only for missing required inputs.
  Produce: Completed labeled diagram, Gap list, and Accuracy percentage.
  Have the learner sketch one bounded structure from memory, label as many parts as possible, compare against the source only after the attempt, and visibly mark every repaired label or link. If more than 30 percent of the needed labels were missing, run one redraw of the same structure. Do not draw for the learner and do not let the first pass turn into copying.
  Preset behavior:
  - exam_cram: one-shot; rough labeled outline; short miss list; redraw only if clearly needed.
  - deep_mastery: interactive; separate sketch, label, gap, repair, and redraw sections.
  - quick_review: one-shot refresh; compact label-gap-status table.
  - clinical_bridge: stepwise; applied anatomy or pathway grid with function or significance notes.
  If no preset is specified, use the default knobs. One-shot returns the full artifact in one bounded reply; interactive or stepwise mode moves cover source -> sketch -> label -> gap check -> repair -> redraw decision and waits.
validation:
  test_cases:
  - topic: Structures, pathways, lists, tables, and maps with visible relationships
    expected_outputs:
    - Completed labeled diagram
    - Gap list (what was missing)
    - Accuracy percentage
    pass_criteria:
    - All required outputs are present.
    - The learner performs the required active step before the final artifact is given.
    - The result stays within scope and matches the method format.
  - topic: Single isolated facts that only need a quick cue
    expected_outputs:
    - Stuck protocol response
    - Either a simpler scaffold or a method redirect
    pass_criteria:
    - The tutor does not force a bad fit.
    - The tutor either shrinks scope or suggests a better-fitting method.
    - The response remains honest about the mismatch.
  acceptance_criteria:
  - All required_outputs are present in the successful test case.
  - No forbidden_moves are violated.
  - The facilitation_prompt can be run without extra hidden context.
  known_issues:
  - LLMs may over-explain instead of enforcing the memory-first sketch unless the first attempt is gated explicitly.
  - Learners can confuse a neat copy with a useful diagnostic drawing unless misses are logged and visibly marked.
