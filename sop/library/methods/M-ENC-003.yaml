id: M-ENC-003
name: Draw-Label
category: encode
subcategory: org
description: Sketch the structure (anatomy, pathway, concept map) and label from memory. Fill gaps with
  source material.
control_stage: ENCODE
status: validated
version: '1.0'
created: '2026-04-07'
updated: '2026-04-14'
tags:
- visual
- anatomy
- drawing
- active
- retrieval
purpose: Organize the material into a visible structure so relationships, sequence, contrast, or hierarchy
  become easier to remember and explain.
not_for: This is not for isolated trivia, free-form brainstorming, or content that has no meaningful structure
  to map.
best_fit_topics:
- Structures, pathways, lists, tables, and maps with visible relationships
- Material that benefits from spatial or hierarchical organization
poor_fit_topics:
- Single isolated facts that only need a quick cue
- Highly abstract content with no separable parts or relationships
learner_state_required: Source material is loaded. The learner can see or recall the parts and is ready
  to organize them into a structure.
inputs:
- description: Structure to draw (anatomy, pathway, diagram)
  required: true
- description: Blank paper or drawing surface
  required: true
- description: Source material for gap-filling
  required: true
outputs:
- name: Completed labeled diagram
  description: Completed labeled diagram
  format: labeled visual structure
- name: Gap list (what was missing)
  description: Gap list (what was missing)
  format: short, checkable artifact
- name: Accuracy percentage
  description: Accuracy percentage
  format: short, checkable artifact
required_outputs: &id001
- Completed labeled diagram
- Gap list (what was missing)
- Accuracy percentage
success_criteria:
- 'All required outputs are present and checkable: Completed labeled diagram, Gap list (what was missing),
  Accuracy percentage.'
- 'The method reaches its stop condition: Diagram complete with all labels; Gap rate <30%.'
- The learner stays active and the tutor does not give away the answer before the required attempt or
  transformation.
partial_criteria:
- 'Some required outputs are present but at least one is missing or incomplete: Completed labeled diagram,
  Gap list (what was missing).'
steps:
- step: 1
  name: Or Cover Source Material
  action: Close or cover source material
  tutor_does: 'Guide the learner to Close or cover source material. Keep in mind: Drawing from memory
    is the key mechanism'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Drawing from memory is the key mechanism'
- step: 2
  name: Sketch The Basic Structure Outline
  action: Sketch the basic structure/outline from memory
  tutor_does: 'Guide the learner to Sketch the basic structure/outline from memory. Keep in mind: Rough
    is fine — focus on spatial relationships'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Rough is fine — focus on spatial relationships'
- step: 3
  name: Label As Many Parts As
  action: Label as many parts as you can recall
  tutor_does: 'Guide the learner to Label as many parts as you can recall. Keep in mind: Leave blank where
    uncertain'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Leave blank where uncertain'
- step: 4
  name: Source Material For Gaps
  action: Check source material for gaps
  tutor_does: 'Guide the learner to Check source material for gaps. Keep in mind: Note which labels you
    missed'
  learner_does: Reads the prompt, does the thinking step, and returns the artifact or answer.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Note which labels you missed'
- step: 5
  name: In Missing Labels With A
  action: Fill in missing labels with a different color
  tutor_does: 'Guide the learner to Fill in missing labels with a different color. Keep in mind: Different
    color highlights gaps for review'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Different color highlights gaps for review'
- step: 6
  name: Redraw From Memory If 30
  action: Redraw from memory if >30% gaps
  tutor_does: 'Guide the learner to Redraw from memory if >30% gaps. Keep in mind: Repeat until <30% gaps'
  learner_does: Performs the requested cognitive move and shares the result before moving on.
  max_lines: 8
  check: Is this step complete and ready for the next move?
  example: 'Example: Repeat until <30% gaps'
constraints:
- rule: Require active learner processing
  why: The method depends on the learner generating, mapping, explaining, or transforming the material
    rather than passively reading.
- rule: Stay within objective scope
  why: Prevents drift into unrelated material and keeps the method auditable.
- rule: Do not turn this into a passive answer dump or scoring event
  why: This method is designed for guided learning, not one-shot lecture or formal grading.
- rule: Force active processing (explain, transform, or map), not passive reading.
  why: This gating rule is part of the method’s execution contract.
- rule: Keep output scoped to mapped objectives only.
  why: This gating rule is part of the method’s execution contract.
allowed_moves:
- Prompt the learner to close source material before drawing
- Describe what to draw (structure, pathway) and spatial relationships to focus on
- Encourage rough sketching focused on accuracy over artistic quality
- Prompt learner to label as many parts as they can recall from memory
- After learner attempts, guide them to check source material for gaps
- Suggest using a different color for gap-filled labels
- Prompt a redraw if gap rate exceeds 30%
- Ask learner to explain spatial relationships in their diagram
forbidden_moves:
- Draw or sketch the diagram FOR the learner
- Provide labels before the learner attempts recall from memory
- Allow the learner to copy directly from source material while drawing
- Accept a diagram without gap tracking (missed labels must be noted)
- Skip the memory-first retrieval step
- Focus feedback on artistic quality instead of structural accuracy
- Generate outputs FOR the learner instead of reviewing their work
- Move to retrieval before encoding is complete
stuck_protocol: Reduce the scope to fewer nodes or rows, restate the parts in plain language, and then
  rebuild the structure one relationship at a time. If needed, switch to a simpler map or flowchart.
failure_modes:
- mode: Looking at source while drawing
  detection: The learner or tutor starts doing looking at source while drawing or the artifact stops satisfying
    the method’s required checks.
  recovery: Physically cover source material
  fallback_method: M-ENC-009
- mode: Focusing on artistic quality
  detection: The learner or tutor starts doing focusing on artistic quality or the artifact stops satisfying
    the method’s required checks.
  recovery: Emphasize accuracy over beauty; stick figures acceptable
  fallback_method: M-ENC-015
- mode: Not tracking gaps
  detection: The learner or tutor starts doing not tracking gaps or the artifact stops satisfying the
    method’s required checks.
  recovery: Require different-color pen for filled gaps
  fallback_method: M-ENC-010
default_duration_min: 10
energy_cost: high
best_stage: first_exposure
mechanisms:
- dual_coding
- retrieval
- generation
evidence:
  citation: Wammes et al. (2016)
  finding: Drawing effect — drawing produces superior memory compared to writing, especially for visual-spatial
    content
  source: seed_methods.py
knobs:
  guidance_level: medium
  output_format: bullets
  evidence_raw: Wammes et al. (2016); drawing effect — drawing produces superior memory compared to writing
  gating_rules:
  - Force active processing (explain, transform, or map), not passive reading.
  - Keep output scoped to mapped objectives only.
  logging_fields:
  - structure_drawn
  - labels_recalled
  - labels_missed
  - gap_percentage
  - redraw_count
  artifact_type: notes
related_methods:
- id: M-ENC-009
  relationship: Concept-map fallback for visual organization
- id: M-ENC-015
  relationship: Alternative map-building method
- id: M-ENC-010
  relationship: Comparison table if the task is contrast-heavy
